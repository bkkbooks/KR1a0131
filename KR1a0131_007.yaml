body:
  text: 讀易日鈔卷七賛善張烈撰繋辭上傳繋辭即文王周公所作之辭繋于卦爻之下者上下經是也此則孔子所述之傳以通論一經之大體凡例第一章天尊地卑乾坤定矣卑髙以陳貴賤位矣動静有常剛柔斷矣方以類聚物以羣分吉凶生矣在天成象在地成形變化見矣是故剛柔相摩八卦相盪鼔之以雷霆潤之以風雨日月運行一寒一暑乾道成男坤道成女乾知大始坤作成物乾以易知坤以簡能易則易知簡則易從易知則有親易從則有功有親則可久有功則可大可久則賢人之徳可大則賢人之業易簡而天下之理得矣天下之理得而成位乎其中矣易之為書也人徒知其為聖人所作然聖人豈自以其意為之凡易所具皆天地間自然之理聖人特一一形出以示人耳夫易中有純陽純隂之卦焉謂之乾坤卦之内外爻之承乘有上下之位焉謂之貴賤卦爻之體有隂陽之别焉謂之剛柔有占决之辭焉謂之吉凶蓍䇿中之卦爻有隂變陽陽化隂之象焉謂之變化凡此皆易所具也然何一非天地所已具者試觀天居上而臨下如此其尊是健也地居下而承上如此其卑是順也何必作易始有乾坤一觀于天之尊地之卑而易之所謂乾坤者蚤已確然定矣天地萬物之散殊互有卑互有髙如是其陳列于目前也何必作易始有貴賤觀于卑髙以陳而易之所謂貴賤者已班班位列于此矣天地萬物之性有常動者强之使静不可即偶静亦非其常也惟其為陽也有常静者强之使動不可即偶動亦非其常也惟其為隂也何必作易始有剛柔觀于動静之有常而易之所謂剛柔者已判然分斷于此矣事情所向善有善之類惡有惡之類方各以類而聚也人與物善有善之羣惡有惡之羣物各以羣而分也善類善羣必吉惡類惡羣必凶何必作易始有吉凶觀于類聚羣分而易之所謂吉凶者已自然生于此矣隂陽一氣也在天則成象而可仰在地則成形而有實而成象成形各有變化也何必作易始有變化觀于成象成形而易之所謂變化者已隠然露現于此矣若是乎易之所有無非天地所先有夫未作易之先而凡易所有無不悉具于天地是故聖人之作易也凡易之理亦無不悉見于天地聖人見天地間觸目皆隂陽于是畫一連亘而實者曰剛畫一中斷而虚者曰柔一剛一柔互相加上而成四象曰太剛少柔少剛太柔四象之上又以一剛一柔互加之而成八卦曰乾兌離震巽坎艮坤蓋兩畫互加有似乎相摩戛者于是始有八卦矣八卦既成于是每一卦各以八卦迭加其上有似乎相推盪者而六十四卦始備則易卦之變化極矣易卦之變化已極而凡成象成形之變化孰非具于易乎以成象言之姑槩舉其類不有鼓之以雷霆潤之以風雨者乎不有日月運行一寒一暑者乎若是者皆易理也如震為雷巽為風坎為雨離為日坎為月自復至乾而暑自姤至坤而寒仰觀于天之成象而無在非易理矣以成形言之姑舉夫動物不有得陽氣之純為男得隂氣之純為女者乎若是者亦易理也易有乾有坤凡卦之以陽為主者皆男也皆得乾之道而成者也凡卦之以隂為主者皆女也皆得坤之道而成者也俯察于地之成形而無在非易理矣信乎聖人作易之後天地間所有无往而非易也要之易理无外于乾坤極之天地之功化賢聖之徳業莫不盡于乾坤者是乾坤也以對立之義言之則分屬男女矣以相須之義言之則一司始一司成共成其化焉乾者至陽之氣有乾以施于先而物之生氣起焉故凡物生之始而生理即无所不全者皆乾管之也此天道也坤者至隂之氣有坤以受于後故乾方資始而坤即起而成之此地道也惟乾知大始則其始物非必逐物以始之也乾自行其動健之性无意始物而物自資以為始在乾本无難也是以易而知大始矣惟坤作成物則其成物非有勞于乾施之外也坤自守其順静之性有一始自有一成在坤本不煩也是以簡而能成物矣以天地功化之大而其事无非易簡可見天下之理不出乾坤外也人誠能健以去私而存心如乾之易則其心明白無私而人易知之矣能順以循理而處事如坤之簡則其事要約不擾而人易從之矣易知則我之心即人之心人孰不與之同心故有親易從則我所為皆人所欲為人孰不與之協力故有功有親則因信從之衆而驗吾理之不可易雖進于久可也有功則兼天下之力而所圖无不成所為无不備雖進于大可也夫人心孰無所得而人不信之後且自疑惟可幾于久則所得有大過人者是賢人之徳也人之于事孰无所成而人不助之所就甚小惟可幾于大則所成有大過人者是賢人之業也然猶未已也由可久可大而進之立心一純乎易止此明白共見之心即天下所共然之理易者是理不易者非理吾易之外无餘理則天下之理無一不具于吾心之中矣制事一純于簡止此要約不煩之事即天下所共由之理簡者是理不簡者非理吾簡之外無餘理則天下之理無一不見于事為之際矣易簡而天下之理得矣至于舉天下之理而悉歸于易簡之中則徳為盛徳業為大業天以易在上地以簡在下而吾心兼之可與天地並立而成位乎中矣信乎易理之包括天地者惟在一乾坤人學易而能體備乾坤之徳亦即可與天地並大也學者觀易于未畫之先驗易于既畫之後極其合撰天地之妙而要歸之乾坤易簡可知所以學易矣第二章聖人設卦觀象繋辭焉而明吉凶剛柔相推而生變化是故吉凶者失得之象也悔吝者憂虞之象也變化者進退之象也剛柔者晝夜之象也六爻之動三極之道也是故君子所居而安者易之序也所樂而玩者爻之辭也是故君子居則觀其象而玩其辭動則觀其變而玩其占是以自天祐之吉无不利伏羲既已作易矣文周聖人于是設列伏羲所畫之卦而一一詳考其象繋辭焉以明著其吉凶此易所以有辭也所以然者卦爻不過剛柔而剛柔初無一定之象總此六位忽而剛居之忽而柔居之互相推盪是以剛化柔柔變剛變化不一則各卦有各卦之象各爻有各爻之象苟不各觀其象各繋之辭則吉凶何由以明乎夫惟觀象以繋辭而象有剛柔相推之變是故辭與變之内人事造化之理無不備焉辭之所謂吉凶者非他即人事失得之象也失則凶得則吉也辭之所謂悔吝者非他即人事憂虞之象也處事不當至于可憂可虞是以致悔而取吝也卦爻之剛柔未定而變化方生者非他即造化進退之象也造化氣機退極而進若柔之變剛進極而退若剛之化柔也卦爻之變化已成而剛柔已定者非他即造化晝夜之象也晝則陽用事若柔之已變成剛夜則隂用事若剛之已化成柔也夫卦之六爻初二為地三四為人五上為天本有三才之象今也剛柔變化流行於六爻之間如此其動而不滯此即地之所以忽柔忽剛人之所以忽仁忽義天之所以忽隂忽陽三才極至之道也語及此則卦爻所具之理聖人所繋之辭真足以包人事括造化而宇内之理一無所遺矣君子其可不學耶是故易中所著之事理皆有因時制宜不可亂之序而君子處世其身之所居而出入必由須臾不舎者无非易之序也易有爻辭吉凶悔吝曲盡其㫖而君子之所深樂而玩味者即此爻之辭也君子于易其躬行心得者如此是故君子無論平居與有事而皆不離乎易平居無事則觀卦爻之象而玩其所繋之辭及有事而動則觀卦爻之變而玩其所值之占動静皆依乎易則居安樂玩之功至矣随其所為安有不當理而即于凶者是以自天祐之吉无不利也夫聖人觀象繋辭本以明吉凶而必學易如君子乃能有吉而無凶知聖人所以作又知君子所以學乃可以用易矣第三章彖者言乎象者也爻者言乎變者也吉凶者言乎其失得也悔吝者言乎其小疵也无咎者善補過也是故列貴賤者存乎位齊小大者存乎卦辨吉凶者存乎辭憂悔吝者存乎介震无咎者存乎悔是故卦有小大辭有險易辭也者各指其所之文周繋詞其大意可統而論乎曰可文王之辭謂之彖彖者非他一卦之全體其理必有所似如乾之大通至正屯之動乎險中皆卦中本具之象彖者所以言乎象者也此六十四卦之通例也周公之辭謂之爻爻者非他卦雖一義而爻各有一節之變如初之為潜二之為見不可執一爻者所以言乎變者也此三百八十四爻之通例也彖爻之辭中則有吉凶有悔吝有无咎吉凶者非他言乎卦爻之失得也得則吉失則凶也悔吝者非他言乎卦爻之小疵也悔未至于吉猶有小疵吝未至于凶已有小疵也无咎者非他卦爻中有已致過矣而善能補其過故以无咎言之也然則辭之所言无非卦爻所本有而卦爻所有非聖人之辭亦不能言之如此明切而周至是故易有貴賤而所以列之使不混者則存乎爻位之上下矣易有大小而所以齊之使不雜者則存乎卦體之隂陽矣至于小大貴賤錯綜更迭之間失得互見于此而欲辨别其吉凶以開天下之愚則必存乎卦爻之辭甚矣辭之為功大也辭之為悔吝者聖人實有憂焉憂之者以其在善惡將分之介故聖人蚤為憂之欲人决于善而絶于惡庶可以免悔吝也辭之為无咎者聖人盖震奮其志氣也震之者以其有自悔之機故聖人急為震之使人歸于无咎也凡此皆吉凶悔吝无咎之通例也吉凶悔吝无咎之辭皆就象變所有而言之者也是故就卦言之則有小大就辭觀之則有險易要之辭之險者必其卦爻之小者也隂盛則凶悔吝随之矣辭之易者必其卦爻之大者也陽盛則吉无咎随之矣聖人之辭豈以意為之哉不過就卦爻情之所向而聖人指之以示人耳辭不外乎卦爻此聖人繋辭之總例也第四章易與天地凖故能彌綸天地之道仰以觀于天文俯以察于地理是故知幽明之故原始反終故知死生之說精氣為物遊魂為變是故知鬼神之情狀與天地相似故不違知周乎萬物而道濟天下故不過旁行而不流樂天知命故不憂安土敦乎仁故能愛範圍天地之化而不過曲成萬物而不遺通乎晝夜之道而知故神无方而易无體言道者至天地而止天地一大隂陽而隂陽之變不可勝窮故其道无所不備凡聖人著書縱極力發揮不過著天地之一節安能盡天地之所有而括之使不遺析之使不紊哉惟易之為書直從隂陽根原衍出无窮變化是易書亦自具一世界居然與天地齊凖盖非法天地而為之而其理之所立與天地同源共流適相符凖而无二也夫易即天地故天地所有易无不有之其于天地之道遂能彌之極其周匝而綸之極其分明也易能彌綸天地之道則極聖人之能事所謂窮理盡性以至于命者何莫非資之于易乎何則理之最難窮者莫如幽明死生鬼神使非易幾不知幽明為何故死生為何說鬼神為何情狀惟易從隂陽根原直截剖破故聖人融貫易理于一心易理洞徹之後仰以此觀于天文之晝夜上下俯以此察乎地理之南北髙深即知其幽者陽變為隂而然明者隂化為陽而然无他故也以此而推原人物所以始又反而求人物所以終即知始之所以生者氣之凝而隂變為陽終之所以死者氣之盡而陽變為隂無他說也以此而推氣化之屈伸天下本无是物也乃隂精陽氣聚而成物及其乆也其魂氣遊散而向之為物者遂變壊而烏有于是知精氣之聚者隂變為陽所以不得不伸而為神也遊魂之散者陽變為隂所以不得不屈而為鬼也其情狀居然可見也聖人有得于易而于理無不窮是凡理之在天地者易無不彌綸之有如此再觀聖人盡性之事人性之中无所不備猶天地之道无所不有人惟蔽于一曲不能盡其性之所具則覺天地大而我小天地全而我偏與天地不相似而其行之背乎天地者遂多聖人之心全體皆易性量渾然儼如天地之至大而无遺又如天地之相資而无缺聖人盡性與天地相似故天地所有聖人亦必有而不相違也何以見之性雖无所不有而要而言之有知焉有仁焉知如天之髙明其清虚變化之體即易之陽也仁如地之博厚其敦厚確正之體即易之隂也聖人之心全體皆易則清虚變化之體與敦厚確正之體兩者既相資為用而又有以各極其至觀其知既足以周悉人物之理而仁之所施果能使人得其所物遂其生而道濟天下焉則知有實用不徒為空疎浮蕩之見不過矣事有不可直行者聖人從權而旁行此知也然從權而不失其正不至流于非禮是又其仁也知周道濟旁行不流其知仁之相資為用者如此且其知有更深者惟樂天理之當然而不見外物之可好實知天命之有定而但盡在已所應為故其心不憂而為知之極抑其仁有更深者随遇皆安無自擇便利之意其萬物一體之懐日加肫切安土敦乎仁故自不能不愛人而為仁之極樂天知命故不憂安土敦乎仁故能愛其仁知之各極其至者又如此仁知相資者似天地之相資仁知各至者似天地之各至盖全易隂陽之用融備于一心故能曲盡性分之理而與天地相似不違如此是凡性之分見于天地者易亦无不有以彌綸之也再觀聖人至命之事天命之流衍者為化天命所生者為萬物天命之對待而循環者為晝夜之道此皆隂陽之運也而隂陽之變莫備于易聖人全體易理則存諸心者隂陽不執之體見諸事者隂陽時措之用故天地之化有流而為過者聖人則範圍之使有節制而无或過萬物不能自成聖人則愛養匡正使人物各遂其性大以成大小以成小而无或遺幽明死生鬼神凡氣化之相對而又相生者統謂之晝夜之道聖人知晝之所以為晝又知夜之所以為夜且知晝之所以必夜夜之所以必晝覷破縁由打透消息兼通而黙契焉合此三者是聖人窮理盡性之功真造至天命之域故聖心之神妙初无方所之可測聖心之變易初无定體之可指也盖易理本无方體而聖人渾備易理于心故測聖心于天地而聖心在焉測聖心于萬物而聖心亦在焉測聖心于晝夜而亦無不在焉其无方如此也以之範圍而範圍非一端以之曲成而曲成非一端以之通知而通知非一端其无體如此也聖人至命之事至于无方无體而莫非本于易是命之在天地者易亦无不有以彌綸之也合聖人用易以窮理盡性至命者觀之信乎易與天地凖故能彌綸天地之道矣第五章一隂一陽之謂道繼之者善也成之者性也仁者見之謂之仁知者見之謂之知百姓日用而不知故君子之道鮮矣顯諸仁藏諸用鼓萬物而不與聖人同憂盛德大業至矣哉富有之謂大業日新之謂盛徳生生之謂易成象之謂乾效法之謂坤極數知來之謂占通變之謂事隂陽不測之謂神易之書備天地之道非无由也試思道果何謂天地間動者為陽静者為隂然一隂矣而又一陽循環不窮此其間實有所以相乗而不容息者故天地間更無别物止此二者相為循環是天地人物之定理所謂道也誠知一隂一陽之謂道而極天地人物之理孰不有所謂一隂一陽相因而不容廢者自夫天地之氣繼静而動氣之方行而此理未蔽于人物之形是造化本然无雜之善也陽之事也及此氣結成人物而理随以賦則人物各具之性也隂之事也是天命之流行賦予亦一隂而一陽不能相無也盖不如是不謂之道也無奈人性出于善本自无偏而禀氣不齊各有所蔽有偏于陽動而為仁者據其所見則惟以生動發越之意為道在此矣不知其尚有知也有偏于隂静而為知者則以貞静宻察之意為道止此矣不知其更有仁也若百姓又日用此道而不知夫仁知各有所偏而百姓一无所見此君子體用全備之道所以鮮其人也若夫道體之全何嘗因仁知而有偏因百姓而遂无乎試觀造化氣機之出入其氣之静極而動也春生夏長凡發生萬物之仁現之于外是顯諸仁也陽之事也及氣之動極而静也秋斂冬成凡發舒萬物之用收之于内是藏諸用也隂之事也顯仁則鼔物而出矣藏用則鼓物而入矣然其鼓之也止此一隂一陽之機氣至而自應非如聖人之憂民出于有心夫陽至而能顯其仁徳何其盛而无窮隂至而能藏其用業何其大而無外且顯藏又出于不憂則其徳業之盛大天下更無加上之者至矣哉何則藏用而謂之大業者惟藏諸用則萬物之生理悉收于静翕之中是其所藏者亦何所不有一朝發出尚安有限量是之謂大業也顯仁而謂之盛徳者惟顯諸仁則萬物之生理愈出而愈茂其所顯者日新不窮此非徳之存于内者甚盛安能如是出之不竭是之謂盛徳也然則顯仁之盛徳陽也藏用之大業隂也大業而即繼以盛徳盛徳而即繼以大業循環不已者一隂一陽之道而非同于見仁見知之偏也道之見于化機出入者如此然則天地人物亦安有獨隂獨陽而漫无變易者乎夫道之所謂易者以其隂生陽陽又生隂生生不已而變化遂不可窮詰是之謂易也即一隂而一陽之謂也推之物理所謂乾坤人事所謂占事又何非一隂一陽之道乎物生之初其氣方結有可為此物之象而未實則輕清屬陽之動是之謂乾成象之後其形日堅凡其所應具之體一一呈效而出則重濁屬隂之静是之謂坤一乾一坤是亦一隂而一陽也自人事言之以蓍問易極其七八九六之數因得所值之卦爻而知方來之吉凶是事尚未定陽之動也是之謂占及其以占之所决者而通其所處之變或趨或避是占之已成隂之静也是之謂事一占一事亦一隂而一陽也然則道之所在其可以一偏求之者哉夫道之所以為神者正以此道忽然而在隂又忽然而在陽流行不測莫究其所從來莫詰其所從往是以見其无方而謂之神也斯道也推之天之流行賦予而為善為性分之人之秉受而為仁為知騐之氣機之出入而為顯仁為藏用為盛徳為大業考之物理人事之始終而為乾為坤為占為事而以其生生則為无體之易以其不測則為无方之神總之皆此道皆此一隂一陽之道也易書以著此而已第六章夫易廣矣大矣以言乎逺則不禦以言乎邇則静而正以言乎天地之間則備矣夫乾其静也專其動也直是以大生焉夫坤其静也翕其動也闢是以廣生焉廣大配天地變通配四時隂陽之義配日月易簡之善配至徳夫易之為理其中所含載者可謂廣矣其外所統括者可謂大矣使易理及乎邇而遺逺及乎逺而遺邇天地之間稍有未備皆不足為廣大今易之為理以言乎逺則此理无逺不到莫之能禦也以言乎邇則目前几席即物理存不待安排布置而理自各足无偏缺也以言乎天地之間凡世間所應有之理則无不備矣甚矣其廣大也然易之廣大則何從生生于乾坤耳夫乾天之性情當其静而利貞雖未嘗生物而生物之心則常存不他何其專壹及其動而元亨則生意由中達外沛乎莫禦何其直遂静專動直而物无不資始此乾之大也而易理即以形模此乾是以理无不備而大從此生焉夫坤地之性情當其静而利貞舉萬物之生理悉收斂翕聚而无餘如户之翕及其動而元亨承乾之氣即鼔之而出如户之闢静翕動闢而物莫不資生此坤之廣也而易即以模寫此坤是以理无不載而廣從此生焉是易所以廣大之由也故概舉其廣大之實而言之則天道人事之理易無不有以配之也世之廣大者莫如天地而易之廣大則適足配天地也世之變通者莫如四時而易之隂陽互變變而不窮適足配四時也世之分隂分陽者莫如日月而易中卦爻隂陽之義適足配日月也易之于天道无不配者如此若人心所得于天之理謂之至徳而易有健之易順之簡宜健而健宜順而順至易至簡無少差謬則適足配人心之至徳也盖人心中仁禮屬健而至易義智屬順而至簡其所以當然而不可易粹然而无所雜者無非易簡之善而易之易簡配之是其于人事无不配者又如此夫以易之配乎天道人事如是信乎逺不禦近不遺天地之間无不備其廣大何如耶第七章子曰易其至矣乎夫易聖人所以崇徳而廣業也知崇禮卑崇效天卑法地天地設位而易行乎其中矣成性存存道義之門易其至矣乎夫易乃聖人所以崇徳而廣業者也徳業至聖人而止而聖人所以崇徳廣業者乃得之于易則天下之理孰加于易故曰至也何以見聖人之崇徳廣業得之易也盖六十四卦三百八十四爻亦既備悉天下之理矣聖人于是理也窮之于心則識見超邁而其知崇循是理而行則踐履篤實而其禮卑知之崇非苟崇之而已髙明洞照必效乎天如天之崇乃崇之極也禮之卑非苟卑之而已篤實造履必法乎地如地之卑乃卑之極也崇卑之功既同天地則崇卑之效亦同乎天地試觀天設位于上如此其崇地設位于下如此其卑一崇一卑而其間隂陽升降變易不窮之妙自行乎其中矣聖人亦然夫人人有本然已成之性道義渾備于心惟識見蔽于卑陋踐履缺于虚浮則本性不存即存亦不固故道義不自我出今聖人知崇使本性之虚明髙朗者日无所蔽禮卑使本性之條理中正者日无所虧則其性存而又存而凡率性而行莫非道義矣成性存存即為道義之門猶天地位而易行乎其中也是以道義之得于心者日新月盛而徳于是崇道義之見于事者日積月累而業于是廣易為聖人之所以崇徳而廣業也如此易所以為至也第八章聖人有以見天下之賾而擬諸其形容象其物宜是故謂之象聖人有以見天下之動而觀其㑹通以行其典禮繋辭焉以斷其吉凶是故謂之爻言天下之至賾而不可惡也言天下之至動而不可亂也擬之而後言議之而後動擬議以成其變化鳴鶴在隂其子和之我有好爵吾與爾靡之子曰君子居其室出其言善則千里之外應之況其邇者乎居其室出其言不善則千里之外違之況其邇者乎言出乎身加乎民行發乎邇見乎逺言行君子之樞機樞機之發榮辱之主也言行君子之所以動天地也可不慎乎同人先號咷而後笑子曰君子之道或出或處或黙或語二人同心其利斷金同心之言其臭如蘭初六藉用白茅无咎子曰苟錯諸地而可矣藉之用茅何咎之有慎之至也夫茅之為物薄而用可重也慎斯術也以徃其无所失矣勞謙君子有終吉子曰勞而不伐有功而不徳厚之至也語以其功下人者也徳言盛禮言恭謙也者致恭以存其位者也亢龍有悔子曰貴而无位髙而无民賢人在下位而无輔是以動而有悔也不出户庭无咎子曰亂之所生也則言語以為階君不密則失臣臣不密則失身幾事不密則害成是以君子慎密而不出也子曰作易者其知盜乎易曰負且乗致冦至負也者小人之事也乗也者君子之器也小人而乗君子之器盜思奪之矣上慢下暴盜思伐之矣慢藏誨盜冶容誨淫易曰負且乗致冦至盜之招也聖人作易本諸天下之理故易之既作有以盡天下之用在人善推詳其意也夫易何以有象有爻哉聖人未畫卦之先有以見天下之物如此其賾亂也就至賾之形容而擬度之見其或為陽或為隂或為純或為雜于是畫卦以象其各物之類是卦之為卦所以象天下之賾也是故謂之象聖人未繫辭之先有以見天下之事如此其變動也人之處動在衆理㑹輳之中必有一理之可通行者聖人于動處觀其㑹中之通而即以其可通行者行之為不易之常法是聖人見天下之動而處之如此也于是觀爻之合乎典禮者繫以吉爻之不合典禮者繫以凶是爻辭所以效天下之動也是故謂之爻夫聖人因天下之賾以立象是象所以言天下之至賾象繁雜宜若可厭然物宜之象皆天下所宜有而不可厭惡也因天下之至動以立爻是爻所以言天下之至動辭多端宜若可亂然吉凶之斷各有定理而不可亂也象爻之不可厭亂如此則理无不備而凡一言一動之理莫不具于此矣學易者于己之言必觀象玩辭觀變玩占擬度于易理而後言之于己之動亦必觀象玩辭觀變玩占商議于易理而後動之盖言有淺深詳畧之宜動有行止久速之異變化不可執一學者所當擬議于易以成其言動之變化也然欲擬議于易宜何如耶試舉其例如中孚九二爻曰鳴鶴在隂其子和之我有好爵吾與爾靡之擬議此爻當知不鳴則已鳴則必和天下感應之速本如是鶴之在隂猶君子之居室鶴雖在隂而聲已聞于外君子雖居室而言已聞于逺故居室而出言善千里之外即應之況邇者有不應乎居室而出言不善千里之外即違之況邇者有不違乎則言之重可知矣行之重亦可知矣言出乎身即已加乎民不能秘之使民不聞行發乎邇即已見于逺不能揜之使人不見動于此而感于彼如樞轉而户自闢機動而矢自發言行誠君子之樞機也謂之樞機則言行一發而應之之榮違之之辱皆此樞機主之也且不特人之從違言行善而天地祐之言行不善而天地殃之所以感動天地者亦在是可不慎乎然則即此爻而擬議之當謹其言行之發矣如同人九五爻曰同人先號咷而後笑擬議此爻當知同本于道道本于心心之同者始雖暫異而終當大同君子之道或出或處或黙或語自其始而觀之若不同也然要其終而論之則此二人者其心實同心同則雖至堅能間之物我能斷之而不為所間也心同則我之言即彼所欲言彼之言亦我所欲言惟見其美而可說也其利斷金其臭如蘭又何不終同是即此爻而擬議之相同貴以心矣如大過初六爻曰藉用白茅无咎擬議此爻凡錯物者但錯之于地已安矣今又藉之以茅安有傾壊之患何咎之有若此者惟慎而又慎之心也夫茅之為物雖不貴而用之所資如此其重為其可託以用吾慎也由此推之天下意廣慮踈者雖甚可重賴之物每忽之而不用慎之至者雖至微薄之物亦諄諄資之為重物而不敢忽人能慎守此術也以往自然無所失矣是即此爻而擬議之凡事宜過慎矣如謙九三爻曰勞謙君子有終吉擬議此爻凡方勞于事謂之勞事成有利于人謂之功人能勞而不伐有功而不自以為徳則其心謹厚之至也爻所謂勞謙者正謂以其功而下乎人也盖君子之心以為徳所宜自勉故言念不忘惟欲其盛而勞不辭禮所以自制故言念不忘惟欲其恭而謙不己夫惟謙乃能保其位謙也者正極致其禮之恭以存其位者故曰有終也即此爻而擬議之凡居功者宜下人矣如乾上九爻曰亢龍有悔擬議此爻貴无位髙无民賢人不為之輔是以有悔也即此爻而擬議之居位不可使亢矣如節初九爻曰不出户庭无咎擬議此爻則知言之貴于慎宻凡禍亂之生皆起于言語為君者言不宻則禍及臣為臣者言不宻則禍及身不特君臣凡㡬宻之事言不密則害其成君子是以慎宻而不出諸口也盖不出户庭户之在人最闗利害者莫如口也即此爻而擬議之宜慎宻其言矣不但此也作易聖人于人情无不透徹即盜情亦深知之如解六三爻曰負且乗致冦至擬議此爻盖負本无才徳小人之事而乗乃有才徳君子之所居也以小人而乗君子之器則竊據髙位才徳不勝適起謀利者攘奪之心盜思奪之矣且小人而居上位則必上而慢其上下而暴其民盜且有借以為辭而思伐之矣譬之慢藏者如誨人使盜已冶容者如誨人使淫已皆自取耳故曰負且乗致寇至言其為盜之招也即此爻而擬議之則知髙位不可以无徳居而有國者亦知所以杜盜源矣由此七爻例推之庶㡬為擬議以成變化之學云第九章天一地二天三地四天五地六天七地八天九地十天數五地數五五位相得而各有合天數二十有五地數三十凡天地之數五十有五此所以成變化而行鬼神也大衍之數五十其用四十有九分而為二以象兩掛一以象三揲之以四以象四時歸竒于扐以象閏五歳再閏故再扐而後掛乾之䇿二百一十有六坤之䇿百四十有四凡三百有六十當期之日二篇之䇿萬有一千五百二十當萬物之數也是故四營而成易十有八變而成卦八卦而小成引而伸之觸類而長之天下之能事畢矣顯道神徳行是故可與酬酢可與祐神矣子曰知變化之道者其知神之所為乎易之始作其源起于河圖易之既作其用存乎蓍䇿而蓍䇿之法實本河圖今考圖之所以為圖與蓍之所以為蓍然後知圖之數蓍之法皆出于自然之變化有人力不得而强者夫天下止此一理而一氣流行之中遂有自然之節次而數生焉此數之生百千萬億不可窮詰而要而言之則凡竒為陽數凡耦為隂數止此二端而已然天地間本有此數而不能告人自伏羲時河中有龍馬出背上旋毛有自一至十之數伏羲一見遂悟得陽數竒隂數耦而取之以畫卦但至今圖雖尚存人第知其為自一至十之數而不知其分配乎天地今試區而别之凡竒皆陽盖天數本如是其竒凡耦皆隂盖地數本如是其耦是乃天一地二天三地四天五地六天七地八天九地十也總而計之則一三五七九其為天數者五矣二四六八十其為地數者五矣然數則十數而分列于上下中左右者則為五位此五位者自其生出之次第觀之有一必有二有三必有四有五必有六有七必有八有九必有十皆一竒一耦以類相得無越次也自其各方之配合觀之一配以六二配以七三配以八四配以九五配以十皆一竒一耦各相配合无偏枯也夫其相得如此各有合又如此故積天之數為二十有五積地之數為三十總積天地之數凡五十有五而此五十五數者舉造化所以成變化而行鬼神者初不外此盖天地間陽主變隂主化而變化之往來屈伸而不可測者謂之鬼神天地之變化止有五行而河圖之變化亦止有五位五位中一變六化二化七變三變八化四化九變五變十化即天地之陽變生水而隂化成之隂化生火而陽變成之陽變生木而隂化成之隂化生金而陽變成之陽變生土而隂化成之也而五位生成之屈伸徃來即所謂鬼神也觀五位則知五行考河圖則識造化此圖之數即天地之所以成變化而行鬼神也河圖之數其足以盡天地之秘如此而聖人揲蓍之法遂因此起矣夫蓍䇿之必于五十者盖河圖中宫為五為十聖人以為五者生數之極十者成數之極故取極數以相乗而大衍之每一皆衍為十則五當衍為五十惟大衍之數五十故蓍䇿必五十也然生數極于五成數極于十而又衍為五十則其數已滿不能變動故臨用蓍䇿之時必去其一以啟變端是其用則四十有九也于是信手中分為二焉盖以象天地之兩也繼則取右䇿之一懸于左手小指間掛一焉盖以象人並天地而三也繼則數其䇿以四數之揲之以四焉盖以象四時也繼則將所零之䇿勒于左手中二指之間歸竒于扐焉盖以象厯法之積餘日而為閏也然閏法必五年而一齊五歳中凡兩閏然後先所餘之日已盡而又起積分故揲蓍者一掛之後亦必扐其左扐其右凡再扐焉而後又起一掛也是揲蓍之法與天地適合矣再以過揲之䇿計之凡筮得一老陽其餘䇿必三十六若六爻皆老陽而為乾則其䇿二百一十有六矣凡筮得一老隂其餘䇿必二十四若六爻皆老隂而為坤則其䇿百四十有四矣合而計之為三百六十適當一年之日數也且二篇之中百九十二陽爻若皆作老陽皆以三十六䇿計之百九十二隂爻若皆作老隂皆以二十四䇿計之則其䇿為一萬一千五百二十其數之至多而不齊適如天下萬物之數也是揲䇿之法无往而不與天地適合也夫其法足以合天地故其用遂足以盡天下之理周天下之事是故分二掛一揲四歸竒凡四營而成一變焉積至十八變而成一卦焉當其九變得三畫方得八卦之一卦而為小成焉至于六爻已成而視其爻之變不變以為動静則即一卦而引而伸之一卦可變為六十四卦也觸引伸之類而長之則卦卦皆可變為六十四卦也夫卦止六十四若未盡天下之事乃引伸觸類而變无不通則天下无一事一物不在卦爻中者天下之能事畢矣由是吉凶之理本隠而易以辭著之是顯道也趨避之迹本出人為而易以數推衍而出有非人所能為是神徳行也易能顯道神徳行是故人方問而易答之可與人相酬酢鬼神所不能告人者而易告之可與祐助神之不及矣蓍法之妙若此而實皆本于河圖之數然則數之變化不窮也法之變化亦不窮也而其變化皆出于不得不然天地无所與知聖人无所容力總一神之所為而已知數法變化之道者其知神之所為乎不然數雖巧而或出于牽强法雖精而未免于補凑則必非天地自然之數聖人自然之法矣豈所語于河圖蓍䇿哉第十章易有聖人之道四焉以言者尚其辭以動者尚其變以制器者尚其象以卜筮者尚其占是以君子將有為也將有行也問焉而以言其受命也如嚮无有逺近幽深遂知來物非天下之至精其孰能與於此參伍以變錯綜其數通其變遂成天地之文極其數遂定天下之象非天下之至變其孰能與於此易无思也无為也寂然不動感而遂通天下之故非天下之至神其孰能與於此夫易聖人之所以極深而研㡬也唯深也故能通天下之志唯㡬也故能成天下之務唯神也故不疾而速不行而至子曰易有聖人之道四焉者此之謂也夫易有蓍䇿而辭可以顯道數可以神徳行且變化皆出于神所為矣可見易非聖人不能作也盖以聖心之淵微體天地自然之理數是為聖人之道此非聖人不能作而易則有聖人之道四焉曰辭曰占曰象曰變而天下用之不能外矣人有言焉謂臨事必先議論其義理也而用易以言者皆尚乎易之辭人有動焉謂是非未可執一也而用易以動者皆尚其竒耦未定之變人有制器焉謂據現成之法則而裁制之也而用易以制器者皆尚其剛柔已成之象人有卜筮焉謂事之吉凶成敗有疑于心而欲審決之也而用易以卜筮者皆尚乎易中吉凶之占尚者尊而用之不敢違也聖人制為辭占象變而人尚之如此是以君子凡將有為于一身將有行于天下也必以蓍問于易焉而以之發言處事乃君子方命于易而易之受命以答之也如嚮應聲之速无論事之逺近幽深而遂有以知未來之事理人之所為尚其辭尚其占者此也苟非其道立于至精則或涉于粗淺或滯于成迹問而不應應而不詳者有之矣烏能一問而无不知如此乎故由辭占觀之見易道之至精矣再言象變揲蓍者方其四營而成一變也必先騐其左手歸竒之䇿為㡬又騐其右手歸竒之䇿為㡬兩相對騐以定其為五四為八九猶之數物必三數之于先又五數之于後以參騐之也如是為一變及其三變而考其數之總也必將三變所竒之䇿錯落置之而總綜較之以審其為老為少是錯綜其數也如是為三變夫參伍特一變耳通之至于三變皆用此參伍之法則竒耦互陳儼如天地之隂陽迭現燦然成文也錯綜特三變耳極其數以至于十八變皆用此錯綜之法則動静互呈儼如天下之進退出入紛然有象也人之所為尚變尚象者此也苟非其道立于至變則滯于一定限于有窮烏能成文定象如此乎故由象變觀之見易道之至變矣且其至精至變豈有意為之哉易者蓍與卦而已何嘗有思也有為也方其蓍在櫝卦在書寂然不動初无與于物及其感于人之問求則蓍動于四營卦成于十八變來物可知文象可見遂通天下之故是其寂無思為感亦无思為有莫知其所以然者非其道之至神而能然乎是合辭占之至精象變之至變觀之見易道之至神矣然易之至精至變至神豈易自能如是哉易之至精至變至神皆聖人為之也夫易聖人之所以極深而研㡬也吉凶之理隠深而難見而聖人繫之辭占以窮極其深吉凶之象㣲茫而未形而聖人裁為象變以研究其㡬是占辭者聖人所以極理之深而辭占即深矣象變者聖人所以研理之㡬而象變即㡬矣惟辭占之深也故吉則示其所以吉凶則示其所以凶使人曉然不疑能通天下之志焉此所以受命如嚮遂知來物為天下之至精也惟象變之㡬也故吉使人决于趨凶使人决于避能成天下之務焉此所以成文定象為天下之至變也惟是深也㡬也皆出于理之自然而无所强深㡬所在皆神所在也故无意于通志而志无不通无意于成務而務无不成不疾而已速不行而已至此所以寂然不動感而遂通為天下之至神也然則惟聖人以辭占極深以象變研㡬而後易有至精至變至神之妙信乎辭占象變非聖人不能作也子曰易有聖人之道四焉者正謂非聖人之極深研㡬則不能為此辭占象變以待天下之用易之精變何非聖人之精變易之精變之神何非聖人精變之神乎第十一章子曰夫易何為者也夫易開物成務冒天下之道如斯而已者也是故聖人以通天下之志以定天下之業以斷天下之疑是故蓍之徳圓而神卦之徳方以智六爻之義易以貢聖人以此洗心退藏于密吉凶與民同患神以知來知以藏往其孰能與於此哉古之聰明睿知神武而不殺者夫是以明于天之道而察於民之故是興神物以前民用聖人以此齋戒以神明其徳夫是故闔户謂之坤闢户謂之乾一闔一闢謂之變往來不窮謂之通見乃謂之象形乃謂之器制而用之謂之法利用出入民咸用之謂之神是故易有太極是生兩儀兩儀生四象四象生八卦八卦定吉凶吉凶生大業是故法象莫大乎天地變通莫大乎四時縣象著明莫大乎日月崇髙莫大乎富貴備物致用立成器以為天下利莫大乎聖人探賾索隠鈎深致逺以定天下之吉凶成天下之亹亹者莫大乎蓍龜是故天生神物聖人則之天地變化聖人效之天垂象見吉凶聖人象之河出圖洛出書聖人則之易有四象所以示也繋辭焉所以告也定之以吉凶所以斷也易如此至精至變至神矣抑思易之為用果何為者乎人終日讀易而不知易之用何為則聖人作易之心不見夫易者使人卜筮以知吉凶所以開人物之昬䝉卜筮以决趨避所以成天下之事務且卜筮以考卦爻則逐卦逐爻開示吉凶將天下之道若小若大无不統冒其中使物无不可開務无不可成如此而已夫惟易可以開物成務冒道此所以聖人不容已于作易也是故聖人知卜筮能開物也以之通天下之志知卜筮能成務也以之定天下之業知筮䇿之卦爻能冒道也以之斷天下之疑是聖人之為天下如此其殷而所以為天下通志定業斷疑者道如此其妙也盖蓍卦爻之理先具于聖人之心而後能作為蓍卦爻以教天下是故以言乎蓍之徳分掛揲扐竒耦無常圓不定而神不測也蓍占所得則有卦爻以言乎卦之徳事有定理方不移而知不惑也以言六爻隨時之義則變易其理以獻諸人也凡此皆易之所有也而未有易之先聖人已自以此圓神方知易貢之理洗濯其心不使有一毫私意小知之累以致有不圓不方不易之失故方其无事則此心寂然退藏于至宻之地其所為圓神方智易貢者不可得而見也及其有事吉凶當前不但凡民患之聖人亦患之乃吉凶之未來者則聖人之神有以知之盖吉凶在後者為來聖心虚静之極見于未萌不待卜筮而自知之也吉凶之已然者則聖人之知有以藏之盖吉凶在前者為往聖心明徹之極見天下各有定理故由其騐于後者而知其已往之吉凶若何是不待卜筮而方知之中已包羅已往吉凶之故而不能遺也夫聖心自有蓍卦爻故不待蓍卦爻而自知吉凶如此其孰能與於此哉得卜筮之理而不假卜筮之具猶夫得神武之理而不假殺伐之威其殆如古之聰明睿知神武而不殺者夫聖人惟神知如是是以能明于天時消長之道而察于民情得失之故明天道故知蓍䇿神物具有隂陽消息之理可借以告人察民故故知事故多端而民不能見不可不有以開其先于是興此神物作為卜筮以前乎民用而又不止凡民用之也雖聖人臨事亦必齋戒求占以知未來之事使其心神明而不測也盖至此而後開物成務冒道之易成矣信乎民用之攸賴者非聖人不能開也是故造物之化育不已萬物之生成有序至于取天地所生之物而裁為民用則在乎聖人自夫氣機收藏如闔户也則謂之坤氣機開發如闢户也則謂之乾一闔一闢不專于一也則謂之變闔闢往來循環不窮也則謂之通凡此皆化育之功也而物由以生焉在資始之初方發現而未成形則謂之象及資生而實有是形則謂之器凡此皆生物之序也然天地雖能生物而不能以其用告人萬物之生于闔闢往來中者雖各有用而不能自顯惟聖人知其物之所可用又知是物之所以用于是裁制而用之凡其所以制之者皆有自然之條理而不可紊一定之矩則而不可越是則聖人所立萬世不易之程度謂之法也有是法而人遵而行之出入動静无所不利于是舉凡民而咸用之不能離盖周徧日用而人莫知其所以然之故矣是則謂之神也彼蓍龜者非同生于闔闢之中同在象器之内而聖人制之以法使人人用之以盡神者乎甚矣神物非聖人不能興也神物興而易之有濟于民者大矣是故以作易之事言之易有无形之理而為萬變之主宰者曰太極太極有動有静于是竒耦分而為兩儀兩儀又各加竒耦而為四象四象又各加竒耦而為八卦八卦既立而六十四卦以成則時位交錯之間吉凶之理已定于卦爻之内吉凶定則天下之所以趨避成務者其大業已生于是甚矣易之足以前民用也是故天下有數大焉而前民用之功未有大于蓍龜者以法象則莫大乎天地矣以變通則莫大乎四時矣以懸象于上著明于下則莫大乎日月矣以崇髙則莫大乎天子之富貴矣天下本有是物也取而備之以致人之用天下本无是器也立為成器以為天下利則莫大乎聖人矣而至于天下之賾悉具于卦爻之中占者所值尚隠而未見也今探于賾中而索出其隠者以示人隂陽未分吉凶未形本至深也今而鈎取之使人因所值以决趨避成事功致之于逺焉探索以定天下之吉凶鈎致以使人亹亹趨避而不倦是則所謂開物成務冒道以前民用生大業者天下術數之學雖不一而孰有大于蓍龜者乎可見欲前民用則有卦爻不可无蓍龜有蓍龜不可无卦爻有卦有蓍而易乃有以前民用此二者皆出于天而惟聖人能因之耳是故天生蓍龜神物聖人于是則蓍以制筮則龜以制卜焉天地設位而變化行其中聖人于是效其屈伸徃來以為卦爻之變化焉日月星辰垂象于天其行之順也為吉徵行之逆也為凶徵聖人于是象其吉凶之理以繋辭焉河出圖洛出書于是伏羲則圖以作易大禹則書以敘疇焉是凡所以前民用未有不出于天地而成于聖人者也惟出于天地而聖人則之效之象之于是有象焉有辭焉有占焉其所以開導天下者至為明切矣易之卦爻渾然无别而揲蓍之後有老陽老隂少陽少隂之四象焉所以示人以所值之卦爻也无老少則人不知當變何卦當觀何爻矣既得卦爻則有所繋之辭焉所以告人以卦爻之藴也无辭則人不知此卦此爻為何義矣有辭則有占定之以吉凶焉所以斷其失得使人不疑也无占則人尚岐于所向矣聖人之則效象以示人告人斷人如此宜乎易之為用可以開物成務冒道以前民用也末節易字與章首易字第五節易字俱相應易曰自天祐之節易曰自天祐之吉无不利子曰祐者助也天之所助者順也人之所助者信也履信思乎順又以尚賢也是以自天祐之吉无不利也此釋大有上九爻當在擬議七爻之末擬議此爻則知祐之為義助也自天祐之者合天助人助以見其為天祐也然天人之助不可倖邀天止此理人順理而行處處自合天意天之所助者惟在順而不在他也人止此心我居心篤實人人以我為可倚人之所助者惟在信而不在他也今大有上九處極盛居上位苟驕恣自滿則天人皆棄之矣乃上九能下從六五夫六五孚交而上從其後有踐履必信之義焉謙退自居有處心必順之義焉降從六五之賢又有尊尚賢人之心焉盖即下從六五之一象而取義有三是其履信思乎順而即此信順之心又以之而尚賢也然則處盈有道而天之所助人之所助舉在是矣是以自天祐之吉无不利也擬議于此則人宜思所以處盛滿迎天心者矣第十二章子曰書不盡言言不盡意然則聖人之意其不可見乎子曰聖人立象以盡意設卦以盡情偽繋辭焉以盡其言變而通之以盡利鼓之舞之以盡神乾坤其易之緼耶乾坤成列而易立乎其中矣乾坤毁則无以見易易不可見則乾坤或幾乎息矣是故形而上者謂之道形而下者謂之器化而裁之謂之變推而行之謂之通舉而措之天下之民謂之事業是故夫象聖人有以見天下之賾而擬諸其形容象其物宜是故謂之象聖人有以見天下之動而觀其㑹通以行其典禮繋辭焉以斷其吉凶是故謂之爻極天下之賾者存乎卦鼔天下之動者存乎辭化而裁之存乎變推而行之存乎通神而明之存乎其人黙而存之不言而信存乎徳行聖人意中有无窮義理欲舉以告人勢不得不假之于言以言教人勢不得不假之于書然而書終不能盡言言終不能盡意也然則聖人之意其不可見乎聖人以為一言止該一事言有限事無窮然天下事何者不由于隂陽本隂陽以立為竒耦之象則萬事起根之地握定于此且不直指其事而假立為象則事无不可通理无不可兼凡意之不可以言盡者立象焉盡之矣象既立矣由是即此兩畫相摩相盪遂設為六十四卦凡事物之善而為情不善而為偽者无不曲盡其中盖卦者象之所衍情偽者亦正聖人意中所欲示也由象卦而繋辭焉即至虚之象以發至實之理象无倚辭亦无倚凡言之不盡于書者惟此象中之辭有以盡之也由象卦而制為蓍䇿焉以七八九六之變而通之于占者之事為則趨避明出入順聖意之所以利民者于此盡之也由變通以鼓舞天下焉趨避未明人心瞢然悶塞不知所適一自得卦之後一一剖决了然使人踴躍鼓舞日趨善而不自知則聖人之意所為周徧无方而思為不設者亦于此盡之也情偽也言也利也神也皆意中所具也一立象而皆有以盡之然則卦爻之變易雖无窮而總之止竒耦二象竒畫為乾耦畫為坤止此兩畫而蓍卦之變易隠然包寓其中乾坤其殆易之緼耶何也聖人畫成六十四卦時如横圖所列節節皆隂陽相對三百八十四爻非竒則耦兩兩燦列葢對待不虧所謂成列也斯時也雖未論及蓍卦之隂變陽陽化隂而蓍卦之所以隂變陽陽化隂者已先立于其中矣使卦畫不立乾坤之列缺毁而未成則蓍䇿之變憑何而見使蓍之變不可見則隂陽卦畫亦徒設而已乾坤或㡬于滅息矣是有蓍䇿而後乾坤之用行又必先有乾坤而後蓍䇿之體立豈非乾坤為易之緼而聖人之意非立象不足以盡之耶惟象立卦設而乾坤成列是故易之為功遂大周于天下卦爻竒耦所謂形也有是形則有所以為形之理此形而上者則謂之道有是形則竒耦有定已成不移此形而下者則謂之器象立卦設而道以彰器以著于是蓍䇿之變通出而天下之事業成焉四營之後其蓍䇿之為一為二為三為四皆有莫知其然而自然化成者所謂化也因其化而裁定之為七八九六之數則謂之變裁之為變則因所值之卦爻而推其理以行之是卦爻之理无不可逹于人事也則謂之通舉此卦爻之理而措之天下之民使人人變之通之以避凶趨吉則事務可成大業可定謂之事業向非聖人立乾坤之象則道于何彰器于何定變通何自以起而事業何自以生耶甚矣立象盡意非聖人不能而學易者欲即象以悟意得意以忘象亦甚不易也是故以盡意之象言之盖聖人有以見天下之賾而擬諸其形容象其物宜是故謂之象聖人之象非偶而設後之觀象者其見不及聖人未足與言象也以盡言之爻言之盖聖人有以見天下之動而觀其㑹通以行其典禮繋辭焉以斷其吉凶是故謂之爻聖人之爻非偶而繋後之觀爻者其見不及聖人未足與言爻也故窮極天下之賾者固存乎聖人之卦矣鼓舞天下之動者固存乎聖人之辭矣化而裁之固存乎易之變矣推而行之固存乎易之通矣凡此皆象辭之已著者也作易者之能无與學者事也至于化裁推行之際將所值之象所占之辭能不執其㫖而又不悖其㫖神之極其无方而明之極其不謬此則存乎其人无與于作易者矣何則所謂神明者臨變通之時心自虚明不闗言說黙焉之間神明之體已具足而完成絶无事于言說也而實實具是神明若此者豈可襲取必其平素理得于心而為徳理積于身而為行乃能如此黙成也有徳行而後能黙成能黙成而後能神明豈非存乎其人耶是以作易者非立象不可以明意而學易者非得意不可以觀象讀易日鈔卷七
