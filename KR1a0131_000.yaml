body:
  text: 讀易日鈔總目易類卷一上經卷二上經二卷三上經三卷四下經一卷五下經二卷六下經三卷七繫辭上卷八繫辭下説卦傳序卦傳雜卦傳臣等謹案讀易日鈔八卷國朝張烈撰烈字武承大興人康熙庚戌進士已未舉博學宏詞厯官左春坊左贊善是書一以朱子本義為宗謂易者象也言有盡象無窮伏羲畫為竒偶再倍而三因重而六文周逐卦繫彖逐畫繫爻全是假物取象不言理不指事而萬事萬理畢具大指在因象設事就事陳理猶説易家之切實者舊有其子益孫升孫紀實云此稿已刪潤四十餘過至易簀前數日尚合蒙引通典存疑諸書考訂知來藏往二義旋加改補云云則其用力亦可謂勤矣烈之沒也門人私謚曰志道先生楊允長作私謚議一篇冠于此書之首昔宋儒張載之沒門人欲為作私謚司馬光力言其非當時手帖猶載張子全書之首古人以禮處人不欲妄相尊重干國家易名之典其謹嚴如是允長等豈未之聞乎今録是書而削除此議用杜虚聲標榜之漸焉乾隆四十四年二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:8756cdc7dc5125d7b2be00010ed41581923a70f7108dca6562b10b4d1b6bc1bd
