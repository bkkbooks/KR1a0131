body:
  text: 讀易日鈔卷二贊善張烈撰上經坤下坎上比吉原筮元永貞无咎不寧方來後夫凶比者兩相親輔之意九五以剛中正居上上下五隂比而從之以一人而撫衆人以衆人而仰一人之象故名比夫人而為人所親輔吉矣然人比于我而我无元善之徳則惻怛同體之心不篤无長永之徳則始勵善而終敗徳者有之無貞正之徳則又未免涉于驩虞干譽之術此三者徳不足當人之比皆吾咎也故為人比者必再考以自審果其有元永貞之徳乃為无咎也我既可以當人比而无咎則凡未比于我而不得所安者皆將來歸以求安彼後至之人則自取凶耳非我咎也彖曰比輔也下順從也比之為言輔也此卦所以為輔者以卦體九五一陽居尊位而下之羣隂皆順從之有親輔一人之象故名比也原筮元永貞无咎以剛中也不寧方來上下應也後夫凶其道窮也其曰元永貞者卦體九五剛中陽剛之道長育萬物冐覆羣生所謂元也中則又純粹以居心無一物以間之故能永無一私以雜之故能貞也曰不寧方來者隂性從陽而卦體惟五一陽舉上下羣隂皆應之此方來之象也後夫凶者此交已固彼來已晚雖欲來且不見受其道窮而无所之故凶也象曰地上有水比先王以建萬國親諸侯物相親比而无間者莫如水在地上所以為比也先王欲與天下相比而勢不能徧情不及周于是分建萬邦而又制朝聘往來之禮以親之則諸侯莫不承宣徳意以親比天下此先王所以比天下而无間者也蒙引曰六字是一串意非兩平隆山李氏曰于師得古井田之法于比得古封建之法按大象凡論理之事則槩曰君子凡創制之事則槩曰先王初六有孚比之无咎有孚盈缶終來有他吉居初是與上人初相比也初與人比而輒懐二心視所比之人汎汎相值非實有不可解于心者而與之親輔也比人者固如是乎故必有孚比之乃于此道為无咎若積之以至充實無一念一事之不孚如盈缶焉則今雖止于无咎而終來又有意外之吉也象曰比之初六有他吉也比之道在乎初初能有孚則終致有他之吉其始不誠終焉得吉六二比之自内貞吉汲汲求比于人不擇所應比而妄比焉皆不正以取凶者也六二柔順則安于分中正則審于理上比九五之正應其比之也乃素處于内初无求人之心及見其分之當從理之當合乃從容自内而出以比于外焉得比之貞无過此者必見重于所比矣吉象曰比之自内不自失也比不可後亦不可不正如二比之自内則守正而不自失者矣葢人可比而我不比謂之失人人不可比而我比謂之自失六三比之匪人隂柔不中正承乘應皆隂夫比皆以比五為義而三獨比隂此其比之也皆非其所當比之人矣象曰比之匪人不亦傷乎人之成敗皆視所比而三獨比之匪人不亦大可傷憐乎爻不言凶而夫子惻然痛憫之人可以惕然省矣六四外比之貞吉柔順得正外比九五五陽剛中正賢也居尊位上也親賢從上比之正也故吉象曰外比于賢以從上也五剛明之賢而四比之是外比于賢然四之比五豈特以其賢而後比之哉正以五居我上分所當比則盡吾忠順焉有擇則二心矣九五顯比王用三驅失前禽邑人不誡吉一陽居尊剛健中正卦之羣隂皆來比已五能以一心普現于衆人之前顯明其比無少私暗為顯比焉來固不拒去亦不追如天子田獵止用三面之網開其前面禽之從前而去者任其去耳不求必得也而其私屬之邑人亦皆化于无私不相警備以求必得縱禽之去一如上之意焉凡此皆吉之道也邑人不誡如中牟童子狎雉不捕或問之曰使君好仁方春物生故不忍捕也即此意象曰顯比之吉位正中也舍逆取順失前禽也邑人不誡上使中也所以為顯比之吉者由其居乎正中正則行不私中則心無黨故能顯比也失前禽者葢禽之逆我而去者舍之順我而來者取之取舍聴其順逆而无必得之心焉故失前禽也邑人不誡是邑人亦浩浩蕩蕩有無偏無黨之心矣則皆上使之然也上六比之无首凶居上有比下之責然隂柔无徳无以比下不足為人首凶道也按上爻諸家皆以後夫當之惟本義更取一義葢居上位者如人之首衆所仰庇居上而无徳不足為首人思去之矣比之辭曰吉則无首之凶可知象曰比之无首无所終也以上下之象言之則上為无首矣以終始之象言則上又為无終葢徳不足以首物則人有始比之而終棄之者矣安所得終也乾下巽上小畜亨宻雲不雨自我西郊小隂也畜收而止之也上巽下乾以隂畜陽又卦惟六四一隂上下五陽皆為所畜是皆以小畜大之象隂柔力弱能繫而不能固又為所畜者小之象故名小畜夫曰小畜似陽已受制而隂志得行矣然隂之畜陽惟以巽入柔其剛健非力能制之故陽之亨自若况卦有内健外巽之徳二五居中用事陽剛之志得行故其占當得亨通然據所畜者小之義是畜未極而施未行如宻雲而不成雨因雲自西郊隂方而起隂先倡而陽不與和故也筮者得之則占亦如其象云宻雲不雨自我西郊此二句只是所畜者小之義不必就以隂畜陽説葢與上亨字不相蒙乃各自為説也彖曰小畜柔得位而上下應之曰小畜陽必求隂卦體惟六四一柔得上位則上下五陽皆欲與之應矣志繫乎柔能无為所畜乎故曰小畜健而巽剛中而志行乃亨陽為隂畜又何以得亨葢陽剛之人苟内失剛正之性則流為隂類矣苟外無順宻之用則害于隂類矣惟卦徳内健則不撓外巽則不激是陽剛善于自全之道也况天下事在外者無權居中者有勢而卦體二五之剛皆居中位執權用事其志得行合此二者乃所以亨也宻雲不雨尚往也自我西郊施未行也宻雲不雨者凡陽氣上進若隂力濃厚能禁而遏之則相蒸而成雨矣今陽尚盛隂方㣲不能遏陽陽直遂其上往之勢故不成雨也自我西郊者隂倡于先欲施其隂氣而未能大行也要之此卦五陽志應于隂遂為所畜此以小畜大之義也然五陽一隂勢自不敵陽雖隠然有被畜之憂而此時固猶尚往也隂雖隠然有畜陽之機而此時固猶未行也此所畜者小之義也但大勢雖猶屬陽而隠機蚤已屬隂狃目前之盛而不知氣機已非乆之而尚往者不往未行者可行矣此必至之勢識㣲者所甚懼也聖人繫辭非徒幸之欲陽之及時蚤見而豫防耳象曰風行天上小畜君子以懿文徳風有氣无質能畜而不能乆小畜象也君子之徳亦有畜之小者如威儀文辭之文徳必懿美之此其一身之小節未足為厚積而逺施也然不可以其小而不畜也初九復自道何其咎吉當畜時而欲進似于倚隂之力况與四正應尤似求援于隂是進不能无咎也然初豈必不可進哉陽本在上之物而初又得正而逺于隂則其進而向上也乃自其應行之故道而復還其舊云耳非有私于隂何其咎且不受隂制而志可行矣吉卦本小畜爻皆以不受畜為義象曰復自道其義吉也小畜之時似不宜進惟自道之復正以義酌之而不失其正故吉九二牽復吉三陽志同而九二漸與隂近惟其剛中則心无邪趨又審于善進之道于是知初九之復自道為可依倚而相牽連以復吉同初矣象曰牽復在中亦不自失也二之牽復由其居中則善别勢理而所連得人故初不自失二亦不自失也在中是指出能牽復之由九三輿說輻夫妻反目九三亦欲上進然剛而不中則不能靜察理勢而用情失當又迫近于隂本非正應而隂陽相悦遂為所係畜欲如初二之脫然自進其可得乎是輿説輻之象也夫先以其媚順我也而遂䁥之彼既得暱而有勢則不復媚我反能制我至見其制我乃忿忿與之爭也又如夫妻反目此皆理勢之必至者象曰夫妻反目不能正室也夫妻反目妻固不足責也室者夫之室情好之地裁之以正則愛可乆溺于情而不正其室能无反目乎六四有孚血去惕出无咎以一隂畜衆陽本有傷害憂懼血與惕不免也夫獨力不克必得陽剛助之乃能无患四則柔正虛巽内具實心二陽樂得而助之以此制剛血可去惕可出无咎蒙引曰爻辭以四為小人耶君子耶曰不目為小人也只是位卑力小不任大事底人也象曰有孚惕出上合志也有孚所以惕出者有孚則上合二陽之志故得陽力以免于懼也九五有孚攣如富以其鄰卦本以巽畜乾故巽體三爻為同心畜乾鄰之象也而九五居中處尊其勢尤足以役人故其孚誠與上下相攣固而不可解是其心同也而又能用富厚之力以指麾其同事之鄰其畜之必矣初二三言不可受畜之義四五又言畜剛之義葢在四言四著以弱制強之法在五言五著以上制下之道象曰有孚攣如不獨富也世固有有富力而不能以其鄰者五曰有孚攣如則不獨用其富厚之力也上九既雨既處尚徳載婦貞厲月幾望君子征凶卦名小畜隂固不能甚畜夫陽也然陽剛志疎隂柔術宻平日不覺其畜勢愈欵緩而濡蒸已透陽且漸與之和諧不以志行為務于是向之不雨者今既雨矣陽之可亨者今既處而不行矣是皆誰使之然耶葢由陽悦于隂不知自正尊尚隂徳以積至滿載故也夫以隂加陽理不順則勢不安雖自託于正亦危厲之道也則隂宜戒也然隂既已盛如月之幾望矣君子苟猶欲征進不徒取其凶乎則陽亦宜戒也象曰既雨既處徳積載也君子征凶有所疑也既雨既處由隂徳積于至載也非載則畜不成非積則亦不載人亦慎于始之積者而已聖人无時不樂君子之進而此獨戒以征凶者君子本志于征進而當隂盛抗陽之日則有所遲疑審顧而不敢進也兌下乾上履虎尾不咥人亨履躡人後而進也此卦以兌遇乾乾剛在前兌以和説躡其後故名履夫剛強之人性不可犯履其後者如隨虎後而行未有不被噬者然而剛戾之生本無實性激發則剛如兌者履剛強而以和説行之恭敬和順不激不忤則彼無所生其怒而我行得通象為履虎尾不咥人可致亨通天下至危之地亦在乎人之善處耳雲峰胡氏曰人之涉世多是危機不為所傷乃見所履大傳曰易之興也其當文王與紂之事耶是故其辭危危莫危于履虎尾之辭矣故九卦處憂患以履為首彖曰履柔履剛也履者卦莫柔于兌莫剛于乾卦體以兌柔履乾剛之後故名履説而應乎乾是以履虎尾不咥人亨夫以至柔履至剛甚危矣然正惟卦徳以和説而應乎乾是以不致傷而得亨通也身相隨則曰履心相契則曰應不特身相隨且心相契得其歡情故不傷而亨和説非阿媚也正而不激耳剛中正履帝位而不疚光明也然履之所以可亨又有義焉卦體九五帝位也夫君道主持萬幾貴以剛心無偏繫貴以中事必當理貴以正惟九五則剛中正可以履帝位而無媿于心由是發于事業天下共仰其剛健有為之功共被其中正無私之徳光輝四被而不可掩也斯亦亨道也象曰上天下澤履君子以辯上下定民志天在上澤在下尊卑較然此禮所由起人之所履也君子觀人心之欲无窮得此望彼志向囂然人人欲以尊富自處此大亂之道也君子為之辨别上下使貴賤等差各安其分以定人之志使不妄冀其取于天澤之義而示人以所履也如此初九素履往无咎人固有素守剛正一涉世故而頓改前行者初九居下位當履初而陽剛得正不為物誘是能率其素履者也以此往宜无咎矣象曰素履之往獨行願也君子自有志願恥與世浮沉故素履若非所以宜世而竟以是往葢獨行其心之所願而已毁譽利害非所計也九二履道坦坦幽人貞吉世路險阻人營營其中擇利而趨不暇正理九二居下无應不為世知而剛中之徳足以自樂為率履其道坦坦平易此幽靜之人所以自守其貞而措躬于吉也象曰幽人貞吉中不自亂也貞吉而必屬之幽人者幽靜乃不亂之義内無可悦故有慕于外世物變現自起自消非有意亂我而我自亂若中徳自娱豈自亂也六三眇能視跛能履履虎尾咥人凶武人為于大君不中不正才弱志剛無能而好自用如目眇而自以為能視足跛而自以為能履志剛如此以此履乾必見傷害履虎尾咥人凶且據其才弱志剛之象又如武人無為君之才而今為大君必恣暴以速亡矣信乎其被咥而凶也象曰眇能視不足以有明也跛能履不足以與行也咥人之凶位不當也武人為于大君志剛也眇之能視其視幾何不足以有明也跛之能履其履幾何不足以與行也履本不咥人而三獨有咥人之凶者以居位不當无中正之徳也武人為于大君以其志剛必至肆暴也九四履虎尾愬愬終吉迫近九五之剛危如履虎尾矣然四雖不中正而以剛居柔不敢用剛而愬愬然戒懼以敬畏事剛終可以得上心矣吉象曰愬愬終吉志行也履虎而行志欲上進也敬順之則上進之志可行所以吉也九五夬履貞厲剛中正有能為之資履帝位挾得為之勢下又以兌説應之惟所欲為無少拂逆由是視天下人無出我右天下事無足我難者凡有行履決斷无疑如此將自恃過甚有隠患而不悟雖曰剛斷人君之正然危道也在下者患不能樂故喜其履坦在上者患不能憂故戒其夬履象曰夬履貞厲位正當也正則有能為之資當則挾得為之勢傷于所恃故厲上九視履考祥其旋元吉當履之終祥不必問之天也唯宜自視所履以考其所應得之祥苟視之而所履周旋无虧无一事一念之非善則无往而不與吉相迎大善而吉可自考而知也如未旋則吉凶之多少亦可自決矣象曰无吉在上大有慶也以元吉而在上則積非一日善非一端可以大有福慶也乾下坤上泰小往大來吉亨泰通也此卦天地交而二氣通故名泰正月之卦也當泰之時坤隂往居于外乾陽來居于内又卦變自歸妹來六往居四九來居三是皆陽剛為主隂柔順從則善氣日盛而隂慝不得為之阻吉亨之道也彖曰泰小往大來吉亨則是天地交而萬物通也上下交而其志同也内陽而外隂内健而外順内君子而外小人君子道長小人道消也六十四卦言隂陽消長者不一然未有正當消長之中如泰否者也一泰一否氣化之升降判焉人事之治亂定焉卦曰泰辭曰小往大來吉亨則是天地相交而萬物之氣得通也此以氣化求之然也是上下相交君降已以求臣臣仰贊以答君而同心圖治也此以人事求之然也且氣有隂陽隂陽之徳有健順而泰則内陽外隂内健外順陽健為主隂順退聴此以氣化求之又然也人有君子小人而泰則内君子外小人君子為主小人退聴君子之道由此日長小人之道由此日消此以人事求之又然也此所以為泰所以為小往大來所以為吉亨也象曰天地交泰后以財成天地之道輔相天地之宜以左右民天地相交是為泰然天地日交物類日盛而參贊其間者后也氣化流行渾然無辨其氣常有餘而至于過原無截然方整之理后則明天時畫地域于本齊者區分之于不齊者補配之將天地氣化之道裁割以成就之所以制其過然道中隂陽異候剛柔異質消息異時髙卑異性天地各有所宜不能一槩皆宜所謂不及也后則因天時隨地産可用者用之可避者避之可救轉者救轉之將天地之宜輔佐相助以濟其不及此二者非他凡以為民也民生于天地而不知以天地自養故裁成輔相皆以左右夾持吾民耳可見有天地之盛化必有聖后之經綸致泰之功繼天而起也初九㧞茅茹以其彚征吉泰固大來之時也三陽方來初為之首進則俱進若㧞一茅而衆茅之根連其類以起者征行無礙吉道也象曰㧞茅征吉志在外也㧞彚征吉其吉獨在身哉三陽之志固將有為于天下惟志皆在外故其㧞茅之征足以為吉否則一身之利耳非吉也九二包荒用馮河不遐遺朋亡得尚于中行程傳曰二以剛中之才上應于五為上所専任主治泰者也治泰之道有四必有包含荒穢之量則其施為寛裕詳宻事理而人安之若無含𢎞之度有忿疾之心則无深逺之慮有暴擾之患深弊未去而近患已生矣故在包荒凡泰時漸至衰替皆由狙習安逸因循已然自非剛果決斷不能挺奮有為也故在用馮河人心狙于泰則苟安逸而已惡能復深思逺慮及于遐逺哉治泰者逺人逺事周之勿遺在不遐遺時之既泰人習于安情肆而失節將約而正之非絶去朋比之私則不能也自古立法制事牽于人情卒不能行者多矣故又在朋亡治泰有此四者乃合九二之中行也蒙引曰中者天理之當然恰好者耳不能含容非中也當斷不斷非中也忘逺非中也私邇亦非中也析言之一事一中合言之統體一中象曰包荒得尚于中行以光大也舉包荒一句通解四者之義言中行者其行也而必原于心之光大光則心胸皎潔无所偏繫大則規模宏逺不狃近小所以无往而不合于中行也九三无平不陂无往不復艱貞无咎勿恤其孚于食有福三陽盛進之時不知時將過中泰將極而否欲來故聖人為之戒約世運无有平而不險陂者隂類无有往而不復來者天道循環如此甚可危也若怠忽恣意則非天不祐而自取其咎耳惟艱難其心固守正理庶无玩時棄天之咎夫平必陂往必復勢之必至而必信者也能艱貞則勿憂恤其必信而平不陂往不復可以長享泰寧之福矣象曰无往不復天地際也无往不復此天地氣運之交際也否泰于此分焉聖人所以戒也六四翩翩不富以其鄰不戒以孚已過乎中泰已極矣三隂翩然而來不待富厚之力而自能用其鄰不待戒約而自相孚信隂類合交以害正君子所宜戒也三陽欲進而以之者初三隂欲來而以之者四象曰翩翩不富皆失實也不戒以孚中心願也翩翩來復不待富厚之力者隂本居下今居上為失實故不安其上復就于下也不戒以孚由其中心願來故无待于戒也皆失實只言隂本不宜居上故復反下與爻義異皆以抑隂耳六五帝乙歸妹以祉元吉以隂居尊為泰之主柔中虛已下應九二降至尊以順從賢臣受福而保泰于无疆大善而吉之道也昔帝乙歸妹之時曽占得此爻信乎其為降尊從卑之象以此受祉元吉必矣象曰以祉元吉中以行願也下從九二固其願也然所以行此願者由其中徳故心无欲而信賢篤也上六城復于隍勿用師自邑告命貞吝掘隍土積累以成城如治道積累以成泰及泰之終復反于否創治之日備極苦勞方成基業而今忽已頽墮是城復于隍之象也若此者大業已虧天運已去不可以力強爭也惟自守私邑而申告政命以自保耳葢雖正而不免于羞也象曰城復于隍其命亂也城復于隍原由其政令之亂故必告命以治之坤下乾上否之匪人不利君子貞大往小來否閉塞也天地之位雖自有上下而天地之氣則貴于相通此卦坤下乾上地自地天自天二氣不通故名否夫隂陽交而萬物生生氣流行此人道之常也否則氣機閉塞物生將絶非人道之常矣當此之時人欲横行嫉善奬惡甚不利于君子之正道葢以陽往居外隂來居内固小人得志之㑹而非君子所利也彖曰否之匪人不利君子貞大往小來則是天地不交而萬物不通也上下不交而天下无邦也内隂而外陽内柔而外剛内小人而外君子小人道長君子道消也否泰反類故辭皆與泰反象曰天地不交否君子以儉徳辟難不可榮以禄君子處否必將有難然難生于禄禄生于徳使不自匿其徳則人皆物色之必欲榮之以禄矣君子既食人之禄則斷无苟容之理以正而行羣邪側目安得不及于難是以君子務歛藏已徳以避禍難使人不得而榮之以禄則可免患矣夫善人无禍雖云常理而惡風方熾自宜避之徳不可改而可斂吾徳天地之心生人之命奈何不自重自保而輕嘗機穽之餌以觸凶人之鋒乎初六㧞茅茹以其彚貞吉亨當否之時三隂連類而進㧞茅茹以其彚之象也然隂之進不可遏而初之惡猶未深君子小人本無定名正即君子不正即小人况人性皆善溺于惡則竟惡矣反于善則竟善矣為初者當惡習未深苟反而從正則身可吉而世運復泰可亨矣不然則凶咎可知象曰㧞茅貞吉志在君也初之貞何如凡隂類害陽由子計身之私利而不顧其君耳苟以愛君為念自當保君子以貽君福有此心天亦祐之矣故貞則必吉六二包承小人吉大人否亨隂柔中正知有君子能包容承順乎君子之象也此在小人則吉矣然彼雖包承而其小人之心自若也不能害君子實能染君子故陽剛大人不可以彼包承而自失其守惟歛徳以自安于否則身雖止而道未傷天下不至以陽道為必不可行是道之亨也象曰大人否亨不亂羣也二雖外相包承然豈能翻然自變遂脱小人之羣乎彼既猶然小人之羣則大人亦當自安于否不可雜入于彼羣也使彼不在小人之羣大人固樂得而合之矣六三包羞聖人作易窮盡人情如此卦隂類雖同為小人而實有各異有習惡未深猶可乘機而化之者初是也雖无包承之術亦无斷然為惡之心故不目之為小人而勉以貞知其可與為君子而進之也有已成為小人而猶顧惜名義不欲顯然致害于君子者二是也既有包承之術即無實欲遷善之心故直目之以小人而戒大人以安否知其終不可為君子而避之也若六三以隂居陽不中不正則不顧面目直欲傷善在本心亦知彼為善類我今害之實有慚沮之念而外不勝其忿忮之私則内包含羞赧而外忍于為惡矣然才弱而未能發故不言凶象曰包羞位不當也人至于包羞以為惡惟心不中正使然耳九四有命无咎疇離祉否過中矣將復為泰是當重隂閉塞之日忽有反泰之機有天命矣而九四以陽居隂不極其剛氣機方轉之際不委不激以善移之否遂反泰故四无誤機之咎而疇類三陽並受福祉象曰有命无咎志行也君子復泰之志苟機㑹不遇亦无如之何有命而不善處亦无濟若有命无咎天人兩善何幸如之宜其志之得行也九五休否大人吉其亡其亡繫于苞桑五否將盡之時也而以陽剛中正居尊位是能休息天下之否者也天下亂易治難泰時少忽便至于否否而欲泰非有徳有位之大人不能息之故休否為大人之吉也然治亂無恒必常自戒懼曰其亡矣其亡矣則恒存恒安如繫于苞桑之固也桑根深固苞則叢生于下者其固尤甚象曰大人之吉位正當也正者其徳當者其位徳位兼隆乃克休否故吉曰大人之吉上九傾否先否後喜以陽剛居否極盡舉向日之否而傾之先雖否後則喜傾者竭盡无餘積年鬱塞一舉而頓除之何其暢快真可喜也象曰否終則傾何可長也曰傾否是用人力之辭然以天道推之否終則必傾原不能更乆待也君子亦乘時而已離下乾上同人于野亨利涉大川利君子貞同人與人同也離為火乾為天火性炎上同于天也二五皆人位而以中正相應又卦惟一隂上下五陽皆欲同之故為同人夫同人者以天下大同之道則聖賢之公心也一言同則易近于私昵故必于野外曠逺之地無城府相隔無疆畛可分廓然無人不同焉則志行通逹无礙矣况乾健之才無險不涉而又濟以同人之助何險危之不可涉乎亨利涉大川此于野之效也然而于野云者就所同之境極其廣而言之也而我之所以同人者豈必人人而同之哉惟明理克私處已交物實合乎君子之貞吾心正而天下同于一正之中同以理不同以勢同以義不同以欲此所以于野所以亨利涉不然交徧天下而愈成其為私惟其非君子也此萬世同人之大凖不可假借者也彖曰同人柔得位得中而應乎乾曰同人卦所以為同人卦體六二之柔得正得中而應乎九五同徳相應故曰同人葢五陽一隂則以一隂為主故同人之義取諸二同人于野亨利涉大川乾行也文明以健中正而應君子正也唯君子為能通天下之志于野亨利涉大川者卦徳乾健无私故有于野亨之義又有利涉之義也所以利君子貞者卦徳文明則能燭理故能明大同之義剛健則能克己故能盡大公之道且卦體六二中正而上應九五亦中正是能明理能制私而處已交物無不出于正焉此所以謂君子之正也君子之正如此内絶一己之私則外可以合天下之公天下人同此心心同此理凡天下之志無不有以感通之而無礙矣夫同至通天下之志乃為大同而唯君子為能之信乎利君子貞也象曰天與火同人君子以類族辨物天與火其性同也君子欲同天下以為槩而同之則反相妨害而乖爭起惟因人族之不同者各區别以類之則族各以類相從而各得所同矣且統羣族而並存之賢愚貴賤各得其所而勢足相資正所以為大同也因物之不同者各審明以辨之則物各得其辨而各相同矣且統羣物而並用之大小美惡各有其宜而事足相濟正所以為大同也審異以致同善于為同人物所以賴君子也初九同人于門无咎居初未有私主剛正非為私之人而上无繋應又无所與私故其同人不于家内而于門外心无私昵之咎矣象曰出門同人又誰咎也曰于門非門内也出門同人矣同而出門我心原无親疎厚薄之異又誰得而咎之也六二同人于宗吝二雖中正然専應于五不能大同而繫于私惟同人于宗黨而已本以善相取而専繫同好視大道為公之志不有愧乎吝象曰同人于宗吝道也同人之道曰于野而二乃于宗其道固可吝之道也九三伏戎于莽升其髙陵三嵗不興剛而不中上无應與欲下同于二而二専同于五使三以柔處此則亦已矣過剛不中必欲間二五而奪之潛毒宻計如伏兵戎于林莽之中覘探顧望欲乘其隙如升其髙陵然九五陽剛非三所能攻故至于三嵗之乆而終不能興也讀此象者可以知隂陽攻取之由窮小人忮害之狀又見圖非己有者徒勞而无功如此雖然致此爭者誰乎二不得辭其過象曰伏戎于莽敵剛也三嵗不興安行也伏戎于莽非敵二敵九五之剛也三嵗不興又安能行乎九四乘其墉弗克攻吉剛不中正又无應與亦欲同于六二而隔三一爻隔三攻二為乘墉以攻之象然以剛居柔尚能自反知二為五正應非己正應也退而弗攻是能改過而得吉也象曰乘其墉義弗克也其吉則困而反則也既曰乘其墉則力非不能攻徒以義之不能故不攻與九三之屈于勢者異矣故聖人竞與之以吉者葢心欲同二而理有難通求所以同二之義而不可得然後知妄求之无益而退安于道義之正則焉困而反則所以吉也不自反于則則二未必得禍已及之矣九五同人先號咷而後笑大師克相遇五與二以中正相應而為三四所隔五不勝憤抑而至于號咷然五與二以同徳相應義理之同也勢利之同可間義理之同不可間故其後又遂其同而笑焉然六二柔弱而三四剛強必用大師以勝之然後能與二相遇此其後笑之由甚不易也象曰同人之先以中直也大師相遇言相克也先所以號咷者以五二相同以中其理本直故不勝憤切而號咷也大師相遇者言五之與三四勢不可並而三四甚強今欲相克故非大師不可也凡言克者見敵之強春秋傳曰如二君故曰克隆山李氏曰卦以相同為義而三伏戎四乘墉五大師克嗚呼出而與人同至易至簡之事而乃如此故易中必知險簡中必知阻不學易者殆不可以涉世也上九同人于郊无悔居外无應物莫與同如處于荒僻无人之地有同人于郊之象然潔身獨處諸爻之爭超然無與可以无悔矣象曰同人于郊志未得也于野則曠逺无私人人可同故遂其求同之志今上九非无求同之志也然不于野而于郊則僻寂之地無人可同是于求同之志尚未能得也乾下離上大有元亨大有所有之大也乾下離上火在天上无所不照照臨衆有是所有之大也又六五一隂居尊得中而五陽皆應之有位有徳羣陽樂歸亦所有之大也故名大有夫所有既大苟徳有未善何以能保所有惟此卦有剛明應天之徳焉則可使所有者各得其理而日新日盛大善而亨之道也凡言元亨元者其處事之理盡善盡美亨者即此事亨通也然不可分二字另講葢就其亨處思之又見其理之盡善而事無不通故曰大善而亨元吉亦然程傳曰凡卦有卦名自有其義者比吉謙亨是也有因其卦義為訓戒者師貞同人于野是也有以其卦才而言者大有元亨是也彖曰大有柔得尊位大中而上下應之曰大有卦所以為大有者以卦體惟六五一柔居乎尊位且以五之中而居乎尊位則其中為大中非止一身之中而已有此位徳而上下皆應之所有者大矣故曰大有誠齋楊氏曰同人曰應乎乾我同乎彼之辭也大有曰上下應我有其大之辭也其徳剛健而文明應乎天而時行是以元亨夫大有之時固盛矣當此時而益致其元亨則存乎其徳也觀卦徳乾為剛健離為文明卦體六五居尊而應乾合卦徳卦體觀之是其為徳也剛健以勝私是无欲之體也文明以燭理則聰睿之體也體既立矣而用之所施則又張弛威福動與時宜凡理勢自然之極天意所至聖人即有道以應之而不失其時焉撫大有之勢而乘以聖人之徳豈非大善而亨者乎象曰火在天上大有君子以遏惡揚善順天休命所有既大物類不齊苟无以治之則釁孽萌而盛業將敗矣君子以為天之命人原有善而无惡此休美之命也于是有刑禁以遏人之惡有勸賞以揚人之善以此順乎天之休命所以治大有也初九无交害匪咎艱則无咎人處大有則欲易盈志易驕未有不因得意而致害者害徳害身均之皆自誤之咎也初九陽剛則其心本正居下則位未能肆上无應與則誘之者少居事之初則世味未深合此四者未渉于害無可指為初之咎者故匪咎雖然以居初之故而免于咎閱厯未深其堅否未可知故必艱難其心以處之時存戒懼則驕盈无自而乘如此乃確然為无咎耳象曰大有初九无交害也大有本易涉于害惟初九則陽剛居下無應居初所以未害九二大車以載有攸往无咎剛中之人才徳並茂大車之象也得應于五為上所任葢有是車而用之以載矣夫人志有所欲行而才具如是見用于上可勝任而免咎矣雲峯胡氏曰九二乾體而曰大車者引之以馬之健行之以輪之圜皆乾象也况以剛居柔柔則其虛能受剛則其健足行不曰吉者任大責重僅得无咎處大有之難如此象曰大車以載積中不敗也謂之大車則能勝重所載雖多積于中而車行不至于敗由九二材力之強能勝大有之任也九三公用亨于天子小人弗克居下之上公侯之象其徳陽剛得正而上值六五柔中下賢之君以賢侯而遇聖主其被親遇可知故為公侯朝獻于天子之象若小人本無剛正之徳安能得親遇于柔中之主故小人雖占得此爻弗克當也象曰公用亨于天子小人害也公用亨于天子為剛正者言之小人占此固不利也九四匪其彭无咎六五柔中于上而四以剛近之有僭逼之嫌故其時位之盛非福機也使更極其盛則大誤矣四則居柔能自貶抑不極其彰盛免于咎矣象曰匪其彭无咎明辨晳也匪其彭无咎葢四居離體其明辨物理晳然不蔽當其方盛則知咎之將至故能抑損不至滿極也昏昧之人為欲所蔽貪得務前徒自取敗而已六五厥孚交如威如吉大有之世柔順而中以處尊位虛中以應九二之賢是上以信予下也上下應之是下以信事上也上下交以信相感厥孚交如矣然君道貴剛太柔則廢徒恃其心之无他而等降不嚴權威不肅亦非善道故必威如乃吉曰交如非實指其相交孚誠之心此往彼來兩心无異有似于交互也曰威如非實欲作威君令臣恭肅然靜治有似于威嚴也凡言如者皆形容之辭非直指之説象曰厥孚交如信以發志也威如之吉易而无備也交如雖兼上下然下實由于上惟上以信予人故能感發人之志皆歸于信也又曰威如者恐太柔則人玩易之而无畏備之心也備者凡人心有所畏必常自防備恐致誤觸若无威則初時猶倚心相託不拘小節乆則輕狎藐玩全無畏備矣此人心所必至故聖人慮之上九自天祐之吉无不利居大有之極本有滿盈之慮然此卦六五一隂而上下應之故上九雖以剛居上亦下從六五者也夫六五孚交而上履其上是能履信實之道矣謙退不居是能思乎卑順之道矣志從于五是能尊尚賢人矣如此則天人无不樂從故為自天祐助之吉无不利之象葢持滿有道能衍其福于无窮者也象曰大有上吉自天祐也大有至上已懼太盈今以大有之上而吉非天實助之不能也則其所以致天之助者可思矣艮下坤上謙亨君子有終謙者有而不居之義太虚中本無一物徳業勲名于我何有天地生萬物而不言所利聖人徳極今古而望道未見葢有則實有居則无可居也程傳曰達理故樂天而不競内充故退讓而不矜此足知謙道之深矣此卦内止則其心收歛外順則其行卑恭謙之意也以山之髙而屈于地之至卑之下謙之象也故名謙人能謙則徳日盛業日廣无行而不通有亨道也且其先雖自屈于人而其終則光輝盛大人自不得而掩之此君子所以獨能有終也小人始雖虛矜傲物終豈免于敗辱以貽笑哉彖曰謙亨天道下濟而光明地道卑而上行謙之所以亨者葢謙則必亨也試觀之天地天雖居上而其氣常下降以濟萬物此天之謙也惟其下濟故生成萬物化育如此之光明此非亨乎地之位則屈于下徳則順乎天如是之卑此地之謙也惟卑故能承天時行以其氣上交于天此又非亨乎葢非下濟則不能光明非卑則不能上行抑下濟即能光明卑即能上行皆其道之自然不可強也天地如是則人之謙而必亨可知矣天道虧盈而益謙地道變盈而流謙鬼神害盈而福謙人道惡盈而好謙謙尊而光卑而不可踰君子之終也然則所謂君子有終者不又可推廣其理乎今合觀天地神人之道各取一盈者一謙者而並較之盈者之後究竟何如謙者之後究竟何如則謙之有終可知矣天道則虧盈而益謙也如日没則升中則昃月晦則生望則縮也地道則變盈而流謙也盈滿者傾變而反陷卑下者流注而益増也鬼神則害盈而福謙也盛必衰歛必發侈必災謹必泰也人道則惡盈而好謙也傲物取怨虚已人悦也凡此皆其道之自然非有心使之也甚矣謙之善也以是居尊則其徳愈光顯以是居卑則位雖下而徳莫可踰何則以人好之也可見始雖自屈而終至于光不可踰信乎君子之有終也象曰地中有山謙君子以裒多益寡稱物平施主山而言則山屈而止于地之下也主地而言則見以地之卑而藴山之髙内充而外歉謙象也君子觀天下之物有過多有過寡何其不平故裒去其多者增益其寡者所以稱物之宜而平其施使天下之物各得均平而無偏多偏寡之患此則非獨君子一身之謙所以治一世而使之謙也初六謙謙君子用涉大川吉柔能謙矣又處至下謙而又謙是君子之行也自處至謙衆所共與居後不爭不犯于難用之涉大川且吉况平常乎象曰謙謙君子卑以自牧也人之氣易于自髙雖降之猶不自勝所貴日以卑下之道馴養其心乃能漸至調順卑以自牧故一謙不足必取乎謙謙六二鳴謙貞吉柔順能謙中正則善用其謙謙徳之盛積于中而發于外人皆稱之鳴謙之象積乆自聞未嘗干譽貞也名實既符志行可達吉也象曰鳴謙貞吉中心得也二之鳴謙葢其心有不如是而不可者乃中心所自得初非求聞于外也此其謂之貞吉九三勞謙君子有終吉剛正之才能建功業居下之上其位髙卦惟一陽上下所歸其任重合此三者有功勞矣勞而能謙君子所以有終何吉如之象曰勞謙君子萬民服也不曰功而曰勞葢有功之人拮据焦苦獨為勞瘁惟其勞最易怨望今勞而能謙萬民所以不惟感其功且實心服其徳也夫謙而使萬民服正所謂尊而光者故曰有終六四无不利撝謙柔而得正上而能下有謙徳矣何所不利然九三有大勞而已居其上彼雖不爭已則何安更當發揮其謙以示不敢自安之意葢四本有謙心特隂柔收歛故欲其揮布于外所處應然耳象曰无不利撝謙不違則也謙有所宜施故撝謙雖似過然處九三之上理合如此不為違則也則者天理當行之節限四之謙正以過為則者也六五不富以其鄰利用侵伐无不利以柔居尊在上能謙從之者衆不富以其鄰之象猶有不服者則不可専執柔徳况人之從我者衆率以侵伐宜矣然居尊能謙而從之者衆則他事亦无不利豈獨侵伐也象曰利用侵伐征不服也聖人慮後世有觀此象而妄動干戈者故易侵伐而言征征者上伐下禁暴亂整名分以正行之也上六鳴謙利用行師征邑國謙極有聞亦為鳴謙衆之所與故利行師然柔而無位僅可以征已之邑國而已坤為地為衆故凡坤象多言邑國言師象曰鳴謙志未得也可用行師征邑國也上雖鳴謙然柔則才不足无位則力不足故人或未從志有未得而至于行師也然其可用行師則亦征邑國耳能如五之逺哉坤下震上豫利建侯行師豫和樂也人心和樂以應其上也九四一陽上下應之其志得行又以坤遇震為順以動故名豫夫震為長子有君象坤為衆有師象此兩者皆必賴人心和樂而後可舉今以順動致人心之和故于建侯行師為利建安邱氏曰屯有震无坤則言建侯而不言行師謙有坤无震則言行師而不言建侯豫合坤震成體故兼言之中溪張氏曰地以靜鎮建侯也雷以威動行師也彖曰豫剛應而志行順以動豫卦名豫者卦體九四一剛為上下所應而其志得行此人心之和樂也卦徳坤順震動順理以動動而人莫不悦此人心之所以和樂也故名豫豫順以動故天地如之而况建侯行師乎夫豫雖兼剛應與順動而所以致豫則耑在順動豫之徳既為順以動矣順理之舉循乎當然之則中乎自然之機故天地之大亦皆如我意所為葢天地者理之至我順乎理則天地順乎我而况建侯行師又何不得人心之悦乎二者所以利也天地以順動故日月不過而四時不忒聖人以順動則刑罰清而民服豫之時義大矣哉夫當豫之時其義存乎順動矣而順動之義豈徒建侯行師為利哉天地至大也然天地之運惟順其氣之自然以動故日月之晷刻遲速有常不過也而四時之氣候寒暄有定不忒也過忒不和也不過不忒則和豫矣而由順動故然是天地惟順動故豫也聖人至大也然聖人之行惟順其理之自然以動則事事皆足以感民之性正民之情不待煩刑而民自心服夫刑罰煩而民不服不和也刑罰清而民服則和豫矣而亦由順動則然是聖人惟順動故豫也以天地聖人之大而皆不外順動以致豫則此豫時順動之義何其大哉而豈止于建侯行師也象曰雷出地奮豫先王以作樂崇徳殷薦之上帝以配祖考雷始伏于地及出地而奮則鼓天地之和氣發萬物之生機和之至也故為豫象先王取豫之義又取雷之聲于是作樂詩歌聲律舞蹈綴兆無所不備則其盛徳之美無不相形而出可以崇顯其徳矣而又何以用之耶雖朝覲㑹享無往不用而惟享帝配親為最大于是取所作之樂盛薦之上帝薦之南郊而以祖配薦之明堂而以考配夫薦之上帝而上帝歆吾徳配以祖考而祖考悦吾徳和豫無大于此矣葢徳積而作樂以崇之是和之積于中者不得不發為聲音也而聲音既奏又足以召和極之上帝祖考以此格焉餘可知矣初六鳴豫凶豫之時以不溺于豫為善初六隂柔上得強援正志行有勢之人故不勝其豫而以自鳴凶之道也象曰初六鳴豫志窮凶也初六則隂柔卑下之人而忽得強援是必志滿意極而禍敗无日矣所以凶也六二介于石不終日貞吉豫樂易以溺人心逐紛華福禍之幾渾不自覺故初凶三悔五疾上咎惟六二中正自守處逸樂之中而泊然安靜不亂斷然堅確不移其介如石焉則心無蔽惑而思慮明審凡事之幾㣲遇之即知不俟終日而見之是得處豫之正而逺于害矣貞吉象曰不終日貞吉以中正也中則内存虚靜之體正則外秉禮義之則故不溺于豫而見幾蚤六三旴豫悔遲有悔隂不中正又近于四仰瞻人之得志而藉以自豫能无溺乎處此惟宜速改可也苟又遲焉則凶咎將至真有悔之不及者矣象曰盱豫有悔位不當也不中正正與二反九四由豫大有得勿疑朋盍簪卦之為豫由四而成是衆所賴以致豫者也大有所得矣夫以一人而為天下致豫任大望重獨剛未可濟也需同類之朋焉惟至誠勿疑則朋類合而速聚乃可保豫也象曰由豫大有得志大行也剛之志在為天下致豫由豫則志大行故曰大有得六五貞疾恒不死隂柔无堅介之守居尊有逸豫之資沉溺于豫固有疾矣况九四之剛衆皆附之我乘其上衆不附而處勢危其疾益深有貞固其疾之象然以其得中猶有善行存焉未嘗肆无道以速亡則又為恒不死之象象曰六五貞疾乘剛也恒不死中未亡也六五則是柔而居尊有疾矣曰貞疾則以其乘四之剛故勢愈危也如此而恒不死葢其雖溺于豫而中徳猶未亡也上六冥豫成有渝无咎隂柔居豫極有昏冥于豫之象然以其居動極雖已成之愆而能變而自新善補其過无咎象曰冥豫在上何可長也昏冥于豫已非善道況在上又窮極之地何可長也震下兌上隨元亨利貞无咎隨從也欲人來隨已者必我先降心以隨物而後人悦從之此卦卦變自困來者九來居初自噬嗑來者九來居五自未濟來者兼此二變皆為剛來下柔之義所謂降心以隨物也以二體言之為此動而彼説所謂人説從之也故名隨夫人情乖背則事皆有阻苟我能隨物物來隨已彼此相從無少礙塞大通必矣但言隨則或勢相驅或情相昵不顧義理之正以此致人或為人致雖得大亨不免于咎況動悦之情易失其正故必利于固守其正不苟相隨乃无咎也彖曰隨剛來而下柔動而説隨卦名隨者卦變則剛來而下柔卦徳則此動而彼説故名隨大亨貞无咎而天下隨時隨時之義大矣哉隨固大亨矣然必得其正而无咎則義理之正合乎人心之公而天下皆願隨之此貞之所以利也夫人之相隨以為適然相從特小事耳不知處隨之時有不出于正而不可者惟正而後天下隨之勢驅情昵可以私而不可以公可以暫而不可以乆此其義之所係何如重大而謂可苟歟象曰澤中有雷隨君子以嚮晦入宴息雷本動物今藏澤中隨時休息之象君子亦有然者晝則自強不息及嚮昏晦則宴息以安其身亦隨時適宜之一事也南軒張氏曰隨非隨時俯仰之謂有是時則有是理君子順理而行嚮晦宴息亦其一事耳建安邱氏曰豫之作樂法雷之動隨之宴息法雷之靜初九官有渝貞吉出門交有功官主也初九以陽居下為震之主正所謂剛來而下柔者隨之主也是官也然一有所隨則有所偏繫較平時無所専隨之虛𠂻不能不變其常矣此正初出隨人之始不可不慎也必也隨乎正類而所與不泛則措身善地吉矣又出門以交不私所隨則所交不狹而人之資我无窮何事不可就有功矣隨人之道泛與狹皆不可而戒泛尤在所先一曰貞再曰出門貞則許其立身之吉出門乃許其身外之功此子夏子張之論交所以胥失之也象曰官有渝從正吉也出門交有功不失也人不患有渝而患渝之不正故官雖有渝隨從乎正則吉也隨最易有遺失出門交有功則能集衆善而无遺不至有失矣六二係小子失丈夫隂必隨陽處二而擇所隨初與五皆陽也但初非正而近五正應而逺人情易暱于近而二隂柔又不能自守故其象為情係于初之小子則反失五之丈夫矣程傳曰二中正非必至是也在隨之時當為之戒也象曰係小子弗兼與也係小子者豈果忘丈夫以為可兼與耳不知從非則失是斷无兼與之理也夫志安于此而欲兼乎彼此其所以有係而不能割自謂不見絶于正類而究止為下流之歸苟決知其弗兼與此𠂻判然復何所係哉六三係丈夫失小子隨有求得利居貞陽剛在上者丈夫也居下者小子也三雖與初同體而切近于四故係于四之丈夫遂失初之小子以四陽當任而已隨之固有求必得矣雖然不可以必得之故而遂至于苟求惟利居處其正則所得者亦君子之應得矣葢三四非正應而隨之且有得疑若出于邪媚且人情无厭有求必得遂以為非理亦可求也故戒之象曰係丈夫志舍下也人貴知所舍志舍乎下乃能係上此知弗兼與之義者九四隨有獲貞凶有孚在道以明何咎位近于五剛徳同五故其隨五也所欲可獲矣但勢陵于五嫌隙易生在我雖无邪心而勢必凶也貞凶然則何以處此惟本之心者實皆愛敬其上之誠見之行者皆合進止當然之理有孚在道如是其明哲焉則咎于何生乎葢咎生于不明不明之人隨上而无専于隨上之實心不循隨上之定理趨避彌巧取禍彌速象曰隨有獲其義凶也有孚在道明功也勢過則禍生隨有獲以理斷之固宜凶也有孚在道惟明理者能之是明哲之功也九五孚于嘉吉二之中正嘉美之徳也五以陽剛中正應之天下惟同徳之相隨真摯而不可惑故為孚于嘉之象上之隨下與其嘉者相信吉莫大焉象曰孚于嘉吉位正中也下非一類而獨孚于其嘉惟已有正中之徳故能孚乎二之中正也上六拘係之乃從維之王用享于西山卦已終矣始終不失其隨已極推其心誠有専固于是而不可移者如拘禁之係縳之又從而維結之也夫二三其徳汎汎而來汎汎而去人之大患也如上之誠雖王用以享西山可矣況隨人乎象曰拘係之上窮也拘係之者隨至于上則始終不變其心之誠窮極而不可易也巽下艮上蠱元亨利涉大川先甲三日後甲三日蠱壊極而有事也此卦艮剛居上巽柔居下卦變自賁來者初上二下自井來者五上上下自既濟來者兼之總皆剛上柔下之象也夫剛上而情不下接柔下而情不上通上下乖隔蒙蔽日滋蠱之由也又下卑巽而无任事之心上苟止而无振作之志因循積弊百病交生亦蠱之由也故名蠱天下事不極亂則不極治蠱壊之極必將更新大亨可必也但所以元亨者豈任之天運哉貴乎盡人力以濟險難利涉大川而所以治蠱之道則有二焉蠱有事之始猶甲日之始也一則治之于先當將壊而未甚壊之時蚤求自新以開後事之始而不使至于大壊若甲為始而甲之先三日則為辛也一則保之于後當壊事方新之始當更丁寧詳審于後而不使至于速壊若甲為始而甲之後三日則為丁也蠱將成而預治之蠱既治而維持之此其涉川之事元亨之由也程傳曰先甲先于此究其所以然也後甲後于此慮其將然也一日二日至于三日慮之深推之逺也究其所以然則知救之之道慮其將然則知備之之方善救則前弊可革善備則後利可乆古之聖人所以新天下而垂後世也後之治蠱者不明斯戒慮淺而事近故勞于救亂而亂不革功未及成而弊已生矣彖曰蠱剛上而柔下巽而止蠱卦名蠱者卦體卦變為剛上而柔下卦徳為巽而止皆蠱之由也蠱元亨而天下治也利涉大川往有事也先甲三日後甲三日終則有始天行也治蠱者承因循怠廢之後亦難為力矣而能至于大善而亨此非區區補救而天下大治之象也利涉大川者向以偷安无事成蠱則今之治蠱必往而有事乃可元亨也先甲三日後甲三日如是以治蠱則亂終而治始矣夫終之必有始天運固然也人可不思所以應天行耶象曰山下有風蠱君子以振民育徳山下有風物壊而有事矣君子治蠱之事則无過治人治已二者葢蠱之時教化凌夷風俗頽敗必振作其民使一變其舊習也而自新又新民之本故必培養己徳以為之基焉二者並舉蠱无不治矣初六幹父之蠱有子考无咎厲終吉幹如木之幹挺持振立之義蠱者前人已壊之緒故後人繼而治如子幹父之蠱也初六蠱未深事易濟誠能幹父之蠱則可謂有子而考得以无咎葢父之蠱父之咎也子不能救有子如無能幹方見有子而考之過咎亦葢也但既至于蠱事亦危矣不可以蠱未深而易心處之也知其危而戒之則始危而終吉象曰幹父之蠱意承考也幹前人之蠱則必衒已之長彰前人之短専務更張不顧當否葢前後相形人已相較其私已甚耳若以子幹父是一人之事相形相較之私安所用之雖使盡革父之壊事而其意原以承考我今所為皆歸之考所欲為故聖人于凡幹前人之蠱者而取象于幹父使其心為厚愛前人歸美前人之心乃可以言幹不然皆私也此幹蠱要義故首于初發之九二幹母之蠱不可貞六五柔而在上母象也二以剛中應之為幹母之蠱夫幹母與幹父則又異矣以我之剛承母之柔恐傷于剛直而于子道不盡故不可堅執其貞惟巽以挽之而已堅貞則恩義傷而蠱終不可救象曰幹母之蠱得中道也母之蠱難于父而二能幹之者以其得中道也中則善用其正九三幹父之蠱小有悔无大咎幹蠱而過剛不中未免有矯拂之嫌于心固小有悔矣然巽體可以救其剛得正可以補其不中亦无大失于理也象曰幹父之蠱終无咎也人患不幹蠱耳既曰幹蠱迹雖拂而心則順終无咎也六四裕父之蠱往見吝以隂居隂不能有為蠱已深而寛裕以處之無奮迅急援之氣以此而往弊日加甚立見其吝耳葢蠱宜去而不宜因故其道用剛而不用柔于初見用心之公于二三見用剛之中于四深著用柔之失蠱道于是大備象曰裕父之蠱往未得也蠱而以裕處之其如蠱何是徒處其任而究無所濟也六五幹父之蠱用譽五亦才柔不能治蠱者然虚中應二任九二之剛以幹蠱則蠱可治而用以致譽矣幹蠱之實歸二而幹蠱之譽歸五柔尊者亦何憚而不任下之剛乎溢善曰譽五本不能幹蠱而人竟以幹蠱稱之是溢美之名也甚矣虚心任剛之善也象曰幹父用譽承以徳也五之幹蠱非五自能由二承以剛中之徳也上九不事王侯髙尚其事陽剛之人抱賢徳而操守堅且居上蠱事已終無所有事在卦之外身無職任故象為不臣事王侯而獨髙尚其一身之事也象曰不事王侯志可則也榮利之地誰能忘之果能不事王侯此其潔清之志甚可為法則也朱子曰當此時若能斷然不事王侯髙尚其事不半上落下則其志真可則矣只為人不能如此也兌下坤上臨元亨利貞至于八月有凶臨進而凌逼于物也彼雖衆此雖寡然此勢方進彼勢方退此氣方盛彼氣方衰寡者纔進而衆皆引退其氣足以逼之也此卦二陽浸長以逼于隂雖心不逼而勢已逼之故名臨十二月之卦也陽道方通陽道本正況卦有説而順剛中而應之善皆亨道皆貞道也故其占當得大亨而宜固守其悦順剛中之正也雖然隂陽消長循環甚速方今二陽浸長固為盛矣至于八閲月之後則亦二隂浸長而為遯是為有凶人第知今日有浸長之樂而不知後隂亦有浸長之日也可无慮乎彖曰臨剛浸而長卦名為臨者以卦體剛浸漸而長也説而順剛中而應況卦徳説而順雖處剛長之時而无急于逼物之心内和悦而不激外順理而不乖卦體九二剛中而應乎六五雖當剛長之時而不過用其剛且有助于上凡此又皆卦之善也大亨以正天之道也當剛長之時而又有此善是原有亨道正道也故既許以大亨而尤必以正者處臨之不可不正此天理之當然也天之大惟一正人而不正是棄天之道自絶于天者也又何元亨之有至于八月有凶消不乆也據今則為方長然距二隂之遯僅八月耳消亦不乆也可不備歟象曰澤上有地臨君子以教思无窮容保民无疆地臨于澤上臨下之象也君子臨民之道有貴乎教之者非第訓約之而已其董戒成就之思無所不至如澤之浸潤而深洽也有貴乎保之者其所愛䕶不可以有限必容受包含普皆保之无復疆域之隔如地之廣承而生聚也二者臨道備矣初九咸臨貞吉咸徧也皆也二陽浸長舉羣隂而徧皆臨逼之葢方長之勢寡足以逼衆也然初九又得正不亂于小人之羣亦不至為已甚之行適合處臨之正而陽道自此獲伸矣貞吉象曰咸臨貞吉志行正也咸臨則其勢盛勢盛將不顧理初之貞吉則志在行正非倚勢者九二咸臨吉无不利亦如初之咸臨初得正而二得中其勢且又進矣故吉无不利初二之咸臨皆以其勢言也貞吉吉无不利又自初二之徳斷之象曰咸臨吉无不利未順命也咸臨而能吉无不利者羣隂恃其衆未即肯順天命以遜君子也此不可過剛故必如二之剛中乃能吉无不利六三甘臨无攸利既憂之无咎居下之上下臨乎陽懼其見逼而甘媚以臨之彼之所疾者隂邪所好者剛正而已豈甘能動之故无攸利然能憂而改之自變為陽類則為泰之九三方同升之可慶寧有咎乎葢君子處已也嚴故不受不正之媚樂善也寛故不治既憂之人為三者徒以隂術悦之无益不若實改從善也象曰甘臨位不當也既憂之咎不長也甘臨之術不中正者所為也既憂而改之則先暫有咎後歸无咎咎不長也六四至臨无咎以順正之人得初九正應而與之宜其親宻懇至而无間也夫與人相臨而貌合情疎咎莫大矣四則臨之至雲峰胡氏曰六四坤兌之間地附澤澤依地相臨之至也象曰至臨无咎位當也不正之人情无定實四柔而得正故與初相臨之至六五知臨大君之宜吉五居尊位所臨甚廣而柔中虚已以應九二不自任而用人智之事也以知為臨是大君之所宜者吉可知矣葢曰大君則所臨不一而區區自用其耳目甚非所宜故任賢為宜象曰大君之宜行中之謂也謂之宜者葢天理適中之處行乎中道是謂之宜五有中徳故能任賢以合宜上六敦臨吉无咎處臨之終積乆無間敦厚于臨者也相臨患于情薄則意乖勢離不免于凶皆已之咎敦厚則吉无咎也象曰敦臨之吉志在内也上之所欲臨者内之二陽其志専在于是不可他移是以為敦臨聖人于隨上臨上皆示誠確之義人之相與貴信厚而惡浮薄如此按初二之臨陽臨隂同卦名臨逼之義餘四爻皆上臨下之義與卦不同讀易日鈔卷二
