body:
  text: 讀易日鈔卷五贊善張烈撰下經兌下艮上損有孚元吉無咎可貞利有攸往曷之用二簋可用享損減省也下卦本乾上卦本坤損下卦上畫之陽益上卦上畫之隂又上山下澤為損澤之深益山之髙皆損下益上則剝民奉君之象也然民貧則君不得獨富下固損而上亦歸于損故名損夫損本拂人情之事本非大善而吉本不能無咎本非正道本不可行然有不得不出于損者勢不得已取之有道而所損不妄是為有孚則元吉無咎變不失正可貞也近情而可行利有攸往也夫損既非得已而所用亦必出于不得已斯其為用也宜何以用之乎惟一概從儉雖祭享大事亦只以二簋可矣况其他乎至用之如此其儉而後知其損下之果不得已也有孚者實出於情之不欲其然實出於理之不得不然使心利其益已而姑托于不得已之言非孚也使勢未至于無可奈何而姑託于不得已之理非孚也彖曰損損下益上其道上行卦名損者卦體損下卦益上卦益歸于上其道乃自下而上行者也則下損而上亦損矣故為損損而有孚元吉無咎可貞利有攸往曷之用二簋可用享二簋應有時損剛益柔有時損益盈虛與時偕行夫損非善道也惟損而有孚故元吉無咎可貞利有攸往曷之用二簋可用享夫二簋豈所以致享而于此用之遂若適當如是人不怍而神不怨者蓋其用之應有時也惟損時應如是非可執為常法人可不識時乎即如以卦畫觀之非必剛宜損柔宜益也然剛滿極則損至柔歉極則益至有相乘于不得不損不得不益者皆有時也以凡天下之物觀之或損或益或益極而盈或損極而虛時至則行無物能違也甚矣時之不可不審也夫子于損益二卦津津時之一言此天地人物一大關鍵于此覷破可以得寰中之旨身世了無事矣象曰山下有澤損君子以懲忿窒欲山下有澤氣通上潤損下益上之象君子修身所當損者莫過忿欲忿則懲于今以戒其後欲則塞其源以絶其流忿之突兀不化如山欲之濁穢浸溺如澤朱子曰懲忿如摧山窒欲如填壑初九已事遄往無咎酌損之損以損下益上為義初以剛居最下上應六四之隂自應損已益四義無所辭故自輟所為之事而速往以益之忘己之私以盡心于上無咎之道也然益人之術隨分量施雖父兄于子弟不能概施而直致况下于上乎行己之意不顧上之所安忠而被惡愛而見踈以是也故當斟酌其淺深以損之遄往者心酌損者用也象曰已事遄往尚合志也已事遄往益上如此其速者以四賴于初初應于四志相合故不辭捐私以赴之九二利貞征凶弗損益之為下固當益上然枉己從人適失其益上之具九二剛中有志在守正不肯妄進之象惟志在守正故占者利于貞惟不肯妄進故占者征則凶也夫守正不進是無損于己何以益上不知正惟弗損已道乃所以深益于上也人固有損而後能益人者亦有不損而後能益人者不可不精察也象曰九二利貞中以為志也九二非正而曰利貞志在守中自能正也中者無絶上之志亦無徇上之志宜守則守宜弗行則弗行不别求益上而上已益貞莫大于是六三三人行則損一人一人行則得其友下體三陽上體三隂今三陽之中損去一陽而上之是三人行則損一人之象此一陽既上則上隂來下于是初與四相偶二與五相偶三與上亦相偶蓋物必有兩兩則親又參一焉則三三則亂故必一人行則各得其友相與之道損三以就兩而已象曰一人行三則疑也所以必一人行者三則各一其心疑攜而不相親也安得不損一六四損其疾使遄有喜無咎隂柔不立是其疾也以初九之剛損已之疾惟利于速必汲汲下求能使初遄來則疾去而有喜在我求益之道庶得無咎在初之益四宜遄往而在四之求益宜使遄各盡其心乃能見益不然彼方汲汲此乃悠悠誰之咎乎象曰損其疾亦可喜也在上以受益為喜四不言益而損其疾損疾所以受益故亦可喜六五或益之十朋之龜弗克違元吉位居至尊天下之物皆其所有受益本多然使以驕僻處之則人心離怨誰其奉我五居尊而有柔順虛中之德故天下莫不樂以重寶相奉五雖無意求之而彼自來或益之以值十朋之寶龜雖欲却之而不可得大善而吉之道也象曰六五元吉自上祐也六五元吉惟其為六五中順之德上順天理故天祐助之而人心莫不樂奉也蓋受天下之大益者非人力智巧所能得乃自上天祐之也上祐無他在己中順之德而已故曰六五元吉自上祐也明大益不可幸邀在天尤在德也上九弗損益之無咎貞吉利有攸往得臣無家損下益上至上九則受益已極反欲益下然所以益下者必有惠而不費之道不待損己自可以益人乃為無咎之道然亦必出于至正不苟以悅人為心則吉而利有攸往人之受其惠而歸之者不復見其有家而德施無外矣象曰弗損益之大得志也君子以益下為志然損己益人所被有限惟弗損益之施及無窮乃為大愜本懷耳震下巽上益利有攸往利涉大川益增益也損上卦下畫之陽益下卦下畫之隂損上以益下下固益而上亦歸于益故名益夫損下非善道作易者憂之故纍詞以示訓若夫為上而以益下為心道己善矣無所用戒也處常則事可行處變則險可濟無所用而不利也况二五具中正之德處益下之時而行以中正其利可知故利有攸往震巽皆木象有益下之心而濟以才具其利又可知故利涉大川彖曰益損上益下民説無疆自上下下其道大光卦名益者卦體損上卦之陽益下卦之隂夫為上而損己以益下受其益者感説豈有窮極自應民説無疆也何也莫尊于上莫卑于下故下情疾苦常艱于上聞上心侈大常踈于下逮上與下若是其難通也今觀卦體乃自上卦而下于下卦之下是上之德意實自上而非虛文實自上以究及于下而無中滯其道大光顯矣夫道不光者雖施惠于人而人不感惟大光則美意良法實使民説服之無盡所以民説無強也以益下而道光而民説上又何嘗不益乎蒙引曰下二句申上二句按損上益下自上下下皆就卦體説説過卦體然後轉入君民意隂民象利有攸往中正有慶利涉大川木道乃行夫益道之善己如此而卦體九五六二同有中正之德凡所以益下者皆出于大中至正之心故所行之事皆貽福慶于天下所以云利有攸往也卦象震巽皆木人之所憑以涉川者木也而凡人之所慿以濟險難者其經綸才具皆木道也利涉大川者木道施行可恃以濟天下也惟利往可以處益之常利涉可以處益之變益之無所不利見之卦體卦象又如此益動而巽日進無疆天施地生其益無方凡益之道與時偕行然益之道又不止此也推廣之則學問造化不能違要歸之則一時足以盡其義夫益之為卦也卦德動而巽內有震厲奮作之心而外又沉潛以入義理斯其日進也不可限圉矣卦體乾陽自上而下坤隂自下而上是天施其氣地生其形舉萬物而並育之其益無方矣夫動巽而益自無強施生而益自無方皆有候焉候至而益不得不見所謂時也可見凡天下之為益者其益之道皆因時自行者也益之道大而精矣象曰風雷益君子以見善則遷有過則改風雷之勢交相助益者也君子修德之益莫大于遷善改過凡一見焉即遷如風之速凡一有焉必改如雷之猛且遷善則過愈寡改過則善愈純二者相為益亦猶雷風之相益也初九利用為大作元吉無咎損之受益者上三爻而上九為極益之受益者下三爻而初九最深夫在最下而受上最大之益何以報之而無愧宜大有所作為而其大作又極于大善而吉乃為無咎也象曰元吉無咎下不厚事也必元吉乃無咎者大作乃厚重之事在下之分本不宜任厚事而今欲大作以厚事自任焉苟不措至元吉則越分違量為咎滋大故必元吉乃無咎也爻無咎根受益説象無咎根大作説六二或益之十朋之龜弗克違永貞吉王用享于帝吉滿招損謙受益六二當益下之時而虛中處下人樂與之故為或益之十朋之龜弗克違之象夫虛中處下固二之貞也但隂柔恐不能固守則無以終受大益故必永守其貞乃吉斯道也不特臣下為然即王者至尊猶在上帝之下惟用此虛中處下之道亦可享祀上帝而受其益矣吉象曰或益之自外來也或者衆無定主之詞不知其何人也不知其何人而皆來益之我豈嘗邀于彼乎彼自自外來也非虛中處下何以致此六三益之用凶事無咎有孚中行告公用圭隂柔不中正不當得益者然當益之時槩當得益而居下之上又危地也故上之益之也以困心衡慮之事而增益其所不能是益之用凶事也占者如此可警懼震動而去其隂柔不中正之病矣無咎然上既益我以凶事而我之承此凶事也則何以處之苟處之無道而傾敗披靡無以副上責望之意亦未見其果益也必也處此凶事皆竭誠心而得中道于以通信于上而無負其望焉可也公即益以凶事者圭所以通心之信通我心之誠以告于公使知我實體其責望之意也象曰益用凶事固有之也才德人所本有但不困苦則不能堅固益以凶事正欲其固有之六四中行告公從利用為依遷國四當益下之任而居位不中故戒之能以益下為心而合於中行則以告于公無不從矣雖事之至大如遷國亦利也蓋遷國本以益民而遷國之時必有所依倚乃能有立如四以益下為心而合乎中道雖使主張遷國之議亦無非益無非中人用四為依倚以遷國無不利矣况事之小于此者初本坤而上遷于四有遷國象象曰告公從以益志也告公者不患上弗從而患己弗誠誠有益下之志公安不從乎九五有孚惠心勿問元吉有孚惠我德陽剛中正以居尊其惠下之心非有所為實出於至性真惻視下如傷蓋有孚惠心也惠下如此不問可知其元吉矣何也我以至性惠下則下之感我德者亦皆實出于至性之真惻上施下應總一真意流行豈非大善而吉之道乎象曰有孚惠心勿問之矣惠我德大得志也益下惟問其心既已有孚自應元吉勿復問矣惠下之志至使人以真意應我方見感洽透徹無復遺憾大愜本志也上九莫益之或擊之立心勿恆凶陽剛務進况居益極求益不已則人莫肯益之而爭欲擊之矣由其立心失益下之恆理是以凶象曰莫益之偏辭也或擊之自外來也莫益之特就其不得益而言之猶偏端之辭也若究言則或擊之矣夫曰或擊之則亦不知其何人不期其至而自外來者也乾下兌上夬揚于王庭孚號有厲告自邑不利即戎利有攸往夬決也以五陽除一隂決而去之而已不勞力也故名夬三月之卦也五陽決一隂勢雖至易然正不可易視而苟率處之也必明揚其當決之罪于王庭使上下咸知其必宜決而非有私也然一君子欲決之一君子又庇之或忽為不必決而欲留之或姑以為可決而實存之君子與君子方猜嫌不一彼死灰不更然乎故宜盡孚誠以呼號同朋也然猶未也君子常踈小人常密故彼罪雖著我力雖齊尚有危厲不可安肆也但君子之心又非與彼角智鬭力也惟先自治已躬實可以服彼之心而不宜專恃勢力之威武以求勝則隂可決而所往無不利矣決隂之難如此可曰易乎勢盛如此而終不用勢此其為陽剛君子彖曰夬決也剛決柔也健而説決而和夬決也在此卦卦體五剛決一柔也夫其決本易而卦德健説內健則無私所以能決外説則不激所以能和蓋決去小人本天理所當然而洶洶焉行以激躁徒開爭奪反覆之端古之善去小人不受其反噬者未有不由于從容鎮定者也此卦德之善也揚于王庭柔乘五剛也孚號有厲其危乃光也告自邑不利即戎所尚乃窮也利有攸往剛長乃終也何以揚其罪卦體一柔乘五剛之上隂小而居君子之上即其罪也孚號而猶有厲蓋知有危厲則君子之道乃無虞而光顯也告自邑不利即戎者專尚威武則所尚乃取窮之道也利有攸往者卦已五剛再長則純乾隂類乃終而無復遺類矣故吾道可以利往也不然小人有一人之未去猶足為君子之憂猶人欲有一分之未去猶足為天理之纍也象曰澤上于天夬君子以施祿及下居德則忌澤上于天勢必潰決而注于下君子之澤亦有潰決于下者施其惠祿以究及于下不停蓄于上也使居蓄其德而不施則所忌而不敢也初九壯于前趾往不勝為咎陽剛在下不度勢位而恃壯進決為壯于前趾前猶進也以此往決小人必不勝矣是本欲決人而反自貽咎也象曰不勝而往咎也往決人者必先慮其勝乃可以往以不勝之勢而冒昧一往非咎而何聖人大用皆在未舉之先勝算全定然後一舉而人莫之禦九二惕號莫夜有戎勿恤當決之時人皆用剛太過九二以剛居柔又得中道故不自恃剛壯而能憂惕呼號以自戒備則雖有乘暗而為患者亦無懼矣暮夜之中而猝有兵戎亦可無恤惟有備也象曰有戎勿恤得中道也夬時最患不中則過恃其剛略無防戒二得中故有戎亦勿恤九三壯于頄有凶君子夬夬獨行遇雨若濡有愠無咎過剛不中是欲決小人而剛壯見于面目有凶道矣在衆陽之中九三獨與上為正應在三必有局蹐形迹之疑恐為上所纍而見憾于衆君子故急于自異不覺悻悻于面目也不知君子之決小人第問本心何如耳果其決于其決必欲去之則雖不同于衆陽獨與上合獨行遇雨焉以至若為上所濡染而為君子所愠然心既在決必終能決之而無咎也又何必壯頄以致凶乎夬雖五陽決一隂而恃壯志踈未有不凶者甚矣敵隂之難聖人之大用見矣象曰君子夬夬終無咎也君子既有夬夬之心始雖獨行終歸于夬何咎之有九四臀無膚其行次且牽羊悔亡聞言不信以陽居隂剛決不足也不中正智德俱劣也故欲居則不安欲與衆陽競進如臀無膚不能安居也夫不居則行可矣乃剛斷不足欲進而不前其行次且也此皆由以不決之才而與衆陽競進也若不與競前而安隨其後如牽羊者之不當其前而隨其後則可進而悔亡也然當決之時志在上進雖聞此言豈能信之􅏥急在中必不能用處後之䇿也使信之則何患矣象曰其行次且位不當也聞言不信聰不明也其行次且由無中正也聞言不信由聰德之不通明也九五莧陸夬夬中行無咎莧陸感隂氣之多者九五為決之主而切近上六之隂感受隂氣如莧陸然必也決而決之斷于驅除而又合于中行不為過暴則決而和矣無咎恐其昵于隂又恐其一反而入于激也象曰中行無咎中未光也合乎中行固無咎矣然心有所比不得已而決之事雖無咎而意潛有係于中道未得為光大也上六無號終有凶隂居窮地黨盡勢危無所號呼終必有凶象曰無號之凶終不可長也隂將盡終不能復長無復可望故凶巽下乾上姤女壯勿用取女姤遇也望其至而至者曰復喜之也不願其至而至者曰遇駭之也決盡則為純乾四月之卦至姤然後一隂可見而為五月之卦以其本非所望而猝然遇之故名姤夫隂遇陽女遇男之象女子不待六禮之聘而偶與男遇已非貞女矣况所遇又五陽則不貞之甚女之壯者也壯者乖柔靜之德無復忌憚羞耻者也如此而取以自配其害陽豈小故勿用取女明此一隂之不可昵也其失全在遇更在以一隂而遇五陽彖曰姤遇也柔遇剛也姤遇也在此卦卦體一柔與五剛相遇也勿用取女不可與長也凡取女自配非一朝一夕之故欲久長而成家今女之壯者必不能改其不貞之性難與長處故勿用取之也天地相遇品物咸章也剛遇中正天下大行也夫一隂遇五陽之象固不善矣而遇之為道極言之未嘗不善以卦體求之五陽在上而一隂生于下天地之氣相遇時當五月品物皆茂育而章燦也非遇何以咸章再以卦體九五求之天下惟人君之尊為中萬物而獨立以正位乎上所謂中正也九五則以剛健之德而遇此中正之位德與位適相遇故乘權布化其道大行于天下也非遇何由大行此兩義者皆遇之善不可不遇者也姤之時義大矣哉然此卦之為姤則其遇之不善者也一隂之生雖微而可慮者甚大人皆忽其微而不知其萌之當謹則處此之時義豈不大矣哉象曰天下有風姤后以施命誥四方風行天下物無不遇后之與民本難相遇惟以命令誥四方而君民之心相遇矣初六繫于金柅貞吉有攸往見凶羸豕孚蹢躅柅所以止車以金為之則堅甚初隂雖長然勢微而躁進未有不取害者戒而阻之愛君子亦所以愛小人也故必堅止不進如繫于金柅如是守正則吉矣若有所往則凶二者可不擇處乎然初隂之勢固不可遏也如豕雖羸而勢必至跳梁蹢躅之壯君子奈何不蚤為之備也象曰繫于金柅柔道牽也柔之為道好相牽引而進故聖人止之蓋獨行無私者陽剛之性攀緣連引者隂柔之能一隂之所以可畏也九二包有魚無咎不利賔魚隂物二與初密比而相遇包有魚之象也斯時也初隂尚在我管轄之中制之在已故猶可無咎若我不制而使遇于衆賔誰能制之將不利于衆其害廣矣機會豈可失乎象曰包有魚義不及賔也二果能包之使不得逸于外何由而害于賓故二之責重矣九三臀無膚其行次且厲無大咎性不􅏥者居行有常勢有與者進止自定九三過剛不中下不遇于初上無應于上以暴性而處孤勢居則不安行又不利臀無膚其行次且之象也然既無所遇則無隂邪之纍雖危而無大咎也象曰其行次且行未牽也雖其行次且然未牽于隂何咎乎九四包無魚起凶初隂在下民象本應于四今乃遇九二而不及已包無魚也自失其民難必及之凶必自此起矣象曰無魚之凶逺民也易象或以隂為小人或以隂為民以為小人逺之可也以為民民不可逺也四失其民若自推而逺之所以為無魚之凶也夫子恐人以此象與包有魚同作小人看故特明其為民見取義之殊也九五以杞包瓜含章有隕自天瓜物之隂而在下之象且甘美如小人之柔媚善潰如小人必至于極盛也九五位為卦主如把之髙大陽剛中正如把之堅實以在上之剛而下防始生必極之隂有以把包瓜之象焉然未必其果能制之也隂陽迭勝天運固然必也含晦章美斂其聲色密其心思靜以制之則陽明復盛隂患潛消本失忽得有如自天而隕矣象曰九五含章中正也有隕自天志不舍命也九五含章惟其為九五有中正之德故能自含其章美也有隕自天豈幸致哉惟知其為時運之常而含章以靜俟之乃志不違乎命也不違命命斯祐之矣上九姤其角吝無咎角剛而在上上九以剛居上而無位不得其遇為姤其角之象吝道也然無遇則亦無隂邪之纍故無咎象曰姤其角上窮吝也居上而不得其遇上斯窮窮斯吝矣坤下兌上萃亨王假有廟利見大人亨利貞用大牲吉利有攸往萃聚也坤順兌説彼此之情聚矣九五剛中而二應之上下之情聚矣澤上于地浸潤上行發榮滋長萬物皆聚矣故名萃夫聚之為道其吉占有四而皆不可以無戒夫廟所以聚祖考之精神今卦為聚是王者能聚已之精神可以至廟而事祖考矣然亦必能聚已之精神而後可以假廟也吉而有戒者此其一物之既聚必統于大人乃安泰而亨不見大人不亨也欲見大人又必自相聚以正乃可以見大人而致亨不正無以見大人而致亨也吉而有戒者此又其一萃者豐茂之時凡祭者皆得從厚用大牲吉然必當萃之時而用大牲乃吉不聚不可用也吉而有戒者此又其一凡事惟聚則素備已定舉而措之無不克濟利有攸往然亦必聚而後利往不聚無以往也吉而有戒者此又其一要之皆貴于聚也彖曰萃聚也順以説剛中而應故聚也萃聚也在此卦卦德此順理而彼悅服彼此之情可聚矣卦體九五剛中而六二應之剛柔相資又同德相助上下之情可聚矣合此二者故能聚也王假有廟致孝享也利見大人亨聚以正也用大牲吉利有攸往順天命也至于廟中是致其孝享之誠也欲致孝享非聚已之精神何以致乎聚而宜見大人見大人而遂可以亨者惟其相聚原以正也不正之聚何以見大人而致亨乎聚乃可以用大牲聚乃可以利攸往皆順乎天理之當然也使匱乏而求豐祀無素備而欲有為則非順理之行矣觀其所聚而天地萬物之情可見矣故天下無往不有聚無往不貴有聚以天地言之聚則二氣通不聚則化育閉天地未有不樂于聚者也以萬物言之聚則豐美不聚則衰落聚則親密不聚則暌疏萬物未有不樂于聚者也故即其所聚觀之而天地萬物之情可見矣舉天地之大萬物之廣其所為必不容已之情惟聚而已矣象曰澤上于地萃君子以除戎器戒不虞潤澤之氣盡出于地上則萬物齊育矣君子當民物萃聚之時恐人之狃治而忘亂習安而忘危故必修戎器而聚之以戒不虞之亂書之克詰戎兵詩之用戒戎作皆處萃聚極盛之時而警備不虞不敢荒弛武備啓天下窺伺之心也初六有孚不終乃亂乃萃若號一握為笑勿恤往無咎上應九四是所當與萃者也然隔于二隂溺于同習而近易相比且當萃之時急于求萃隂柔之性不能自守以有待則雖所應在四而不能萃于四是有孚而不終志亂而妄聚也為初之計若呼號正應歟則衆且一握為笑矣夫背邪向正在我有遷善上達之美而反沮于聚笑不敢變移此隂柔之所以無能為也故初當勿恤人笑而直往從正應乃可以無咎象曰乃亂乃萃其志亂也乃亂乃萃非獨其迹之亂蓋其志亂也既知有正應而又溺于近習怵于羣譏心無主而妄聚人情大抵然矣六二引吉無咎孚乃利用禴二本應五而雜于二隂之間若係二隂而失九五是顧私背公也萃九五而舍二隂是利己棄羣也皆未吉而有咎莫如牽引二隂以萃于五則吉且無咎也且二柔順中正虛中以上應九五剛健中正誠實而下交是吾之孚有以感上之孚誠意既至文飾可儉若禴祭之薄可也孚乃利用禴専以二應五説與引吉不相蒙象曰引吉無咎中未變也五不可背二隂又不可係權于二者之間而引下隂以同萃在上之剛兩得之矣非中不能若是之適當也夫人孰無中而涉身萃地營私執見變其中者多矣故引吉無咎由二之中未變也六三萃如嗟如無攸利往無咎小吝隂柔不中正上無應與欲近而求萃于四然無德無援彼何取于我而與我萃故求萃于近而不得嗟如而無所利也為三計者惟往從于上以分當萃而萃之于理無咎耳但不得其萃困然後往復得隂極無位之爻亦小吝矣然失在見之不早實則理之正也小吝何足恤乎象曰往無咎上巽也往無咎上本正應我上而巽從之于理為順故無咎九四大吉無咎上比九五得上之萃也下比衆隂得下之萃也四可謂得志矣然以陽居隂不正夫自古以不正而得君者多矣以不正得民者亦有焉若齊之田氏魯之季氏是也得為無咎乎故必使其萃于上下者無往不出于正至于大吉然後無咎也象曰大吉無咎位不當也必大吉乃無咎者以四居位不正疑其所為未必盡善故戒之九五萃有位無咎匪孚元永貞悔亡卦之為萃柔當萃于剛也然卦惟二剛而九四非尊位不足當天下之萃惟九五則居于至尊其萃乃為有位也然五非徒恃其位也陽剛中正德與位稱以此受人之萃無咎矣即或人有未孚亦惟自修其元永貞之德則人自信之而悔亡蓋居大位以受人之萃如此其不易也卦體近比故元永貞之理亦同于比象曰萃有位志未光也萃有位矣然萃徒以位而人或未孚則于五之志未為光大也上六齎咨涕洟無咎萃終則散况隂柔質弱無位望輕處無萃之時而已無可以致人之萃求人莫應勢孤矣勢孤而不知懼其害豈止于無萃乎故必憂危之甚至于齎咨涕洟雖不得萃尚可自保而無咎也象曰齎咨涕洟未安上也上而無位衆莫與之故不敢自安而至于齎咨涕洟也巽下坤上升元亨用見大人勿恤南征吉升進而上也卦自解來柔上居四是柔以時而上進也故名升夫柔以時升循序而不妄進已善于進矣且卦德內巽則善酌乎事理外順則不失乎時宜皆利進之德也卦體九二剛中而五應之在我有其具而在上有其應又利進之機也以此而升大善而亨矣元亨若何用以見有德有位之大人未有不見欣納者可勿憂恤也凡自下而上自暗而明有志于前進者皆可以遂其所適而無礙吉矣用見大人南征皆升也勿恤吉即元亨離居南方自巽而坤其行自南故有南征之象彖曰柔以時升卦名升者卦變柔以時升向時柔居乎三今以時而升乎四也蓋升之道在時稍急則被摧稍緩則失勢惟時至自不能不升此升之善道也巽而順剛中而應是以大亨卦變已善矣乃卦德又巽而順卦體又剛中而應內則沉潛斟酌無急遽之心而外又因勢順宜無妄動之戾在我強毅不激有可進之才而在上虛懷下應適見我才之美凡此皆上進之無礙者也是以大亨用見大人勿恤有慶也南征吉志行也升之元亨如此故以言乎見大人則我樂得大人大人亦樂得我歡慶甚矣何恤乎以言乎南征則欲前進即前進無所牽于旁無所曳于後志克行矣何勿吉乎凡此皆以時升致之以巽順之德剛應之勢致之也凡欲升者未有不由斯道者也象曰地中生木升君子以順德積小以髙大順作慎木伏生意于地中而漸發達于地上自下而髙升之象也夫木之生也一日不長則枯德之進也一息不慎則退必念念謹審事事謹審積之惟見其小而忽已成其髙大此君子之升也初六允升大吉升道在乎巽順初以柔順為巽主當升之時而巽從于二陽信能升之象也占者如之則大吉矣象曰允升大吉上合志也初六之才本不能升而能允升大吉者上合乎二陽之志也九二孚乃利用禴無咎六五柔中虛中以下應無雜志于內而專應于我者也九二剛中誠實以上交秉無私之性而盡心于上者也我之孚有以感乎上之孚則真意相注不煩文飾孚乃利用禴其誠上升不負上矣無咎象曰九二之孚有喜也有九二之中實則孚誠足以上感上下之間有感必應有動必成喜莫大焉惟其為九二之孚也凡言孚或取中虛或取中實中虛則心無雜中實則志不苟真實朴誠謂之九二之孚至誠未有不動自有喜矣多飾何為九三升虛邑陽剛之才既可以進當升之時又利于進而臨于坤隂隂體為虛坤象為邑進臨虛邑如入無人之地矣象曰升虛邑無所疑也虛邑之象以其無所疑滯于前也六四王用享于岐山吉無咎以柔居柔柔順之至誠意之極也積其卑順之恭以無忤于上而誠意上升焉王用以事岐山之神亦應獲福而無戾矣吉無咎雲峰胡氏曰隨上體兌兌正西羑里視岐山為西故曰西山此卦上體坤坤位西南岐山在雍州南故直曰岐山象曰王用享于岐山順事也下之事上惟有一順以順事之積久不渝鬼神可享况于人乎若卑順之中微有傲逆神吐之人害之矣六五貞吉升階當可升之時居尊位又有可升之勢但以隂居陽性之雜者未能純心守正則其升猶未可必其無礙耳必其循理守德正而固則吉以五之時位而一循正理其升如升階之易何勿吉乎象曰貞吉升階大得志也升進固得志之事也使升不以貞已內愧于心矣不貞而致艱阻益自負其志矣貞以致升階之易內光明而外通坦其得志何如乎故曰大得志上六冥升利于不息之貞隂柔居升極昏冥于升而不已斯道也無適而利惟用于不息之貞則利耳蓋冥升者貪于利不息之貞則人所本不當息之正理反其不已于外之心而汲汲于內則惟患其有息矣何不利象曰冥升在上消不富也冥升亦其心之不知止耳實則以冥升而在上豈復有能升之理惟有消亡不能加益徒勞心奚益坎下兌上困亨貞大人吉無咎有言不信困者窮而不能自振之義陽剛之德何往不可有為今坎剛為兌柔所掩九二為初三所掩四五為上六所掩陽剛被制而無以施其才故名困夫身有困時心無困時盡其義之得為以聽其命之不得為固無時而不亨也而卦德處險而悅亦有亨義焉故人必處困而心能亨則得其貞也然處困而貞非大人不能卦之二五亦有大人之象故惟大人處此乃能吉而無咎也苟不安守晦默而尚口多言人誰信之非大人亨貞吉無咎之道矣進齋徐氏曰兌口不掩言象坎剛中有孚信象坎兌相失故有言不信彖曰困剛掩也卦名困者以卦體剛皆為柔掩也下卦陽寡而陷于二隂之中上卦陽衆而在一隂之下隂為之主此陽剛之困也險以説困而不失其所亨其惟君子乎貞大人吉以剛中也有言不信尚口乃窮也剛既困矣乃卦德險以説身雖困而心自有可説不失其所亨非君子能之乎故亨乃為貞而必屬之大人吉者正以二五剛中有大人之德也又戒以有言不信者處困之時而欲以口勝則多言適以取困乃窮道也象曰澤無水困君子以致命遂志君子處困惟委致其命以遂我之志而已致命亦未必必死但自分一死致命于彼而不復惜何事不可行是亦困而亨也不然瞻前顧後身名敗沒此恨何窮是乃真困矣初六臀困于株木入于幽谷三嵗不覿以隂柔處困之底居暗之甚其才其地皆不足以自拔者也處困底故所居不安為臀困于株木之象居暗甚則終無出期為入于幽谷三嵗不覿之象蒙引曰底字貼臀字人行則趾為下坐則臀為下故以象初甚字貼三嵗象曰入于幽谷幽不明也入于幽谷則惟見幽暗終不能明也九二困于酒食朱紱方來利用亨祀征凶無咎他爻之困多致凶悔惟二以剛中之德才猷既美可以遂其所欲不至凶悔然正以得所欲之多而重為身纍如酒食本人之所欲而醉飽之過反以致困也且二有剛中之德而九五以同德應之象為朱紱之王者方來求于我也下誠實以上交上專一以下應感孚如此享祀之道也故占為利用亨祀然二之剛中得應雖如此而身當困險征則必凶但義不苟免尚為無咎象曰困于酒食中有慶也以有中德能貽福慶于天下是得所欲之多也然慶在天下困在二矣六三困于石據于蒺藜入于其宫不見其妻凶隂柔不中正以處困時無適而可故居四之下而欲推乎四則四堅不可動是困于石也居二之上而欲藉二以為安則二不甘承伏于下是據于蒺藜也進退不利則身危且死家不可保上六雖吾正應是吾之妻而不相應入于其宫不見其妻則家不保矣凶象曰據于蒺藜乘剛也入于其宫不見其妻不祥也據于蒺藜以二剛本非所乘而三乘之以求安故不安彌甚也入于宫不見其妻不祥莫大焉九四來徐徐困于金車吝有終初六正應也奈四不當位無濟人之才故初方困于下而我不能救初之來也徐徐然未得遽與我合也初又為九二所隔困于金車而不能自拔以就我也不能拯吾正應吝矣然邪不勝正久之而妄求者去正應者合終必得合矣二坎體有車象剛金象象曰來徐徐志在下也雖不當位有與也初之來徐徐四之才雖不足以拔之然其志則欲拯之也故四雖不當位為無才而終與初遇也九五劓刖困于赤紱乃徐有説利用祭祀上為隂所掩則傷于上而劓矣下又乘剛則傷于下而刖矣上下既傷則凡所以奉身者皆適為身纍赤紱之服無用而反為所困矣乃五有剛中之德因時幹理久後尚有可濟且兌為説體故不終困而徐有説且其剛中為誠實之心以祭祀鬼神亦可久而獲福蓋不特其幹理之才可以免患而朴誠之心自足以基福所由困而不困也蒙引曰九五不主人君言故曰困于赤紱象曰劓刖志未得也乃徐有説以中直也利用祭祀受福也劓刖則上下皆困志未能自得也然又徐有説者以其有中直之德中則不滯直則不屈故可濟也利用祭祀蓋神之福人須人有以受之五之中實乃所以受福也上六困于葛藟于臲卼曰動悔有悔征吉隂柔居困極故纒束拘縶而不可動困于葛藟之象也震撼危動而不可靜困于臲卼之象也如此則何往而可哉亦曰動輒得悔而已耳然物窮則變困極可亨若能有悔咎從前之心而改其所為則處世有道本無纒束本無危撼以征獲吉矣象曰困于葛藟未當也動悔有悔吉行也困于葛藟非彼能困我乃我隂柔無才處之未當也本動悔而能有悔則凡所動作無非遷善改過之心其行為吉行矣安有終困者乎巽下坎上井改邑不改井無喪無得往來井井汔至亦未繘井羸其瓶凶井者穴地出水之處巽木入乎坎水之下而上出其水井象也故名井井之為道體有常故用不竭邑雖可改井不可移此其體之常也故在井初無得喪而人之用之往者來者皆井其井也此其用之不竭也夫因常而用之若無所容致戒矣不知其敬勉之心無時可廢也苟汲井而幾至亦未盡收其繘于井而羸敗其瓶則井雖無得喪而我不獲其用矣凶是知事有仍舊守常而又當敬勉以用之無使幾成而敗也彖曰巽乎水而上水井井養而不窮也卦名井者巽下坎上卦象為巽木入乎水下而上出其水故名井井之為井本諸內者有源出諸外者有道可以養物而不窮故坎巽合而井道成也從井看出養來是夫子所取非文王本旨改邑不改井乃以剛中也汔至亦未繘井未有功也羸其瓶是以凶也改邑不改井以卦體二五剛中剛則能堅久中則又可久之道故能有常德而不失其舊也井以上出為功今汔至亦未繘井是尚未有功也功未成而羸其瓶則養物之用廢矣是以凶也可不敬于幾成哉象曰木上有水井君子以勞民勸相木上有水津潤上行猶井之水在下而汲之以上也井能養物君子亦有養人之道焉恐民不得所必為之制田里計俯仰以撫勞之使有以安其身慰其心又必鼓其仁讓之性作其親睦之情使之勇于任恤急于賙助勞民者君之養民勸相者使民相養君子養民之心于是曲盡而天下無一人不得其養矣此君子之井也初六井泥不食舊井無禽井以陽剛為泉上出為功初六隂柔則無泉在下則不為人用故其井為泥而人不食之泥不可汲而廢為舊井非特人不食而禽鳥亦莫之顧也進齋徐氏曰人品汚下不能強于為善無用于世為人所棄觀此爻可以知勉矣象曰井泥不食下也舊井無禽時舍也井泥不食以其居下故不上出而淤也舊井無禽則為時所棄也九二井谷射鮒甕敝漏剛中有泉矣然上無正應下比初六功不上行而僅可下潤微物以井言如井旁穴出之水僅可以射注于鮒不能及人也以汲井言如甕敝而漏其水于下不足以上出也鮒魚名謂初象曰井谷射鮒無與也二有泉而僅為井谷射鮒者以其無應與于上也九三井泄不食為我心惻可用汲王明並受其福以陽居陽純乎剛德井泉之潔者也乃居下體未為時用是不為人所食而人人為之心惻也夫井泉之泄本可以汲而濟物今特無人汲之耳設使王者明則必識其德之可用而汲之以及物將汲者受者並受其福惠矣此所以惻之也象曰井泄不食行惻也求王明受福也井泄而不食則行道之人皆為心惻天下所公惜也惻之不已而思求一王明焉非私九三一人也王明則上下均受其福矣能勿重為之望六四井甃無咎隂柔得正而隂不能有泉其為井也但能修治不汚而不能有及人之功然以自守固無咎矣象曰井甃無咎修井也井甃無咎蓋其整敗去汚修治之功亦勤矣九五井冽寒泉食井以冽為貴泉以寒為貴九五陽剛之德且居中正之位功及于物矣故其井則洌清其井中甘寒之泉則已為人食也象曰寒泉之食中正也諸爻非無美泉而獨五為寒泉食者蓋位中且正居及物之地也上六井收勿幕有孚元吉收汲取也井以上出為功而上六居卦之上則井為人所汲取井收之象也坎口不掩而上六適居坎口則又勿幕之象也夫井收勿幕是其實有不竭之原泉有孚之義也人能實有及物之德而有孚則施濟無窮大善而吉矣象曰元吉在上大成也以元吉而在上乃井道之大成也初泥二谷未可用三泄四甃井道方修五既可食而上又收而勿罨則功用及物而井道大成矣離下兌上革已日乃孚元亨利貞悔亡革變革也不安其故而改除之也上澤下火火然則水乾水決則火滅少女在上中女在下女本不可同居而又倫敘有乖仇怨滋起皆變尅相革之義也故名革夫人情可與習常難與通變可與樂成難與慮始故方革之始人心疑阻不一必待已革之後利害昭然人乃孚信之然則事之可不革者甚不必輕改以惑衆心而事之必當革者尤不可懼謗而喪善事也夫革之難如此而所革可以不當乎卦德內文明以灼理于未革之先外和説以順情于方革之際則所革大通而得其正妄革之悔可亡也蓋內明外説所以元亨此革之正也故利于如是之貞不貞則不孚不亨而反有悔矣彖曰革水火相息二女同居其志不相得曰革卦名革者以卦象水火相滅息二女同居其志不能相得故曰革已日乃孚革而信之文明以説大亨以正革而當其悔乃亡已日乃孚者未革之日人尚未信惟既革則其當革之故人人曉然而人乃信之也元亨利貞悔亡者卦德文明以説明則真見義理而其革也不苟説則和協人心而其革也不驟故其革大亨而正也得正則所革者皆不可不革之事革而得當其悔乃亡否則安能無悔乎天地革而四時成湯武革命順乎天而應乎人革之時大矣哉夫革道推而言之若天地之氣序相革而四時以成是有不得不革者在也若湯武之革命上順天理下應人心亦有不得不革者在也皆時使之也革之時大矣哉象曰澤中有火革君子以治厯明時澤中有火水決則火滅革象也君子觀天地之間革之大者無過四時但氣候推遷之節人不能詳君子則治厯以明之所以示天下以天之革也初九鞏用黃牛之革雖當革時而居初則分猶卑不當事任無應則上無援不得自伸未可輒有所革惟安靜平易以中順之道自固可也象為鞏用黃牛之革象曰鞏用黃牛不可以有為也位應未集不可強而有為六二已日乃革之征吉無咎柔順則不違衆中正則無偏邪文明能燭理應上又得權于是可以革矣然革非得已必審處萬當然後革之已日乃革之則其征進有吉無咎才德權位無不如意而革終未可易聖人之慎改作而不敢有恃也象曰已日革之行有嘉也革之太易則革弊生弊益為不美必已日乃革之則其行也謀出萬全有嘉美之功矣九三征凶貞厲革言三就有孚革道貴審而戒躁九三過剛不中居離之極躁于革者也以征則凶雖貞亦厲然非終不革也時已當革但失之不審耳若其議革之言至于三次成就初焉衆以為當革再焉衆以為當革三焉衆以為當革是斷然當革事當而人孚之矣革之可也否則為凶厲象曰革言三就又何之矣革言已至三就又何往乎此固時之不能不革者矣九四悔亡有孚改命吉以陽居隂所革有不當之悔然卦已過中不復有待又當水火之際勢相滅息皆革之時而剛柔不偏不失之迫亦不失之弛正革之用也故悔可亡然在我雖有時有用可以變更而人或未信亦未可革也必人皆孚之然後改革政命可獲吉也悔亡特不乖事體不拂人情而已吉則一除積患大啓新功矣象曰改命之吉信志也改命而吉以上下皆信其志也使我欲革而上下不喻我心其能行乎九五大人虎變未占有孚陽剛中正為革之主是大人在上處常則為自新新民之極處變則為順天應人之時此皆合天下而更新之若虎之毛落更生而光潤鮮好也此象也在占者必其未占之時人已信其如此乃足以當之耳象曰大人虎變其文炳也虎變之象其文炳然明盛也上六君子豹變小人革面征凶居貞吉革道至上天下無一人不變在有德之君子則美積于中文現于外如豹之變在無德之小人雖不能大變其心亦能外革其面以順王化革道至此已成矣若更進而有所變則煩擾滋凶惟安靜固守居貞則吉蓋革非得已革之已成不可復革且上六之才不可有為也象曰君子豹變其文蔚也小人革面順以從君也文炳者文之昭布于天下禮樂風化之類炳著一世者也豹變則為文蔚文之發見于一身言動威儀之類蔚美可觀者也小人革面雖不能化其心然已順以從君命不敢自異于維新之化矣巽下離上鼎元亨鼎烹飪之器也為卦初隂分植于下為鼎足二三四陽實于中為鼎腹五隂對峙于上為鼎耳上陽橫貫于上為鼎鉉鼎之體也且巽木入于離火之下鼎之用也故名鼎卦象有巽順聰明之德卦變有上行之位卦體有剛中之輔有此三者大善而亨之道也蒙引曰元亨不承鼎字自為占辭如大畜益之例彖曰鼎象也以木巽火亨飪也聖人亨以享上帝而大亨以養聖賢卦之名鼎以卦體有其象也且二象以木巽乎火之下又所以致亨飪之用也夫鼎之用豈小哉聖人思已之臨天下實出上帝之命不可無以享之則亨以享上帝焉享上帝固資之鼎也思已之臨天下實賴聖賢之力不可無以養之則又極饔飱牢禮之盛而大亨以養聖賢焉養聖賢亦資之鼎也鼎之用何其大歟巽而耳目聰明柔進而上行得中而應乎剛是以元亨辭曰元亨者卦象下巽是內能巽順以入理矣而上離為目五為耳又有聽無不聰視無不明之象巽順聰明是有其德也卦變自巽來柔進居五是有其位也卦體五得中而下應九二之剛是有其輔也有德有位有輔可以盡善道而無不通利矣元亨不亦宜乎象曰木上有火鼎君子以正位凝命木入于火之下以致烹飪鼎之象也夫鼎之為器也立體端重而中受物實君子體之正位而凝命亦如鼎之端重而能受也正位者內而齋莊外而安重表裏大小莫不一于正焉如鼎之端重也如此則動符天理靜見天心遂有以凝聚天命于己而不失如鼎之克受物實也初六鼎顚趾利出否得妾以其子無咎居鼎之下鼎趾之象也上應九四趾而向上則顛矣然當卦初鼎未有實而舊有否惡之積焉今因其顛而出之則又為利矣其在人事則如妾本賤也得妾而因以得子蓋顛趾出否者因敗以為功猶因妾得子者因賤以致貴則雖顛趾而未嘗有咎也象曰鼎顛趾未悖也利出否以從貴也趾而顛悖矣然未悖也蓋出否之利由其上應九四之貴所從者貴有去故取新之義焉故為出否故為未悖九二鼎有實我仇有疾不我能即吉二有剛中之德是鼎之有實也我有德而不幸密比于初隂初以不正求我適為我害是我仇也我于是有疾矣有德之人而比于匪類如病患在身受其傷纍不可以一朝安也然二能以剛中自守使初雖近而不能就我則不為所凂克保其德矣吉象曰鼎有實慎所之也我仇有疾終無尤也鼎既有實愈不可不慎所往慎則我仇雖有疾而不能為我纍終無尤過也人奈何以有德可貴之身而輕于從人自取咎乎九三鼎耳革其行塞雉膏不食方雨虧悔終吉以陽居鼎腹之中本有美實上承離卦離為雉是其美實乃雉膏之美宜為人食也但行鼎在耳六五耳也乃九三過剛失中裁度乖方不從五而應上又居下之極為變革之時是耳與我不屬鼎之耳既革則鼎不可舉移而其行塞矣雖有雉膏之美不為人食矣然陽剛得正苟能自守則五終必求三三終必應五隂陽和而方雨去其不遇之悔而終有得遇之吉象曰鼎耳革失其義也三上相應雖其本然然在鼎時非耳不行則從五又其因時之義也三剛而不中執應上之志而不知從五裁處失義鼎耳所以革也有鉉無耳其能行乎甚矣君子貴精義九四鼎折足覆公餗其形渥凶九四任重者也而下應初隂不勝其任以致敗事鼎折足覆公之餗矣四安得辭其罪故受剭刑之重而凶也象曰覆公餗信如何也四為上所倚其相期信不小今以誤用人而致敗則素所期信者如何矣六五鼎黃耳金鉉利貞以卦體五象為耳而有中德是黃耳也在五既有中德而又應九二之堅剛是黃耳而貫以金鉉也夫虛中以應下之剛本五之正理但以隂居陽恐心有不一利于固守其正任賢不疑也象曰鼎黃耳中以為實也五之中乃其實德存之心者實無私尚見之行者實無偏舉乃克當黃耳之象上九鼎玉鉉大吉無不利上鉉象也而以剛居柔剛而能溫玉鉉之象處鼎鉉之位而有是剛溫之德剛足以有立而溫又不失之躁于以接人制事極得善道大吉矣且無往而不可行無不利矣象曰玉鉉在上剛柔節也鉉本在上鼎由以舉養人之功由以成而今以玉鉉在上蓋由其以陽居隂則剛柔各有其節不至流而太過所以為玉鉉蓋剛者強作執持本善德也一于剛則過柔者卑順和惠本善德也一于柔則又過惟以剛居柔則其剛為柔之剛非暴也其柔為剛中之柔非懦也用剛用柔適及乎其限而止有木然之善無末流之失此為節矣震下震上震亨震來虩虩笑言啞啞震驚百里不喪匕鬯震動也一陽始生于二隂之下有突如其來之勢故震而動也其象為雷其屬為長子人心怠玩則滋害能警懼則有亨道矣何以見之人之存心常似震懼之來而虩虩然則心有主而事不迷反可以安逸無患而笑言啞啞矣縱有大變之來亦可從容鎮定不失所主之重如雷聲迅厲震驚百里而主祭者安其常度不失其匕與鬯此皆震之所以亨也使非常自警懼則無事而懈怠有事而張皇卒有大變惶惑失措而莫知所為其阻礙可勝言哉匕棘木為之曲柄鋭末所以出鼎肉而升之于爼也鬯釀秬黍為酒以鬱金草煮而和之使芬芳條鬯所以灌地而求神也二者皆主祭者所執猝聞迅雷而不墜失手中之匕鬯言當懼而常度自若也凡當懼而不失常度者皆此象也彖曰震亨震則必亨人第知震懼之不得自寧而不知其可以致亨第知求亨于亨而不知震懼乃所以亨也震來虩虩恐致福也笑言啞啞後有則也虩虩之時未見是福然此恐懼之心乃所以致福也笑言啞啞由其先能恐懼則其後處已與物我自有天理之法則以應之任彼之何以來而吾則不可易不亦坦坦自適也乎震驚百里驚逺而懼邇也出可以守宗廟社稷以為祭主也震驚百里則百里之內逺邇皆驚懼此天下之大變也處此而不喪匕鬯是主祭之長子有素定之養過人之度此其出而繼世主祭真可以守宗廟社稷以為祭主也文王不喪匕鬯承恐懼來夫子云出可以守宗廟社稷主又承不喪匕鬯而贊許長子象曰洊雷震君子以恐懼修省雷聲重洊震驚甚矣君子處震驚之來則恐懼于心而因修省其行事以為消變之實使遇變而頑然不知戒于心或徒懼而不知所以修其身皆昏愚自棄之夫非君子也初九震來虩虩後笑言啞啞吉以三畫卦言為震之主以六畫卦言居震之初故必當震來之初而其震虩虩然則其後笑言啞啞而吉象曰震來虩虩恐致福也笑言啞啞後有則也以初為震主而居震初故爻象與彖辭彖傳同六二震來厲億喪貝躋于九陵勿逐七日得初九為震之主威動而上奮孰能禦之者而六二乃以至柔當其鋒岌岌危殆震之來也厲矣又不但厲而已因怖懼而喪所持之貨貝且逺避于髙陵之上驚懼亦甚矣然柔順中正足以自守所遭雖不安而所存自不亂故雖一時不能禦其來然時過事已則有以復其常所喪者不待追逐而七日自獲矣程傳曰九言其重岡陵之重髙之至也九重之多也雲峰胡氏曰七日得者自二至上又自上而二七數象曰震來厲乘剛也柔不敵剛而迫乘剛上故震厲六三震蘇蘇震行無眚六二遭震而中正自守故猶可七日得三不中不正處平時且不安况處震乎當危懼之時而復有苟且之心行險之事故震懼之甚至于不支神情緩散而自失蘇蘇然也若能因震懼而有行去不善以就善不復安于緩散而有所行為則無眚矣禍福無定惟在人所自處也象曰震蘇蘇位不當也震而至蘇蘇惟居位不中正也故天下惟中正為貴九四震遂泥處柔失剛健之德居四無中正之行陷溺于二隂之間而不能自奮是其處震懼之時遂泥滯沉汨無復動拔之望矣象曰震遂泥未光也處震懼雖為不幸然因此而震動有為以自奮拔則多難之地適足為砥礪資何其光顯若遂沒泥而已徒見昏溺之苦豈能光也六五震往來厲億無喪有事柔居尊位已不勝任况處震懼之時何以御變是其往來皆危厲無一時之或安也然有中德則虛衷處善雖處危變可以無所喪而且因以有事無喪者中之自守有事者中之應用也象曰震往來厲危行也其事在中大無喪也震往來厲則動作皆履危機其行乃危行也今曰有事蓋其有事之故以其在中惟在中可以有事故大無喪也上六震索索視矍矍征凶震不于其躬于其鄰無咎婚媾有言以隂柔處震極驚懼之甚索索然神消氣盡矣志氣索則曕顧徊徨其視矍矍然不能安定以是而行先自亂而無以御變能免凶乎所以然者處震已極不及圗之于蚤也使其震懼之心不在事變及身之日而在憂患及鄰之時則不至猝然驚惶如此之甚矣然隂柔處震極終不免于憂懼婚媾之親反有言焉此亦不虞之小傷而較之索索矍矍之凶已大逺矣象曰震索索中未得也雖凶無咎畏鄰戒也天下事變不足患但人中心有主隨遇而有以自得無歉無怍何至于驚懼已甚乎故索索之象由其中心無自得之體也然雖凶而又可以無咎者蓋當鄰家戒備之時而已知畏焉是以獲免蓋畏鄰戒則中心得矣艮下艮上艮其背不獲其身行其庭不見其人無咎艮止也一陽止于二隂之上陽自下升極上而止也故名艮其象為山者二隂本坤今一陽跨其上若山之隆起于地上也且山之隆起亦自止而不復進亘古如一非如草木之日升于髙大也夫艮者止也止之道宜何如譬之身焉百體皆動惟背為止夫人亦有所當止如背者理是也世間利害得喪是非豫奪倐忽萬端何所憑何所極要歸于理焉止矣無可復易矣人能心一于理止于所當止死心守定天理是為艮其背如是則其靜也惟見一理而其身之利害得喪不暇恤矣不見有身是不獲其身也夫既艮其背而不獲其身則其動而接事也亦惟見一理而于人之是非豫奪亦不暇恤矣是為行其庭除有人之地而亦不見其人也夫人內亂于有身之私外怵于有人之雜皆由其信理不定而搖蕩無主故靜時已不能止而動時愈不能止以致顛拂差訛不勝其咎也今曰不獲其身則靜而止行其庭不見其人則動亦止無時而不止所當止焉乃可以無咎也朱子曰工夫全在艮其背人多將行其庭對此句説便不是又曰此四句是説艮其背了方能于靜時不獲其身動時不見其人按不獲與不見字義不同不獲者只知有理更不曉何物喚作身也朱子曰不獲其身不得其身也猶言討自己身不得又曰欲出于身人才要一件物事便須以身去對副他若無所欲則只恁地平平過似無此身一般又曰不獲其身者但見得事之當止不見此身之為利為害才將此身預其間道理便壞了古人所以殺身成仁舍生取義者只為不見此身方能如此蒙引曰必曰行其庭者如處事之際正衝礙著人處亦照管他不得如伊尹放太甲直做前古所不敢做底事夷齊非武王之伐商雖八百諸侯皆以為當伐吾亦全不管他直説武王不是此皆不見人處後世如申屠嘉之困鄧通雖天子之寵臣不顧也太子親王一不下司馬門則公車劾奏而遮留郎中令小臣也得以妃妾之分而撤夫人之席此等亦有不見其人意彖曰艮止也時止則止時行則行動靜不失其時其道光明艮者止也曷言乎止止之義兼止與行惟其時之當然即所當止之理也時當止則止是靜時之艮止也時當行則行是動時之艮止也動靜不失其時是無動與靜而皆止于義理如此則一心既定而存于靜者見義理之皎潔現于動者見義理之輝光其道不大光明乎此艮止之義也艮止之止止于理也時止之止止而不進也兩止字不同艮其止止其所也上下敵應不相與也是以不獲其身行其庭不見其人無咎也辭曰艮其背背即止之義曰艮其止者止于當止之所也以卦體言則上下二卦隂與隂對陽與陽對各有鈞敵之體相應不互相交偶而各止其所也若一隂一陽則往來相與有不得止其所者矣夫惟各止其所是以內不見已外不見人不獲其身行其庭不見其人無咎也象曰兼山艮君子以思不出其位兩風兩雷兩火兩水兩澤皆有相往來之理惟前後兩山則此為一山彼又為一山各止之象也君子觀吾身各有所處之位苟位在此而事在彼或過或不及皆出位也君子必思位之所在而盡其理以不出位為思無往而不究心所當止焉君子所以能止也思不出位即止其所也工夫全在思初六艮其趾無咎利永貞居下體之下趾象也隂柔才弱性務退守為艮其趾量才度位而不妄動可以無咎夫不妄動乃初之貞也但隂躁不能固守始雖不進懼其終之或進也故利于永守其貞象曰艮其趾未失正也在下而止若疑于無能為者然乃其正也利永者永此而已六二艮其腓不拯其隨我心不快二當腓之處本好動者而居中得正能自止其腓而不動如此則于已得矣但三居二上二所隨也而三過剛不中以止乎上而不能俯聽乎二二雖中正而體柔弱又不能往而拯之吾之所隨而吾不能拯于心安乎故其心不快象曰不拯其隨未退聽也不拯其隨非獨二之過亦由三止乎上不肯退以聽二也九三艮其限列其夤厲薰心三居上下之間限之象也限乃腰胯之際是一身運動之要不可止者也三以過剛不中處此于不可止者而強止焉以運動流通之物而強閉固執以求止不顧其不安則身不得屈伸而上下判隔其夤膂如分列為二矣危厲之甚至于薰躁其心而不可忍也象曰艮其限危薰心也限非可止而止之是以危厲之意常薰爍其心也求止而反至于薰心止之時義可不精辨哉六四艮其身無咎以隂居隂純乎靜者也能止其身而不動知其才之不可為而不為可以無咎象曰艮其身止諸躬也論止之全理兼行止動靜至于事物各得其理乃止也今曰艮其身蓋不能有治物之道而其為止特止諸自身而已六五艮其輔言有序悔亡五當輔之處輔言所由出也以隂居陽發言不當宜有悔矣然得中道能慎止其輔而不妄動則出言有序淺深疾徐各得其條理而妄發之悔亡矣象曰艮其輔以中正也正字羡文五之所以能艮輔以其中道也時語則語時默則默是為艮輔上九敦艮吉止道至難心本動物而外感多端欲止而不寧暫止而終失無如此心何上九以陽剛居止極陽剛則力堅定止極則不動搖能敦厚于止積久力深物莫能撼者也止道至此成矣吉象曰敦艮之吉以厚終也敦艮者人之止難于久終故節或移于晚守或失于終事或廢于久人之同患也君子之德則至終而力愈厚能厚于終所以為敦艮而能吉也不終其德則自貽凶悔耳雲峰胡氏曰震以下一爻為主故九四在上卦之下而未光不如在下卦之下者之致福艮以上一爻為主故九三在下卦之上而薰心不如在上卦之上者之厚終艮之在上體者凡八卦而皆吉人可不厚于終哉讀易日鈔卷五
