body:
  text: 讀易日鈔卷四贊善張烈撰下經艮下兌上咸亨利貞取女吉咸交感也天下之物有相感之情而後彼此可通此卦兌柔在上艮剛在下柔本下而在上剛本上而在下交相感應之象也又艮止則感之専兌說則應之至又艮以少男下于兌之少女男先求女得男女之正二少相求得婚姻之時皆感通之義皆感以正之義也而于婚姻之正尤有明象焉故其卦名咸其辭為咸則必亨但感必以正乃所以亨不然私情之合易至睽離也惟以正則凡感皆吉即取女一事有如是之貞宜獲吉矣感者情也然情不可恃由乎性止乎禮義情乃可久不然狎暱則嫌隙易生責望則乖爭易起彖曰咸感也卦名咸者交感之義也有感必有應所應復為感人之道也柔上而剛下二氣感應以相與止而說男下女是以亨利貞取女吉也其曰亨利貞取女吉者卦體兌柔上而艮剛下則剛柔二氣交相感應以相與也卦徳止而說則感之専説之至也卦象艮男下于兌女則男女之正婚姻之時也此三者皆正也皆咸之所以亨而取女之所以吉者亦在是焉是以亨利貞取女吉也天地感而萬物化生聖人感人心而天下和平觀其所感而天地萬物之情可見矣雖然感道大矣文王重言貞以治人之感者理也天下之不能不感者情也感則通不感則不通天地人物皆樂于通不樂于不通故有不得不出于相感者情之自然情之必然不可已也試觀天氣下降地氣上升感也而萬物氣化者化形化者生通矣聖人知天下不可強邀務有以感人之心感也而天下已自動其豫順之性自消其乖僻之私通矣此二者感通之大者也由是思之天下有感而不通者乎有不感而通者乎有不樂于相感以致通者乎故舉天地萬物無一不有所感無一不樂于感者其情然也即其所感之處觀之而天地萬物之情可見矣甚矣感之不可已也象曰山上有澤咸君子以虚受人山上有澤以澤之潤感乎山以山之虚受其感咸之象也君子體之則虚其中以受人之感胸中廓然无一物先實其中則隨所至而酌其是非无不可通矣不然先入為主後有至者皆捍而不受豈感之正乎初六咸其拇相感有淺深惟感之深者乃遂其進進而後吉凶生焉初居最下拇象居拇之地以感人其感尚淺欲進未能心雖動而身未動吉凶未分也象曰咸其拇志在外也咸其拇其志欲外而感四也身未動而心已感之故亦曰咸六二咸其腓凶居吉二居初上且隂柔不能固守其象為腓欲行而先自動必由躁妄以取凶矣然有中正之徳能靜居其所以待事理之自然則吉象曰雖凶居吉順不害也凶而又能居吉者有中正之徳則其心靜順不至于取害也順故能居不害即吉順之故則中正也九三咸其股執其隨往吝股隨足而動者下二爻皆欲動三居其上不能自主若股之不能不與足俱動也専以隨下為主无復卓立之志以此而往吝矣進齊徐氏曰世之君子位居人上所守不正而反狥􅉏御臣僕在下者之私至于多行可媿者皆執其隨者也蒙引曰此爻辭只就位上取不可説出過剛不中如初之拇二之腓五之脢一槩皆以位取象曰咸其股亦不處也志在隨人所執下也初二隂躁其不處宜耳三曰咸其股是其剛止之體宜若能靜而乃亦不處焉可吝之甚矣君子雖與人同處而志不可奪以所執之髙卓也若志在隨人而已所執不已汚下乎九四貞吉悔亡憧憧往來朋從爾思如拇如腓如股如脢如輔頰舌皆心之所役以感物者惟四居股之上脢之下又居三陽之中是為心象則咸之主也心之感物惟正固乃得其理今九四以陽居隂失正與固能无咎乎故戒之曰惟心存正固感物之際一視理之當然愛憎取舍我无私焉確乎如是而不移則雖不期于人之應而自无不應矣吉且悔亡若不能正固而憧憧然往來夫物我之間一往一來本自然之感應也吾盡吾理而物之應否聴之則大公之往來而无人不在所感中矣今憧憧焉屑屑計較于我感彼應之跡是有意求人之應而人應之者反少不過同類之朋應從爾思而已豈能逺及乎朱子曰憧憧是一心方欲感他一心又欲他來應如正其誼便欲謀其利明其道便欲計其功又如赤子入井之時此心方怵惕要去救他又欲他父母道我好這便是憧憧底意象曰貞吉悔亡未感害也憧憧往來未光大也感則害生將必廢感而後可乎夫害惟生于不正正則未始有感之害故曰吉悔亡也憧憧往來則私私則暗小未能光大也九五咸其脢无悔脢背肉在心上而與心反背不感于物者也五當其地絶物孤處雖非咸之善道然亦无悔矣象曰咸其脢志末也不能感人心而和平之而徒志于絶感志亦小末矣上六咸其輔頰舌舌動則輔應而頰隨之三者相須皆所以言者而在身之上上六以隂居説之終咸之極而兌為口舌故其咸也惟感人以言而无其實喋喋利口感道至此衰薄極矣列此于卦終亦以示感道之窮也象曰咸其輔頰舌滕口説也言出于誠未嘗非感之正若咸其輔頰舌則惟騰躍其口説徒變幻于輔頰舌之間而无與于中心者也豈所以為感乎巽下震上恒亨无咎利貞利有攸往恒常乆也徹始終而不易也震剛在上巽柔在下剛柔各安其位分之常也雷震風發其勢相須常象也下巽上動為巽理以動行之常也二體一剛卦一柔卦相應六爻一剛爻一柔爻相應皆理之常也合觀此卦无往而不得常道焉故名恒人能以不易之心守不易之理循常道而日達焉自无為之阻者亨且无妄改之咎矣但所謂恒者恒于不易之正理非堅執謬邪亦可為恒也故利于恒于不易之正理守之固則行之力習之熟則設施不艱利有攸往是即所謂亨无咎也彖曰恒乆也剛上而柔下雷風相與巽而動剛柔皆應恒卦名恒者常久之義也卦體則剛上而柔下卦象則雷風相與卦徳則巽而動卦體又為剛柔皆應皆常理也故名恒恒亨无咎利貞久于其道也天地之道恒久而不已也恒固可以亨无咎矣然必利貞者不正則徒久而所久非其道矣惟利貞之久則是于其理之當然而本不可易者勿之有易焉非強欲久之也其當然之正不得不久也此天地之道所以恒久而不已也葢天地之道時行物生萬古不易者亦惟其當然之正而已況人欲恒而可外貞以言恒乎朱子曰正便能久利有攸往終則有始也其曰利有攸往者靜守之終即有動用之始惟久于其道者乃能利攸往也亦以其貞故利也日月得天而能久照四時變化而能久成聖人久於其道而天下化成觀其所恒而天地萬物之情可見矣雖然恒之必出于貞者理也而是理之不得不恒者情也日月得天為附麗而千古常照臨萬物矣四時漸變漸化而千古常生成萬物矣聖人于己身當然之道久而行之天下自觀感效法相化而成俗矣此三者恒之大者也由是推之天地萬物動者常動靜者當靜飛者常飛潛者常潛皆有不恒而不能者其情然也于其所恒觀之而天地萬物之情可見矣甚矣恒道之大也象曰雷風恒君子以立不易方雷風相與恒象也君子求正道之所在而立乎其中更不復易焉即久于其道也初六浚恒貞凶无攸利初與四為正應理之常也然在此爻則有不可以常理望者自初而言位居下時當初未可以深有所求也自四而言震體則動而无常陽性則上而不下為二三所隔則勢有所阻是四應初之意已異乎常尤不可深以常理求之也夫初既不可深求于四矣然惟明者能見幾而作今初六柔暗不能度勢又為巽主其性務入故猶深以常理求之望之太隆期之太厚雖本乎正而隙怨由生凶不免矣無所利也象曰浚恒之凶始求深也交有淺深相應之始而求之以深非惟不塞所望凶且至矣爻意合初四取夫子専責初葢彼之變常无足責而我之過求實非此重自反之道也九二悔亡以陽居隂必有不正而失其恒者宜有悔也然有中徳因中得正善自補救悔可亡矣象曰九二悔亡能久中也九二則宜有悔而悔可以亡者其素有中徳久于中則正在其内故悔亡也九三不恒其徳或承之羞貞吝陽剛得正本有徳也以過剛不中不自知其可恒又志從上六動于外誘不恒其徳則人皆奉之以羞辱莫知其為誰人也貞而不恒可吝孰甚葢本无徳者雖行不肖人亦不甚辱之惟初志可觀而半塗失足則人爭欲辱之持身可不慎哉可不畏哉象曰不恒其徳无所容也失其素行則進退无所罔以措躬无所容也喪家之況誰不辱之九四田无禽恒雖美徳然必乆于所當乆乃能有功四以陽居隂乆而非正雖乆无益如田而无所獲也象曰乆非其位安得禽也所乆非其位之正如求禽于无禽之地安從得禽乎天下事為之不得其方交之不得其人皆乆而无功者也六五恒其徳貞婦人吉夫子凶以柔中而順應下之剛中恒于是而不易正而固矣然此在婦人則吉耳在夫子則凶也柔中下應在他卦未嘗不善但在此卦則一以順從為恒矣豈丈夫所宜乎象曰婦人貞吉從一而終也夫子制義從婦凶也于婦人則貞而吉者婦人之道從一夫而終身原以順從為恒者也若夫子則宜裁制事宜以剛斷為正而從婦人之道能无凶乎上六振恒凶恒極則不恒震極則過躁又隂柔不能固守以隂在上非其所安故為振恒之象振者動之速如振衣振書抖擻頻動之意動而无節以此為恒躁妄多失凶可知矣象曰振恒在上大无功也恒至于上是考終之日而反以振處之則盡棄已前之功為大无功也故謂之凶艮下乾上遯亨小利貞遯退避也二隂浸長勢不可遏陽當自退以避之恐過此則不及避也故名遯六月之卦也此時隂未甚盛而九五剛正有可為之徳六二應之有包承之心疑若不必遯也然大勢已在隂矣不可恃己之徳與隂之應而莫之避蚤避則身雖退而猶得伸其志于隠約之中吾道可亨也然在隂小亦利于守正不可恃浸長之勢以侵迫于陽世无君子則載胥及溺而已小人亦何利乎小人難退而易進雖逼逐之猶不去也君子見幾而自重知勢不利則蚤自引故臨為逼隂而遯以陽自避為義彖曰遯亨遯而亨也剛當位而應與時行也遯何以亨葢惟遯而後可亨也安可不遯惟時必宜遯故卦中九五之剛雖當位有中正之徳六二應之雖有包承之心而必因時之宜遯而遯之與時行故能亨也小利貞浸而長也曰小利貞因二隂浸而長故教之正以止之也遯之時義大矣哉夫隂方浸長類寡而勢盛勢盛則已不可復遏止有避之而已然因其類寡或又忽之為不必避及其後也乃欲避而不得此非知幾者不能處此而蚤斷也遯之為時義葢亦大矣哉象曰天下有山遯君子以逺小人不惡而嚴天非有心與山較髙下也而天體无窮山髙有限山自不得近焉君子之于小人亦然決不可不逺之而使之得近然其逺小人也不必疾憎太甚惡厲以逺之惟自守甚嚴繩心以義制躬以禮毫无寛假于己彼小人習于放逸狃于利欲安能舍己而就我故无由而與我暱也我不必逺彼而彼自逺矣初六遯尾厲勿用有攸往遯道貴先而初六觀望以尾其後危道也占者于此不可以有所往惟晦處靜俟可免災耳象曰遯尾之厲不往何災也遯而尾其志猶欲往耳不知適以取厲若不往則何災六二執之用黄牛之革莫之勝説遯道貴堅堅非中順自守者不能和易不激謂之中收歛不發謂之順六二有是徳故其隠遯之志堅不可解如固執以黄牛之革而莫之勝説也黄中象牛順象象曰執用黄牛固志也執用黄牛葢以中順自執是固其必遯之志也九三係遯有疾厲畜臣妾吉遯道貴斷九三下比二隂當遯而有所係焉陽剛而為隂柔所染剛大有虧其心有疾矣其身已危矣是道也惟用之于臣妾則不必其賢亦皆可畜葢臣妾賤而庸劣惟我是依棄之不義故君子實係之而不忍棄絶亦畜之之善道也然豈所以語出處之大乎象曰係遯之厲有疾憊也畜臣妾吉不可大事也剛大无累行止自如惟係則有疾有疾則瞻顧支吾困憊已甚能勿厲乎畜臣妾吉則其不可用之于大事亦明矣九四好遯君子吉小人否與初正應是所愛好者也而乾體剛健有好而能絶之以遯此惟克己復禮以義制欲之君子能如是以致吉而小人則否矣象曰君子好遯小人否也謂之君子自能絶所好以遯小人則不自勝其私意豈能遯乎九五嘉遯貞吉五剛中正徳為人望且與六二應六二柔順中正初无害五之意五自以時之當遯而決然去之不辱不殆遯之最嘉美者也占者如是之貞則吉矣程傳曰遯非人君之事故不主君位言然人君之所逺避乃遯也象曰嘉遯貞吉以正志也嘉遯謂之貞吉以其貞謂之嘉也无係无好能正其志而不苟容是為嘉美蒙引曰他人之遯或跡涉不安然後遯去九五在我既无疵在人又不我嫌全不見可去之隙然以自正其志即早引去故曰嘉遯如俗云去得妙也若待小人有言然後去不為嘉矣上九肥遯无不利肥者寛裕自得之意陽剛有果斷之明居卦外則隂禍未及且下无係應故其遯之逺而處之裕无有不利者象曰肥遯无不利无所疑也人心一有所疑即不能自得上剛體居外下无係應舉无足為之疑滯者宜其悠然而肥遯也按遯宜先宜堅宜斷總以不犯手為貴爻之美惡以是為判初二不以小人言者正欲備著君子處遯之得失也卦中四陽惟九五剛健中正最為羣剛所倚重二隂惟六二是新長所以成此卦者故彖傳釋亨獨言五二乾下震上大壯利貞大陽也四陽盛長其勢壯強而无所畏故名大壯二月之卦也夫陽剛之所以異于隂柔者以其无私心守正理也若恃勢之壯而不顧理之安與小人之恃勢妄行者何異故處壯而固守正理非真克己君子不能其槩附于君子之徒者未有不妄行恃壯者也故亨吉不假復言而惟戒以正固彖曰大壯大者壯也剛以動故壯卦名大壯者卦體大者壯也卦徳乾剛震動内有无私之體而外又有震動之用剛而能動何往不濟所以壯也合二象而大壯之義著矣大壯利貞大者正也正大而天地之情可見矣大壯之所以利貞者葢陽剛既為大者則宜于正也天下之理惟正則大私則小正大之道天地不外乎是覆載生成止此定理止此公理无可私无可曲天地之心有不出于正大而不可得者舉一正大而天地之情可見矣大壯其可不貞乎葢所貴乎陽剛君子者以天地之情為情而不以私邪自小乃所以異于隂柔也雲峯胡氏曰心未易見故疑其辭曰復其見天地之心乎情則可見故直書之人能情天地之情動孰非禮人能心天地之心動之端孰非仁象曰雷在天上大壯君子以非禮弗履雷之威本震而在天上壯盛之甚也君子之大壯則在自勝其私一毫非禮之事不踐諸身人无事不可折服而不能自勝其私而君子能之何壯甚也朱子曰雷在天上是甚生威嚴人之克己如雷在天上則威嚴果決以去其惡而必為善若半上落下便不濟事何以為君子初九壯于趾征凶有孚人行則趾先動故在下而好動趾之象也初以剛資處下位則不安于下且當壯時有恃是鋭于進者也為壯于趾夫壯時所最忌者恃剛輕動也以此而征其凶必矣象曰壯于趾其孚窮也人之始事必躊躇進退遜以出之期于不窮壯于始進則必窮矣九二貞吉以陽居隂已不得其正所為未免恃壯矣然有中徳則其宅心忠恕不肯為過當之舉因中得正可以遂其進而无困吉象曰九二貞吉以中也既曰九二何以貞吉以其中故正也中者心无倚正者事无邪未有以无倚之心而事流于邪者九三小人用壯君子用罔貞厲羝羊觸藩羸其角過剛不中恃壯而進是道也在小人則為自恃強勇不顧義理之是非在君子則為藐忽蔑視不顧事勢之利害者也小人用壯君子用罔則其事雖正而不免于厲矣厲之象如羝羊觸藩而自羸敗其角也象曰小人用壯君子罔也小人之用壯人知惡之矣不知小人之用壯在君子即罔也君子而甘同于小人之為乎九四貞吉悔亡藩決不羸壯于大輿之腹大壯之道所利在貞九四乃以陽居隂不得其正必有不宜進而進以致追悔其失䇿者矣然正惟以陽居隂則不極其剛尚能降其剛性以自治于理不貞而可轉為貞者也轉為貞則吉而悔亡矣其吉悔亡之象如藩已決開而不至于羸角是无礙于前也由是長驅以進其壯如大輿之腹堅固而利于行矣此皆不極剛而得其貞之效也象曰藩決不羸尚往也藩決不羸則前无困阻矣故可以上往六五喪羊于易无悔兌下二陽上一隂此卦下四陽上二隂其體似兑有羊象故諸爻多取羊象謂其能抵觸以進也今六五外柔内剛是亦羊也然以柔居中柔則巽懦而不能進中則安分而不果進故忽焉失其壯強之性如喪羊于至易而无事于矯抑之難者也彼恃壯務進者多凶厲五獨不事于抵觸亦可以无悔矣象曰喪羊于易位不當也失其壯而不能進由于居位不當也以陽居陽則進為夬矣上六羝羊觸藩不能退不能遂无攸利艱則吉壯終動極志之壯也然其質本柔才則弱矣象如羝羊觸藩既不能退又不能遂徒自困于所觸无所利也然猶幸其不剛故能艱難以慎處之則猶可得吉按五上皆言壯進之道不指小人言猶遯初二爻之例象曰不能退不能遂不詳也艱則吉咎不長也不能退不能遂咎生于處之不詳耳故艱則咎不至于長坤下離上晉康侯用錫馬蕃庻晝日三接晉進也卦象為日出地上是上進也卦徳順而麗乎大明為順臣附明君亦上進也卦變自觀來六四之柔進而上行以居于五亦上進也故名晉夫日出地上則明盛之時也順而麗乎大明則以忠貞之心親輔明君在己有格主之徳也柔進上行則柔恭之君在上也當明時有順徳而際遇虚已納賢之君何幸如之故其占為安國之侯得大君之錫馬衆多而顯被親禮接見无時晝日之間三次接見于君焉占者有是三者斯足以當之矣彖曰晉進也卦名晉上進之義也明出地上順而麗乎大明柔進而上行是以康侯用錫馬蕃庶晝日三接也辭曰康侯用錫馬蕃庶晝日三接何其占之盛乎葢不遇明時則賞罰无章雖有大功未必獲賞遇于上也君大明矣我无公爾忘私致身奉主之順徳彼明君又何取于我而厚之我順矣上无徽謙好賢之君則其于有功之臣未必如是其親之重之賞遇之无已也今卦象有其時矣卦徳有其臣矣卦變有其君矣三者適皆㑹焉他象不足以當之斷乎其為安國之侯多受大賜顯被親禮之象矣象曰明出地上晉君子以自昭明徳人之有心猶天有日自具之明不可掩也必致知格物以啟其明之端誠意正心修身以極其明之實使吾心之明朗然超出于物欲之表自昭其明徳亦如日之自出于地上而物不足蔽之也初六晉如摧如貞吉罔孚裕无咎以隂居下應不中正不惟不援我而且傾我有欲進見摧之象此不可妄求僥倖也惟固守吾正則吉何則在下始進豈遽能見信于上設未為人信亦當安靜自守處以寛裕无急求人之信也欲信之心切非汲汲以失其守則悻悻以傷于義皆咎也裕則无咎即貞吉也朱子曰裕无咎又是解上句恐貞吉説不明故又曉之象曰晉如摧如獨行正也裕无咎未受命也所以摧如者正因其獨行正而不苟進故不肯因摧而失守也裕无咎者初居下未得位未有官守之命故可以裕若有官守而不信于上則不可一日居又何可裕乎六二晉如愁如貞吉受兹介福于其王母有中正可進之徳而上无應援雖不摧我亦不見助故愁如然不可妄求我有正中之徳惟貞以自守則吉乆之自見寵信于上而受大福于王母矣王母大母即祖母也柔而居尊之象六五柔君是也象曰受兹介福以中正也二終可以受介福者以其有中正之徳久而必彰也人惟患无徳又患有徳而不自重二既有中正之徳但靜以俟之自有介福之期何事妄求乎六三衆允悔亡三不中正行不足取信于人宜有悔者以與下二隂皆欲上進是以為衆所信而得衆之助以遂其進能亡其悔象曰衆允之志上行也衆何取于三而允之葢三之志在上行與衆同志故允之也九四晉如鼫鼠貞厲不中不正无徳也无徳而在上位若竊據之常畏人奪故其進也如鼫鼠之貪而畏人雖得位于上之所與為貞而徳不稱終必失之象曰鼫鼠貞厲位不當也不中正則无徳故不安其位六五悔亡失得勿恤往吉无不利以隂居陽必有進而失當者宜有悔矣然五以大明處上而下皆順從則徳足以得人而助之者衆何謀不遂悔可亡矣然當進之時勢順可為處此者未免功利之心過勝不知有明徳而下順從豈復有虞其不利者但盡所當為而失得皆勿恤焉自往吉无不利矣象曰失得勿恤往有慶也失得之心擾于中必有宜為而不肯為與不可為而貪于為者貽害天下豈小乎勿恤則為所應為而亦無貪功妄作之失使天下食美利而享靜福其慶大矣上九晉其角維用伐邑厲吉无咎貞吝角剛而在上之物上九以剛居進極強猛躁急其晉也有角象焉此道无所用之而可若以伐大國則恃剛致敗矣維獨用以伐己之私邑彼邑人力弱而勢制于我任剛加之彼不能抗則雖危而尚有濟厲吉无咎雖然以極剛而僅足勝小邑雖貞亦可吝也象曰維用伐邑道未光也晉道當以大明臨物而无思不服焉乃為光顯今區區用以伐邑道亦鄙矣未足為光也離下坤上明夷利艱貞夷傷也離日為坤地所揜明而見傷之象故名明夷暗者在上明者在下不敢顯其明徳亦不可隨世傾邪宜艱難以固守其正也葢守正于暗時非如平世可以直遂其正艱苦百折而后正僅存豈易言乎彖曰明入地中明夷卦名明夷者卦象日明入于地中故名明夷内文明而外柔順以蒙大難文王以之乃卦徳亦有明夷之義焉内離外坤是内具文明之徳而外操恭順之行以當大難葢内明則不失己外順則不取禍明夷之道也昔文王蒙紂之難正用此道矣利艱貞晦其明也内難而能正其志箕子以之辭曰利艱貞者明不可滅而又不可露晦其明以存于内是為艱以存貞也卦體六五切近上六至暗之君是其難在内不可逃避而尚能委曲以自正其志不敢自變其明焉此艱貞晦明之道也昔箕子為紂近親而𦍕狂受辱不失己心之明正用此道矣蒙引曰此條不與上條相屬上釋卦義此釋卦辭雲峯胡氏曰以二體則離明也傷之者坤以六爻則初至五皆明也傷之者上上為暗之主而五近之故彖傳以利艱貞為五象曰明入地中明夷君子以莅衆用晦而明君子莅衆固宜明照但炫露其明則苛細太甚人情暌疑失莅衆之道矣君子之明則必養以渾厚濟以寛和視之若無分别而實不可淆用晦而明乃可以為人上初九明夷于飛垂其翼君子于行三日不食有攸往主人有言明體而居明夷之初見傷之始也故為欲飛被夷而垂其翼之象在占者之君子當有不容己于行者其行也倉猝決去不遑顧慮至于三日不食且其行而有攸往也主人有譏議之言其見傷如此然時義所在不遑恤也程傳曰三日不食困窮之極也事未顯而處甚艱非見幾之明不能知幾者君子之獨見非衆人所能識也故明夷之始見傷未顯而去之則世俗孰不疑怪故有所往適則主人有言也然君子不以世俗之疑怪而遲疑其行若俟衆人盡識則傷己及而不能去矣此薛方所以為明而楊雄所以不獲其去也象曰君子于行義不食也君子于行義所當然豈暇顧食世之瞻顧貧富之間遲回衣食之計遂降壯心銷毅氣甘失義而不恥者豈足為君子六二明夷夷于左股用拯馬壯吉以至明之才中正柔順善于自處雖傷于行而所傷未切其明夷也為夷于左股之象股所以行而左股尚不甚切也然既已被傷不可任之以至于甚必拯救之且救之速如乘壯馬以往則速免獲吉矣象曰六二之吉順以則也六二之吉者以其為六二則有柔順之徳故能處之有法以免禍也不然明夷未有吉者而惟六二言吉豈无故乎九三明夷于南狩得其大首不可疾貞有剛明之徳居下之上而屈于至暗之下志有不展正與上六闇主相應則又受傷之切者夫徳位俱盛而迫于不得已故其明之被夷也有向明除害而得其首惡之象南者向明狩以除害大首首惡也然非常之舉惟甚不得已而為之不可急疾乃其貞也象曰南狩之志乃大得也南狩之事當論其志其志在去害非以利天下乃可以一舉成功而大有所得也志苟不然則悖亂已耳六四入于左腹獲明夷之心于出門庭左腹幽隠之處腹坤象左腹坤下畫之象六四離下明而入于幽暗之處是已被傷也然未切于上所居尚淺而又以柔正處之可以得意于逺去故可以獲明夷之心于出門庭象曰入于左腹獲心意也惟其左腹則雖處暗地而未居要處故可獲意而去若切近如五又安能去六五箕子之明夷利貞以柔中居至暗之地近至暗之君能自晦而不改其正是箕子之明夷貞之至也占者利于守是正而已象曰箕子之貞明不可息也箕子之晦其明而謂之貞者外雖晦而明自存葢吾心之明乃天明天旦常亦如是變亦如是非可得而滅息者也不然何以為貞上六不明晦初登于天後入于地以隂居坤極上之極亦闇之極也夫明徳人所固有上惟不明其徳以至昏晦故初則處髙位以傷人之明後則至于自傷而墜厥命人奈何可以不明乎象曰初登于天照四國也後入于地失則也初登于天位之髙足以照臨四國也後至于被傷而入地焉惟其不明而失道之則也離下巽上家人利女貞家人一家之人也立家之道須内外各正今六二正乎内九五正乎外可以成家道矣故名家人家道雖兼内外而内為難治恩之不篤由婦之間義之不嚴由婦之愚故必先以女之正為急人而能使女正則其外之无不正不待言矣蒙引曰卦名取之二五者内外各正方成個家凡内外有不正即不成家故人而不仁則非人國而不治則非國家而不正則非家又曰卦辭本只用利貞而乃曰利女貞者示人以先務所在也女貞如何閨儀必肅饋事必謹必孝舅姑必順夫子必和家衆必睦宗姻不生讒妬不預外事是也彖曰家人女正位乎内男正位乎外男女正天地之大義也卦名家人一家之人不止于女而文王獨曰女貞非獨責女也責女則並男責之也一家之中非男即女女職内男職外今卦體六二以正居内是女盡内職正位乎内也九五以正居外是男盡外職正位乎外也夫男女正即天地隂陽之大義也其義同乎天地而男女可以不正乎此文王所以責女實並責男之意也家人有嚴君焉父母之謂也再觀卦體九五陽剛中正為主于外六二柔順中正為主于内是不特為男女之象又有父母之象也夫惟國有君為人所嚴奉而受治者而家人内亦有尊嚴之君長焉則父母之謂也一父一母嚴君正而家人莫敢不正此又正之所由來也父父子子兄兄弟弟夫夫婦婦而家道正正家而天下定矣再詳卦畫上與初父子也而一上一下父父子子矣五與三兄弟也而一上一下兄兄弟弟矣五三與四二夫婦也而各一上一下夫夫婦婦矣如此則不特女正而家人无一不正矣正家則措之天下者亦不過此恩義之咸盡上下之各得而已天下又何難定乎夫家正而天下定家安可以不正正家必先于女安可以不先女貞也象曰風自火出家人君子以言有物而行有恒火熾則風生猶家齊則化溥君子可不思所以正家乎家之所以正在身而身之所重在言行發一言也必有事實而非虚制一行也必有恒度而不改則身修而家可齊風化自此出矣初九閑有家悔亡初九有家之始也有家之始苟不防閑之以法度則人情流放必至有悔失長幼之序亂男女之别傷恩義害倫理无所不至初九陽剛能防閑之則此悔可亡矣象曰閑有家志未變也閑之于始葢初有家人之日嫌隙未生瀆亂未啟家人之志向尚未變也人之相聚莫不始親而變疎始正而變瀆既變而矯之則難未變而防之則易六二无攸遂在中饋貞吉柔順中正克盡婦道凡事无所専遂惟在中治饋事而已所謂女正位乎内者也貞吉象曰六二之吉順以巽也六二之吉豈在他長惟其為六二則有順徳以巽從于夫也故婦人之善止一順徳而已他非所論也九三家人嗃嗃悔厲吉婦子嘻嘻終吝過剛不中治家太嚴有家人嗃嗃然嚴厲束迫之象一時雖或悔于少恩近于危厲然而規矩齊肅人心祗畏家道可昌猶為吉也若暱情喪禮婦子嘻嘻然笑樂无節則一時雖若可歡而傷倫滋釁無不由兹終致羞吝矣象曰家人嗃嗃未失也婦子嘻嘻失家節也嗃嗃雖過尚未有失也嘻嘻則失家之節矣家人本以情勝情易至于過貴有禮以節之嘻嘻尚何節之有六四富家大吉陽主義隂主利四隂柔有致富之才在上又有致富之勢故有能富其家之象而占為大吉何謂陽主義隂主利陽徳剛斷能裁制事物故主義隂徳柔順能乘時因物以取厚資世之為陶朱猗頓者固不出順之一道也且陽主斷隂主生滋息莫如隂也陽主散隂主嗇厚藏莫如隂也陽亢爽而不瑣隂沈入而善算心計莫如隂也信乎有主義主利之分矣在此爻又為巽主近利市三倍象曰富家大吉順在位也有順徳又在位所以富也九五王假有家勿恤吉剛健中正下應六二之柔順中正是在我既有刑家之徳而又得内助之賢王者以此而至于其家則兩徳相與歡洽无間不用憂恤而吉可必矣象曰王假有家交相愛也五與二相應以徳夫實見其内助之可愛婦實見其刑家之可愛王者一至于家惟見其交相愛耳何不吉之有上九有孚威如終吉陽剛則能正家居上則為家主在卦終則又有家之乆者也故言正家久逺之道在乎孚誠中有孚信則能常久而人自化于為善不由至誠則已不能常況欲使人乎然家人情愛之間常患在禮法不足而瀆慢生長失尊嚴少忘恭順而家不亂者未之有也故必有威嚴以正之有孚威如則家道乆而彌盛終吉矣象曰威如之吉反身之謂也威如之吉豈曰作威加人之謂哉反身自治非禮不動則人自畏服孰敢侮之固不在求威于人也兌下離上暌小事吉暌情乖而迹異也上火下澤一炎上一潤下性相違異中女少女雖同居而將來各嫁志不同歸故名暌夫成大事者在于得人心豫之建侯行師是也今人心乖異大事不可舉矣然卦有内説外明之徳人心雖乖而我心和悦不與人之乖者相激且人心既乖而我明于事理能達其情而用之悦徳與明徳相麗是有善處之徳也又卦變自離來者柔進居三自中孚來者柔進居五自家人來者兼之柔而得進有可行之機也六五得中而下應九二之剛已有中徳而所應得人亦可行之資也故大事雖不可舉然小事之无甚賴于衆力恊同者猶可為也小事吉彖曰暌火動而上澤動而下二女同居其志不同行卦名暌者以卦象火澤異性中女少女又志不同行故為暌説而麗乎明柔進而上行得中而應乎剛是以小事吉暌又何以小事吉以卦徳卦變卦體之善是以小事吉天地暌而其事同也男女暌而其志通也萬物暌而其事類也暌之時用大矣哉然暌雖止于小事吉而天地人物皆有不得不暌不可不暌者則暌之用甚大也天髙地下暌矣而施生化育之事則同男女異質暌矣而倡隨相求之志則通萬物散殊暌矣而此感彼應交資互用之事則不類者合而為類天地人物暌未有不合不暌亦未有能合者也暌之為時用豈不大矣哉象曰上火下澤暌君子以同而異二隂同體而炎上趨下之性不同是同中有異也君子處世亦有同中之異焉程傳曰君子于大同之中而知所當異葢于彝秉則同矣于世俗之失則異也不能大同者亂常拂理之人不能獨異者隨俗習非之人也要在同而能異耳中庸曰和而不流是也蒙引曰大體皆同而中間却自有異處重在異字葢此就暌卦言也初九悔亡喪馬勿逐自復見惡人无咎乖異之時至為難處初上无正應孤立无與有悔矣然九四本不相應因當暌之時同徳相求我需彼彼亦需我自然相合悔可亡也悔亡之象如先喪其馬无可恃以行乃不待求逐而馬自復可資以行矣但暌乖之時人心叵測同徳者固宜相資匪類者亦不宜拒必見惡人則我无致患之咎程傳曰當暌之時雖同徳相與然小人乖異者至衆若棄絶之不幾盡天下以仇君子乎又安能化不善而使之合古聖人所以化姦凶為良善革讐敵為臣民者由弗絶也中溪張氏曰見者遇而弗絶之辭非必欲見之也象曰見惡人以辟咎也見惡人非怵于惡人之勢亦非希合惡人之心葢拒惡太嚴激而成亂皆我咎也君子知辟免于咎而已無邪心也九二遇主于巷无咎二五隂陽相應宜相遇者也然當暌時隂陽相應之道衰而剛柔相戾之意勝則未免于乖異矣夫二五臣主之象也君臣之義不可解主雖失于下交臣不可甘于自外苟不曲求所以遇主則咎不在上而在我故必委曲相求而得㑹遇如遇主于巷焉乃无咎象曰遇主于巷未失道也求之太勤似于為邪然本其正應處不可解之分自宜如是未為失道也故二之于巷至性之不可已天理人倫之至也六三見輿曵其牛掣其人天且劓无初有終本與上九相應乃居二四二陽之間二從後而曵之求與之合也四復從前而掣之亦欲與之合也見其輿之曵牛之掣而前却未定也夫三既與上應而曳掣二四之間上能不疑乎況上以極剛處暌極之地猜狠方深遂將輿中之人而重傷之天且劓焉此三象是其初之不合无初也然邪不勝正全无是事者其事必白空有是疑者其疑必消故終必至于合而有終葢始以形迹之疑被傷而心本无他卒以得白也象曰見輿曳位不當也无初有終遇剛也輿曳牛掣以其位不當居二陽之間也无初而有終則終與上九之心相遇合也程傳曰不正而合未有乆而不離者也合以正道自无終暌之理故賢者順理而安行智者知幾而固守九四暌孤遇元夫交孚厲无咎九四陽剛无隂柔以為應是无所合而孤立也然初九陽剛元善之士也四遇之而與之交孚焉則同徳相與暌者合矣然當暌之時易離難合必以危厲處之乃可終合而无咎象曰交孚无咎志行也以陽剛之才而至誠相輔何所不濟二陽救暌之志得行是為无咎不然濟暌之責咎歸已矣六五悔亡厥宗噬膚往何咎當暌之時居體不正或所據非其地或所為乖其方有悔矣然以柔中應九二則悔可亡何也時之方暌既有彼此相求之勢而五之柔中又有虚已下賢之誠吾見其與二之合也若噬膚之易以此而往尚何暌異之咎此所以為悔亡也象曰厥宗噬膚往有慶也厥宗噬膚是正所謂得中而應乎剛者以此而往真可救人心之暌而貽福慶于天下也上九暌孤見豕負塗載鬼一車先張之弧後説之弧匪冦婚媾往遇雨則吉本與三應不孤也然六三為二陽所制而上以剛處明極暌極之地明極則過察而多疑暌極則拂戾而難合故猜狠乖暌而孤立无與也六三本非汚也而上見以為汚如豕之負塗六三之合于二陽本无是事也而上見以為有如見載鬼一車于是先張弧而射之欲害之矣後漸覺其无是也乃説之弧而不射後乃益知六三非宼而實婚媾之親也由是而往遂隂陽遇合而吉矣象曰遇雨之吉羣疑亡也暌孤之先所疑不一皆若實有至其後而羣疑乃盡消亡焉所以為遇雨之吉也艮下坎上蹇利西南不利東北利見大人貞吉蹇難也足不能進行之難也艮下坎上見險而止故名蹇處蹇之道趨向平易則日就无事更趨險阻則困遽轉増理固然也況艮居東北險阻之方而卦變自小過來陽進則往居五而得中退則入于艮而得阻故其占利西南不利東北當蹇之時失依者不利必倚附大徳之人乃可以濟理固然也而卦體九五又有大人之象故占為利見大人當蹇之時妄行者取困必依順正理而行乃可出險理固然也而卦體六二以上五位皆得正又有貞之義故占為貞吉蒙引曰卦辭三段皆據理本宜如此而卦中又自具有此義此法可通用以看六十四卦彖曰蹇難也險在前也見險而能止知矣哉蹇之為義難也此卦上坎是險在前也下艮是見險而能自止行之難是以為蹇也夫卦徳之見險能止如此是審理達勢而不犯于患者也知矣哉蹇利西南往得中也不利東北其道窮也利見大人往有功也當位貞吉以正邦也蹇之時用大矣哉利西南者卦變陽進而得中位是進而得其所安平易自便故曰西南也苟退而入乎艮則東北險阻之方无可展施之地矣故不利東北也利見大人者卦體九五剛健中正大人也往而見之則可依以有功也貞吉者卦體自二以上皆當位所以為貞吉貞吉之道无往不貴即以施之邦可以正之矣然則處蹇者必往西南不往東北又必見大人又必得正然後得處蹇之道此蹇之時用豈不大矣哉象曰山上有水蹇君子以反身修徳處蹇之道必反而自省于己有失而致之乎有則改之无則加勉自修其徳庶可以濟蹇初六往蹇來譽蹇者見險而能止必度時之可進而進如五與上是也不然必其義之不容止而後不止如二是也餘爻則皆以止為利故初六往進則蹇來而不進則有見幾知時之美可以得譽來者對往之詞上進則為往不進則為來蒙引曰初六爻辭只是以蹇之時論不必拘于爻體或謂初爻隂柔无援故辭云然者不然也此爻縱是初九而上有應援亦不宜往九三以陽居艮極且曰往蹇信乎以蹇之時言矣故此爻本義无一字及爻體象曰往蹇來譽宜待也非終不往特宜待也隆山李氏曰古人生亂世无官守言責者類髙蹈隠淪以待天下之清卒之身名俱髙所謂來譽也視夫履富貴而蹈危機以致名位俱仆為後世笑者何如哉六二王臣蹇蹇匪躬之故柔順中正有精忠盡節之心也正應在上方陷險中君臣之義休戚與共故涉危冒險蹇而又蹇以求濟之而非以其身之故也不言吉凶者占者但當鞠躬盡力而已成敗利鈍非所論也誠齊楊氏曰諸爻皆不許其往惟二五不然二為大臣五履君位復不往以濟誰當任乎雲峰胡氏曰坎互坎蹇蹇象艮其背不獲身匪躬象凡二皆王臣而蹇獨稱之者平時未足見臣節蹇之時方見之象曰王臣蹇蹇終无尤也王臣之蹇蹇濟不濟未可知縱不濟亦終無可尤也九三往蹇來反當蹇與初无異而又不在王臣之位進退在己故往則蹇來反以就二隂則得所安也象曰往蹇來反内喜之也三之反就二隂而得所安者葢下二隂樂得九三之陽而與之相依故三可就之為安也六四往蹇來連往則蹇矣來而連九三之剛以合力共濟可也蒙引曰來連與來反不同來連將以進也來反只是退此上下體之别象曰往蹇來連當位實也所貴乎來連者九三當位乃剛實之才正可相資以濟也惟當位故為實若不當位則六三矣何以為實而可連九五大蹇朋來他爻之蹇未為獨任五居尊位其蹇非常是大蹇也非得同心同徳之朋不足以濟而五有位有徳實賢豪所樂從必有朋來而為之助濟可知矣不言吉者尚未離蹇也象曰大蹇朋來以中節也爻言朋來之故兼位徳象傳專本其徳言之人遇險難則苟顧利害不識義理五有中徳雖處大蹇而守中自若節概不渝此天下賢豪所以欽其徳而願為之助也苟利棄徳之人豪杰且吐棄之矣徒與不肖之人居何以克濟蒙引曰中節只是中徳但以在蹇而易其名耳如同人則曰中直如臨則曰行中聖筆如化工之因物賦形上六往蹇來碩吉利見大人已在卦極往无所之益以蹇耳來就九五與之濟險則可成碩大之功而吉矣葢九五剛健中正大徳之人也濟蹇者非得是人為主不可以成功故占者利見之象曰往蹇來碩志在内也利見大人以從貴也來碩云者志在内從九五也利見大人所以從在上之貴不從貴何由有功坎下震上解利西南无所往其來復吉有攸往夙吉解難之散也下坎上震居險而能動則出于險之外矣故名解難之方解生理方回正宜培養故利于平易與安靜而不可乆為煩擾且卦變自升來三往居四入于坤體坤固西南平易之方也惟三往居四則二居其所而得中居所得中固安靜不擾之道也故處解者利于西南平易之地若難已盡解而无所往即宜來復其所與為安靜矣設或解有未盡而尚有攸往則宜速往速復不可乆煩擾也總之大難之後休養為急无往有往皆不欲生事而已彖曰解險以動動而免乎險解卦名解者卦徳處險能動動而免乎險之外其難散矣故名解解利西南往得衆也其來復吉乃得中也有攸往夙吉往有功也利西南者西南取平易之義坤方也坤為衆今卦變三往居四入乎坤衆之體是得平易之道也其來復吉者卦變九二居其所而得中是即其所安能與時休息故為來復也有攸往夙吉亦以卦變九二得中自能審乎時宜夙往夙回以散未盡之難而不乆擾于民為有功也有功宜貼不擾意夙往夙復不乆煩擾貽福大矣正所謂有功天地解而雷雨作雷雨作而百果草木皆甲坼解之時大矣哉夫有難必有解推移之數總歸之時不特人事然也造化亦此機耳夫窮冬之時天地閉塞化育幾乎息矣及二氣解散則奮而為雷蒸而為雨雷雨乃作雷雨作而百果草木乃甲而坼矣天地一解而雷雨以作百果草木乘以發生其功用之大如此總一時乘之不得不解也使天地不解則化功不成解之時大矣哉象曰雷雨作解君子以赦過宥罪雷雨交作天地所以解物之屯君子亦有以解民之難有過者赦而不問有罪者有而從輕皆所以推廣天地之仁心也中溪張氏曰雷者天之威雨者天之澤威中有澤刑獄之有赦宥也按赦宥仁也罪則宥而不赦有義存焉初六无咎難既散矣初以柔在下能安靜而不生事且九四震主能動以免乎險而初正應之資以為援其時其徳其應皆可以濟何咎象曰剛柔之際義无咎也四剛初柔正相為應交際為用以義斷之自宜无咎矣九二田獲三狐得黄矢貞吉卦凡四隂除六五君位餘三隂即三狐之象狐性柔而情姦晝伏而夜動小人之道也邪媚之羣不去則中直之類不伸九二剛中秉道疾邪除隂媚而來正人為田獲三狐得黄矢之象解除隂邪正也隂患不作吉也象曰九二貞吉得中道也九二非正而能貞吉者二得中道居心粹美自能知邪媚必宜去中直必宜得以合乎貞也六三負且乘致宼至貞吝隂柔无才不中正无徳而居下之上宜為下而今居上宜為負而今乘車宼思奪之矣雖其位以正得之亦可吝也惟避去可矣象曰負且乘亦可醜也自我致戎又誰咎也負而乘徳不稱位小人以為榮不知其可醜也既不知避而去之則宼戎自我致之又歸咎于誰乎九四解而拇朋至斯孚拇初象四與初皆不得其正而相應應不以正深為四累善類且逺而去之矣然四本陽剛隂非其類是初固所當解而四亦庶幾能解之者若能解去而之拇邪類去正類自來朋至而相孚矣不然即深交君子之朋而佞邪未舍吾心未純君子豈信之象曰解而拇未當位也解而拇者初與四皆未當位應不以正故宜解六五君子維有解吉有孚于小人卦凡四隂五當君位乃與三隂同類必有氣味相投而不能舍者其害可勝言哉故君子必解去小人乃吉也夫五實隂類而望其有解其果能去與否未可必也此惟騐之于小人小人退可見君子之有解小人未退則君子未嘗有解矣當以此自騐而勉于解也建安邱氏曰小人情狀最為不一狐以言其蠱惑隼以言其鷙害拇以言其附麗負且乘以言其僭竊是已極其形容矣至此復明以小人斥之所以顯其罪而去之也象曰君子有解小人退也正邪不並立君子果有解謂之曰有實有解之之心實有解之之事矣小人自不容不退也故用以為騐上六公用射隼于髙墉之上獲之无不利上居髙位公之象六爻惟上六得正故為君子除害之象上與六三對三剛而不正鷙害如隼且竊據髙位如在髙墉之上公于是射而獲之器成動順无不利矣雲峰胡氏曰易于震動多有戒詞今于動之極而曰无不利自坎而進于震經厯險阻而後動動必不妄也按墉陽畫之象墉二也三在二上故云髙墉之上同人九四乘墉亦指九三之陽也據此則隼為六三程傳及諸儒之説似可從蒙引則以隼為上六象曰公用射隼以解悖也隼象乃隂狠亂政悖拂正道之人豈容存之故射以解之也建安邱氏曰解散也散天下之難也然小人者難之根小人不去難根不除此作易聖人所深懼也按六爻自九二起皆解小人之義其為解難之本歟讀易日鈔卷四
