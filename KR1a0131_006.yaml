body:
  text: 讀易日鈔卷六贊善張烈撰下經艮下巽上漸女歸吉利貞漸漸進也止于下而巽于上方其在下則自止而不妄動及其上進又巽順而不迫切是不遽進之義故名漸夫天下之凡為進者莫不貴于漸而女之進歸于夫家必六禮備而後行尤漸之昭著者也故漸有女歸之象女歸以漸此其得男女之義无失已之嫌而吉也推之凡有進者皆如是則皆吉矣然進之序固以漸矣而其所以得進之由又必出于正而後可卦自二至五皆得其正故漸進者又利于固守正理也雲峰胡民曰咸取女吉娶者之占也漸女歸吉嫁者之占也彖曰漸之進也女歸吉也之作漸漸者漸進也女歸如是則吉也進得位往有功也進以正可以正邦也然漸進而又利于貞者何歟凡爻當位者謂之得位卦變自渙來者九進居三自旅來者九進居五皆陽上進而得陽位也夫陽進而得其位則往可以有功也所以然者何也陽得陽位者正也天下惟此正理上以是表下以是應陽剛上進豈尋常之進而已將有天下之責也而進以正則一人以正進而邦之正者皆興邦之不正者皆化莫不相率而為正矣可以正邦此所為有功也得位之正則可以正邦而有功漸其可不利于貞乎其位剛得中也以卦變言固有得正之義矣以卦體言則九五之爻位又為剛得中有陽剛之徳而能權動靜之宜絶躁急之失剛得中其進焉有不正者乎此所以斷斷利于貞也止而巽動不窮也至于此卦所以名漸者又何取乎夫人之動也不安于下分與急遽以上行進而不顧其安貪于前而不慮其後未有不窮者也卦徳止于下而巽于上以此而動又安窮乎象曰山上有木漸君子以居賢徳善俗山上有木其木漸長漸髙君子有當漸者于已而欲居積其賢善之徳非一日之畜也于人而欲善其風俗非可一朝而化也皆以漸致焉初六鴻漸于干小子厲有言无咎鴻之為鳥木落南翔冰泮北徂往來有時而其行也長幼有序其進也安徐不驟皆漸象也故六爻以鴻取象初六始進于下尚未得所安而上復无應如鴻之進于水涯未為得所也夫初才弱而位卑小子之象而處始進无援之時固宜有危厲而言語小傷不能免矣然于理非有失也故无咎象曰小子之厲義无咎也小子之厲時位使然非已自取于義為无咎也又何傷六二鴻漸于磐飲食衎衎吉柔順中正有可進之徳又能以漸而進而上且有九五援之是已无媿于所進而又有得遂其志之勢如鴻由干而進于磐石之上安便得所而飲食自適衎衎然和樂也進之吉者莫大于此象曰飲食衎衎不素飽也飲食何以衎衎使我无徳可進而竊居其位則處之不安進不以漸而躐居其位則處之又不安處之不安而徒貪一飽食其能下咽乎二以有徳漸進而應于上得之有道處之心安不為徒飽是以能和樂而自適也九三鴻漸于陸夫征不復婦孕不育凶利禦㓂鴻水鳥故由水而涉干是方進而未為得所也由干而磐則水濵安平之大石鴻于此憇焉得所矣再進而平陸豈水鳥所宜乎九三過剛不中而无應有恣已過暴冥行失勢之義故為鴻漸于陸其占在丈夫則為剛愎无助足以殺軀征不復也在婦人則為隂陽失和雖孕不育也凶莫甚焉然此過剛之道惟用以禦㓂則利也象曰夫征不復離羣醜也婦孕不育失其道也利用禦㓂順相保也夫征不復是羣醜皆歸而已獨不歸永離羣類无復生望矣婦孕不育由其過剛而无應隂陽乖戾失其生育之道也利用禦㓂葢禦㓂之道非極剛之人不能率衆同力致死以拒敵故三之過剛在禦㓂用之正所以同心恊力順以相保聚也六四鴻漸于木或得其桷无咎鴻趾連不能握枝故不木棲漸于木則不安甚矣以六四乘九三過剛之上是以善弱之資而遇艱險之人或艱險之事不得所安若鴻漸于木也然所遇雖不善而四能以順巽處之則于不安之中猶稍得所安焉若鴻在木而或得一横平可棲之桷也故无咎象曰或得其桷順以巽也事之難易在人自處處不安而可以得桷者惟其義理之順正而自處于卑巽也使理不順而心不巽安望得安九五鴻漸于陵婦三嵗不孕終莫之勝吉九五居尊漸于陵之髙矣六二正應乃隔于三四而未得其用如婦之三嵗不孕然二五正應三四豈能奪之天下事凡正理所在雖一時有隔終必獲伸居正相應之位而抱兩相符之徳原非泛泛浮合者比人自不得而勝之故終合而吉象曰終莫之勝吉得所願也二五之相合本其所願終莫之勝則得所願安得不吉上九鴻漸于陸其羽可用為儀吉陸作逵上九至髙其漸也乃超然遊于物表人不得而近若鴻之飛于雲路也然其清髙獨出之概足為世表若鴻羽可用為儀衛之飾葢雖不與世近而有用于世吉道也象曰其羽可用為儀吉不可亂也獨遊世表其志卓然而不可亂故足表于世雲峯胡氏曰二居有用之位有益于人之國家而非素飽上在无位之地亦足為人之儀表而非无用二志不在温飽上志卓然不可亂士大夫之出處于此當有取焉兌下震上歸妹征凶无攸利歸嫁也妹少女也以兌之少女而從震之長男不擇所偶非正也其情又為以説而動亦非正也故不曰妹歸而曰歸妹歸者在妹女之自歸不待求聘者也歸妹固已凶而不利矣而卦爻自二至五皆不正三五又皆以柔乘剛故其占征凶无攸利彖曰歸妹天地之大義也天地不交而萬物不興歸妹人之終始也歸妹男室女家固天地之大義也何以見之使天地之氣不相交而萬物何由興起使男女不相配而人類何以繁生此歸妹為天地之大義也夫婦者女之終而生育又為子之始故歸妹為人之終始其義豈不大乎説以動所歸妹也夫歸妹之義本非不正而此卦之徳為説以動是不顧其理之正而惟情是從則其歸為女之自歸所以為歸妹也征凶位不當也无攸利柔乘剛也歸妹本正而此卦所以為歸妹者則為説動是已不正矣況卦體尤有不得其正者焉辭曰征凶以卦體二三四五位皆不當行不以正敗禮滅度凶所由也曰无攸利者卦體三五皆以柔乘剛是婦制其夫夫屈于婦所謂牝鷄之晨惟家之索何所利也象曰澤上有雷歸妹君子以永終知敝雷動則澤水為之摇漾女從男之象也君子于此觀其始合之不正即預有以知其終之有敝葢女子從人以説而動至于失身敗徳而不保其後者多矣凡事皆然始不正者終必敝也蒙引曰永終只是乆後之意非永其終也此句承歸妹字來初九歸妹以娣跛能履征吉居下而无正應其象則娣妾之卑也陽剛有賢正之徳惜為娣不能大彰其徳僅能承助其君若跛之能履不能以逺到也然亦娣中之賢者矣故征吉象曰歸妹以娣以恒也跛能履吉相承也婦人從一而終故恒為貴而娣妾之心尤不能恒初之為娣則剛正而能恒者也跛能履而吉者雖不能自主事亦可以承助君之不逮有益于家者多矣故吉也九二眇能視利幽人之貞剛中賢女也上有正應非如初之為娣也然正應隂柔不正是女賢而配不良不能大成内治之功如眇之能視而已較初之跛能履其薄命不偶相去无幾矣人之處此且奈之何哉女賢而无良夫猶賢人而无明主夫不遇主之幽人主雖不賢不可以自改其徳亦不可以怨望其君惟幽靜自守則利耳利幽人之貞聖賢之處不幸止此道也象曰利幽人之貞未變常也順從婦之常也以夫不賢而失其常罪乃大矣故幽人之貞者欲其靜守已正而不變其常也六三歸妹以須反歸以娣隂柔不中正又為説主不正之女人莫之取者也故須待而未得所適反歸為人之娣焉賤亦甚矣象曰歸妹以須未當也歸妹以須者未當其位不正而人莫之取也九四歸妹愆期遲歸有時陽剛為賢居上體為貴賢貴之女而无正應无所與歸故其歸妹也愆過其可嫁之期矣然其遲歸也欲擇佳偶以四之賢貴豈終无歸故終必佳配來求有可歸之時自重如是與六三正反象曰愆期之志有待而行也愆期非人莫之取也四自有志也其志欲有所待而後行待其佳偶故寧愆期豈可以終身之重不擇人而妄配哉六五帝乙歸妹其君之袂不如其娣之袂良月幾望吉五居尊位女之最貴者下應九二猶帝女之下嫁乃其徳柔中能尚徳而不尚飾葢惟有徳之人則専以徳為事不及于飾也象如帝乙歸妹而其女君之袂反不如其娣之袂之良美若是者其于婦人隂柔之徳可謂盛矣若月之幾至于望也宜家之吉可知象曰帝乙歸妹不如其娣之袂良也其位在中以貴行也其君之袂不如其娣之袂良也五何以幾此葢五位在中是有中徳徳之可貴者也以其可貴之徳而行則惟見徳之為貴不見袂之為貴外飾之美與不美自不入其心袂之不良豈強而能之哉上六女承筐无實士刲羊无血无攸利以隂柔居歸妹之終隂柔非賢居終過時而又无應是約婚而不終卒于无諧者也夫婚禮之成則女必承筐是將士必刲羊以宴今女則承筐无其實士則刲羊无其血是未嘗承筐未嘗刲羊昏禮不成也何利之有象曰上六无實承虚筐也陽實隂虚婚道以誠相求乃克有成曰上六則隂柔无實是以約婚不終而徒承虚筐也離下震上豐亨王假之勿憂宜日中豐大也以明而動見之明行之決功无不成有盛大之勢故名豐豐則固已亨矣但盛極則衰王者至此有憂道焉然勿為徒憂也宜守其常而不使至于過盛常如日之中焉可也彖曰豐大也明以動故豐豐之義大也卦徳明以動明動相資可以不安于小圖而成其大有為之志故豐王假之尚大也勿憂宜日中宜照天下也夫王者居得為之位操得為之勢而又當此豐盛可為之時則其志氣恢張不復甘于狹小意向䧺闊又復恥于謹戒惟大是尚此其所以可憂也故戒以宜日中者日中之明方能遍照天下過此則照有所不及矣王者宜常自戒惕使此心時時周入乎天下而不敢懈乃有以保其業不然一念懈弛即有照不及之處釁蘖即由此生矣可不戒乎日中則昃月盈則食天地盈虚與時消息而況于人乎況于鬼神乎且卦辭之所謂宜日中者尤有深意焉謂時之可盛而不可過也日中盛矣既中未有不昃月盈盛矣既盈无不虧食盛極必衰理數不得而逃也非惟日月推之天地之盈虚亦隨時而消息方時之息也變化蕃生天地盈矣及時之消也羣動收寂天地虚焉天地不能違時以常盈而不虛況于人乎況二氣之屈伸于天地間而謂之鬼神者乎夫惟盛極必衰所以戒之恒如日中也象曰雷電皆至豐君子以折獄致刑雷電兼至威照並行其勢盛大君子于獄之未決也則明以折之既折則致以刑而不少貸又可威也此威照並行之道也初九遇其配主雖旬无咎往有尚凡相應者常非均敵隂應陽柔應剛是也初九九四均是陽剛才力相敵宜其不相得矣然當豐時明動相資初明四動正可相合而有助是四乃初之配主謂之主者羣爻之中耑惟四相配也惟與配主相遇則雖相均敵而无相爭之咎且行有嘉尚之功矣象曰雖旬无咎過旬災也雖旬而可以无咎葢才力之相敵者若萌一求勝之心則兩賢相厄患災乃生惟相下相資不求過乎旬則災不生而无咎六二豐其蔀日中見斗往得疑疾有孚發若吉為離之主至明者也而上應六五之柔暗則五之昏暗足以大蔽我之明徳象為豐大其蔀障而日中見斗昏蔽甚矣處此而尚欲往而回其惑開其蔽以強爭之則反見疑而又不可任之莫救也惟積吾誠意以感動之使上心久而自悟忽若開發其蒙則吉矣象曰有孚發若信以發志也有孚發若意誠之極人未有不動貴以己之信發上之志也九三豐其沛日中見沬折其右肱无咎三明極而應上之暗極其受蔽又甚于二若豐大其斾幔日中見沬沬星之小者于日中之時見焉昏愈甚矣如此則雖有明而不可用若折其右肱然非已之罪也无咎象曰豐其沛不可大事也折其右肱終不可用也未有事昏極之主而能成大事者豐其斾則不可大事也故曰折其右肱正見其終无可用之理耳九四豐其蔀日中見斗遇其夷主吉以剛明之徳上比六五之柔暗豐蔀見斗象同于二夫以剛明受蔽于上勢難獨挽必有同徳之士恊心共濟猶可救也初九明體彼雖居下然徳則等夷與夷主相遇則吉矣象曰豐其蔀位不當也日中見斗幽不明也遇其夷主吉行也豐其蔀以位近六五處非其位也日中見斗是幽暗已甚不能明也然遇其夷主則兩徳相資動中機要所行乃吉行也六五來章有慶譽吉質雖柔暗然在下賢明之才固不乏也若能虚已下求以來致天下之章明者用人之明以為明則福慶集于天下而有美譽矣何吉如之此聖人因五柔暗而設此以教之也象曰六五之吉有慶也六五居尊故其吉為慶及于天下也上六豐其屋蔀其家闚其戸闃其无人三嵗不覿凶以隂柔之質而居豐之極滿假甚矣處震之終􅏥動極矣是明極而反暗者也象為豐大其屋反以自蔽其家且昏蔽之極闚其戸闃然无人至于三嵗之乆亦不覿凶道也象曰豐其屋天際翔也闚其戸闃其无人自藏也豐其屋在上自髙若飛翔于天際也闚戸无人非果无人也暗不見人自生障蔽耳艮下離上旅小亨旅貞吉旅覊旅也吳氏應回曰旅非商賈之謂凡客于外者皆是也天子有天子之旅天王出居于鄭是也諸侯有諸侯之旅公在楚是也大夫有大夫之旅陳子之去他邦是也聖賢有聖賢之旅孔子之轍環孟子之厯聘是也此卦山止于下火炎于上為去其所止而不處之象故名旅處旅本无大通之理如六五得中于外而順乎上下之二陽艮止而離麗乎明則處旅可以不困是亨也因其為旅之亨故為小亨且旅雖非常居而亦自有處之之正道如言忠信行篤敬仁于童僕義于同侣禮以律身智以照物道亦大矣必守其貞乃吉也彖曰旅小亨柔得中乎外而順乎剛止而麗乎明是以小亨旅貞吉也旅之所以小亨者旅本離居在外之事今卦體六五之柔得中乎外卦而順乎上下二剛柔中則温惠之徳所如皆合而又順附陽剛以資其力彼之力又足以庇我矣卦徳艮止而離麗乎明止則靜専无􅏥妄之舉明則辨物有察情之用是以能小亨能守貞而得其吉也不然寄身于外无所與親而性非柔中動與人忤又无強有力者為之夾持躁妄多失而昏于擇人其能一步行乎況能不失旅之貞以保其吉乎旅之時義大矣哉是以旅雖暫事人易忽之然處之為最難于此而欲不失其時義豈易言者豈不大哉象曰山上有火旅君子以明慎用刑而不留獄用刑不可失當而又最難于得情故必明以察之有慎重而不敢輕者焉曰明慎其必求為明必不敢不出于明者正慎之至也而凡有獄情又必速為決之不乆留滯明慎如山不留如火治獄之道有合于旅象如此初六旅瑣瑣斯其所取災隂柔非明爽之資居下无逺大之志當旅時而鄙猥瑣細難與人諧斯其所以自取殃咎歟象曰旅瑣瑣志窮災也隂柔在下其志意无過人者局促窮陋行事能勿瑣瑣以取災乎六二旅即次懐其資得童僕貞旅中之善不過三事即于次舎則身安懐其資財則用裕得童僕之貞信則无欺而有賴處旅而有此三者可謂得志矣六二柔順中正以温惠之性而動合中正之理故三者皆備于諸爻最吉象曰得童僕貞終无尤也處旅之時即次懐資固為要矣而童僕尤急得童僕之忠貞則行有所賴終无尤矣九三旅焚其次喪其童僕貞厲旅道以柔謙得人為本葢寄身于外非若在家之有親倚而九三過剛則性褊急不中則處失當居下之上則自髙不下人正與二反故為旅焚其次喪其童僕雖其心非邪然已危矣象曰旅焚其次亦以傷矣以旅與下其義喪也旅焚其次亦已困傷矣況又喪其童僕乎以旅之時而過剛不中好髙陵下其與下之道如此以理斷之固宜其喪矣九四旅于處得其資斧我心不快四雖不及二柔順中正然以陽居隂處上之下用柔而能下人故處旅亦不及二而優于三雖不如即次之安而旅于可旅之處不至投非其所優于三之焚次也雖不如懐資之裕而得其資身之斧以自防優于三之喪僕然居非正位又上无陽剛之與下惟隂柔之應處非其所无髙明之援而徒齬齬與卑瑣者處我心又安得快乎象曰旅于處未得位也得其資斧心未快也四雖旅于處然居不得正无陽應隂是尚未得位故雖得其資斧而心不快也六五射雉一矢亡終以譽命離有雉象五柔順文明又得中道為離之主故得此爻者有射雉之象雖費一矢而所費不多終得譽名所失少所得多也象曰終以譽命上逮也終以譽命葢其才徳之美上達于君非徒草野有聞而已君子積行終身或不能邀上人一日之知今曰上逮又何惜一矢乎上九鳥焚其巢旅人先笑後號咷喪牛于易凶以過剛處旅之上離之極剛傲取災不特焚次而且如鳥之焚巢將安歸乎始雖驕樂終乃悲號葢其驕上之甚忽焉失其順徳而不自知是以凶也象曰以旅在上其義焚也喪牛于易終莫之聞也旅道貴順以旅之時而自髙在上其義宜焚勿足怪也喪牛于易者驕氣方盛喪不自知雖至于焚巢號咷而終不自聞知其過也巽下巽上巽小亨利有攸往利見大人巽入也一隂伏于二陽之下能卑順以入故名巽巽以隂為主隂之力弱不能大致亨通但能卑順循物小无所礙而已小亨然隂不能有為而能卑順乎陽惟陽是從則資陽之力可以有攸往也但所從不可不擇吾全倚于陽而陽不盡可倚惟中正有位之大人利往見之乃可資以往耳彖曰重巽以申命卦上下皆巽是重巽也重巽之義為申命之象葢人君欲有所為必順人情所向而反復丁寧以深入其心正重巽之義也以為也剛巽乎中正而志行柔皆順乎剛是以小亨利有攸往利見大人以卦體言九五剛健足以振天下柔懦之習然又不恃其剛而順依于中正之理居心不流于偏制事必當其則而乘權居尊其志得行初四之柔皆順從乎二三五上之剛夫九五剛巽乎中正而志行此所以為大人也柔皆順乎剛此所以能順大人以利有攸往也是以小亨利有攸往利見大人象曰隨風巽君子以申命行事風勢相繼以至巽象也君子凡有行事必先反復丁寧以申明其命令而後行焉亦隨風之義也舉大事者必順人心順其心而深入之然後鼓舞從命而事可行初六進退利武人之貞巽以下伏為義故初四皆隂而初最下則初之巽更過兌以上現為義故三上皆隂而上最上則上之説更深初下六柔為巽之主過于卑巽凡事遲疑或進或退而不果過懦何利惟利于武人之剛猛以為貞武人剛太過者也以矯初之過柔則正而宜象曰進退志疑也利武人之貞志治也進退之病由于志趨不一也矯以武人之貞則斷然強立向之襍亂无定者今皆清治而有據矣九二巽在牀下用史巫紛若吉无咎尊者坐牀上卑者拜牀下在牀下卑屈之象也史巫為人達誠意于鬼神者也九二以陽處隂不過其剛又居下位多畏于上有不安之意焉然當巽之時不厭其卑而二居中亦不至已甚故其占為能卑巽以處牀下且用言辭以自達其誠丁寧煩悉若用史巫之紛若其辭則得巽之宜而吉不見責于人无咎象曰紛若之吉得中也紛若疑過矣而吉以二得中也中道最難識非必不過巽之為中宜過而過過乃中也九三頻巽吝過剛不中非下人之資居下之上又挾上人之勢此豈能為巽者強而為之非出于誠不誠不可乆屢勉屢失但見其頻巽而已志不自勝深可吝也三居兩巽之間一巽既盡一巽復來故有頻象此别意耳象曰頻巽之吝志窮也出于誠者其心用之不窮勉強為之少間則故態復露其志向非不欲巽而動輙見窮非有繼而可乆是以吝也六四悔亡田獲三品隂柔无才无應又不得人之助而承乘皆剛非隂柔所能安處宜有悔矣然以隂居隂處上之下用柔能下陽剛反為之助故既免陽剛之侵可以悔亡而且資陽之力有求必獲以田則所獲之多足備乾豆賔客君庖三品之用他事可知矣象曰田獲三品有功也田獲三品則資陽以有功豈止悔亡而已九五貞吉悔亡无不利无初有終先庚三日後庚三日吉居巽體則苟且偷安之弊有不免宜有悔矣然以其性體剛健中正能奮厲而改圖可以得正而吉且悔亡无不利矣是其始之悔為无初而後之悔亡則有終也然其改圖之貞道宜何如夫改先之巽懦者更也若幹之庚也必也丁寧于更變之前使人皆樂于易轍如庚前三日之丁又揆度于更變之後使事必謀于萬全如庚後三日之癸善于更變如此此所謂貞也故吉象曰九五之吉位正中也九五之吉他爻皆以巽為義惟五以更巽為義然必惟其為九五則有中正之徳正以謹度中以䂓時故獨能更巽而吉上九巽在牀下喪其資斧貞凶居巽之極凡事委阿過于巽而失其剛斷之徳象為巽在牀下喪其資斧如此則自輕取侮失機召禍雖无邪心凶不免矣象曰巽在牀下上窮也喪其資斧正乎凶也巽在牀下以在卦上窮極之道也喪其資斧則必凶矣正乎凶也兌下兌上兌亨利貞兌說也一隂進于二陽之上喜現于外故為兌其象澤者潤澤之氣萬物之所説也又坎水而塞其下流則壅為澤也夫人情相説則彼此通而无礙有亨道矣而卦體剛在中是誠確堅毅之體立于内不至妄説故亨也然説易流于邪妄而卦體柔在外以柔説物懼其失正故利于貞彖曰兌說也卦名兌説之義也剛中而柔外説以利貞是以順乎天而應乎人説以先民民忘其勞説以犯難民忘其死説之大民勸矣哉卦名取其説矣又戒其利貞者何卦體剛中則能貞柔外則不可不貞故雖説而必利于貞也夫言説則近于私私則小小則可以説一二人不可以說千萬人要人以説而不能使人自説説而貞則大大則不求人説而人自説且不止一二人説而人人説是以正理所在凡天理當為人心欲為者我一舉事而人皆有以順之應之天人皆與我无逆何説之甚也而以此鼓民民有不説從者乎以順應之正説而倡事以先民民且忘其勞況不勞民之事也以順應之正說而使民犯難民且忘其死況非死民之事也夫忘勞忘死是民之自相勸勉鼓舞而不能已也可謂利矣然皆由于順天應人之正説今而知説惟正則大惟大則人自説勸而不可已人苐知有説而不知說之大也説之大葢遂至民勸矣哉又何可不利貞象曰麗澤兌君子以朋友講習兩澤相麗互相滋潤互相説也朋友同講講之又講為習亦互相資益互相説也天下之可説者无如此事矣初九和兌吉陽爻不失于柔媚處下不失于上求无應不失于私係故能以和氣御世周徧其説而无偏黨之私吉道也説若易于和而實難説有私則乖爭起和兑惟初能之象曰和兌之吉行未疑也凡情有不正則理必不順心必不安皆疑也皆不吉初自行其正无疑于理无疑于心又何不吉九二孚兌吉悔亡以陽居隂處非其位必有難感之人未易説者悔不免也然剛中有中實之心積已之誠以感説于物則吉而悔亡象曰孚兌之吉信志也和兌以周于物故觀其行孚兌以積于中故推其志志者心所存心存主于誠信而不失人必格矣是以吉也六三來兌凶為下卦兌主又隂柔不中正是好説而不度其正者也然上无與應反來就二陽以求説彼初之正二之中豈屑與之卑賤取辱凶道也象曰來兌之凶位不當也位不當即不中正苟中正則初二且樂求之何至來以取凶九四商兌未寧介疾有喜上承九五之中正理所宜説又下比六三之柔邪情所欲説二者未決方商度所説而未能寧定然質性陽剛終知決所去取故介然守正而疾惡柔邪深可喜矣交岐邪正事介是非意分善惡皆此象也象曰九四之喜有慶也九四商兌之時邪正固不可知矣稍一不悟即流為小人之歸而今能介疾焉此其喜固非小喜由此日進于髙明葢已甚可慶慰矣九五孚于剥有厲隂能剥陽況上六以隂柔為兑主處説極尤能妄説以惑陽内則蠱人之心外則虧人之行何剥如之而九五剛健中正以居尊又在説時徳位可恃未必不好人説已而宻邇上六豈其幸乎故其占為孚于隂之剥已者則必有危厲矣象曰孚于剥位正當也正謂剛中正當謂居尊位惟位正當則自恃正當以小人為不足畏而不知已入其術中遂不覺與之孚也上六引兌以隂居説極又為成兌之主深于術者也故引下二陽以相説陽之從否未可必而但見其日事于引而已矣來者已來就人引者誘人就已深于來矣故引之者剥之也三言凶上反不言者不言其應但著其狀所以深惡之也象曰上六引兌未光也惟上六故為引兑説道利貞本自光大故曰説之大至于引而私暗甚矣説道不可問矣坎下巽上渙亨王假有廟利涉大川利貞渙散也下坎上巽有風行水上離披解散之象故名渙處渙散之勢若无人為之拯救則天下終于不合矣卦變自漸來九來居二得其所安六往居三得位而上得六四之助剛柔各得其用有亨道矣夫天下之渙皆所當聚而最大者无過于假廟人徒知憂天下之渙求經濟于外而反忘己身所由來有祖考而後有身有身而後有民物祖考方去遂任其精神之散而莫之求生身之本尚可不聚也身外之民物反亟乎故言萃言渙之道莫先于王假有廟也至于渙散之時險難方殷非才不足以濟而卦象木在水上有克濟之象故為利涉大川雖然亨而非正則剛柔无撥亂之功假廟非正則豐祀有媚神之意涉川非正則遇事有行險之心是三者皆宜于貞焉彖曰渙亨剛來而不窮柔得位乎外而上同渙之所以亨者濟渙之用惟剛與柔此卦之剛卦變自漸剛自三來居于二處乎中地進退裕如而不窮剛者得以盡其用矣此卦之柔自二而外居于三居下之上是得位矣而上而與六四同類相助柔者亦得盡其用矣剛足以有為而復得乘便之地柔不足自立而乘權有與剛柔各盡其用又何渙之不亨乎王假有廟王乃在中也王假有廟非徒隆其文而已王乃親在廟中也廟者向徒見祖考聚于斯而今王乃亦在于斯儼然王者一至其地而祖考皆如在焉使王不在廟中則王之精神不聚而祖考之精神亦渙散而無屬矣利涉大川乘木有功也治渙所以濟險而卦象木在水上有乘木之象乘木則川可涉以乘木之道濟險可以有功也夫大川在前入者皆沒宜若无術以越之矣乃有道焉天下之物水皆不受而惟木則浮于是假用于木而人乘其上大川之險无如我何人之智能善用未有若乘木之妙者也以乘木之道涉險天下无難濟之事矣象曰風行水上渙先王以享于帝立廟天下之情本樂聚而惡散若可以任其渙散而不之恤者必其與我邈不相屬者也天下何物與我不相屬而大本大根則帝與祖又我身所從出人而忘天忘祖精神兩不相聚是自戕其本也使人人不知有天祖又何知有君親天下之冰消雲散而不相維忘本故也昔先王是以享于帝以聚天之神立廟以聚祖考之神使天下仁孝報本之心油然而生則不忍復散矣初六用拯馬壯吉當渙之始救之易為力宜用拯也又以柔居九二之下能順乎九二以資其力是又得馬之壯也渙可拯矣吉象曰初六之吉順也初六之才不能濟渙而可以吉者惟初六性柔則能順乎二以成功也九二渙奔其机悔亡二非陽地而九居之若失其所處不足濟渙而有悔矣然卦變舍三居二得中不窮是當渙之時舍其故地之不安而急奔以就所安机者人所凴以安也得凴藉以為安悔可亡矣象曰渙奔其机得願也當渙之時人皆願求所安夫所願在是而坐失機宜終身不獲可勝悔乎二奔机則得願所以悔亡曰得幸之亦危之六三渙其躬无悔隂柔不中正有私于己身之象悔不免矣然居得陽位則才雖未優而志在濟時能為人忘己渙散己躬而不之恤夫百私皆出于躬能散其躬則濟否未可知而其心无悔矣此上四爻皆用渙以濟渙者也渙之象不可在世不可不在身一人各私一身所以渙而不相屬散其身則渙者化而聚矣象曰渙其躬志在外也人莫不各私其躬而三能渙之者志有在也身為内世為外二者不容並係志在于外自不暇顧身矣六四渙其羣元吉渙有丘匪夷所思居隂得正上承九五當濟渙之任者也而下无應與有能散其羣黨之象夫人心渙散之時各為羣黨不能統一而四能散之解私交以急公事未有如此之盡善者也占者如是則元吉且既能散其小羣則統為大羣是其渙之所聚者且如丘之積洵非平常之人所思及者矣常人止知各結其私豈能公懐若是象曰渙其羣元吉光大也渙羣之心可謂光明无私昧廣大不狹小也此其為元吉而匪夷所思九五渙汗其大號渙王居无咎當渙之時所宜渙以合人心者莫如號令與居積九五陽剛中正以居尊位能得濟渙之要故能渙散其大號大號大政令也布此大號出乎上之中心由中及外由近及逺雖至幽至逺之處无不被而洽之猶人之汗出乎中而洽于四體也又能渙散王之居積以公諸人夫散其號則天下共見一人之心矣散其居積則財散而民聚矣天下大勢不其合于一乎庶于主渙之責无咎矣象曰王居无咎正位也渙汗渙居其功大矣而止言无咎者以五正居尊位天下之渙皆其責故必如是而乃可以无咎也王居无咎是將爻辭節作四字意則全包上九渙其血去逖出无咎逖惕同渙極將聚隂柔處之則无以收其勢矣上九以陽剛之才濟之能出乎渙故渙其傷血則血已去渙其憂惕則惕已出无咎象曰渙其血逺害也渙其血血者患害之象害非自去上有以逺之也兌下坎上節亨苦節不可貞節有限而止也下兌上坎澤上有水其容有限故為節凡事有節則裁制有道可以通行无弊而卦體剛柔均半二五得中其節又不至于過故可亨若節之過而至于苦則人病其難行是亦不可固守以為正矣彖曰節亨剛柔分而剛得中節固有亨道矣而卦體又剛柔分而剛得中葢人情易流其斷然能自節止者惟剛能之特患剛過則節之不近人者多耳今剛柔各半是嚴勁之體與温潤之意並存也二五之剛得中是斷制之理皆制于所當制也此二者節而不過故亨也苦節不可貞其道窮也至于苦節則其道窮而不可行是以不可貞也説以行險當位以節中正以通夫苦節之道窮而不可貞則節之貴于通可知通者所以亨也卦徳兌説人于所説必務進而不知止乃前遇艱險阻其所為則思自止矣方説而止是節道也然節之善否全視主節之人而卦體九五實得位以主節于上夫五之主節為何如哉五葢中正者也内无輕重偏畸之情外有義理適當之則則其所為節者皆天理民彝所不容已而通行于天下而无弊者也夫節出于中正而可通此節之所以為亨而非苦節比也天地節而四時成節以制度不傷財不害民推而言之何往非節也天地無節則寒暑陵奪失序不成為四時矣國家无節則多取濫用傷財以害民矣惟天地之氣有節而四時乃成惟立制度以為節取之有則用之有經則不傷財不害民凡此皆有賴于節甚矣節道之大也象曰澤上有水節君子以制數度議徳行君子之節莫大于節民節身二者而已節民之道于凡儀文器物必為制多寡之數隆殺之度焉天下所以无踰節之俗節已之道于存心制行必商議其宜操何術宜執何行焉一身所以无失節之舉初九不出戸庭无咎當節之初未可以行而陽剛得正亦能節而自止象為靜止自歛不出戸外之庭慎宻如是又安得咎象曰不出戸庭知通塞也初非耑于止也時尚塞耳兼知通塞之宜而後能時止則止不出戸庭豈姑以退閉掩拙哉九二不出門庭凶二當可行之時矣而失剛不能有為不正乖于事理又上无應與故知節而不知通象為不出門内之庭凶道也妄動固足召災固執亦能取禍也初本在戸内而不出戸是守其固然二應在門外而不出門則喪其當然也初前遇竒戸象二前遇偶門象象曰不出門庭凶失時極也君子貴乎乘時時不可失不出門庭失時甚矣六三不節若則嗟若无咎隂柔不中正非能節者侈于前必困于後既不節則必嗟安所歸咎象曰不節之嗟又誰咎也三之嗟以不節而自致者也又誰咎乎六四安節亨九五主節于上六四承之然使承善節之道而已不能順中正之理日在吾前而内不勝其邪倚之私上亦无以益我也四柔順則能受節得正則又近于節故承五之道而安然自有其節亨道也象曰安節之亨承上道也安由于能承承由于順正九五甘節吉五為節主而能以中正節天下其節道皆恊人之性宜人之情樂易而无所艱苦是為甘節吉道也以此而往人説從之有嘉尚之功矣象曰甘節之吉居位中也既曰節則不患不正而患不中故五之甘得之正者固不少而得之中者尤多也上六苦節貞凶悔亡易以道義配禍福而道義尤重于禍福上六居節之極節之苦者也雖貞實凶然此終知有節其視不節之嗟逺矣悔亡象曰苦節之凶其道窮也苦節之所以貞而凶者以其道之窮也總之節道中正則通而亨吉過則窮而凶兌下巽上中孚豚魚吉利涉大川利貞孚信也二隂在内四陽在外是中虚也二五剛中是中實也中虚者心體淨明中无私偽孚之本也中實者意念誠懇中无浮妄孚之質也又下説以應上上巽以順下上下交孚故名中孚夫孚信之道以何為極必其誠意所積雖无知如豚魚亦可感動則其无所不格可知是乃吉道也至信之道以涉險難則不僥倖不欲速人樂助之大險可濟而卦象木在澤上外實内虚亦有乘木舟虚之象故利涉大川雖然至信可以感豚魚涉險難但感物不以正則違道干譽者有之涉川不以正則行險苟免者有之故信必以正乃利彖曰中孚柔在内而剛得中説而巽孚乃化邦也卦名中孚者卦體以全體言為二柔在内分二體言二五之剛得上下之中中虚中實皆孚象也卦徳下説從而上順理是上下相孚也夫上下相孚則非獨吾臣吾民而已乃由近及逺化及萬邦皆與我孚也豚魚吉信及豚魚也言信而必曰豚魚吉者豚魚至无知而信足以及之則信无不及矣故吉也利涉大川乘木舟虚也信之可以涉川者卦象木在澤上既有乘木之象外實内虚又有舟虚之象乘木者實理之用舟虚者虚中之能皆信之所以利也中孚以利貞乃應乎天也信道至矣而必利乎貞者葢正者天理天理本實而吾不敢虚天理本真而吾不敢妄凡吾之所為誠篤不欺者一皆天理之本然理本不可偽而吾即如其无偽者以應之故孚雖可以感无知濟險難未敢必其盡合乎天惟利貞乃應乎天也此中孚之極致也象曰澤上有風中孚君子以議獄緩死風感水受自然相應孚象也君子之孚莫大于議獄獄之未決是以貴議君子恐其察之不審而誤陷无辜也寧姑緩其死以待議之徐定是其至誠惻怛之心何如也君子于天下之事无所不盡其誠而此則人之生死攸係尤其大者初九虞吉有他不燕當孚之初與六四為正應四可信者也夫相信之道貴審之于初當初而虞度其可信者信之則吉若復有他志焉我心既貳于彼彼心亦必不一于我或又信非所信此皆不能得所燕安也惟在初而審其可信者信之則交正而有倚心安身亦安也象曰初九虞吉志未變也初九則志尚未變故于此時即虞之乃吉也九二鳴鶴在隂其子和之我有好爵吾與爾靡之九二中實九五亦以中實應之象如鳴鶴在隂鳴者自鳴而其子自和之天然之孚應也所以然者葢我之中實我之美徳也美徳人所同好故美徳雖在我而爾亦係戀之也抑美徳人所同好而必有是徳者乃知好之故美徳在我惟吾與爾係戀之也鶴陽鳥九象在隂二象其子五也我吾指二爾指五好爵以喻美徳象曰其子和之中心願也凡人心同愛此一物則兩意自不期而應其子和之以二五中心同願愛此美徳故不覺其和之也豈強致哉六三得敵或鼔或罷或泣或歌隂柔不中正則躁而无常居説之極則流而无節然使得善應之助猶可資以為主乃六三所得之敵應則窮信不通之上九不足倚賴者也我既无主于心而所應又不能主張于我故作止无常哀樂无節或鼔或罷或泣或歌心无所定也象曰或鼔或罷位不當也爻歸咎于敵象歸咎于三六四月幾望馬匹亡无咎居隂得正位近于君其純柔之徳足以取信于君而又居近君之地權勢方盛月幾望之象也且初與已為匹而四能絶之以上信于五心純于主无咎兩馬為匹象曰馬匹亡絶類上也人心患有所係而不能絶四能絶已之類以上信于五豈有咎乎九五有孚攣如无咎剛健中正有孚之徳又居尊位而為孚之主下應九二與之同徳宜其相孚之攣固也夫為孚之主者天下之誠偽皆係于我遇有徳而不能誠交无以作天下交孚之志皆我咎也故五无咎象曰有孚攣如位正當也正謂剛健中正有孚之徳也當謂居尊位為孚之主也上九翰音登于天貞凶翰音鷄也巽象居巽極有登天象上九處信之極固執失理信非所信而不知變若翰音非登天之物而強欲登天不誠難乎雖所信者正理而適取凶矣象曰翰音登于天何可長也理之通者可長若翰音登天果可乆乎艮下震上小過亨利貞可小事不可大事飛鳥遺之音不宜上宜下大吉小隂也四隂在外二陽在内隂多于陽小者過也故名小過隂既過于陽以勢而言隂可亨矣以理而言則小者之當過時自有所可行所不可行之正則恃勢而妄作違理而乖分何利乎故必利于貞也何以為貞卦之過者柔也二五之柔得中以處小事可矣卦之少者剛也三四之剛又皆失位而不中以舉大事不可也可小不可大此小過之貞也卦畫内實外虚又有飛鳥之象飛鳥雖在上而飛鳥所遺之音則聞于下不聞于上處小過者體此象凡事不宜髙已自上惟宜收歛退約自處于下則萬全无害而大吉矣此又小過之貞也小過之所利者此也可恃其亨乎葢小過于大分不正而事不順如臣子而過于君父僚屬而過于官長天下亦時有此事但其過者勢也終不可過者理也小過于大而極恣其勢能保厥終者有之乎故教以任小辭大而卑下自處乃理之正也天地之大經也其教天下之為小者至矣若文王三分有二小過也以服事殷則貞而不過也彖曰小過小者過而亨也卦名小過者卦體小者過惟過所以亨也過以利貞與時行也過而戒以利貞者小過之時即有小者處過之理使過者非小小不必戒也使小者不過小亦不必戒也惟小者本不可過而適處過時則隨時自盡必有過而不過之理所謂貞也柔得中是以小事吉也剛失位而不中是以不可大事也卦體之柔二五得中柔本不可有事以得中則可小事得中本可有事以柔得中僅可小事也卦體之剛不居二五而居三四是失位也而三四皆不中成大事在剛而此卦之剛位與徳胥失之是以不可大事也有飛鳥之象焉飛鳥遺之音不宜上宜下大吉上逆而下順也再觀卦體二陽鳥身四隂鳥翼有飛鳥之象焉故取義飛鳥遺之音而戒以不宜上宜下大吉者隂小本下苟乘勢之過而妄欲自上乃逆分之為惟不恃勢而守卑下則順也故宜下也象曰山上有雷小過君子以行過乎恭喪過乎哀用過乎儉山上有雷其聲小過君子亦宜有小過者若行喪用日用常近之事于此而過小者之過所謂可小事也且恭哀儉此皆自處退小之道不厭其過若行而傲喪而易用而奢此乃斷不可過者是可過于小而終不可過于大也又恭哀儉大過則為足恭為滅性為鄙嗇是可小過而不可甚過也此二義又所謂宜下也初六飛鳥以凶飛鳥遺之音則下而不上單言飛鳥則上而不下矣初六當過之時而隂性多躁又上應九四志急上行一于過上而不可止若飛鳥之一于飛而逝也以此致凶何疑象曰飛鳥以凶不可如何也過上取凶自取之无可如何也六二過其祖遇其妣不及其君遇其臣无咎柔順之質守正得中過而不過故由其進言之則過三四之陽而反遇乎六五之隂為過其祖遇其妣之象夫過于陽已為過矣過陽而反遇隂則无強盛之患是未嘗過也由其不進言之則不敢上及乎六五而自安其分不及其君適遇其臣无陵上之嫌亦未嘗過也處過而不過无咎矣象曰不及其君臣不可過也二之不及其君以理斷之臣本不可過盛也臣而過則及君矣九三弗過防之從或戕之凶小過之時事每過當然後得中況九三以剛正處羣隂之中衆所忌害而三自恃其剛不肯過為之防備則或出其不意而戕之矣凶象曰從或戕之凶如何也凶如何言凶之甚九四无咎弗過遇之往厲必戒勿用永貞當過之時以剛居柔行過乎恭无咎之道也何也四葢弗過于剛而適遇其宜也設若更往而有為則過剛矣厲道也不可不戒也然而時各有宜非徒守一過恭之道遂可以處此无患也剛柔互施不可過剛而亦非不可用剛此陽剛處小過之大權大用也方憂九三之凶而忽見四之不過故首係之无咎象曰弗過遇之位不當也往厲必戒終不可長也弗過遇之正因位不當則不過于剛也往厲必戒然終不長守之為貞也長即永意六五宻雲不雨自我西郊公弋取彼在穴隂柔非有為之才居尊又過上而不下且當隂過之時故不能有為為宻雲不雨自我西郊之象夫在我不足有為而六二正應可取以為助二去我逺故宜弋而取之二在下體幽隠之處故有在穴之象然兩隂相助究亦不能濟大事也象曰宻雲不雨已上也卦本小過小而至于居五髙上已甚不能下人故不足有為也上六弗遇過之飛鳥離之凶是謂災眚隂性本躁又居動極過極過之太髙而甚逺大悖可小宜下之義者也故弗遇其宜而一于過之若飛鳥之逺去穿雲沒影而離之矣凶道也天災人眚並至然則隂之過甚豈隂之福乎象曰弗遇過之已亢也弗遇過之葢太亢而不降也離下坎上既濟亨小利貞初吉終亂亨小作小亨既濟事之既成也水火相交互成其用事之所以濟也六爻皆正剛柔得當亦事之所以濟也故名既濟濟固亨矣惜其為既濟則盛運已過所餘无幾惟小亨而已處此者惟利于固守正理不可以履盛運而肆然滿志自敗其義理之度也當濟之初固可云吉而其終未有不亂葢初畏理而終玩法貞不貞之别也可不戒乎彖曰既濟亨小者亨也既濟之亨葢大事之亨已過矣今則惟餘小節細目之間日向于亨而已小者亨也利貞剛柔正而位當也戒以利貞者卦體剛柔皆正而位皆當也處濟者无論其才之剛與柔而一稟于正焉如此卦之六爻可也初吉柔得中也初吉六二居下卦方濟之初而以柔得中柔能慎畏而得中則善處事機不失于退懦是以吉也終止則亂其道窮也終亂非終之自能亂也人處終而有止心以為已安矣已成矣无事于憂勤矣則亂由之而起葢其道已趨于窮極而无復向治不已之心非天使然實人之不善也象曰水在火上既濟君子以思患而豫防之既濟非有患而患即生于既濟夫既濟之日患固未形也患不可見而吾能以思見患循勢按理以思其患之所必至而豫為防之則長濟而永无患矣初九曳其輪濡其尾无咎輪在下尾在後初象也既濟初吉終亂故初九當既濟之初尚能心存謹戒可前也而尚曳其輪可濟也而尚濡其尾慎畏如是不致以侈肆釀敗故无咎象曰曳其輪義无咎也咎生于不慎初有曵輪之慎自无致咎之理六二婦喪其茀勿逐七日得二以文明中正上應九五剛健中正之君宜得行其志也而九五居既濟之時无復有為之志不能下求于二二雖有徳而不得行若婦喪其蔽車之茀而无以行也然中正之道不可終廢既濟之盛有時而過則天下資我中正之道甚急矣我可以行矣若茀喪不待追逐而七日可復得也象曰七日得以中道也中道在我則濟世者非我而誰故可必其七日得九三髙宗伐鬼方三年克之小人勿用九三重剛當既濟之時而用剛若髙宗當殷道既興之後而興兵以伐鬼方之象也然以髙宗之盛伐鬼方小國必三年乃克之則不及髙宗者可知矣甚矣用剛之難也其可以小人任之乎行兵而用小人是平一亂生一亂也處濟時者可不鑒乎象曰三年克之憊也三年然後克之是勞費財力困憊已甚也處既濟之後斷不可輕動矣葢人主之勤兵逺方者必其以極剛之資而當極盛之時故不勝其貪與忿而必逞志于一擊于是好事小人爭起而迎合其意開釁滋亂財力殫窮功未奏而盛業已壊矣此爻以九三過剛而當既濟又離為戈兵正合此象故聖人甚言其克之之難又申戒以小人勿用至矣哉六四繻有衣袽終日戒繻當作濡濡謂舟漏而水浸入也六四處既濟而重柔能慎故防患有具終日存畏戒之心若濡有衣袽而其心且終日戒也雲峯胡氏曰乘舟者不可以无濡而忘衣袽亦不可謂衣袽已備而忘戒懼水浸至而不知則雖有衣袽不及施矣備患之具不失于尋常而慮患之心又不忘于頃刻此處既濟之道也象曰終日戒有所疑也人必有疑于心而後防之四之終日戒其心實見其生患之處而疑之也其心又不知患之于何生而若有所疑之也九五東鄰殺牛不如西鄰之禴祭實受其福東陽五也西隂二也九五雖居尊而時已過不如六二在下而始得時象為東鄰殺牛之盛祭反不如西鄰之薄祭可以受福也象曰東鄰殺牛不如西鄰之時也實受其福吉大來也東鄰雖殺牛不如西鄰之時也實受其福二當初吉之時吉正大來而未已此其時之盛豈五所及乎上六濡其首厲在上首象既濟極而將亂險極又為難濟而上以隂柔處之力不能支漸見沈沒象如濡其首厲矣象曰濡其首厲何可乆也涉險而至于濡首尚安能久支乎坎下離上未濟亨小狐汔濟濡其尾无攸利未濟事未成之時也水火不相為用事之所以未濟也六爻皆不當位亦事之所以未濟也故名未濟夫未濟非不濟也尚未濟耳有終濟之望焉且六五柔中能知畏慎亨可必也但所以致亨者必敬慎乃克有濟若懈于將成則終不濟如小狐之幾于濟而濡其尾焉是終未濟也何利之有狐性善疑畏然惟老狐知畏故履冰而聴懼其陷也若小狐則不知畏慎而輕濟濡尾者多矣人之老成者多周慎而新鋭者必鮮終亦猶是焉彖曰未濟亨柔得中也未濟而可以亨者六五柔得中則能小心慎宻而未濟者濟矣故亨小狐汔濟未出中也濡其尾无攸利不續終也雖不當位剛柔應也曰汔濟是幾至于濟而己未出乎險中也宜何如敬宻而乃濡其尾无攸利是始勇于濟而不能敬慎以繼續其終也然此卦卦體亦猶有可濟之理雖六爻不當位事失其正未可有濟而剛柔皆相應則又有互相為用之義可以交助成功豈終于弗濟哉象曰火在水上未濟君子以慎辨物居方水火異物各居其所君子由是知物類不同則所居宜異辨之稍未精則居之有未當故必慎辨物宜而使各居其方也初六濡其尾吝以隂居下无才无位當未濟之初又非其時故未能自進若狐之濡其尾自取吝耳既濟初九濡其尾才可濟而自止也故无咎此爻濡其尾才不能濟而將溺也故吝象曰濡其尾亦不知極也雷氏曰初六知始之欲濟而不知終之不能續故曰亦不知極也極者終窮之謂九二曳其輪貞吉以二應五以下濟上事也然下剛上柔是恃其濟時之才而陵忽于上失正取凶矣九二居柔得中卑恭守分能自止于下而不進若曳退其輪貞吉之道也程傳曰剛過則好犯上而順不足唐之郭子儀李晟當艱危未濟之時能極其恭順所以為得正而能保其終吉也象曰九二貞吉中以行正也九二非正而能貞吉者本其心之中以行正也宅心中順故能以義理自約而得為下之正六三未濟征凶利涉大川隂柔不中正无才徳也當未濟之時時難為也故事未有濟而以征則凶然以柔乘剛與以剛乘險者不同將出乎坎與未出險中者不同又可以涉大川矣象曰未濟征凶位不當也爻兼才徳與時言之象耑責其无徳九四貞吉悔亡震用伐鬼方三年有賞于大國以九居四不正有悔必也勉而為貞因時順理不汲汲以求進不違道以妄進則吉而悔亡矣然以不貞之資欲勉而貞非極其震動以大為克治至于用力之乆不能也若震奮以伐鬼方必三年之乆乃克成功而受賞于大國也象曰貞吉悔亡志行也貞則吉悔亡者勉而為貞則濟時之未濟其志得行是為吉悔亡葢得行其志即吉无不得行志之悔即悔亡而皆原于貞四其可不貞乎六五貞吉无悔君子之光有孚吉以六居五本非正也然有文明之徳又有虚已應剛之善皆正道故得貞而吉雖有悔不為悔矣然五之貞又非特无悔而已其文明虚中之徳發越于事為之間使人可望而知者葢有光焉凡君子之光著于外者莫非實徳誠意之流行而非飾致也自其貞言之固見為吉而自其光言之又見為吉也象曰君子之光其暉吉也君子之光于何見其吉葢光之散見于事物者處處照映而不可掩積徳之效見于此矣是即其吉也上九有孚于飲酒无咎濡其首有孚失是剛明有能濟之才又居未濟之極乃將濟之時于此復何為哉惟自信自養有孚于飲酒以聴天命之自至耳以是才當是時故宜安樂以靜待而非失于荒逸也何咎若遂縱而不反以至于沈溺若狐涉水而濡其首則又過于自信而失其義之當矣葢有孚于飲酒者安養以待有為則義之是也若處于患難知其无可奈何而放意不反與恃其將濟遂以為不足介意而懈荒自敗皆誤用飲酒之説而失其是者也象曰飲酒濡首亦不知節也飲酒豈徒自荒逸已哉而至于濡首亦甚不知節矣知節則安樂之中自有敬畏之意矣讀易日鈔卷六
