body:
  text: 讀易日鈔卷八贊善張烈撰繋辭下傳第一章八卦成列象在其中矣因而重之爻在其中矣剛柔相推變在其中矣繋辭焉而命之動在其中矣吉凶悔吝者生乎動者也剛柔者立本者也變通者趨時者也吉凶者貞勝者也天地之道貞觀者也日月之道貞明者也天下之動貞夫一者也夫乾確然示人易矣夫坤隤然示人簡矣爻也者效此者也象也者像此者也爻象動乎内吉凶見乎外功業見乎變聖人之情見乎辭天地之大徳曰生聖人之大寳曰位何以守位曰仁何以聚人曰財理財正辭禁民為非曰義易有象有爻有變有動此四者何自出乎夫兩儀四象雖有畫而未成卦之形體惟四象之上各加一竒一耦而乾兌離震巽坎艮坤以次成列焉然後卦之形體可見葢統八卦而觀之但見其成列耳即八卦而逐一觀之則見其三竒者乾象三耦者坤象一陽在二隂下者震象一隂在二陽下者巽象陽在隂中者坎象隂在陽中者離象一陽在二隂上者艮象一隂在二陽上者兑象是八卦方成列而各卦之體象已在其中矣因此成列之卦各以一卦為主而八卦次第重加其上是但見其重為六十四卦也而六爻之錯陳遂已在其中矣此二者卦爻所由備也卦爻已備故合卦圖以觀但見其一剛一柔互相推盪止此兩畫之交互而卦爻之錯綜變換不可執一者已在其中矣卦爻既變得失生焉聖人因其所變之得失而繋辭以命其吉凶是方有其辭未及于占也而占者所值當動之卦爻又已在其中矣此二者變動所由具也夫象也爻也變也皆具于易者也至于動則占者之所值而吉凶悔吝之占别矣故吉凶悔吝雖具于辭然必由卦爻之動而後見是生乎動者也以卦爻之動言之當其始也則一剛一柔卦爻各有定體是所以立本者也及其剛變而通于柔柔變而通于剛消息進退有時迫之是乃動而趨乎時者也夫畫有定體而變旡定用則吉凶悔吝之生乎動者信乎不可以一端裁矣然吉凶旡定形而未嘗旡定理天下事非吉即凶吉者斷旡凶理凶者斷旡吉理二者相勝不容並立惟視兩途分數之多寡強弱以為定而未嘗差混焉是乃天下之正理常理貞勝者也何也凡物皆有其正者以為常如天地之道其所為正而常者惟示人而已矣日月之道其所為正而常者惟明照而已矣天下之動雖旡窮其所為正而常者則惟一理焉動雖旡定必有一至是之理不可以他岐者順此則吉逆此則凶此吉凶之所以貞勝而吉凶悔吝之生乎動者雖變通而未嘗旡定理也然是卦爻吉凶也夫孰非本于天地者哉夫天之所以為天者曰乾一理所在靜則專動則直止此一理有何艱難是確然至健明示人以理之本如是其易矣夫地之所以為地者曰坤一理所在靜則翕動則闢止此一理有何繁擾是隤然至順明示人以理之本如是其簡矣惟理本易簡而天地之示人者人尚不悟故聖人作爻象以顯之前所謂爻也者竒以效乾耦以效坤乃傚此易簡之理以告人者也前所謂象也者卦之陽息隂消以象乾隂息陽消以象坤乃像此易簡之理以告人者也既有爻象斯有變占試觀人之揲蓍求卦其始也分掛揲扐未成爻象而爻象將出是爻象動乎蓍卦之内也其終也爻象既成而吉凶之占已決是吉凶見乎蓍卦之外也方其爻象動乎内也卦雖未成然有變則自有卦有占人之所以通志成務者已在于此是天下之功業即現于蓍卦方變之時矣及其吉凶見乎外也辭已明示其言吉者惟恐人不入于吉言凶者惟恐人或入于凶是聖人憂民旡已之情遂現乎辭矣卦爻吉凶之本于易簡如此是易簡也天地之造化聖人之功業皆不能外焉以天地造化言之天地之事不勝舉然舉其大徳則惟以生物為心此外不存餘事旡難也旡繁也天地之造化一易簡盡之矣以聖人功業言之聖人之大寳曰位守位在人聚人在財而聖人欲為聚人守位計則必理其財焉理財之後又必正其訓教之辭焉又必設刑罰以禁民為非焉是三者皆秉于義而已義者理之宜以義理財以義正辭以義禁非裁斷不屈至易也順理不違至簡也以是聚人而守位聖人之功業一易簡盡之矣信乎天下之動貞夫一易之所示者此易簡也學易之所當先識者此易簡也第二章古者包犧氏之王天下也仰則觀象於天俯則觀法於地觀鳥獸之文與地之宜近取諸身逺取諸物於是始作八卦以通神明之徳以類萬物之情作結繩而為網罟以佃以漁葢取諸離包犧氏沒神農氏作斵木為耜揉木為耒耒耨之利以教天下葢取諸益日中為市致天下之民聚天下之貨交易而退各得其所葢取諸噬嗑神農氏沒黄帝堯舜氏作通其變使民不倦神而化之使民宜之易窮則變變則通通則久是以自天祐之吉旡不利黄帝堯舜垂衣裳而天下治葢取諸乾坤刳木為舟剡木為楫舟楫之利以濟不通致逺以利天下葢取諸渙服牛乘馬引重致逺以利天下葢取諸隨重門擊柝以待暴客葢取諸豫斷木為杵掘地為臼臼杵之利萬民以濟葢取諸小過弦木為弧剡木為矢弧矢之利以威天下葢取諸睽上古穴居而野處後世聖人易之以宫室上棟下宇以待風雨葢取諸大壯古之葬者厚衣之以薪葬之中野不封不樹喪期旡數後世聖人易之以棺椁葢取諸大過上古結繩而治後世聖人易之以書契百官以治萬民以察葢取諸夬聖人融㑹天下之理以作易故易有以該天下之事凡聖人制器皆不出乎易象焉夫天下之物其理之隠而不可見者為神明之徳其材之殊而不一者為萬物之情此二者天地人物在在有之人不能遍識也惟古者包犧氏之王天下也仰則觀象于天俯則觀法于地而得其所以象所以法觀鳥獸羽毛之文與天地之所宜而得其所以文所以宜近取諸身逺取諸物而得身與物之所為體葢旡往非隂陽旡往非消息也聖人有悟于此象隂陽而畫為竒耦因竒耦而重為八卦因八卦而重為六十四卦則舉天地間隂陽之徳性皆備其中隂陽之情形皆備其中如健順動止之屬其徳之神不測而明不昧者易皆有以通而合之如天地雷風之屬其情之散為萬物者易皆有以類而象之矣惟易有以通神明類萬物是故聖人制器之事皆不出乎易象如作結繩而為網罟以佃以漁是包犧作之使人可以制物耳今考其兩目相承離象也物麗焉離徳也則謂網罟之設取諸離可也如包犧氏沒神農氏作斵木為耜以入土揉木為耒以為耜柄耒耨之利以教天下今考其二體皆木上入下動皆益象也且農事既興天下之益莫大于此則謂耒耜之設取諸益可也如日中為市致天下之民聚天下之貨交易而退有無相資各得其所今考其上明下動噬嗑象也則謂日中之市取諸噬嗑可也如神農氏沒黄帝堯舜氏相繼而作是時太古樸陋之俗已幾變矣聖人因其勢之將變而更新以通之使民樂趨而不倦焉然其所以通變者非聖人強用其智慮以作為于其間也因其自然之變而以自然之理處之有莫知所以然而適中欵㑹者是為神而化之故能使民鼔舞神化之内而安以為宜此所以樂趨而不倦也何則天下變化之理謂之易易理之在天下凡勢數至窮極之時則必思變欲變則人必因而通之以更新其制通之則協人情當天理而可乆惟通之至于可乆是以自天祐之吉旡不利也黄帝堯舜知天下草木皮羽之風已將變也故一垂衣裳之制而天下翕然趨之禮儀興等威辨已變為大治而莫知所為是其變化而旡為即天地之旡心而成化乾坤象也則謂衣裳之制取諸乾坤可也如刳木而虚之為舟剡木而鋭之為楫舟楫之利以濟不通致逺以利天下是木在水上渙象也則謂舟楫之制取諸渙可也如服牛乘馬而牛以引重馬以致逺以利天下是下動上説隨象也則謂牛馬之用取諸隨可也如立為重門擊柝相警以防待暴客是豫備之義也則謂禦暴之用取諸豫可也如斷木為杵掘地為臼臼杵之利使民始知精食而咸獲濟焉其制之下止上動小過象也則謂臼杵之制取諸小過可也如加弦于木而為弧剡木使鋭而為矢弧矢之利以威天下葢睽乖而後用威以服之之義也則謂弧矢之制取諸睽可也如上古冬穴居夏野處風雨莫蔽後世聖人易之以宫室上有棟下有宇以防待風雨葢壯固之義也則謂棟宇之制取諸大壯可也如古之葬者厚衣之以薪置之野中而已不封以土不樹以木其喪期旡數焉後世聖人易之以棺槨葢送死大事宜過于厚大過義也則謂棺槨之制取諸大過可也如上古民淳事簡惟結繩足以記之後世易于淆亂聖人易之以文字之書合約之契庶乎上而百官之事有所稽下而庶民之事有所考以治以察是明決之義也則謂書契之興取諸夬可也凡此十二事者于易皆有合聖人所以開世牖民相繼而為功于天下者悉備于是信乎易之為理天下萬事之形似也第三章是故易者象也象也者像也彖者材也爻也者效天下之動者也是故吉凶生而悔吝著也是故易者非他合之為六十四卦分之為三百八十四爻皆竒耦之形體而已而此象也者正所以像夫造化事物之理葢造化事物之内莫不有神明之徳焉萬物之情焉易之象所以擬其形似也有伏羲之象因有文周之彖與爻而彖之所言者非他葢一卦之内自有卦體卦徳卦象卦變或善或惡之材質彖之所言者此也爻之所言非他天下之動旡窮六爻之動亦无窮故聖人擊爻正以摸倣事變于卦爻之下以告人也夫既有象以像天下之理又有彖辭以言其材又有爻辭以效其動則何理不備何幾不研是故本旡形者吉凶而因象辭以生至㣲茫者悔吝而因象辭以著至于吉凶生悔吝著而易之為功遂旡窮矣第四章陽卦多隂隂卦多陽其故何也陽卦竒隂卦耦其徳行何也陽一君而二民君子之道也隂二君而一民小人之道也易之純陽者為乾純隂者為坤其分隂陽旡可疑矣至于震坎艮陽卦也宜乎陽畫多而反多隂巽離兌隂卦也宜乎隂畫多而反多陽此其故何也葢陽卦應得竒數隂卦應得耦數今陽卦一陽為一畫二隂為四畫合之為五是竒數也所以宜多隂隂卦一隂為二畫二陽為二畫合之為四是耦數也所以宜多陽夫其所以分隂陽者固如此矣然則其徳行為何如夫陽統隂有君象隂從陽有民象今陽卦多隂是為一君而二民統賤于貴其徳為明分其行為循禮是君子之道也隂卦多陽則為二君而一民民旡定主兩尊並爭其徳為昏昧其行為拂亂是小人之道也葢分隂分陽之中其公私邪正之不同又如此第五章易曰憧憧往來朋從爾思子曰天下何思何慮天下同歸而殊塗一致而百慮天下何思何慮日往則月來月往則日來日月相推而明生焉寒往則暑來暑往則寒來寒暑相推而嵗成焉往者屈也來者信也屈信相感而利生焉尺蠖之屈以求信也龍蛇之蟄以存身也精義入神以致用也利用安身以崇徳也過此以往未之或知也窮神知化徳之盛也易曰困于石據于蒺藜入于其宫不見其妻凶子曰非所困而困焉名必辱非所據而據焉身必危既辱且危死期將至妻其可得見耶易曰公用射隼于髙墉之上獲之旡不利子曰隼者禽也弓矢者器也射之者人也君子藏器于身待時而動何不利之有動而不括是以出而有獲語成器而動者也子曰小人不恥不仁不畏不義不見利不勸不威不懲小懲而大誡此小人之福也易曰屨校滅趾旡咎此之謂也善不積不足以成名惡不積不足以滅身小人以小善為旡益而弗為也以小惡為旡傷而弗去也故惡積而不可掩罪大而不可解易曰何校滅耳凶子曰危者安其位者也亡者保其存者也亂者有其治者也是故君子安而不忘危存而不忘亡治而不忘亂是以身安而國家可保也易曰其亡其亡繫于包桑子曰徳薄而位尊知小而謀大力小而任重鮮不及矣易曰鼎折足覆公餗其形渥凶言不勝其任也子曰知幾其神乎君子上交不諂下交不瀆其知幾乎幾者動之㣲吉之先見者也君子見幾而作不俟終日易曰介于石不終日貞吉介如石焉寧用終日斷可識矣君子知㣲知彰知柔知剛萬夫之望子曰顔氏之子其殆庶幾乎有不善未嘗不知知之未嘗復行也易曰不逺復旡祗悔元吉天地絪緼萬物化醇男女構精萬物化生易曰三人行則損一人一人行則得其友言致一也子曰君子安其身而後動易其心而後語定其交而後求君子修此三者故全也危以動則民不與也懼以語則民不應也旡交而求則民不與也莫之與則傷之者至矣易曰莫益之或擊之立心勿恒凶卦爻之辭其理有引伸莫盡者畧舉數爻如咸九四爻曰憧憧往來朋從爾思夫從止于朋是憧憧之過也而憧憧之病正由于思人好自用心計所以多思思不已而多慮實則旡所用吾思慮也試就天下曠觀一畨何用思何用慮哉極天下之境而合計之感應之理究歸本同而特其塗不得不殊感應之理極致惟一而特其慮不得不百其殊也自然而殊其百也自然而百彼既本有自然之理我何用思慮為乎彼四之所以憧憧其思者特于往來感應之際不能旡心耳孰知往來皆自然之理乎如日往則月自來月往則日自來日月相推而明生焉不待思也寒往則暑自來暑往則寒自來寒暑相推而嵗成焉不待思也推其故則凡往者皆屈也來者皆伸也有屈則必伸既伸則復屈屈伸相感而明生嵗成之利生焉總不待思也不特此也縱觀天下之物亦何在非屈伸相感自然之機乎如尺蠖之屈其屈本以求伸也伸之理自在屈不待思而尺蠖有然龍蛇之蟄其蟄本以存身也存之理自在蟄不待思而龍蛇有然又不特此即推之聖學亦然凡事理之宜謂之義而裁制曲當之妙有言不能擬思不能及者又至神也必也精研其義至于入神是乃收約心思以入義理屈之至耳然惟義精則應事裕如正所以推致其用也伸也既致用矣則用旡不如意而身之所適皆安伸之至耳然惟用利則理之得于心者日積日髙以崇徳也屈也夫精義不覺其已致用利用不覺其已崇徳皆屈伸相感自然之機不待思者也夫既内焉精義而外有以致乎用外焉利用而内有以崇乎徳内外只管如此交相養互相發則過此以往欲已而不能已幾非在我亦不自知其所至也至于交養互發之功熟而又熟則徳盛矣徳盛則此心之全體妙用與天地脗合旡間自有以窮其合一不測之神知其推行有漸之化是窮神知化惟俟其徳之盛也然不知者往而屈自致者來而伸是亦自然之理耳然則曠觀天下自造化物理以至聖學屈伸往來旡非自然有欲強之而不可者果何用思慮為哉如困六三爻曰困于石據于蒺藜入于其宫不見其妻凶葢天下事惟中正之人能量力以處苟此人非我所能困而我欲困之徒勞旡功適以形拙名必辱矣此人非我所可據而我欲據之託身非所身必危矣既辱且危死期將至妻其可得見耶甚矣不中正者之不可與涉世也如解上六爻曰公用射隼于髙墉之上獲之旡不利夫隼者鷙害之禽也弓矢者射隼之器也用此器以射之者人也人以用器而器以射禽君子之為天下解悖亦貴有其器而已君子有解悖之志必將解悖之具平素蓄備于身然後待可乘之時而動何不利之有何也器不素備則臨動必多結礙今也器既素具動之所施旡不如意動而不括此所以隨出而隨獲也上之所謂獲之旡不利者正謂其以已成之器而動者也欲解悖者可不先備器乎為國者宜知小人之情小人不恥于不仁不畏于不義故其所勸惟利不見利不勸所懲惟威不威不懲是以待小人必宜有以懲之當其初為惡即懲之則其後終不敢為惡小懲而大誡此小人之福也故易噬嗑初九曰屨校滅趾旡咎正此謂也善惡皆在于積善不積不足以成名惡不積不足以滅身小人以小善為旡益而弗為以小惡為旡傷而弗去不知日積日累此身遂全旡善而全是惡矣故惡積而不可掩使至于罪大而不可解若此求旡滅身得乎故噬嗑上九爻曰何校滅耳凶人主莫不欲安欲存欲治然以理求之則自見其危者乃所以安其位者也自見為亡者乃所以保其存者也自見為亂者乃所以有其治者也理本如此是故君子安而不忘危存而不忘亡治而不忘亂是以身安而國家可保以常存常治也故否九五爻曰其亡其亡繫于苞桑人之徳與才欲與事任相稱苟徳薄位尊智小謀大力小任重鮮不及于禍鼎九四爻曰鼎折足覆公餗其形渥凶言不勝任也事有幾㣲能知幾者其為神人乎凡人上交欲恭恭即易流于謟謟不謟之間所爭旡多謂之幾下交欲和和即易流于瀆瀆不瀆之間所爭旡多謂之幾觀君子上交自不至于謟下交自不至于瀆此非獨照于幾㣲之際不能也其知幾乎夫幾者何也幾者人心一念初動之㣲一念動于善即吉之兆一念動于惡即凶之兆是吉凶之先現者也幾之所繫若此其重彼謟不謟瀆不瀆之所從分者正在此固甚難知也惟君子見幾之吉則作而趨之見幾之凶則作而避之蚤見蚤決不俟終日非止不謟不瀆而已君子之知幾如此果何由哉豫六二爻曰介于石不終日貞吉葢人之神智清明由于旡欲而靜君子不溺于豫嗜好不足摇之介如石焉寧用終日斷可以識凡事之幾㣲矣試舉其知幾之實凡天下事或當藏而㣲或當顯而彰或當委順而柔或當勁直而剛其間是非彼此間不容髪君子以介石之衷能隨其時之所宜而悉知之則其髙識有以見衆人所不能見深心有以成衆人所不能成豈非萬夫之望乎信乎其如神矣惟聖人與道為一其次則近之若顔氏之子其殆幾于道乎葢道旡不善而近道者去不善以復于善顔子有不善未嘗不知知之未嘗復行夫知過易也知之未嘗復行則幾純于道矣故曰庶幾復初九爻曰不逺復旡祗悔元吉若顔子是已天下之理相與之意專而後能成功天地惟氣之相交絪緼莫解故萬物之氣化者其秉質皆醇厚而凝結也男女惟以其氣之精者相構故萬物之形化者化生不窮也是二者皆由于兩相與之專一故損六三爻曰三人行則損一人一人行則得其友言相與之貴于致專也君子有立心之恒焉必使身與理適安其身而後形于動作必使心與理和易其心而後出為語言必使上下相孚定其交而後求以賦歛君子修此三者故動而順語而從求而至能處于安全也若身不順理危以動則人孰從之理不足而怵于氣懼以語則人孰應之旡交于下而欲求其財則人孰與之至於莫與則傷之者且至矣故益上九爻曰莫益之或擊之立心勿恒凶凡此十一爻者皆有不盡之精義焉由此觸類通之他可知矣第六章子曰乾坤其易之門邪乾陽物也坤隂物也隂陽合徳而剛柔有體以體天地之撰以通神明之徳其稱名也雜而不越于稽其類其衰世之意邪夫易彰往而察來而㣲顯闡幽當名辨物正言斷辭則備矣其稱名也小其取類也大其㫖逺其辭文其言曲而中其事肆而隠因貳以濟民行以明失得之報易理變化至旡窮也然推所由來皆出于乾坤二畫乾坤其殆易所從出之門耶何也乾坤既有竒耦之形則皆物也然乾畫一而實是陽物也坤畫二而虚是隂物也一以象陽一以象隂二者判然不相與也使二者終于判然則易亦不作矣然此二者亦自不能終于判然于是隂陽相交互相摩盪而由二生四由四生八由八生六十四始有諸卦剛柔之體凡雷風山澤之屬天地所撰而出者卦皆有以體貼其象而著之凡健順動止之理徳之神而明者卦皆有以通㑹其義而發之葢一有乾坤二畫則其徳不得不合合徳則自有許多諸卦剛柔之體而體撰通徳遂旡不備焉豈非乾坤為易之門耶此伏羲先天之易也及文周繫辭其所稱之名義一卦有一卦之義一爻有一爻之義可謂雜矣然名義雖雜而實本隂陽之理故各有定體不至于差越于稽其事類則慮周于常變之殊計深于情偽之感此非太古淳質之時思慮所及也其衰世之意耶繫辭聖人身經衰世故不覺其慮之詳言之危也此文周後天之易也夫易有卦爻有繫辭于是易書之中旡所不備隂陽消息天地之已然者為往易有以彰之吉凶悔吝人事之未至者為來易有以察之而又不特此也人事之顯人不知其根于理數也易則推原于理數以㣲之義理之幽人皆日用而不知也易則就事為以闡發之人有稱名也易有貴賤賢否之别焉各當其名物有物類也易有剛柔善惡之象焉各辨其物卦爻有各具之義也易則正其言吉凶有一定之應也易則斷其辭夫如是則旡一之不備矣若此者其理之周宻旡遺非一端可盡其妙而要歸于開物成務而已易中所稱卦爻名義如牝馬牝牛棟橈遺音之類卦之稱名者小也如乘馬需泥負乘喪茀之類爻之稱名者小也或事名之小者或物名之小者稱名固小矣然其取類皆由隂陽之變是取類則大也易之㫖趣皆以言天地性命之奥是㫖之所含者逺矣意思深逺則詞或滯晦而不足以發明乃易辭則又條理疎暢有自然之文也易言委婉或各因一事而發有不皆直指全體者可謂曲矣然皆以適中乎理不以曲而有遺也其所以敷陳其事者推類備舉可謂肆矣然其所以然之理則皆本乎隂陽之故實極隠奥不以肆而涉粗也易辭之開示于人者其周至如此夫何為哉葢因民心疑貳欲有以濟乎民行故為此周至之詞以明失得之報如何為失失則其報凶如何為得得則其報吉顯然明之而民行可濟庶不患于疑貳而旡適從矣聖人之為人何如哉乾坤立而開濟物之始辭占繫而終濟物之功先後聖人相為表裏如此第七章易之興也其於中古乎作易者其有憂患乎是故履徳之基也謙徳之柄也復徳之本也恒徳之固也損徳之修也益徳之裕也困徳之辨也井徳之地也巽徳之制也履和而至謙尊而光復小而辨于物恒雜而不厭損先難而後易益長裕而不設困窮而通井居其所而遷巽稱而隠履以和行謙以制禮復以自知恒以一徳損以逺害益以興利困以寡怨井以辨義巽以行權易雖作于上古至夏商之末而中㣲其道之復興也葢于中古乎作易繫辭者其有憂患乎惟時至中古為世態日新之日而作易者又身經憂患操心危慮患深則其所以反身修徳者自旡不至是故易卦之中多教人以反身修徳之事約畧言之有九卦焉其序不可紊而功不可缺皆作易者示人之精意也夫人之修徳以力行實踐為先而所行之際先須習禮文循規矩以為實可憑據之地然後由此積累而上易有履焉上天下澤是為禮教乃徳之所以為基也習禮者又非徒習其文必一以卑遜為主持而不失乃可以得禮意易有謙焉是徳之所執以為柄者也有禮與謙以修飾執持于外矣制于外然後有以養其中由是心不外馳而善端可復有以為萬善之本易有復焉是徳之所以為本也既復矣必須存其善而不失易有恒焉是徳之所以能固也徳雖可久然人欲之私或未盡去本然之善或未盡充易有損焉徳之所以修去其累也易有益焉徳之所以充裕其美也人欲去天理純矣何以自騐其得力惟處患難而不以動心乃騐其學之有得易有困焉所以為徳之辨騐也至子處困不動則磪然有定而安于所止易有井焉旡喪旡得是乃徳之地也徳既堅定則由此可以制事易有巽焉巽順入理是乃徳之所以為裁制也至此則徳成矣葢聖賢之處憂患惟有修徳一事而聖賢之修徳亦因處憂患而愈勤其甘苦次第之詳誠有不外此九卦者此作易者所以有憂患而易因以興也今再觀九卦之所以為徳其盡善之美不可一端盡也因情制禮本非強世履固和矣然一皆天理之極至人不得而加損和而至非苟狥乎情而已卑以自牧謙若不尊光矣然美徳在中終不容冺人敬而仰之尊而光非終于晦沒而已善端甚㣲復若小矣然一念之善烱然非羣邪所能掩非羣私所能汚已辨于物矣惟恒也則雖處紛雜之地而吾徳有常始終如一不厭矣懲忿窒慾強勉自制損未嘗不先難然克治既久人欲漸輕用力漸省又後易矣遷善改過長其善心以至于充裕益固貴于長裕然涵泳從容養所固有非有事于造作又不設矣困身困而道亨則窮而未始不通也井徳有定體而自能有及物之澤則居其所而未嘗不遷也巽能稱物之宜而所以酌量事理者則沉潛善入而不涉于浮露是稱而未始不隠也九徳之善如此則用以處憂患焉往不宜動作之形于身者行也蕩越閑矩則戾而多爭故履之為道有儀則有度數順理而不乖所可用以和行也和行以禮而禮意在于自卑故謙之道卑讓撙節不欲上人而禮自我制可用以制禮也復則本心之明有不求助于外而自照者可用以自知恒則純其所復之善可用以一徳損則去其為身病者可用以逺害益則致其為身資者可用以興利困則處困而亨鮮有怨尤可用以寡怨井則心定識明事至自晰其定可用以辨義巽則沉入優游精于義理不必拘拘然循途守轍而自能適其輕重之宜可用以行權九卦之用如此合而觀之九卦之理原有合于修徳之目如基柄之類是矣再即九卦而究其藴則和至尊光之類各極其善是以用以處憂患而和行制禮之類旡一非修徳之實即旡一非處患之功中古聖人示人者何其至也第八章易之為書也不可逺為道也屢遷變動不居周流六虚上下旡常剛柔相易不可為典要唯變所適其出入以度外内使知懼又明于憂患與故旡有師保如臨父母初率其辭而揆其方既有典常苟非其人道不虚行易之為書也其卦爻象辭人當時時觀玩之不可須臾忘焉葢凡書之理苟其拘于一隅則事理未該雖逺之可也今易書之為道也則屢遷而不定矣何以見之易之所有九六兩畫而已是九六也至變至動不居于一所總此六爻之虚位九六周轉流行于其間故自其上下之位觀之或九上而六下或六上而九下上下旡常也自其剛柔之體觀之在此卦此爻為剛者在被卦此爻又為柔在此卦此爻為柔者在彼卦此爻又為剛剛柔相易也總之不可為一定之典要唯其變之所趨而已其道之屢遷如此但見變不同則吉凶亦不同變旡定則吉凶亦旡定信乎旡事不周旡理不載矣是宜隨其卦爻而觀象玩辭觀變玩占之不暇又可逺乎夫易旡非變變旡非道道之所在皆不易之理也故其示人以出入之事皆必以其事理當然之法度使人出而外入而内凜然知有度而不敢妄為皆知懼焉然所示之度兼吉與凶而言之耳聖人之情則又有不盡于此者凶咎悔吝危厲之途每多于吉利故易于憂患之處又諄諄明切示人且必言其所以致憂患之故葢即出入之度中而又明于憂患與故焉故人之用易者見其指示真切自然凜凜兢惕不待師保而常如父母臨之是易道之示人其于變適之理可謂詳切矣故人人考易之辭亦即可以識其道但能用其道者終不易耳如第以辭而已初焉率其辭以揆其理則其剛柔上下之變雖不可為典要而辭中所示出入之度憂患之故亦既有典常矣然是理之有定者必待人之觀玩神明方能得其理之所在以見于行事苟非其人則易道之有常者固亦不能自逹于事為之間也是易本至變而其因變以示人者又皆有典常之確理非深于觀玩者不能盡其用也而謂可逺乎第九章易之為書也要始原終以為質也六爻相雜唯其時物也其初難知其上易知本末也初辭擬之卒成之終若夫雜物撰徳辨是與非則非其中爻不備噫亦要存亡吉凶則居可知矣知者觀其彖辭則思過半矣二與四同功而異位其善不同二多譽四多懼近也柔之為道不利逺者其要旡咎其用柔中也三與五同功而異位三多凶五多功貴賤之等也其柔危其剛勝邪易之為書也有卦有爻卦何以成下而推原卦之所為始上而要歸卦之所為終自始至終有初有二有三有四有五有上而一卦之體于是乎成是乃卦之所以為體質也卦質具而爻在其中矣六爻之間初三五陽位也陽居之隂亦居之二四上隂位也隂居之陽亦居之其相雜如此者葢隂陽二物時往時來初旡定在唯其時物之所趨而已是以若此其雜也始終具而一卦之體成時物雜而六爻之義變易之為書盡此矣今以爻之時物觀之其初爻之義難知上爻之義易知何也初為卦之始本也卦質方起義類未明故難知上為卦之終末也卦質已全義類已備故易知惟難知故聖人于繫初爻之時必加擬議焉惟易知故聖人于繫上爻之時不過就其義之將備而成之終耳此初上之時物然也若夫雜舉事物之繁詳撰事物之理辨别爻之是與非則非中四爻不能備此中爻之時物然也噫辭之備如此此特為常人設耳實則天地間自有箇吉凶存亡之理苟能一其心思以要求其天道存亡人事吉凶之理則居然可知不待求之于易矣如必求于易在智者但觀其彖辭則一卦之指歸已明而時物之所以當否以為存亡吉凶者已十得六七思過半矣葢六爻時物即具卦質之中學者固當究爻辭以析其詳尤先當玩彖辭以悟其要也雖然前言中爻之時物固以雜物撰徳辨是與非矣而其中尤有材同而用異者不可不辨二與四皆隂是其功能固同也而位則異故其爻之善不同二則多譽四則多懼者以四近君而多危也四以近而懼則二以逺而譽可知然柔之為道貴于資剛之力是本不利于逺剛也而二之逺剛要歸可以旡咎葢二雖柔而得中有是中徳雖不必借力于剛而自能无咎矣二以中无咎則四以不中多咎可知葢四以近君而得君之力但未免于懼善之中有未善也二逺君則无懼而又有柔中之徳不患于逺善之中又有善也是二四之位皆善而善不同也三與五皆陽是其功能固同也而位則異三多凶五多功葢五君也貴也三臣也賤也貴則可以為所欲為故多功賤則欲有所為而上嫌于逼下又嫌于陵故多凶也要之三五皆髙位重任之地以柔處之則身危不惟三多凶而五亦不盡多功矣以剛處之則任勝不惟五多功而三亦不盡多凶矣是三五之異中有同者又如此凡此皆中爻同異之義也合之而卦有統體析之則爻各有殊易之為書可不詳為觀玩耶第十章易之為書也廣大悉備有天道焉有人道焉有地道焉兼三才而兩之故六六者非他也三才之道也道有變動故曰爻爻有等故曰物物相雜故曰文文不當故吉凶生焉易之為書也統言之可謂廣大析言之可謂悉備矣何以見之據三畫卦而言上一畫象天中一畫象人下一畫象地有天道焉有人道焉有地道焉是已具三才之義矣乃聖人又因八卦而重為六十四卦則兼此三才而各加一倍焉是兩之也兩之故有六畫六畫者非他亦仍此三才之道耳葢上二爻為天則隂陽成象而天道全中二爻為人則仁義成徳而人道全下二爻為地則剛柔成質而地道全是道之在宇内者舉不出此矣不亦廣大而悉備乎夫六爻具三才是皆道所在也然統謂之道而道非一義其中有至變動而不可執一者一畫有一畫之義是乃交變以示人者故畫而謂之曰爻爻則有逺近貴賤之差等是乃物類不齊之象故又謂之曰物其物之剛柔相間而成章不純乎一色故又謂之曰文葢同此爻也自其等而見為物自其雜而見為文則剛柔交錯不必皆當有剛爻居柔位柔爻居剛位為不當者亦有剛爻居剛位柔爻居柔位為不當者或不當而得或不當而失是以吉凶生焉總之六畫以象三才有三才自然有物有文有吉凶有六畫亦自然有物有文有吉凶三才之道悉具于易信乎其為廣大悉備矣第十一章易之興也其當殷之末世周之盛徳邪當文王與紂之事邪是故其辭危危者使平易者使傾其道甚大百物不廢懼以終始其要无咎此之謂易之道也易之興也其當殷衰周盛之際耶其當文王與紂之事耶葢聖人而不生末世與處末世而非聖人俱未能盡事之變而為天下法惟以文王遇紂是為以周之盛徳而處殷之末世此其閲厯深憂慮逺矣是故其所繫之辭皆憂危警戒之意焉辭危何如人之臨事而懼者謂之危危則能審處事理不敢妄為宜其有平福也易則于卦之危若而繫以亨吉之辭使之平焉人之率意妄行者謂之易易者宜有顛覆之患也易則于卦之易者而繫以凶悔之辭使之傾焉是易辭之傾者其意固危即詞之平者其意亦危也此其危平易傾之道所該甚大百事皆不能廢此理故文王以此諄諄示人惟使之儆懼于心无分終始而要歸于无咎所謂易之道者惟此而已夫惟易之詞主于危故能該舉百物而引人于寡過之地亦惟文王處末世遭憂患而後其詞皆主于危此易之復興所以必于文王之世也第十二章夫乾天下之至健也徳行恒易以知險夫坤天下之至順也徳行恒簡以知阻能説諸心能研諸慮定天下之吉凶成天下之亹亹者是故變化云為吉事有祥象事知器占事知來天地設位聖人成能人謀鬼謀百姓與能八卦以象告爻彖以情言剛柔雜居而吉凶可見矣變動以利言吉凶以情遷是故愛惡相攻而吉凶生逺近相取而悔吝生情偽相感而利害生凡易之情近而不相得則凶或害之悔且吝將叛者其辭慙中心疑者其辭枝吉人之辭寡躁人之辭多誣善之人其辭游失其守者其辭屈易作于聖人而聖人之心何如聖心莫非易理而自其有得于陽道之純者為乾有得于隂道之純者為坤夫乾无欲之剛不息之毅天下之健莫加焉惟其性情至健則以此存之為徳見之為行者舉之有必勝行之有必至天下更无難為之事是恒易也夫恒易則疑其以易心待天下事恃健而冒入于患者有之然聖人雖易而不自恃其易遇憂患之來則其剛明之衷臨于事上自有以洞知其險而不輕入是能明天下之險者无如聖人矣夫坤循理守常无所強作天下之順莫加焉惟性情至順則其徳行皆行所无事而不用煩擾是恒簡也夫恒簡則安詳平等雖值憂患只如常處之可矣然聖人既簡而且益致其慎謹約之心退于事下自有以知其阻而不妄動是能明天下之阻者又无如聖人矣夫乾坤聖人其所以知險知阻者何也葢乾坤聖人當无事時于事物之理融徹于心極其歡洽能説諸心矣及臨事時又即所知之理而研審之不使有差能研諸慮矣説諸心則見理明決凡險阻與否舉天下吉凶之故皆先定于胸中而无少疑研諸慮則趨避審定凡險阻之當止不險阻之當行皆有以成其亹亹之情而无少怠然則乾坤聖人乃能説諸心能研諸慮以定天下之吉凶成天下之亹亹者宜其知險知阻也是故險阻之故總皆天下自然之理而必聖人乃有以知之在造化有隂陽之變化焉在人事有言動之云為焉此皆理之所在也且變化云為之中有吉事將至而休祥先呈者此又理之可先見者也聖人則皆有以知其理焉彼變化云為有一定之理者器也聖人就其變化云為之事而擬象之即有以知其器之所在彼吉事有祥凡吉凶之兆于未至者來也聖人就其吉事有祥之事而占度之即有以知其來之所成所謂悦心而定吉凶研慮而成亹亹者此也聖人固不卜筮而知吉凶矣然此聖人之所能百姓不得而能也聖人其能忍乎故天地設位以來凡乾坤險阻變化云為吉事有祥之理燦然悉具于髙卑之間但天地雖有是能而不能告人其能有未全者聖人則作為易書代天地以告人遂成全天地之能焉由是人有所事謀之人而未決者復抱蓍問易以謀之鬼神則百姓之愚亦能以易知器知來定吉凶成亹亹而不陷于險阻皆可與乎聖人之能矣試舉聖人作易成能之事則先天之畫後天之辭蓍䇿之變是也因重摩盪而有六十四卦則雖无言而已有隂陽純雜之象以告人是先天之畫也文周繫詞而有爻彖則皆以卦爻之情言之是後天之辭也是其所告所言者何也葢卦畫之間剛柔雜居由是時有消息位有當否而吉凶可見矣先天所告後天所言胥此而已有象辭因有蓍䇿以蓍䇿求卦方其隂陽老少變動未定之時雖未成卦爻而所以成文定象示人趨避之利者已在于此是即以利言也及變動已定而吉凶占決之詞出其詞之吉凶則隨卦爻所向而發其情无定吉凶亦无定是以情遷也惟吉凶以情遷是故約言之有數等焉爻有以愛心相求者而吉生有以惡心相求者而凶生吉凶以愛惡遷也爻有位逺而相取者病于太疎而悔吝生有位近而相取者嫌于妄合而悔吝生悔吝以逺近遷也爻有以情相感者徳義交孚兩受其利有以偽相感者私邪相從兩歸于害利害以情偽遷也大抵凡易之情近相得者為貴逺不相得亦无妨惟此爻之近而相惡不相得者則或凶或害或悔吝有不能免矣由此推之則比爻之相得者其為吉利无悔吝可知也再以逺之應爻生爻推之其相得不相得之應亦如此而已豈非凡易之情盡于此乎吉凶之以情遷者如此葢詞隨情異有莫知其然而然者不特易辭為然而凡人之辭皆然也如人將欲背畔正理者其詞必慙中心疑者所見不磪其辭必多枝葉而不爽切吉人心存自无多言其辭寡躁人心放任口所出其辭多善人本不可毁而強誣之无可憑據其辭則浮遊而不實本有所守而忽失之无以自伸其辭則退屈而不達凡此皆辭之以情異者也卦爻辭以情遷何以異是然則聖人體乾坤之徳既自能知險知阻矣而又作易告人極情之不同為辭之至變使人亦有以知險知阻焉其為百姓之功何如哉說卦傳第一章昔者聖人之作易也幽贊於神明而生􅆱參天兩地而倚數觀變于隂陽而立卦發揮於剛柔而生爻和順於道徳而理於義窮理盡性以至於命昔者伏羲聖人之作易也其用在􅆱有􅆱則有數有數則有卦有爻而􅆱由何生惟聖道大行天下和平黙有以贊乎天地之化由是和氣充塞蒸為神物而生􅆱焉是􅆱也可為求卦之用而揲蓍求卦七八九六之數又何倚而起葢天體圓地體方圓者一而圍三三各一竒聖人知天之本三也因參乎天而為三方者一而圍四四合二耦聖人知地之本二也因兩乎地而為二三二之數既立于是蓍䇿七八九六之數倚此而起矣三三為九三二為六是二老之數乃參兩之積也兩二一三為七兩三一二為八是二少之數乃參兩之交也是數皆倚參兩以起而已矣有是數則用以求卦爻于十八變之後統而觀之觀其幾畫隂幾畫陽是為何卦而卦于是立矣又就其中逐一而發揮之推詳其某爻剛某爻柔某爻太剛少剛某爻太柔少柔而爻于是生矣夫生蓍起數卦立爻生則聖人作易之事備矣是易也凡進退存亡之道健順中正之徳盈天地間所有之理一一皆依其形容摸寫而出无一少乖无一少逆是易和順乎道徳也而其中條理曲折因時合宜之義又皆有以區分縷晰之而不使至于淆亂是又理于義也但見萬事之變萬物之宜凡理所在易皆窮極其所以然而无少遺大而人倫小而一物凡人物之性所宜然者易皆見之无不明處之无不當而極其盡理也性也皆天道之精㣲人意不得而加者也易則窮之盡之以合于天命之自然而无少歉焉是又至于命也易之包括如此聖人作易豈偶然哉第二章昔者聖人之作易也將以順性命之理是以立天之道曰隂與陽立地之道曰柔與剛立人之道曰仁與義兼三才而兩之故易六畫而成卦分隂分陽迭用柔剛故易六位而成章昔者伏羲聖人之作易也非徒備卦爻而已實有見于性命之理將依其理之形似而順以發揮之也何也凡物所依以立者性命也天下之物不過三才性命之理即此立三才之道試觀立天之道曰隂與陽氣不容偏一也立地之道曰柔與剛質不容偏一也立人之道曰仁與義徳不容偏一也是隂陽柔剛仁義之並列相濟者乃天地人性命之理固然也作易聖人見性命之理必有兩也故始為三畫已象三才然必兼舉三才之畫而兩之以示三才所立未有不由兩而成者故易有六畫而後成卦也然此總言之耳細分之則六畫之中分初三五為陽二四上為陰陰陽均分无少偏倚則初剛二柔三剛四柔五剛上柔而迭用柔剛矣故易之六位自以剛柔相間而成文章焉夫統觀六畫則三才皆兩析觀六位則剛柔互用五為天之陽上即天之陰初為地之剛二即地之柔三為人之仁四即人之義无非性命並列相濟之理也故易以順性命之理而已第三章天地定位山澤通氣雷風相薄水火不相射八卦相錯數往者順知來者逆是故易逆數也伏羲始作八卦其生出之次第乾一兌二離三震四巽五坎六艮七坤八既為之横圖矣又規而員之何也嘗以員圖之位考之乾象天坤象地也今乾南坤北是天與地相對而兩儀之位定也艮象山兑象澤也今艮西北兑東南是山與澤相對而其氣通以相資也震象雷巽象風也今震東北巽西南是雷與風相對其勢相迫以為用也坎象水離象火也今離東坎西是水與火相對而各居其所不相射犯也八卦既立于是交錯而為六十四則天地山澤雷風水火交互變化之用有不可勝窮葢有天必有地有山必有澤有雷必有風有水必有火此乃造化不言之秘不可以一端缺一時缺者皆具于八卦而其對待之體相資之用尤必于員圖乃足以見之甚矣員圖之精也若其數之又何如乎圖雖渾員不斷然數之必起于中央之左由一陽之震厯二陽之離兌以至于三陽之乾繼以一隂之巽厯二隂之坎艮以至三隂之坤夫其由震而厯離兌以至乾也此其數之皆計其已生之卦猶自今而追昨是數往也循其已然順也其由巽而厯坎艮以至于坤也此其數之皆推其未生之卦猶自今而推明是知來也探其未然逆也然以横圖本生之序考之則必有乾而後由兌離以至震有巽而後由坎艮以至坤總皆逆推其未生同為逆數耳是故易之本來固逆數也彼員圖之一順一逆者即此横圖之中分而規之者耳人不可不究員圖之藴亦不可不究横圖之本也第四章雷以動之風以散之雨以潤之日以晅之艮以止之兌以説之乾以君之坤以藏之圖皆從中起天地定位以下員圖從中起也今以方圖考之震巽居中者也震為雷巽為風其一以鼓動萬物之生機一以散舒萬物之鬱滯乎巽之次為坎震之次為離坎為雨離為日其一以潤萬物使之滋長一以晅萬物使之發榮乎坎之次為艮離之次為兌艮徳止兌徳説其一以止萬物使之生意歛足一以説萬物使之生意欣暢乎若次于兌而位極乎西北者乾也次于艮而位極乎東南者坤也乾道无所不統雷風雨日止説皆統于乾坤道无所不蓄雷風雨日止説皆蓄于坤其一以君萬物一以藏萬物乎葢始而動散者生物之功繼而潤晅者長物之功又繼而止説者成物之功統之以君藏而造化之用盡此矣而方圖之次序合焉且動散相對潤晅相對止説相對君藏相對皆造化必不可缺之用而方圖之對待亦合焉甚矣方圖之精也第五章帝出乎震齊乎巽相見乎離致役乎坤説言乎兌戰乎乾勞乎坎成言乎艮萬物出乎震震東方也齊乎巽巽東南也齊也者言萬物之潔齊也離也者明也萬物皆相見南方之卦也聖人南面而聴天下嚮明而治葢取諸此也坤也者地也萬物皆致養焉故曰致役乎坤兌正秋也萬物之所説也故曰説言乎兑戰乎乾乾西北之卦也言陰陽相薄也坎者水也正北方之卦也勞卦也萬物之所歸也故曰勞乎坎艮東北之卦也萬物之所成終而所成始也故曰成言乎艮伏羲既有八卦員圖矣文王復更置其位是為後天之圖今取其圖而考之則造化流行之序實備于此夫天之氣機欲出則出欲入則入主宰萬化者是帝也一嵗之中帝始而出繼而齊而相見而致役而説而戰而勞而成則嵗功終而來嵗復始今按其流行方位則皆在此圖之内葢帝出乎震齊乎巽相見乎離致役乎坤説言乎兌戰乎乾勞乎坎成言乎艮何以見之帝之出入不可見于萬物出入見之萬物出乎震葢震位東方也于時則為春正萬物發生之候也齊乎巽葢巽位東南也于時為春夏之交齊也者言此時萬物之出者皆鮮潔而整齊也次巽者離離也者明盛之象也正夏之時萬物形色煥然无不相見葢離位南方時當正夏是以萬物相見如此之明也惟南方至明是以聖人必南面而聴天下嚮乎明以為治葢亦取乎南方之離而已次離者坤坤位西南于時為夏秋之交土氣正旺萬物之生長者皆賴此時之土氣為之充養舉萬物之多皆坤為之致効其養是坤為物役也故曰致役乎坤次坤者兌兌位西方時為正秋物至此時生意暢足萬物之所由說也故曰説言乎兌戰乎乾者乾乃西北之卦也時為秋冬之交謂之戰者隂盛而與陽爭二氣若相迫相鬭然故曰戰也次乾者坎坎者水也水居北坎即正北方之卦也時為正冬是慰勞萬物之卦也葢萬物至此而休息歸藏是其所歸宿之地此慰勞其生意者故曰勞乎坎次坎者艮艮位東北之卦也時為冬春之交今嵗之生意于此終來嵗之生意又于此始乃萬物之所以成終而成始也故曰成言乎艮觀萬物之出入可以騐帝之出入而其出入之序悉于圖中見之此後天員圖之精也第六章神也者妙萬物而為言者也動萬物者莫疾乎雷撓萬物者莫疾乎風燥萬物者莫熯乎火説萬物者莫說乎澤潤萬物者莫潤乎水終萬物始萬物者莫盛乎艮故水火相逮雷風不相悖山澤通氣然後能變化既成萬物也天地之功用謂之神者物有形神无迹盈天地皆物而其中有運量是物者使之隨其鼓舞而不解所以然妙乎萬物所以謂之神也葢運物而滯于物者不足為妙不滯于物而遂遺乎物者亦不足為妙惟不滯物亦不遺物是為妙乎物所以為造化之神也試看後天員圖東方之震雷也東南之巽風也南方之離日火也西方之兌土中之潤澤也北方之坎雨露之水也東北之艮冬春終始之際也此六者動則物无不動撓則物无不撓燥則物无不燥說則物无不説潤則物无不潤終始則物无不終始舉萬物而惟所變化莫得而測其端倪者豈非神乎然此後天之用固神矣向非有先天對待之體則流行之用何自而生故必有先天圖位坎離則水火相濟震巽則雷風不相悖艮兌則山澤通氣然後有動撓燥説潤終始之變化以盡成萬物是後天功用之神原不出先天對待之體也雖取兩圖而一之可也第七章乾健也坤順也震動也巽入也坎陷也離麗也艮止也兌説也總此隂陽純之而為健順間錯相乘而有動有入有陷有麗有止有説此八卦之性情也第八章乾為馬坤為牛震為龍巽為雞坎為豕離為雉艮為狗兌為羊有八卦之性情則外觀物類无不有合者葢世間實有此幾種性情亦自然有此幾種物類乾健能行象馬坤順任重象牛震陽動象龍巽隂伏象雞坎外隂内躁象豕離外文内弱象雉艮外剛止物而内柔媚象狗兌外柔悦而内剛狠象羊以八卦逺取諸物如此第九章乾為首坤為腹震為足巽為股坎為耳離為目艮為手兌為口有八卦之性情則内觀一身亦无不有合者葢世間不過此幾種性情則人身亦不過此幾種形體乾陽而尊象首坤隂能容象腹震動于下象足巽隂耦居下象股坎陽在内象耳離隂麗陽中象目艮剛在前止物象手兌隂開于上象口以八卦近取諸身如此第十章乾天也故稱乎父坤地也故稱乎母震一索而得男故謂之長男巽一索而得女故謂之長女坎再索而得男故謂之中男離再索而得女故謂之中女艮三索而得男故謂之少男兌三索而得女故謂之少女以八卦而擬諸人倫有父母長男長女中男中女少男少女之稱焉果何謂乎葢乾象天也物所資始有父道焉故稱乎父坤象地也物所資生有母道焉故稱乎母乾為父而凡得乾之道者震坎艮皆男也坤為母而凡得坤之道者巽離兌皆女也但所得有先後焉震坎艮本坤體而求乎乾巽離兌本乾體而求乎坤自卦畫推詳之震自坤初求乾而得乾之初畫故謂之長男巽自乾初求坤而得坤之初畫故謂之長女坎再求乾而得乾之中畫故謂之中男離再求坤而得坤之中畫故謂之中女艮三求乾而得乾之三畫故謂之少男兌三求坤而得坤之三畫故謂之少女乾坤以統六子而六子自分男女男女各分為次第有天然之倫理焉八卦之取諸人倫又如此第十一章乾為天為圜為君為父為玉為金為寒為冰為大赤為良馬為老馬為瘠馬為駁馬為木果坤為地為母為布為釡為吝嗇為均為子母牛為大輿為文為衆為柄其於地也為黒震為雷為龍為𤣥黄為旉為大塗為長子為決躁為蒼筤竹為萑葦其于馬也為善鳴為馵足為作足為的顙其於稼也為反生其究為健為蕃鮮巽為木為風為長女為繩直為工為白為長為髙為進退為不果為臭其於人也為寡髪為廣顙為多白眼為近利市三倍其究為躁卦坎為水為溝瀆為隠伏為矯輮為弓輪其於人也為加憂為心病為耳痛為血卦為赤其於馬也為美眷為亟心為下首為薄蹄為曵其於輿也為多眚為通為月為盗其於木也為堅多心離為火為日為電為中女為甲胄為戈兵其於人也為大腹為乾卦為鱉為蟹為蠃為蚌為龜其於木也為科上稿艮為山為徑路為小石為門闕為果蓏為閽寺為指為狗為䑕為黔喙之屬其於木也為堅多節兌為澤為少女為巫為口舌為毁折為附決其於地也為剛鹵為妾為羊舉天地内无非隂陽无非八卦之理故即八卦之象而廣之有可類舉乾之純陽至健則天也性動體圓則圜也尊而統物則君也萬物資始則父也純粹則玉堅剛則金也位西北秋冬之交則寒也氷也位南盛陽則大赤也健行象馬以其純陽至粹則良馬也老陽最久則老馬也无柔至堅則筯骨強峻之瘠馬純剛至猛則鋸牙食虎之駁馬也圓而在上則木果也而乾象亦不盡此也坤之純隂至順則地也萬物資生則母也質柔廣平則布體虚容物則釡也靜翕不施則吝嗇動闢而廣則均也性至順則子母牛也廣厚載物則大輿也畫耦則文畫多則衆也持載萬物則柄也純隂色黒于為地之中則又土色之黒也而坤象亦不盡此也震之陽奮隂下則雷也以動身藏重隂之下則龍也天地始交則𤣥黄也陽氣敷施則旉也陽動而耦開前无碍塞則大塗也一索得男則長子也陽進決隂其動也躁則決躁也東方青色則蒼青其筤之竹也下實上虛則萑葦也其于馬也以其陽聲在内耦開外達則善鳴以其動于下則懸一足之馵足以其陽在下則超騰之作足以其隂在上則的白其顙也其于稼也剛動于下而向上則稼之根下著地而芽反上向也其究歸則二耦俱變而為乾健也究至陽盛則草木之始生者今遂蕃鮮也而震象亦不盡此也巽之陽升隂伏則木也柔而善入則風也一索得女則長女也巽徳之制則繩直也工也少隂西方之色則白也風行横逺則長也木性竪升則髙也巽懦多疑則進退也不果也隂伏氣鬱則臭也其于人也以其陽盛于上則隂血不升而寡髪以其陽體上盛則廣顙目中白者陽黒者隂以其上中白而黒在下白多于黒不若離目上下白而黒居中白黒勻停則多白眼也又巽性近利得利之多至于市三倍也其究也三畫皆變而為決躁之卦也而巽象亦不盡此也坎之内明能陷則水也流而不盈則溝瀆也陽匿隂中則隠伏也陽在隂中抑而能制則矯輮也弓輪也其于人也陽困隂中為加憂虚體被塞為心病耳痛也火為氣水為血則為血卦也得乾中畫則赤也其于馬也陽在中為美眷為亟心上畫柔為下首下畫柔為薄蹄為曵也其于輿也隂陷為多𤯝也水流不盈為通也水之精為月也陽匿為盗也其于木也陽在中為堅多心也而坎象亦不盡此也離之至明則火也日也電也再索得女為中女也二剛外堅則甲胄火性上鋭則戈兵也其于人也中虛為大腹也火熯燥為乾卦也内靜為鱉外燥為蟹善麗為蠃中虚為蚌文明為龜又皆取其内柔外剛也其于木也中虚則上枯為科上槁也而離象亦不盡此也艮之隆起地上而止而不進則山也一陽艮于二隂之上則徑路也小而剛則小石也上連亘下雙峙則門闕也剛在上小而實則木之果草之蓏也能止物則閽寺也指也狗也前剛則䑕也黔喙之屬也葢黔黒也鳥喙多黒而能啄剛在前也其于木也陽在外為堅多節也而艮象亦不盡是也兌之塞坎下流而能説物則澤也三索得女則少女也以口説人為巫也口舌也正秋肅殺為毁折也柔附二剛終為剛決為附決也其于地也上柔下剛為下堅剛而上鹵濕也隂而少賤為妾也内狠外説為羊也而兌象亦不盡此也凡此者觸類而通之則舉天下之性情舉天下之事物皆不出八卦中矣序卦傳上篇有天地然後萬物生焉盈天地之間者唯萬物故受之以屯屯者盈也屯者物之始生也物生必蒙故受之以蒙蒙者蒙也物之穉也物穉不可不養也故受之以需需者飲食之道也飲食必有訟故受之以訟訟必有衆起故受之以師師者衆也衆必有所比故受之以比比者比也比必有所畜故受之以小畜物畜然後有禮故受之以履履而泰然後安故受之以泰泰者通也物不可以終通故受之以否物不可以終否故受之以同人與人同者物必歸焉故受之以大有有大者不可以盈故受之以謙有大而能謙必豫故受之以豫豫必有隨故受之以隨以喜隨人者必有事故受之以蠱蠱者事也有事而後可大故受之以臨臨者大也物大然後可觀故受之以觀可觀而後有所合故受之以噬嗑嗑者合也物不可以苟合而已故受之以賁賁者飾也致飾然後亨則盡矣故受之以剥剥者剥也物不可以終盡剥窮上反下故受之以復復則不妄矣故受之以无妄有无妄然後可畜故受之以大畜物畜然後可養故受之以頤頤者養也不養則不可動故受之以大過物不可以終過故受之以坎坎者陷也陷必有所麗故受之以離離者麗也伏羲畫卦始乾終坤本有自然之序及連山首艮歸藏首坤易序各殊矣文王始為之次其先後始于乾坤終于既濟未濟次序相承未嘗无義焉上經何以首乾坤也有天地然後萬物生焉故必自乾坤始也萬物既生則動者植者盈天地之間皆萬物故受之以屯葢屯乃盈塞之義也然屯者物之始生物始生必蒙昧无知故受之以蒙蒙者蒙昧也物之穉幼也穉則需養故受之以需需者物所必資物生而資飲食是需乃飲食之道也一言飲食則人人所需勢必爭取故受之以訟訟猶其爭之小者訟之不已遂有合衆戰鬬之事有衆起故受之以師師者衆也人既衆豈能无所統勢必親比一人以為主故受之以比比者親比也人既親比于我則必相畜聚故受之以小畜人既相畜聚然後上下别焉等殺生焉自然有禮故受之以履至于以禮相處然後彼此各得其分而安則王道成治平奏矣故受之以泰泰者通也治亂循環物不能終于通故受之以否物亦不能終于否故受之以同人與人同好惡則人之求所欲避所患者孰不歸之在上在下其理皆然故受之以大有所有者大不可以自滿滿則招損故受之以謙有大而能謙則可保所有以樂故受之以豫人心和豫未有不樂相隨者故受之以隨夫以喜説而隨人者非无故而徒然隨之也必有所當為之事故受之以蠱蠱者物壊而有事也勵精圖新有事而後可有盛大之業故受之以臨臨者以上臨下大者之道也物大然後可為羣小之所觀仰故受之以觀在我有可觀仰而後人之合從者衆故受之以噬嗑嗑者合也物而苟合則苟且徑行狎不可乆是貴有以文之故受之以賁賁者飾也然物可飾不可致致飾然後亨盡而反不亨故受之以剥剥者剥落也物不可以終盡故剥窮極于上則復于下故受之以復復于道則合正理而不妄矣故受之以无妄有无妄之實然後可畜聚以充其物故受之以大畜物畜聚然後可優游涵養以成其物故受之以頤頤者養也物必養而後能盛盛而後能動故受之以大過物无終過之理過而不已必陷故受之以坎坎者陷也陷于此中即附麗于此中矣故受之以離離者附麗也上經三十卦之序一皆物理相因自然之次第也下篇有天地然後有萬物有萬物然後有男女有男女然後有夫婦有夫婦然後有父子有父子然後有君臣有君臣然後有上下有上下然後禮義有所錯夫婦之道不可以不乆也故受之以恒恒者乆也物不可以久居其所故受之以遯遯者退也物不可以終遯故受之以大壯物不可以終壯故受之以晉晉者進也進必有所傷故受之以明夷夷者傷也傷於外者必反其家故受之以家人家道窮必乖故受之以睽暌者乖也乖必有難故受之以蹇蹇者難也物不可以終難故受之以解解者緩也緩必有所失故受之以損損而不已必益故受之以益益而不已必決故受之以夬夬者決也決必有所遇故受之以姤姤者遇也物相遇而後聚故受之以萃萃者聚也聚而上者謂之升故受之以升升而不已必困故受之以困困乎上者必反下故受之以井井道不可不革故受之以革革物者莫若鼎故受之以鼎主器者莫若長子故受之以震震者動也物不可以終動止之故受之以艮艮者止也物不可以終止故受之以漸漸者進也進必有所歸故受之以歸妹得其所歸者必大故受之以豐豐者大也窮大者必失其居故受之以旅旅而无所容故受之以巽巽者入也入而後説之故受之以兌兌者説也説而後散之故受之以渙渙者離也物不可以終離故受之以節節而信之故受之以中孚有其信者必行之故受之以小過有過物者必濟故受之以既濟物不可窮也故受之以未濟終焉下經何以首咸也咸者夫婦之道夫婦之道甚大葢自有天地然後有萬物有萬物然後有男女人有男女然後有夫婦有夫婦然後有父子有父子則人類廣而尊卑分焉然後有君臣有君臣則自天子至庶人在在有上下之别然後有上下有上下則儀節必謹車服必别行之有禮處之有義然後禮義有所施措焉是天地萬物男女者夫婦之所由父子君臣上下禮義者夫婦之所致夫婦所關如此之大此下經所以首咸也夫婦之道終身不變不可不乆者也故受之以恒恒乆也然物理久居是位者則宜退不可乆居其所故受之以遯遯退也物又不可以終退故受之以大壯物既壯不可以終于壯而已壯則務進故受之以晉晉進也進不已必受傷故受之以明夷夷傷也傷于外者必反于家以就安故受之以家人家人本親然盛極而衰家道窮必至于乖隔故受之以暌睽乖也乖則必至相戕而難起故受之以蹇蹇難也物不可以終難故受之以解然解者緩縱怠弛之義也緩怠則必有所失故受之以損物理循環損而不已必益故受之以益益而不已必有滿溢潰決之患故受之以夬夬決也勇決而前必有所遇故受之以姤姤遇也物相㑹遇則聚而成羣故受之以萃萃聚也天下之物聚于下必進于上是謂之升故受之以升升而不已必困故受之以困困乎上者前既不遂必反而退却于下故受之以井井道常道也常道久不能无弊不可不變革故受之以革革物者莫若鼎變腥為熟易堅為柔皆鼎用也故受之以鼎鼎者宗廟之重器主器者不可以庻次僭淆莫若長子故受之以震震動也物不可以終動動極則必止之故受之以艮艮止也物又不可以終止故受之以漸漸進也以漸而進將求其所欲至也進則必有所歸宿之地故受之以歸妹凡物而得其所歸則造乎究極之地不以中道自廢勢將可大故受之以豐豐大也窮極其大者必失其居故受之以旅覊旅寡親无所取容非巽順以求諧于人不可故受之以巽巽入也情相入而後説故受之以兌兌説也凡物之情憂則結鬱説則舒散故受之以渙渙離散也物不可以聴其終于離散當節止之故受之以節立為節制則上宜信而守之下宜信而遵之故受之以中孚然人而以信自負有其信者必果于行而无所慮能无稍過乎故受之以小過有過物之才者必能濟天下之事故受之以既濟物既濟矣使終于濟而已是窮極不變无循環不已之理也物不可窮也故受之以未濟終焉則卦雖終而循環之理尚未終也下經三十四卦之序一皆物理相因自然之次第也合六十四卦之序觀之是流行之易也雜卦傳乾剛坤柔比樂師憂臨觀之義或與或求屯見而不失其居蒙雜而著震起也艮止也損益盛衰之始也大畜時也无妄災也萃聚而升不來也謙輕而豫怠也噬嗑食也賁无色也兌見而巽伏也隨无故也蠱則飭也剥爛也復反也晉晝也明夷誅也井通而困相遇也咸速也恒乆也渙離也節止也解緩也蹇難也暌外也家人内也否泰反其類也大壯則止遯則退也大有衆也同人親也革去故也鼎取新也小過過也中孚信也豐多故親寡旅也離上而坎下也小畜寡也履不處也需不進也訟不親也大過顛也姤遇也柔遇剛也漸女歸待男行也頤養正也既濟定也歸妹女之終也未濟男之窮也夬決也剛決柔也君子道長小人道憂也六十四卦每兩卦自相反對卦畫相反則義亦相反錯舉而對觀之可以見變易之理如乾坤二卦一體剛一體柔卦相反對義相反對也比順從而樂師行險而憂也臨觀之義則或以我臨物而為與或以物觀我而為求也屯之震動能現而遇坎而止不冒進以失其故居蒙之坎險雜昧而艮體光明終有顯著之望是一則進而不遂其進一則昧而不終于昧也震起也艮止也損益一則損下益上雖未衰而已為衰之始一則損上益下雖未盛而已為盛之始也大畜无妄一則止健者時有適然一則守正者災有偶至也萃升一則聚而不散一則往而不來也謙豫一則自視輕一則自處怠也噬嗑賁一則飲食之道一則无色而生色一食一色也兌巽一則隂外現而為悦一則隂内伏而為入也隨蠱一則以順從无故而偷安一則以壊後整飭而自勵也剥復一則壊爛一則復反也晉明夷一則當明晝之時一則值傷夷之際也井困一則往來井井而通行一則以剛遇柔而掩抑也咸恒一則感通甚速之機一則恒乆不已之道也渙節一則散離而不居一則限止而不溢也解緩也蹇難也睽家人一則疎而外一則親而内也否泰則其類正相反也大壯遯一則慮陽恃壯而欲陽之知止一則慮隂浸長而欲隂之自退也大有同人一則以上統下之詞六五柔中居尊而得乎衆謂之大見人无不歸勢至衆一則平交相得之辭六二柔中得正以同乎人謂之同見心无不合情至親也革鼎一則去故一則取新也小過中孚一則有過一則信實而无過也豐旅一則明動而事故多一則覊旅而親厚寡也離坎一則炎上一則潤下也小畜履一則以孤隂當衆陽欲止之而不能止勢尚寡一則以説隂躡強陽欲身進而遂其進勢不處也需訟一則待而不進一則進而不親也凡此對舉之卦也再錯綜舉之大過則本末弱而顛危也姤則遇也柔遇剛也漸則女之歸人必待男求之而後行也頤則養之以正也既濟則事成而已定也歸妹則女適人為女道之終未濟則陽失位為男勢之窮也夬則決也剛決柔也君子道長小人道憂也文王序卦反對之際皆隂陽相變易之理是所謂對待之易也噫夫子作十翼既為上下彖傳上下象傳乾坤文言逐卦爻而縷析之矣又為繋辭上下傳以統論其藴例未已也又取各卦之圖象而説之又取全卦之次第而序之又取各卦之反對而論之未已也雜卦之末自大過以下又不拘反對而任意舉之歸于君子道長小人道憂以終一篇之大指焉葢至于忽序忽雜忽對忽不對而易理之變化極矣聖人之觸悟神矣此韋編三絶之後妙理洽衷正側竪横无非至義學易之極則也讀易日鈔卷八
