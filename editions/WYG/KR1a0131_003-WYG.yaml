body:
  text: 讀易日鈔卷三贊善張烈撰上經坤下巽上觀盥而不薦有孚顒若卦名之觀去聲六爻之觀平聲觀有以示人而為人所仰也九五在上四隂在下而仰之又卦有内順外巽之徳而九五中正有以示人皆觀道也故名觀觀示之道必於視聽言動之間常存誠敬而不忘如將祭盥手而不用以薦者然葢盥以將薦盥未有不薦者但既薦則其誠已用無復存者今如不薦則誠敬恒存於中而不忘矣故其孚信積中而人顒然可仰盥而不薦所謂有以示人有孚顒若所謂為人所仰如是乃為觀道彖曰大觀在上順而巽中正以觀天下觀去聲卦名觀者卦體九五居尊位四隂皆仰之是以一人而普示四海大觀在上觀之位也卦徳内順外巽是内而和順以宅心外而巽理以制事觀之徳也再觀卦體九五中正以示人是乘大觀之位秉順巽之徳而由是以見諸外者无過不及无偏无邪足以示法于天下葢以吾中示天下之不中以吾正示天下之不正觀天下之實在中正也而所以能觀于天下者以大觀之位所以能有中正之道以其順巽之徳也有位有徳而中正出焉于以觀示天下卦之名觀者如此觀盥而不薦有孚顒若下觀而化也下觀平聲所謂盥而不薦有孚顒若者是上之以中正示人也由是下之觀視其誠者已不覺自化為中正是豈彊而致之哉觀天之神道而四時不忒聖人以神道設教而天下服矣觀平聲夫以不薦示人而人自化由是知觀之為道不疾而速不言而喻葢神道也試觀天之神道乎四時順布不知誰為之序而自然不忒何其神也聖人之設教亦然欲以中正之道設為教令而不事乎政刑聲色之末也即以天之神道設教篤恭不薦之誠一如天之无聲无臭焉天下日覩其誠敬固已心折神融而樂趨于中正之教矣觀之道極言之至於神而後盡不神不足為觀也象曰風行地上觀先王以省方觀民設教觀平聲風行地上由厯觀覽无物不至先王亦有觀焉巡狩之典是也先王非不能靜處以化民以為風俗時有變遷則教法當因之而設于是巡省方國以觀其民俗使其俗之美惡厯覽无遺而因設之教焉此在不薦有孚之外又有振動移易之道亦所以為觀去聲也初六童觀小人无咎君子吝爻皆以觀瞻九五為義近五則見其道徳之盛所觀深逺今初六隂柔則識闇居賤則逺于五所觀淺近如童稚然此在小人居下无識不足咎也若君子如是則可吝矣象曰初六童觀小人道也初則賤六則闇是為小人童觀固其道也豈所以語君子六二闚觀利女貞隂柔質闇居乎内而窺乎外未能出門曠觀此特利于女子之正也丈夫豈其然象曰闚觀女貞亦可醜也闚觀謂之女貞亦誠可醜矣六三觀我生進退居下之上可進而近五亦可退而伏下進退固未決也然則何以決之亦惟自觀我之所行以為進退而已我之所行善而通也是有可以近五之具進可也不善而塞也是无可近五之具退可也象曰觀我生進退未失道也進退有道六四可進初二可退惟三未決故必觀我生以為進退庶審于其宜未至失道也六四觀國之光利用賔于王五陽剛中正以居尊凡其政化之施于國皆其道徳之光輝也四切近于五故為觀國之光之象夫觀光之大者有二諸侯朝覲于王王以賓禮待之士而仕進于王王亦以賔禮待之故占得此爻者得以上接于上而受其賔禮豈童觀闚觀之比哉象曰觀國之光尚賔也觀國之光豈徒瞻風于下而已哉王有賔臣之禮四葢慕尚其賔禮而願近于王是以有觀光之事也九五觀我生君子无咎九五陽剛中正以居尊其下四隂仰而觀之所謂大觀在上中正以觀天下者君子之象也故居此位得此占者當觀己之所行果有陽剛中正君子之徳乃可以觀示于人而无咎也象曰觀我生觀民也爻皆占辭夫子以其義言之謂人君之觀我生不但觀其一身而已又當觀民徳之善否以自騐所行也上九觀其生君子无咎陽剛居上雖不當事任而亦為下所觀故處此者亦必自視其所行果為君子焉乃无咎也象曰觀其生志未平也上雖不當尊位而亦為下所觀其志未敢安肆故必惕然觀生也震下離上噬嗑亨利用獄噬齧也嗑合也物梗口中齧之而後合也為卦上下兩陽而中虚頤口之象九四一陽梗于其中必齧之而後合也故名噬嗑物之為梗者既去則亨通无礙矣故噬嗑有亨道夫去梗之道莫大治獄獄者刑之未定國有惡人為梗欲審其獄情而刑之非威明兼濟剛柔得中不能也卦有是徳故宜于用獄彖曰頤中有物曰噬嗑卦名噬嗑者卦體為頤中有物之象故曰噬嗑噬嗑而亨剛柔分動而明雷電合而章柔得中而上行雖不當位利用獄也其曰亨者正以噬之而嗑即其亨也曰利用獄者治獄之道太剛則過暴太柔則无㫁不威則來巨姦之侮不明則受狡偽之欺卦體則剛柔分三剛三柔均勻不偏是嚴㫁與温仁兼備也卦徳則動而明威足以懾明足以察也卦象又雷電相合而益章顯是威如雷愈覺其不可欺明如電愈覺其不可侮也卦變又自益來柔上行居五而得中是柔而不偏以居君位也故五雖不當位而由剛柔分柔得中言之見寛猛之不偏由動明雷電言之見威明之兼濟是治獄之道備矣是以利用獄也象曰雷電噬嗑先王以明罰敇法先王之立法也將使人人知畏苟非一一明别其刑罰輕重之科則出入無凖大小無則惡可倖善不免法且廢弛矣故必先明其用法之例使人人不疑則法有定條而不可犯是明罰所以整敕法度以警有衆也明罰義兼威明敇法乃能去梗初九屨校滅趾无咎初上无位受刑之象中四爻用刑之象初在卦始罪薄過小輕刑加之又在下為趾象故為屨校滅趾謂著械手足如納屨然滅没其趾也初方為惡而受刑則懲戒而不敢恣反得无咎矣象曰屨校滅趾不行也趾者人之所以行今曰滅趾是使其不敢行以不進于惡故无咎周公之无咎以禁之于初而言夫子又自滅趾發義六二噬膚滅鼻无咎膚者豕腹下柔軟无骨之肉至易噬者也去梗如食物二中則不暴不縱正則公平當理以此治獄如噬膚之易矣但二本隂柔慈和多而威厲少而下乗初剛則彊梁難制不免反受其傷如食物而滅没其鼻也然在彼既所當治而我又善治雖傷而終能治之无咎象曰噬膚滅鼻乘剛也既噬膚而曰滅鼻惟其乘初剛也六三噬腊肉遇毒小吝无咎腊肉小物全體骨而乾之者堅韌難噬之物也六三隂柔無剛㫁之才不中正又不得用刑之道以此治獄如噬腊肉之難且反為人所傷如遇毒焉才不足治人小吝矣然彼罪當治終必伏刑非我妄治之也无咎象曰遇毒位不當也以已無中正之徳故人得以傷之九四噬乾胏得金矢利艱貞吉胏肉之帶骨者比腊又難噬矣九四居尊所治皆難治之獄如噬乾胏也然以剛居柔得用刑之道人皆願輸金矢以求聽為得金矢之象然不可恃已之能而逞快于一時恣情于武㫁誠知獄為大事而存艱難之心守正固之理則獄得其平而吉矣周禮民有大獄令入鈞金而後聽之有小訟令入束矢而後聽之鈞金三十斤也束矢百矢也爻言得金矢者人願納金矢以求聽以四之聽訟得宜也四臣位兼治大小故得金矢五君位専治大故得黄金象曰利艱貞吉未光也必戒以利艱貞乃吉者恐聽訟之人恃已能㫁則流于慢易偏私心未光明者有之故戒之也六五噬乾肉得黄金貞厲无咎訟獄將決乃至于五故所治雖難于膚而易于腊胏為噬乾肉之象况柔順得中治人人服人皆願納黄金以求聽為得黄金然獄者大事必守正固存危厲乃无咎也象曰貞厲无咎得當也貞且厲焉所治乃得其當不然未易无咎也上九何校滅耳凶過極之陽在卦之上惡極罪大如加以何校之刑而滅没其耳凶之道也象曰何校滅耳聰不明也必言滅耳者耳能聽為聰惟其聰性昏蔽聞善以為不必為聞惡以為不必去聞義以為不足信聞法以為不足畏故至如此之凶也使其聰性稍通豈至此乎離下艮上賁亨小利有攸往賁飾也卦變自損來者柔自三來而文二剛自二上而文三自既濟來者柔自上來而文五剛自五上而文上夫獨剛獨柔不能成文往來交錯間迭可觀文飾之象也内離外艮為文明而各得其分之象亦文飾也故名賁惟柔來文剛是陽得隂助可以遂其所為且内體離明能明于物情達于事理二象有亨道焉但其剛上文柔是柔為主而剛特為之助豈足大有為也且卦體艮止雖不失于妄動亦不足于變通據此二象則小利有攸往而已彖曰賁亨柔來而文剛故亨分剛上而文柔故小利有攸往天文也文明以止人文也觀乎天文以察時變觀乎人文以化成天下賁之所以亨而又小利有攸往者以卦變柔來而文剛剛為主而柔助之相與有行故亨及其分剛上而文柔則柔為主而剛助之柔固不足有為剛亦未究其力故小利有攸往文王之許其亨而不甚許其攸往者誠以此也雖然賁道固甚大矣就卦變剛柔往來之象自然交錯如日月寒暑之往來交錯自然成文焉是天文也就卦徳之文明以止如人道中儀文度數極其燦美而上下親踈各安其分焉是人文也夫天下之道莫大于天人天人之道莫大于文今天人之所以文者皆于賁卦具之是故觀乎賁卦之天文而爽然悟寒暑代謝其至變不一者不過如此卦之剛柔往來而已也即執此以考星定厯察時變可焉觀乎賁卦之人文而爽然悟教治天下所以使之化而成俗者不過如此卦之文明以止而已也即執此以備儀章辨名分化成天下可焉察時變化成天下皆不外此卦而得之賁道之大如是象曰山下有火賁君子以明庶政無敢折獄山下有火火之光輝照耀于山賁象也夫山下之火明不及逺君子之用明亦有明于小而慎其大者庶政之輕可以辨之刑獄之重生殺攸闗不敢自謂有明而遽從而折之是明不敢及逺而自止之者也初九賁其趾舍車而徒居下趾象人不剛則屈于欲而所守不固不明則昏于利而出處失宜初九剛明故能自賁于下徳義足以自榮無事外勢之樂為不受非道之車而安于徒步之象象曰舍車而徒義弗乘也君子之取舍決于義而已義不可乘即弗乘以義為榮不以徒行為辱六二賁其須二隂而三陽則隂不得不附陽矣二中正而三得正則同徳樂相附矣又皆无應與則二无他適而惟附于三矣二之附三而動如須之附頤而動也二為須象而藉三以自文為賁其須象曰賁其須與上興也隂不能自動附于上之陽而與之俱興故取象于須九三賁如濡如永貞吉一陽居二隂之間得其賁而潤澤生焉賁如濡如之象也然陽得隂以自潤可也溺于隂而狎之䙝之自失其正所害多矣故三本貞而能永其貞使二隂為潤澤之濡不為陷溺之濡則吉也受其助益而不溺于所安以陽御隂之理盡此矣主之于僕婢夫之于妻妾君之于臣下官長之于左右皆然象曰永貞之吉終莫之陵也始以昵而相狎終不遜而相陵隂柔之情也而皆由于陽之失正永貞則終無有陵之者矣莫陵即吉也六四賁如皤如白馬翰如匪寇婚媾二與五三與上不相應則亦不相賁惟四以初之應相賁乃隔于九三而不成其賁所謂賁如者乃皤如白而无色矣然四往求初九之心則如飛翰之疾不可緩也况九三剛正其求四非為寇也特求婚媾而已此固在四之自守何如三不足為難也白馬者人既皤如則馬亦白矣象曰六四當位疑也匪冦婚媾終无尤也惟其為四則既應初又乘三惟其為六四則初陽既與相應而三陽又若可求是其所當之位可疑也然可求者其位不可求者其志故三雖匪冦婚媾而四自守其志則雖處疑地而終免尤責也六五賁于丘園束帛戔戔吝終吉丘園儉樸之地五為賁主時之賁將極矣夫文極而救之以質中之道也六五柔中能返文就質敦本務實以儉樸為質賁于丘園焉就其隂性儉嗇凡事從儉所用之物不過束帛之戔戔然淺小若小吝矣然文返于質其流可久終吉道也象曰六五之吉有喜也文過之日其勢可憂惟六五以柔中居尊而返于質焉使風教不壊人心不至于不可問有可喜之理矣故吉上九白賁无咎賁已極矣復益之以文使天下無復實意以相接誰之咎乎上以剛處賁極悉反而復于純素无文之地不為天下滋華勝之弊可无咎矣象曰白賁无咎上得志也他人之志在于極飾上則以返俗救弊為志者今果白賁焉則上為得志愜所本願矣又何咎坤下艮上剝不利有攸往剝落也五隂在下而方盛一陽在上而將盡陽道消落故名剝九月之卦也隂盛陽衰時固當止而内坤外艮亦為順時而止之象故君子處此不可有所往也彖曰剝剝也柔變剛也剝之為言剝落也前此剛嘗盛矣今皆安往耶以卦體羣柔之力害剛而去之于是變剛為柔是以消剝至此也不利有攸往小人長也順而止之觀象也君子尚消息盈虚天行也不利有攸往者易為君子謀見卦體為小人盛長之象鋒不可犯故戒之也且卦徳為順時而止人宜觀此象也夫理數自然或退而消或生而息或息極而盈或消極而虚君子之行止必尊尚乎此而不敢違誠以天運如是天不可逆也故時當止則順時而止而不利攸往隆山李氏曰夬五陽一隂曰剛決柔剝五隂一陽曰柔變剛何也曰此君子小人之辨也君子剛明果㫁小人隂賊險狠君子之去小人聲其罪與天下共棄之名正言順故曰決小人之欲去君子辭不順理不直必萋裴浸潤以侵蝕之使之日消月鑠而不自知故曰變一字之間君子小人之情狀皦然矣象曰山附于地剝上以厚下安宅山本髙于地而今附著于地摧落之象也夫山必託于地猶上必託于下上厚其下使下樂于奉我而我之宅居于上者安矣故必厚下乃所以安宅也初六剝牀以足蔑貞凶隂之剥陽居初最下為剝牀以足之象夫陽剛正道天下所不敢誣而初首開剝陽之端是與正為仇而欲撲滅之者凶莫大焉象曰剝牀以足以滅下也取象于足者隂之滅陽自下而起先其㣲者後及其大志欲盡滅天下之陽而先試之于下也六二剝牀以辨蔑貞凶辨謂牀身之下足之上分辨處也剝及于辨進而上矣蔑貞必凶按初六蔑貞凶本義云蔑正則凶是指滅正者凶也非正者凶也天下豈可无正必欲滅正未有不受其凶者而大全朱子曰只説陽與君子之凶䝉引從之恐未是朱子定説象曰剝牀以辨未有與也剝至于辨亦已危矣然此時二隂方起未有黨與之盛使君子于此而防之固猶可及止也六三剝之无咎衆隂之于陽也方欲剝之而三獨與相應去邪從正善補過矣雖得罪于私黨而見取于公論其義无咎矣利害之私何較哉象曰剝之无咎失上下也剝之而獨能无咎者獨應一陽遂盡失上下羣隂而不顧其失也乃所以為得也故无咎六四剝牀以膚凶剝牀不已遂及于膚蔑貞不待言也凶已甚矣象曰剝牀以膚切近災也曰以膚是已切近于災旦夕禍至君子可不知避哉六五貫魚以宫人寵无不利五羣隂之長羣隂皆其所以也隂之害陽與否權在于五五誠能率其隂類隨序順行如貫魚然以羣隂聽命于陽如后妃以宫人進御于君則无不利矣夫隂之不肯從陽恐其不利于己耳不知奉陽為主則共受其福㫁无不利者亦何憚而不從陽象曰以宫人寵終无尤也以隂害陽天下之大惡加焉苟以宫人寵則終无尤之者矣上九碩果不食君子得輿小人剝廬衆陽消盡惟上九一陽尚存如樹果凋落而惟一碩大之果尚留而不食剝未盡而能復生之象也雖然斯時斯地使以君子當之則一陽得以庇羣隂而羣隂承之是為得輿若復以小人處此則是陽剛剥盡而小人亦無以自安其剥陽乃所以自剥其廬耳象曰君子得輿民所載也小人剝廬終不可用也君子得輿者君子徳足庇民民自共承載之以君子為民所載宜其得輿也小人剝廬則其所以剥陽者乃自傷耳終何益哉震下坤上復亨出入无疾朋來无咎反復其道七日來復利有攸往復陽復生于下也剝盡則為純坤而坤未嘗无陽也陽方盡于上已生于下但未成一畫積成一畫則純隂之内忽見陽之復來如已失而今復也在月則十月純隂陽已生于下積至踰月而一陽之體成乃為十一月之冬至也故名復陽道既復萬類得通其亨必矣又内震外坤陽動于下而以順上行其占為已之出入可以无疾而朋類之來亦得无咎又以隂陽往還之理觀之隂陽之道固反復其道者也是以自姤卦一隂始生凡厯七爻而一陽來復占為七日來復又其陽徳方長前途无礙故占為利有攸往朱子曰七日來復不是前已往之陽重將來復生舊底己自過了這裏自然生出來見其絶于彼而生于此而因著其往來之象故曰來復耳象曰復亨剛反復之所以亨者陽剛之道天下所恃以生向也剛去困閉已甚今剛既反雖未言及後此之盛長而亨通已在是矣動而以順行是以出入无疾朋來无咎復既有亨道矣然處積鬰之後恨不即伸其志而挾可亨之勢又若可以徑前如是則發之過暴一身之動静有礙而朋類皆不能來咎且歸于我矣今卦徳下動上順是處陽剛振起之初而能循義理安時勢無躁無激以靜順之道進而上行是以動靜行止未嘗有過當可訾之病而事機不自我誤朋類可來而无我之咎也動初振而起也行者動之後遂進而上行也反復其道七日來復天行也反復而來復者消長自然之運天實使之故其來復可必利有攸往剛長也利有攸往者卦體剛反之後勢且益長前途正順故利往也復其見天地之心乎夫此復也于剛反見其亨于動順見其出入无疾朋來无咎于天行見其來復于剛長見其利往復之為復如此甚矣其理之㣲而係者大也吾觀天地無心而其生生之理有必主于是而不容息者是天地之心也然天地生物之心雖无時不在而重隂固閉之時既歛而不可見即萬物盛蕃之際亦雜而不可見惟此積隂之下一物未有而陽氣方呈較之歛閉之日既有端倪可求較之雜茂之時亦單有一陽可見乃知天地之心其主于生物而不欲殺物如是其不容改也不然重隂肅閉天地即絶意于物可矣而其生育之機已蚤動于此天地之心不其曉然可見耶人于此識天地之心則内返之一身外推之一世无不宜以此心為心而體天地之化以配天地矣象曰雷在地中復先王以至日閉關商旅不行后不省方雷氣已動而尚藏地中陽始復之象也先王于陽復之始以陽之㣲而宜靜以養之也則于冬至之日而閉關焉閉關則雖行之勤如商旅是日亦不行矣雖行之至大如后省方是日亦不省方矣先王制為此法欲上下安靜以養㣲陽也問陽始生甚㣲安靜而後能長故至日閉關人于迷途之復其善端之萌亦甚㣲故須莊敬持養然後能大不然復亡之矣朱子曰然又曰古人所以四十強而仕者前面許多年亦且養其善端若一下便出來與事物滚了豈不壊事初九不遠復无祗悔元吉復陽來復也陽者善道故爻以復善為義初九為復之主又在卦初為失之不逺而已能自復過未形而改可以不至于悔大善而吉象曰不逺之復以修身也程傳曰不逺而復者君子所以修其身之道也學問之道无他惟知不善則速改以從善而已雙峰饒氏曰人心善端緜緜本自相續念慮雖或小差而歉然不自安之心已萌于中是即天地生物之心之呈露也人惟省察克治之功不加雖有為善之㡬而无反善之實是以縱欲妄行而悔至于不可追善用力者因是心而速反之使不底于悔則人欲去天理還所以修身也六二休復吉柔順中正質能為善又近得初九而下之以取資復之休善吉道也象曰休復之吉以下仁也程傳曰仁者天下之公善之本也初復于仁二能親而下之是以吉也按下者降心屈體之謂六三頻復厲无咎以隂居陽不中不正又居動極是質雜而心行不善又有輕躁之病者也故復而不能固頻見其復焉其去不復亦近矣厲然猶知復也无咎象曰頻復之厲義无咎也三之厲為頻復之厲是猶志在補過故于義可以无咎也六四中行獨復與羣隂為類而獨應初九是在衆中同行而獨復乎善也此時陽氣甚㣲未足有為故不言吉然理所當然吉凶非所論也象曰中行獨復以從道也行羣隂之中何所見而獨復見初九之為道羣隂之非道所以㫁然而從之也六五敦復无悔人有復而不堅者惟氣質之雜故心雖欲善而无如力之不厚也六五中順内無偏頗之失外惟理是循敦篤于復而不可摇不逺復者不至于悔則敦復者竟无悔矣象曰敦復无悔中以自考也復而不能成其復則悔无已時三之頻失非成也二四因人以復非自成也惟五中德虚明恒照自省自勵以自底于成中所以能敦自考是以无悔上六述復凶有災眚用行師終有大敗以其國君凶至于十年不克征隂柔無剛明自拔之才居卦之終遂終迷而不反迷于復焉凶之道也䘮心背理災禍過眚皆所不免矣以此制事无適而可如用以行師則逞私謬動終有大敗且敗不獨將士之辱而累及其國君亦凶不獨一時之害而遲至十年尚不克征也凶亦甚矣用行師四句舉行師一事以窮其凶象迷至于甚迷則凶亦至于甚凶即此一事而他事之各極其凶可推矣而行師之象實取諸坤南軒張氏曰爻辭鮮有如是之詳其凶鮮有如是之極者而獨于復之上六言之葢自古亡國覆家反道敗徳无所不至其源起于一念之㣲不能制遏之夫以隂柔之才去本之逺所謂人欲肆而天理滅者故有大敗終凶之戒也象曰迷復之凶反君道也迷復之象不獨指君而君為尤大苟君而反乎君之道恣欲妄行是為迷復必凶之道也震下乾上无妄元亨利貞其匪正有眚不利有攸往无妄實理自然之謂人心中本具有此實理理所本无而忽有焉謂之妄本无而无之止此實理自動自靜行滿天下而我无容心焉則无妄矣卦變自訟來九自二來而居于初以為震之主是剛健无私之體主乎内動而不妄者也故名无妄夫邪妄之行動成阻礙順實理之自然以應物而无所容私何行而不通乎故元亨然所以為无妄者正也故惟利于固守其貞若其匪正則妄矣必有過誤之眚以至凡有攸往皆不利也彖曰无妄剛自外來而為主于内動而健剛中而應大亨以正天之命也其匪正有眚不利有攸往无妄之往何之矣天命不祐行矣哉凡意之出于人者妄理之出于天者无妄天理无妄而我如其理以行之事事皆人所宜有故天亦助之此卦之為无妄者以卦變則剛自外來而為主于内是心之无妄也正也以卦徳則動而健震厲有為而又不牽于私是行之无妄也正也以卦體則九五剛中而應乎六二相輔以徳是應之无妄也正也合而觀之卦之善如此故許其大亨而又戒之以正者葢天下止恃此正理天之所以為天而流行萬古主宰萬物者只恃此正理正者天之命也故人欲有行未有單恃人力之私而能成者必由天助之而天命在正助正不助不正也所以曰其匪正有眚不利有攸往葢往必由无妄之往而今以匪正則欲何所往乎縱極其人力之私自以為可往而不正之舉天所不助果能行矣哉是以惟正而後為无妄惟无妄而後无不可往誠以其得天命也象曰天下雷行物與无妄先王以茂對時育萬物天下雷行動物為之震動植物為之發生各得實理以成性是一物與以一无妄也先王知物之有實理則必使各全其實理以為天之生物以時故因其時而設之政以養育萬物舉萬物之廣無不對時而育之則茂甚也然各因其時各全其性而已先王何心是茂對育之典亦无妄之用也初九无妄往吉初正所謂剛自外來而為主于内者有无妄之心者也以是而往動與理合天實祐之吉道也象曰无妄之往得志也多妄之人自增滯阻若誠之于物無不能動治事事得其理治人人感而化无往而不得其志也六二不耕穫不菑畬則利有攸往柔順中正能因時順理以盡其所宜盡初未嘗有所望而為之于前亦未嘗有所計而期之于後辟如農夫之先而耕後而穫先而菑後而畬其計望不勝勞也二則不耕亦不穫不菑亦不畬澹然无所期望焉得失利害之心浄則坦然循理无所牽繫行止自如矣人必如是則利有攸往也象曰不耕穫未富也不耕穫豈遂无為哉特不以計利之心為之耳惟心非計富之心則耕如不耕穫如不穫六三无妄之災或繫之牛行人之得邑人之災六爻皆无妄者也在六三本无妄但所處不得正則身之所遇有不如意災自外至莫之致而至如或繫之牛行人得之而邑人受其災也象曰行人得牛邑人災也天下固有无因之禍而令人无可推解者人以其无因而怨之不知君子正以其无因而安之也如行人得牛則詰捕之擾非邑人孰當之自然為邑人之災无足怪也知其固然而安之乃見无妄之心也于二見處福之心无妄于三見處禍之心无妄聖賢涉世之要盡此矣九四可貞无咎陽剛乾體能自守者也下无應與又止宜自守故可以固守而无咎然未可有為也象曰可貞无咎固有之也可貞无咎者不貞固則不能有其陽剛之道貞則陽剛之道我可固而有之是以无咎九五无妄之疾勿藥有喜乾剛中正以居尊位而下應亦中正无妄之至也縱或有无故非意之事亦不必為之勞擾徐當自定耳如无妄之疾不藥而自愈葢疾之自外感者不足為患苟内无受疾之源偶疾自愈不然内體有病外无往而不為患故勿藥有喜所以深形无妄之至也象曰无妄之藥不可試也无妄而復藥之則藥反為妄而生疾人本當理无虞乃為人所摇沮自惑而遷之失是取非反招咎失矣故不可少嘗而試之上九无妄行有眚无攸利上九非有妄也但處乎窮極徒執誠信而不觀理之大通故行有眚而无所利象曰无妄之行窮之災也上之行本无妄其災特生于窮極耳乾下艮上大畜利貞不家食吉利涉大川乾剛上進為艮所止有畜義焉大小畜所畜皆乾所别者艮巽也艮則以大畜大謂之大畜且以陽畜陽其畜有力畜之大者也又内剛健外篤實輝光内外交養其徳日新所畜之大也故名大畜此卦自需而來九自五而上有剛居上位之象焉六五尊而尚之有尚賢之象焉以艮畜乾有遏止健者而不使進之象焉此三者皆非大正不能故占者利于貞也既有尚賢之象則凡畜藴大而為賢者皆宜食禄于朝占為不家食吉又六五應乾為應天時行之義應天合時可以濟難故又占為利涉大川雲峰胡氏曰兩利字一吉字占辭自分而為三不必泥而一之彖曰大畜剛健篤實輝光日新其徳卦之名大畜者卦徳内乾是天理精明不屈于欲徳性常用不息于私内有剛健之體也外艮是踐履敦篤因而光輝生焉外有篤實輝光之行也内外相資而无私之體日益粹敦固之行日益茂由以日新其徳焉畜養己徳無大于此此所以為大畜也剛上而尚賢能止健大正也若其曰利貞者以卦變則剛進而居上也而卦體六五即尊尚其賢以卦徳乾欲進而艮止之能止遏強健夫剛上而非正則徳不稱位下誰戴之尚賢而非正則色貨分心賢豈就之止健而非正則自反不直安能屈彼三者皆必出于天正非小小依名附義者之可為是以必利于貞也不家食吉養賢也其曰不家食吉即以六五尚賢則必養賢人患非賢者耳果其畜徳之大自宜受養賢之典豈有尚安家食者乎利涉大川應乎天也其曰利涉天川者亦以卦體六五應乾乾天也天下事理勢之自然莫非天也藴畜偉大之人不能先天不敢後天惟理勢所至即起而應之故履涉大險若行无事惟應天可以濟險而卦體有應天之象所以利涉大川也象曰天在山中大畜君子以多識前言往行以畜其徳識如字程傳曰天為至大而在山之中所畜至大之象君子觀象以大其藴畜人之藴畜由學而大在多聞前古聖賢之言與行考跡以觀其用察言以考其心識而得之以畜成其徳乃大畜之義也初九有厲利己程傳曰艮止畜乾故乾三爻皆取被止為義艮三爻皆取止之為義初以陽剛又健體而居下必上進者也六四在上畜止于已安能敵在上得位之勢若犯之而進則有危厲故利在已而不進也在他卦則四與初為正應相援在大畜則相應乃為相止象曰有厲利己不犯災也知此之有災而急進者毎犯之不顧惟已則不至犯災也九二輿説輹為六五所畜以其得中故能自止而不進為輿説輹之象象曰輿説輹中无尤也輿説輹者二得中道可止則止故无尤也程傳曰善莫善于剛中柔中者不至于過柔耳剛中中而才也初九不中故戒以有危宜已二得中自无過差也初二乾健而不足以進四五隂柔而能止時之盛衰勢之強弱學易者所宜深識也九三良馬逐利艱貞曰閑輿衛利有攸往三以陽居健極健極則難畜上以陽居畜極畜極則不畜又三與上省陽爻故不相畜而俱進夫乾象為良馬今畜極乾進三逐上而進若良馬相逐而馳不可禦矣然正不可恃其健與應而過鋭于進也故利于艱難其心正固其道取已所以致行之輿防身之衛而日閑習焉則利有攸往矣象曰利有攸往上合志也初利己二説輹三獨利有攸往者初二所遇隂也故被止三所遇陽也上而與上合志皆以陽剛畜極有欲進之心故不止而利往六四童牛之牿元吉四畜初者也初居最下陽之㣲者㣲而畜之則易制如童牛未角而預加横木以防之止惡于㣲用力易而受止者不覺大善而吉之道也剛健不可力止有道焉莫深于豫象曰六四元吉有喜也止健之道有二而六四得其元吉葢上不勞而下不傷在四有可喜之道也六五豶豕之牙吉陽已進而止之不若初之易矣然以柔居中則能善處當尊位則力可為是以得其機㑹而制之如豕之猛利在牙徒制其牙則用力勞而不能止雖縶之維之不克使之變也惟豶去其勢則牙雖存而不為害止強而得其要吉道也止健之道未發則禁于豫既發則扼其機惟此二者而已舍此而欲以力伏未有能勝者也扼其機者病在此而治于彼治于彼而愈于此其用神妙談笑而消大變非聖人不能也象曰六五之吉有慶也六五一身關乎天下今而得吉則天下之惡止功之所及廣矣有可慶之道焉乃為六五之吉上九何天之衢亨畜極而通豁達无礙何其如天之衢路通達之甚也亨矣小畜畜之小故極而成大畜畜之大故極而散此象空説若指實則如畜徳之豁然貫通畜賢之仕進无礙畜健之梗去治通凡畜極而通者皆是也然畜不大則通不甚故此象不于小畜見之按乾為天艮為徑路有衢象艮在乾上是天上之衢太空无礙之所也象曰何天之衢道大行也天衢云者所畜之道大行无礙也此單以畜徳成而入仕者言也震下艮上頤貞吉觀頤自求口實頤口旁也口食物以自養故為養義此卦上下二陽而中四隂外實内虚又上止下動皆為頤象故名頤夫人有生以後无一刻不資于養故人之善否全在所養苟以不正投之則養之適以害之也必養之以正固乃吉以言乎養徳當觀所養之道養之以聖賢大學之道則正矣異端小道則不正矣以言乎養身當自考求其口中所食之物秉道義而略口體則正矣貧賤害心則不正矣二者皆正則吉不正則凶也彖曰頤貞吉養正則吉也觀頤觀其所養也自求口實觀其自養也頤无他辭専戒以貞吉者葢必養得其正則吉否則凶矣由是而觀頤則觀其所以養徳之道也自求口實則觀其自養其身之術也皆以正而後吉也程傳以所養為養人自求口食為自養似于所自二字更明貼雲峰胡氏曰槃澗董氏曾以此問朱子朱子沈吟良久曰程傳似勝葢下體三爻皆是自義上體三爻皆是養人先人而後己者君子觀頤之象自上而下于上體則觀其所以養人者于下體則觀其所以自養者要在皆得正則吉耳按程傳似勝之説信乎宜從程傳特朱子于本義未及更定耳天地養萬物聖人養賢以及萬民頤之時大矣哉頤養之道又不特所養自養而已極之天地由是也長育萬物无非養也極之聖人由是也欲養萬民而不能徧乃擇其賢養之與共天位食天禄俾為我布惠天下以及萬民亦无非養也天地之于物聖人之于民无不有事于養凡其不得不出于養者皆其時之不容已也時至而養道開焉天地聖人之功以出頤之時豈不大矣哉象曰山下有雷頤君子以慎言語節飲食雷震于山下山之生物皆動其根荄發其萌芽養之象也君子之養徳養身雖不一端而由口出者言語由口入者飲食慎之節之尤養徳養身之切務也初九舍爾靈龜觀我朶頤凶陽剛在下其徳足以自養如靈龜能咽息不食可以不求養于外者也乃上應六四而動于欲見人之上位而心慕之舍爾之靈龜乃觀于我而朶垂其頤欣欣欲食焉動于欲則敗徳損名无不至矣凶道也進齋徐氏曰爾初也我四也舍爾觀我若四語初之辭也以卦二體合觀之似離離為龜故以為象朱子曰凡卦中言龜不是正得離卦必是伏個離卦此却伏得離卦象曰觀我朶頤亦不足貴也所貴乎初者為其徳足自養无羡于人也若觀我朶頤亦何足貴哉是人本貴初而初失于自賤也六二顛頤拂經于丘頤征凶隂柔未能自養必求資于陽而卦惟初上二陽皆于二无與二將求養于初乎上不能養下而反求養于下顛倒求頤是違拂其常理也將求養于上乎上之高如丘我于丘而求頤彼在上之勢雖足以養人而本非我應無交而妄求往必取辱非特拂經乃凶道也二固无適而可也象曰六二征凶行失類也六二多吉而此獨征凶葢求養于人必求我同類非類而求徒取凶辱雖六二豈能免乎六三拂頤貞凶十年勿用无攸利頤之道以自養也六三隂柔不中正以處動極心不善而性浮動以害己者養己拂乎頤道雖如飲食男女之類本養之正而不可少者然以拂頤之道行之并其正者亦凶也况不正乎其凶不特一時雖十年之久尚勿可用也凶不特一事葢一无所利也凶甚矣象曰十年勿用道大悖也凶而至于十年勿用葢于頤道不止于悖而大悖之故也六四顛頤吉虎視躭躭其欲逐逐无咎在上位有養人之責而隂柔不足以養人然正應初九四資其養以施于下雖顛而實吉也然以上求下恐暫屈則易而堅久則難彼賢者自貴其道而吾亦自挾其尊嫌隙稍生頤道敗矣必也下求甚専如虎視之躭躭然下而専也求初不替如虎食之欲逐逐然求食而繼也乃勝養人之任而无咎葢上之切于求賢非為賢也以為不如是不足以免咎也象曰顛頤之吉上施光也既顛矣而又吉者所養之實雖資于下而養人之功原施于上四以所求于初者而自上施之天下仰四之施非仰初之施也是吉也六五拂經居貞吉不可涉大川五有養人之責然隂柔不正不能養人而資上九之剛以養之是拂乎上養下之經矣夫已無才徳而専資于人五之貞也安居于此則吉不可自用以濟險葢任人則宜全乎任人也象曰居貞之吉順以從上也居貞之所以吉者五之養人全賴于上苟心有一毫不順于上則上无以究其功矣惟柔順其心以一概聽從于上乃吉也上九由頤厲吉利涉大川六五賴上九之賢以養人是物皆由上九以養也位高任重不可以由頤自快常懐危厲之心乃吉且陽剛有濟險之力在上有濟險之權故利涉大川象曰由頤厲吉大有慶也由頤矣而必厲乃吉者必存危厲之心天下乃永受其養而大有福慶也不然我心驕易則由頤之功不終豈能大有慶乎巽下兑上大過棟撓利有攸往亨大陽也四陽居中過盛故為大過謂大者之才徳既已過盛而所為非常亦皆大過人之事所謂有非常之人必有非常之舉也夫舉非常之事者在吾之才而所與共非常之功者上必有所附下必有為承也四陽之才如棟之隆而上下二隂柔弱不任則四陽上无附下无寄棟且撓墜矣然四陽雖過而二五得中卦又有内巽外説之徳有過之才而行之不過即以此往而行大過之事可得亨矣彖曰大過大者過也卦名大過者卦體四陽過盛也棟撓本末弱也陽剛之才既已過人而又有棟撓之戒者初上皆隂弱不足共大事也剛過而中巽而説行利有攸往乃亨夫隂既不足共大事而陽復過用其剛出于矯激之舉徒自取撓敗耳何濟于事今卦體剛雖過而二五得中非過用其剛者矣卦徳内巽沈潛以入理外説和樂以近物如是以行非好為矯激者矣才過乎人而以不過用之則二隂雖不足共濟而吾之可往者自若也惟利有攸往是乃所以亨也大過之時大矣哉雖然攸往固宜于不過而天下事有宜于大過者或過于任而為舉天下所不敢為或過于㫁而棄舉天下所不能棄凡人之所見為大過乎平常者乃正其適得乎時者也正其不可不過而不大過不足為時者也此豈常人可嘗試依似而為之者則大過之為時大矣哉象曰澤滅木大過君子以獨立不懼遯世无悶澤水髙漲滅没于木大過也君子有大過乎人者見理之至是不隨人為俯仰雖无一人相助君子不之懼也此固兼顯晦而言之也至于遯世隱居舉葢世奇姿竟廢之不用之地君子未嘗有悶也此皆恒情之必不能者惟君子能之所以大過乎人也初六藉用白茅无咎隂柔能愼巽體尤能愼况居巽體之下愼而又愼過于畏備者也如措物于地可謂安矣尤必藉以白茅至愼如是庶乎无咎中溪張氏曰茅柔物也巽為白雲峰胡氏曰卦以棟撓為象三四亦取棟象使六爻不出乎棟撓之一説則付天下之事于不可為然後已故又因爻象而别發其義象曰藉用白茅柔在下也柔能慎在下又慎故有象于藉茅九二枯楊生稊老夫得其女妻无不利卦以陽過得名陽過以不過為善中四爻正所謂陽過者也各視其過與不過而吉凶分焉九二當陽過之始未至甚過而下比初隂得其柔以濟之則不至于過故无所有事之中忽轉而大可有為如枯楊已過而自下生稊可以復榮老夫已過而得其女妻可成生育之功无有不利者象曰老夫女妻過以相與也老夫已過而得女妻以相與陽過而得隂以相與其輔之者善則不至于窮九三棟撓凶三四居中有棟象三過剛不中自致摧折棟撓之象凶象曰棟撓之凶不可以有輔也剛過貴于有輔二所以利也三之過剛自是雖使有輔之之人而三自不可以有輔也九四棟隆吉有它吝以剛居柔過而不過正可以當事任而不敗若棟之隆然居上吉道也然人有宜求輔又有不宜求輔者四之才本足自用而又下應初隂使更他求于初則又過柔不勝任矣不其吝乎象曰棟隆之吉不撓乎下也棟隆之吉正以四之不就初下以取撓也若其就下尚安得隆九五枯楊生華老婦得其士夫无咎无譽九五過極之陽又上比過極之隂雖隂陽若有所資以有為而以過濟過究亦何補如枯楊已過而徒生華于上老婦己過而得未娶之士為夫豈有生育之望乎故雖无咎而亦无可稱譽也象曰枯楊生華何可久也老婦士夫亦可醜也枯楊不生根而生華旋復枯矣安能乆乎老婦士夫无論不能生育而止即老婦士夫之象婦與夫亦已皆可醜也上六過涉滅頂凶无咎上六才弱而處過極之地力不能濟亦不敢避過以涉之滅没其頂可謂凶矣然殺身以成仁之事盡其理所當為非有咎也象曰過涉之凶不可咎也凶有可咎者惟過涉之凶不可咎也凶自凶咎自咎苟以凶為咎則僥倖苟免者自以為得而鞠躬盡瘁者徒受俗人之嗤傷天下忠義之氣豈小哉坎下坎上習坎有孚維心亨行有尚習重也坎險陷也陽陷隂中外虚而中實如地虚窪而水實其中故象水上下皆坎故為習坎雲峰胡氏曰六子卦皆重此獨言習者以序卦適居六子之先坎言重他可知矣夫處險必以出險為功然中懐虚妄有僥倖苟免之心則心多憂困適増其險耳卦體中實為有孚心亨之象葢實安義命始終无涉虚妄冀之心是處險而心不為險所􅇶身雖困而心之亨通泰然自若也心既亨矣何往不濟以清定之衷揆理勢之便可以出險而有可嘉尚之功矣不然則雖有可出之機而亦自不知所為也彖曰習坎重險也卦名習坎者重險之義也水流而不盈行險而不失其信其曰有孚者卦象為水而水有有孚之義焉觀其常流不息足乎此又達乎彼惟見其流而不見其溢滿横濫流而不盈也夫曰流是行乎坎窪之中也曰不盈是其趨下有常性流行有常勢不失其信也水之有孚如此人能中有定主而不妄出斯如之矣維心亨乃以剛中也行有尚往有功也夫人惟中有定主是為中實乃可以出險故辭曰維心亨者非他乃以卦體二五以剛在中即所謂中實即所謂不失其信者是以心亨也由是而往斯有出險之功故曰行有尚天險不可升也地險山川丘陵也王公設險以守其國險之時用大矣哉夫文王所言處險之道也險在彼者也君子又有用險之道焉險在我者也極之天而有險焉其髙不可升者是也極之地而有險焉山川丘陵是也此自然之險也極之王公亦有險焉城池甲兵之備紀綱法度之嚴無險而設為險焉以固守其國可見險雖非常道而天地王公實有不出于險而不可者其需此險甚重其具此險甚富險之為時用豈不大矣哉象曰水洊至習坎君子以常徳行習教事水之流也往者過來者續洊仍而至習坎象也君子治己治人皆取乎重習然後可熟而安之如理之得乎心而見諸行者守于靜毋違于動守于大毋違于小必期于常如理之推以教人而著為事者革其非非一日所能革進以善非一日所能進習而熟之乃知所以造就人才之術也初六習坎入于坎窞凶隂柔非濟險之才况居重險之下愈難自免象為已在重坎之中而輾轉陷溺入于坎窞水旁小穴之内終无出期矣凶象曰習坎入坎失道凶也習坎入坎豈但其勢難哉處之有道必能出險即不然亦不至増患今初柔失處險之道故害中生害轉至于不可支也九二坎有險求小得陷于二隂之内時勢多艱是當坎之時正有險而未能出也然剛則有才中則合道雖未即出乎險而在險之中所求亦可小得未至于甚病也象曰求有得未出中也以剛中而僅能小得葢時勢尚未出乎險中非才徳不足也六三來之坎坎險且枕入于坎窞勿用履重險之間而隂柔不中正其處不善來也坎之也亦坎前既險而後且枕乎險无往而非險也見其陷溺日深輾轉入于坎窞而不可出矣事至此自宜退止勿可有為也象曰來之坎坎終无功也坎以出險為功若來之皆坎又何功之望乎六四樽酒簋貳用缶納約自牖終无咎九五尊位六四近之時當艱險上下易于離阻者此時然時當艱險剛柔相資則上下之急于相求者亦惟此時故四于此時不必拘禮際文貌之煩止用一尊之酒一簋之殽以將意而已及其貳而益之止用缶器之質實而已以此進而約結于君不必所由之正自君心之所明者通之引之而已故始雖艱阻終得无咎象曰樽酒簋貳剛柔際也樽酒簋如此用薄以剛柔相接際意殷則不責物也九五坎不盈祗既平无咎坎陷之地變而盈滿則與地平而无險今五尚在陷中坎未能盈也然以剛中正居尊位時亦將出則亦將底于既平矣无咎象曰坎不盈中未大也以五之中何尚不盈葢五雖中而為時所困其中未能大展也上六係用徽纆寘于叢棘三嵗不得凶隂柔居險極重困而不能出如係縳以徽纆而寘之叢棘之中三嵗之久不得免焉凶象曰上六失道凶三嵗也凶何至三歳葢處險貴陽剛之才上六則以隂柔居險極失其處險之道故凶三歳也離下離上離利貞亨畜牝牛吉離附麗也以一物而麗于二物之間以受其益也萬物皆有所麗如人所親附之人所由之道所主之事皆是此卦一隂麗于二陽之間故名離隂本暗而麗二陽以生其明故其徳為明體隂而用陽故其象為火夫麗之所係大矣所麗不正措身失所終无進達之期所麗既正而不委心順之身相麗而心不相隨猶之无益也故利于麗正乃亨而麗正者又必畜養其至順之徳乃吉也程傳曰牛性順而又牝焉順之至也畜牝牛謂養其順徳人之順徳由養而成也彖曰離麗也日月麗乎天百榖草木麗乎土重明以麗乎正乃化成天下卦名離者附麗之義也麗道甚大天地人皆不能外如日月則麗乎天非天日月无以行也百榖草木麗乎土非土百榖草木无以生也在人則君臣皆有明徳以麗乎君臣之正位有君以作于上有臣以弼于下以明化天下之不明乃能化成天下甚矣麗道之大也柔麗乎中正故亨是以畜牝牛吉也卦辭貴乎正順者葢卦體二五之柔卦之主也而麗乎中正五麗乎中而正亦具其内皆能柔而又能貞者也柔而麗于貞則行无不通故亨且麗乎中正者實本于柔是心原至順是以畜牝牛吉也象曰明兩作離大人以繼明照于四方止一明也今日作而明日復作重離之象也大人位四方之上欲于四方之事與物各悉其理各洞其情而无遺不可以或明或不明也必此心之明緝熙不已聰明睿知恒照臨天下而不息焉亦如日之兩作而不已也初九履錯然敬之无咎以剛明之才而居下志固不安于下于是急遽以進而所履乖錯咎之道也惟敬之則心有主宰應事安詳可免于咎象曰履錯之敬以辟咎也履錯而戒之以敬者非止其進也進之急而咎生焉故敬者所以辟咎也六二黄離元吉二即所謂柔麗乎中正者故其麗于物也心无私昵必于天理之至當麗者而麗之麗得乎中是為黄離之象麗之大善而吉者也䝉引曰凡麗得其中正即為黄離不必指人臣如立天下之正位行天下之大道事賢友仁之類皆是象曰黄離元吉得中道也離雖利貞而中可以該正故二本中正而黄離之象則以其得中道而正自在其中也九三日昃之離不鼓缶而歌則大耋之嗟凶重離之間前明將盡如日昃之明前路已短非似日中之盛也夫葢衰循環理之必至達此而安常自樂聽其自至可也若不能鼓缶自歌則无以自處而惟以年之大耋是嗟何益乎祗自速斃而己凶缶者常用之器達理者无不可樂即缶亦可鼔而歌是為安常自樂善處衰之要道也象曰日昃之離何可久也日昃之離尚安能乆蚤知其然則求人以繼其事退處以休其身何事于嗟九四突如其來如焚如死如棄如四處後明將繼之際繼他人而有事須和緩詳宻以善承之乃能有濟四乃以剛廹之事初而發之太驟突如其來如焚死棄宜矣象曰突如其來如无所容也突如之人躁急无禮无所容于天下不焚死棄何待六五出涕沱若戚嗟若吉五居尊位人之所麗且柔麗乎中徳非不善但不得其正而廹于上下之陽豈能安乎必畏懼之深至于出涕沱若戚嗟若慮危備患不自安委弱以強于善乃吉道也象曰六五之吉離王公也吉各有類在六五之吉則以六五本為王公惟憂懼則可以麗乎王公之位而不失是即其吉也上九王用出征有嘉折首獲匪其醜无咎以九居上剛之逺也處離之極明之逺也剛及逺則威震明及逺則刑不濫王用此以出征由其剛逺而威震則可有嘉美之功而折其首惡焉由其明逺而刑不濫則誅首惡即已所獲非其脅從之醜類可免妄戮之咎焉離有甲胄戈兵之象而上九又有剛明及逺之義分剛與明而各究其用王者行師之道備矣象曰王用出征以正邦也離徳以文明化成天下何以言出征征者正也邦有不軌于法者以兵正之使歸于正豈好窮兵哉夫子言此以防好兵之禍也按上經始乾坤而終坎離隆山李氏曰乾坤三畫以初相易成震巽以中相易成坎離以三相易成艮兑故乾坤者隂陽之祖而坎離則天地之中也坎居正北于時為子為夜之中離居正南于時為午為日之中夜之中而一陽生焉故坎一陽居中日之中而一隂生焉故離一隂居中天地隂陽之中此乃造化張本故易上經始乾坤終坎離貴其得天地隂陽之中而為易之用也且坎在物為水而在人為精以畫觀之陽居中而中實即精藏于中水積于淵之象也離在物為火而在人為神以畫觀之一隂在中而中虚即神寓于心火明于空之象也坎之中實是為誠離之中虚是為明作易者因坎離之中而寓誠明之用又古聖之心學也讀易日鈔卷三
