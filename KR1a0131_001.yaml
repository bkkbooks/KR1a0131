body:
  text: 讀易日鈔卷一贊善張烈撰上經乾下乾上乾一者奇也陽之數也乾者健也陽之性也􅄲者耦也隂之數也坤者順也隂之性也天下止有一理謂之太極自理之動則為陽靜即為隂盈天地間非隂即陽凡為陽者其數必竒其性必健凡為隂者其數必耦其性必順此正其理之不可易太極所以恆管乎二氣也伏羲仰觀俯察至透極熟欲舉以教人無可形似故借其數以明之畫一竒以象陽畫一耦以象隂也然一隂一陽又有各生一隂一陽之象故再倍而三以成八卦則隂陽交錯而或為動或為入或為陷或為麗或為止或為說性乃不同或為雷或為風或為木或為火或為山或為澤象亦各類惟三奇之卦三畫皆陽則性猶夫健也故名之曰乾而象獨為天三耦之卦三畫皆隂則性猶夫順也故名之曰坤而象獨為地至於八卦之上又加八卦以成六十四卦則六畫之內隂陽交錯愈極其變殊名異象而氣化消長人事得失情僞善惡亘古今人所未經之事變未聞之義理無不備具于中矣而惟此卦六畫皆奇上下皆乾是陽之純而健之至也故乾之名天之象皆不易焉次卦六畫皆耦上下皆坤是隂之純而順之至也故坤之名地之象皆不易焉元亨利貞天下柔者不足有為惟健則有能為之資而物莫之阻柔者易流于邪惟健則秉天理之正而確乎不易夫乾道本如是之大通而至正矣故人之筮得此卦而六爻皆不變者其占當得大亨而必利在正固凡其剛健有為處必擇至正無私之理而堅以守之乃可以保其終蓋筮得此卦則其人之心與事必皆合乎乾道而後利否則人與卦相違必不利矣雲峰胡氏曰伏羲時有乾卦畫未有元亨利貞卦辭想占得乾卦者即六畫之象已自知有元亨利貞之理矣朱子曰元亨利貞四字文王本意在乾卦者只與諸卦一般至孔子作彖傳文言始以乾坤為四德二聖人各是發明一理耳初九潛龍勿用龍純陽之物靈變不測故以象乾初陽在下未可施用故其象為潛龍其占曰勿用蓋居下而欲為上時方潛藏而欲發泄背時先動未有不速禍者朱子曰潛龍勿用只是戒占者之辭遇此爻者觀此象而玩其占隱晦而勿用可也又曰如所謂潛龍只是有個象自天子至於庶人看甚麼人來都使得蒙引曰潛龍勿用四字字字從初九二字看出九二見龍在田利見大人剛健中正大人之德也居二則出潛而見於世故澤可以及物而為物所利見也其象曰見龍在田其占曰利見大人臨川吳氏曰凡卦畫陽為大隂為小以三畫卦言二居人位九居二故為大人九三君子終日乾乾夕惕若厲無咎以重剛不中而居下之上性剛者好上人又居上位真危地也然性體剛健有乾乾強勉警惕不寧之象故本其象以戒占者曰君子處此能如是乾而又乾雖至夕而猶惕若則雖處厲地亦無咎蒙引曰乾乾自強不息之意不然則頽惰放弛矣括蒼龔氏曰君子九象終日三象三下卦之終故諸卦多于三言終夕亦三象日之終也王氏曰凡言無咎者本皆有咎處得其道故得無咎也九四或躍在淵無咎以陽居隂處上之下以能疑之人當可疑之地故身處于淵欲躍上天而猶疑而未定也其象如此是能隨時審處故無咎山齊易氏曰九四已離下體故謂之躍猶在上體之下故謂之在淵淵卑於田二已在田今反謂之在淵者淵乃龍之所宅非在田之可比在田不能變而在淵有可變之道也不必指定革命之事凡事當遷革之際皆宜如是九五飛龍在天利見大人剛健中正大人之德五大人之位如以聖人之德居聖人之位而人利見之故象占如此蓋此卦二五占法又一例筮得二爻者宜見在下之大人若有見龍之德則為宜見九五之大人也筮得五爻者宜見在上之大人若有飛龍之位又為宜見九二之大人也上九亢龍有悔陽極于上而不能下動必有悔故象為亢龍占為有悔蓋當極盛之時必預慮其亢使有變通可繼之勢而不至於極則無悔矣用九見羣龍無首吉用九言凡筮得陽爻者皆用九而不用七此諸卦陽爻之通例也以此卦純陽而居首故于此發之而聖人因繫之辭使遇此卦而六爻皆變者即此占之蓋六陽皆變則乾變為坤是本至健之性而行之以順具至剛之德而養之以柔如龍之剛猛在首而今皆不見其首乃善道也故吉朱子曰卦之本體原是六龍今變為隂頭而雖變渾身却只是龍只一似無頭的龍相似蒙引曰不言無首不見其為變若只言無首又不見其本為龍如此立象見其本剛而能用柔也彖曰大哉乾元萬物資始乃統天乾道無所不該而成形之大者惟天體乾者莫若聖人試以天道明乾而以聖人合觀之莫不有元亨利貞之四德焉元者生意萌動之初氣之渾全盈溢而灝然欲舒也繼此而亨則生意通繼此而利則生意遂繼此而貞則生意成乾道本大而乾德之中元又最大凡元皆大而乾之元又最大大哉乾元乎何也人物動植之類本無忽有皆從何來推其得氣之始皆乾之元也使無乾則亦無元使乾無元則亦無始無始則亦無物舉萬物皆取資于乾元以為始元何大也乃元又不特始萬物而已凡自始而後天之全化全功皆在資始時已具其後特本資始之氣而漸完足之耳是一元即可以統天又何大也雲行雨施品物流形夫資始方有其氣而未有其形也至於雲行雨施植物得其滋潤莫不暢然各流其形而生生不已矣不可以見乾之亨乎上文說萬物此忽就品物說兩句指㸃唱嘆方形出亨字神情不知其然而雲已行矣不知其然而雨自施矣品物自然各流出形來枝枝葉葉自然迤邐接去最可玩味大明終始六位時成時乘六龍以御天夫乾道之元亨如此而聖人何如蓋元者始也始之前有終終之下又有始誰為為之蓋時之相逼而至自然如是耳聖人大明乎終始之故乃知卦爻六位之間亦各因時而成如時當初自不容不潛遂成其為潛時當二自不容不見遂成其為見聖人明之如此則見之行事亦不越一時時潛時見時惕時躍時飛時亢六龍惟意所用而天道自我御之矣御如御車遲疾進退總在我意中也夫聖人在上能乘龍御天則天下之人咸有生意而欣欣向治是亦聖人之元亨也曰始終則盡矣曰終始則無盡知始而不知終知終而不知始非大明也知始之有終而不知終復有始知終之有始而不知始必有終非大明也聖人仰觀俯察內考之身心外驗之事物打破機關不過是個終始于循環一貫處看得消融于節次逐段處看得分曉惟循環一貫處看得消融則與時推移有水窮雲起之妙自潛而亢自亢而潛終身再無絶地惟節次逐段處看得分曉則時至事起有物各付物之理合潛而潛合見而見時時各有修為全妙在就終始內悟出一時字悟得時字方信得六龍皆是時由是動靜微彰莫不從時上化出真覺六龍在我日用間隨處備用天道之妙我御之而行矣蓋六龍如馬天如車聖人如人人乘馬以御車聖乘龍以御天其機要止在一時乾道變化各正性命保合太和乃利貞若夫乾之利貞何以見之夫乾道運行無一息之停故無一息而不變變之久而有者忽化而無無者忽化而有此變化二者造化之大機也惟一變一化氣候相催故物之資始者既不得不流形而流形者又不得不日趨于實蓋當流形之時氣方發舒理猶未實至此則華者將實凡物所秉于天天所賦于物之生理隨其貴賤大小莫不各得其分之所應有而內無缺少外無侵易各正性命非利乎然各正之時規模雖備而中未充滿久之則形質完固生意渾全凡物身中隂陽㑹合冲和之氣無不保全和合而無復歉然未滿之處保合太和非貞乎夫惟乾道有自然之變化而流形者不得不各正各正者不得不保合是乃所為利貞也首出庶物萬國咸寧以觀聖人亦有然者聖人而居髙位首出乎臣民之上以主宰萬民運行萬化猶乾道之變化也由是萬國各得其所而咸寧亦猶萬物之各正而保合也此亦聖人之利貞也可見總一乾德有是乾則有是元有是元則有是亨而利貞自相因而見四德不備不足為乾即其中而考其終始循其端倪元則必至於亨利貞而貞下又生元終始無端亦時之不容不然而已天之所以生成萬物聖之所以致太平胥是物耳象曰天行健君子以自強不息天乾象也凡重卦皆取重義此獨不然者天一而已但言天行則見其今日一周而明日又一周若重復之象非至健不能也君子法之全乎天理之本然而不為人欲所屈自強不息則一身之間亦有天行之健而天人相當矣蒙引曰凡君子以等皆以現成者言時文云君子法之當何如哉失其㫖矣又曰不可分以自強體下乾以不息體上乾蓋天行健三字已自不分上下體了故自強則不息一息則非強潛龍勿用陽在下也陽釋龍下釋潛在下故潛潛故勿用雙湖胡氏曰小象于乾初曰陽在下也于坤初曰隂始凝也隂陽之稱始此蓋六十四卦隂陽之初爻即太極所生兩儀之一以為諸卦之通例見龍在田德施普也龍已見則其德之所施已溥如日方升雖未中天而光已無不被雲峰胡氏曰提出一德自見九二之所謂大人者以德言非以位言也按德字施字普字逐字皆宜重看終日乾乾反復道也曰終日曰乾乾蓋重復踐行而一息不敢休也反復字重或躍在淵進無咎也曰或則可以進而不必于進其進必以時矣故無咎也飛龍在天大人造也造者起而在位有重新民物之義大人釋龍造釋飛亢龍有悔盈不可久也亢之為害以其盈也盈豈能久用九天德不可為首也六爻皆用九則乾變為坤正以九者剛健之極天德也陽剛不可為物先故必變而用柔乃吉也蒙引曰自強不息正欲全其天德之剛如何又不可為物先蓋天德之剛専言之天德也舉其全體自無所不該天德不可為首則偏言之天德也對柔順而言只是一邉道理耳故不可為物先東萊呂氏曰乾者萬物之首非有心于首萬物也雖為首而實未嘗為首也老子曰後其身而身先居其後乃所以致其先跡雖不為首心實為首也觀此可見老易公私之辨文言文釋也言指文周之辭乾坤道大故又作文言以盡其藴元者善之長也亨者嘉之㑹也利者義之和也貞者事之幹也元亨利貞四者不獨天道然也人心亦有之今觀人心之元天地生生之理而人得之以為心夫萬惡皆生于私忍則萬善皆生于惻怛人心中隱然有此生意繼此方有善之可言使此生意一無則衆善之路塞矣故後此所以為善之實作用尚多而不得不推此一念以為長是元者善之長也有此元又何善不統于吾心乎觀人心之亨則凡事理之嘉美無不㑹集于心蓋理之嘉美猶各為一理惟此心則衆理㑹聚之所非有其一端而遺其一端亨者嘉之㑹也有此亨又何理不燦列吾心乎觀人心之利本心之中自有裁制其用嚴斷不苟而能使物各得宜不相妨害利者義之和也有此利而何物不裁于吾心乎觀人心之貞本心之明識得正理自能守其正理為主于中而萬事依此以立貞者事之幹也有此貞而何事非心主之乎甚矣人心之四德如此其大也四句純以天德之在人者言元亨利貞就當仁義禮智看但不必露出仁義禮智元在天為統天在人為善長君子體仁足以長人嘉㑹足以合禮利物足以和義貞固足以幹事夫四德具于人心如此而全之者惟君子君子全其本心之元不使刻忍之私或傷其生生之性一身百體莫非生意流行是我為仁之體也體仁則舉念行事無往非仁覺天下無一人不在所愛之中此其心量真足以為天下君矣惟體仁足以長人而所謂善之長者果在我矣君子全其本心之亨以為嘉美之理無窮本㑹于吾心必嘉其所㑹不使嘉者有不㑹而㑹者有不嘉蓋吾心中本含載許多天理惟私意間之則其㑹于吾心者皆物欲之私偏邪之纍盡不嘉之物也而其嘉美之理反缺而不備矣嘉其所㑹使㑹于吾心者無非天理至粹之則而行事安有不合其節文者惟嘉㑹足以合禮而所謂嘉之㑹者果在我矣君子全其本心之利因物裁物各得其所必不使任私行意拂亂物宜則其義之分别嚴斷者適見為和順利物足以和義而所謂義之和者果在我矣君子全其本心之貞識其正理固以守之不使私意邪見搖奪其中然後有以主持事變而天下事依之以立貞固足以幹事而所謂事之幹者果在我矣君子行此四德者故曰乾元亨利貞然則四德雖人所共具然必君子之健乃能行此四德者故經文必曰乾元亨利貞惟乾乃有此四德惟君子乃能行此四德也合而言之天之所以成化者四德也聖之所以致治者四德也君子之行于身者亦四德也而皆一乾所自有大哉四德乎大哉乾乎初九曰潛龍勿用何謂也子曰龍德而隱者也不易乎世不成乎名遁世無悶不見是而無悶樂則行之憂則違之確乎其不可拔潛龍也潛有隱義潛而曰龍則其隱不同乃以聖人神明不測之龍德而隱者也惟龍德則外無慕于物不希世以變易所守不自表以急成其名惟龍德則內無歉于已雖遁世雖人不以我為是而皆無悶非特不易不成矣惟龍德則心無意必有樂乎時則行之無疑有憂乎時則違之亦不疑行藏操縱確然自有至理非隨世浮沉者所能染亦非憤世孤介者所能議又非特遁世不見是之無悶矣以此遞而觀之誠神明于隱者故為潛龍也九二曰見龍在田利見大人何謂也子曰龍德而正中者也庸言之信庸行之謹間邪存其誠善世而不伐德博而化易曰見龍在田利見大人君德也二亦龍德而正當潛躍之中此其為德何如蓋盛德之至雖庸言亦必信庸行亦必謹天德之無間亦可見矣然猶恐有不信不謹之邪念乘之必防間其邪使信謹之誠存而不失是其天德之純而言皆可法行皆可則善蓋乎一世矣而不自以為善世猶是間存之加嚴也夫德愈盛而功愈密善愈大而心愈小此聖人之純亦不已而人莫之測所謂龍德者此也由是信謹所孚誠意所格德無不被亦既博矣而凡被其德者從而自化莫知誰之為此又其時位之正中使然也故易曰見龍在田而即稱以大人蓋二雖非君位而其德如是德之及人如是是已全乎君德也非大人而何九三曰君子終日乾乾夕惕若厲無咎何謂也子曰君子進德修業忠信所以進德也修辭立其誠所以居業也知至至之可與幾也知終終之可與存義也是故居上位而不驕在下位而不憂故乾乾因其時而惕雖危無咎矣君子之所為乾乾者何事乎為人必有當然之理因有當盡之事理得而具于心曰德事成而積于身曰業苟德可任其不進業可任其不修則怠止廢缺已耳何乾惕之有夫君子之乾惕蓋其造理之功日親日切汲汲焉日進其德而不已也分所當為之事益精益備勉勉焉日修其業而不已也顧德何以進則惟忠信凡信理未篤見理未真悠游浮泛則今日此人明日仍此人云何進惟盡已務實其認理懇切有不出于此而不可者具此實力乃能日異月新忠信所以進德也日日修業則日日守定此事不分心于他是修業即居業也業何以居則惟修辭立其誠蓋以忠信進德則已有是造理之誠矣特臨事之時不以所得之理實盡其事而徒逞快于言辭辭不能自撿則向之忠信漸衰漸薄豈能久居此業而不懈故必修治言辭著意撿㸃所言必所行所行必所言使忠信之心不至汨沒動搖而不得立乃能一心守定此業日日修之而不輟矣修辭立其誠所以居業也夫所謂忠信者果何如而忠信之可以進德者又何如蓋理有極至而不可易者曰至惟真知至之所在而心必趨于是焉真知實詣求造乎理之極而後已是為忠信如是則理之幾微無不辨矣夫進德之士必于理道幾微之境有日解所未解日獲所未獲者而後其德為能進今唯知至至之則可與為此矣可與幾而德不已進乎所謂立誠者果何如而立誠之可以居業者又何如蓋事之究竟成結而不可易者曰終真知終之所在而身必詣焉務求極于所終之地而不苟止是謂立誠如是則終一事即獲一義而此義遂確乎存于我矣夫居業之士必于日用當行之宜有此日存而不失日日存而不失者而后其業為能居今惟知終終之則可與為此矣可與存義而業不已修乎夫人之居危而有咎者以其驕與憂也人之有驕與憂者以其不係心于進修而惟存乎上下之見也君子乾乾進修何暇驕與憂乎故乾乾因其時之當惕而惕則驕憂不生雖危無咎矣甚矣君子之當乾乾于進修也時字即照夕字意九四曰或躍在淵無咎何謂也子曰上下無常非為邪也進退無恆非離羣也君子進德修業欲及時也故無咎上下者進退之已成進退者上下之未定君子既已進德修業亦思有為于天下欲及時而進也況及時變動正君子進修之實又何咎及者稍急則先時稍緩則後時惟適及其時正或之神九五曰飛龍在天利見大人何謂也子曰同聲相應同氣相求水流濕火就燥雲從龍風從虎聖人作而萬物覩本乎天者親上本乎地者親下則各從其類也同聲相應至聖人作而萬物覩一氣相形說正意已盡本乎天者三句又推所以聖作物覩之理此節只發利見之故未講大人上九曰亢龍有悔何謂也子曰貴而無位髙而無民賢人在下位而無輔是以動而有悔也凡所謂貴者以其正當要路也上則亢矣故雖貴而無位凡所謂髙者以民皆擁附之也上則亢矣故雖髙而無民五陽皆在下是賢人在下位也凡樂有賢人在下者以其為我輔也今以上九之亢而莫有輔之者無位則權去無民則勢孤無輔則身危安得無咎潛龍勿用下也文言前節龍德而隱以下既詳六爻之義以申象傳之意至此又約其㫖而申之曰初九所謂潛龍勿用者以其位之下也位當在下雖龍德其敢用乎見龍在田時舍也二之德施普德博而化蓋其德自能致之若以位則猶未為時用也終日乾乾行事也乾乾非徒憂乃行所當行而不自怠也或躍在淵自試也云或者自試其時之可而後進也進退之機間不容髮淺深斟酌自知之而已飛龍在天上治也大人不必皆有位惟飛龍乃為得上位以治下也亢龍有悔窮之災也凡事不可窮極窮則災生亢之有悔正窮之災也乾元用九天下治也他卦之用九者何限不得為剛而能柔之義惟乾之用九有元德焉乾元貫四時包四德剛柔溫肅無所不有以此用九則張弛協中寬猛互用天下可治矣潛龍勿用陽氣潛藏又申前意以性情言謂之乾以氣言謂之陽陽氣雖主于發施而亦以能藏為本曰潛曰勿用正陽氣之潛藏以為用基也見龍在田天下文明愚民混處本皆鄙野無知自大人現于世雖未為時用而德博而化天下被之鄙野者始秩然而有文無知者始煥然而有明矣終日乾乾與時偕行乾惕用力勤苦似非聖人之事然以時之危厲當惕則惕是即時乘變化之理與時偕行非聖人不能也或躍在淵乾道乃革革者去舊之義上下皆乾至四乃革下而登上變革宜審故或飛龍在天乃位乎天德九五之位非無德而徒居其位也乃位乎天德者也其德宜居此位故稱天位為天德亢龍有悔與時偕極時既極不知自退乃與之偕極宜其悔也易道莫大乎時時有宜隨而順之者與時偕行則無咎時有宜隨而制之者與時偕極則有悔乾元用九乃見天則剛柔適中天之法則也則者理之有限節而無過無不及者也惟乾元統天則天道運行之內自有節量分劑存乎其間人君以此用九然後天則于此而見也乾元者始而亨者也乾之有元人亦知所以為乾元者乎元為物所資始而不徒始物有資始即有流形始而亨即隨之者也利貞者性情也然豈徒亨而已哉所謂利貞者亦不過乾元之氣日趨于實而各足其秉賦之性各含其生生之情者也然則元亨利貞析之則四合之則二其實貫而一之則渾然一元之氣也乾始能以美利利天下不言所利大矣哉乃知乾元之始既已始而亨矣乃不惟物之亨者恆于斯且能使物各得所宜以美利利天下而物之利也恆于斯又能收藏生意不自顯言其所利而物之貞而成也亦恆于斯信乎乾元之統天也大矣哉大哉乾乎剛健中正純粹精也夫乾之元能終始萬物如此則甚矣乾之大也大哉乾乎豈一德之可名乎元而亨亨而利利而貞其體有以主萬物而無少屈撓何其剛其用有以運萬化而無少間息何其健且當元而元元之後繼以亨當亨而亨亨之後繼以利當利而利利之後繼以貞貞下又生元其行適勻無過不及中也元自為元亨自為亨利自為利貞自為貞其立各足無偏正也剛健中正足以盡乾乎乃剛健則極其剛健而不雜于隂柔純矣中正則極其中正而不雜于邪惡粹矣且純粹則極其純粹而至于不可致思不可名言之地又何其精也夫乾之德至于屢詞不足以盡之甚矣乾之大矣六爻發揮旁通情也夫乾道如此其大則即元亨利貞之四言已正舉其義而直通之矣而由是有六爻又各為發揮則凡乾之藴無不旁通曲盡而凡遇一時一事皆各有一剛健中正純粹精之理矣是合六龍而觀之無非天道變化之妙也時乘六龍以御天也雲行雨施天下平也是以聖人在上時乘六龍以御天也張弛動靜無一非天但見其政教流布雲行焉雨施焉有由始而亨之機而究其後則萬民各得其所而不知誰之力但見其天下之平而已聖人之元亨利貞與天又何異哉君子以成德為行日可見之行也潛之為言也隱而未見行而未成是以君子弗用也理之得于心為德或得而未堅堅而未大皆非成德也中無定體外何以應用而為行若君子以其已成之德而發之為行則理熟養定自能經濟世務是以成德為行也夫初九之德已成則宜日可以見之于行也乃猶曰勿用何邪蓋初九時當乎潛潛之為言也其德雖成猶隱而未見于世不為人所知則其事業猶未能成是以君子弗用耳君子學以聚之問以辨之寬以居之仁以行之易曰見龍在田利見大人君德也大人之德前言信謹間邪不伐舉其德之已盛者言之也若其所以成此德之功何由乎天下之理貴有以聚之又貴有以辨之所聚所辨貴有以居之又貴有以行之君子必也多聞見勤體求舉凡理之在事物在方冊者皆欲聚為我有也然所聚之理有是非有精粗必考問師友以辨析之于至明也至于所聚所辨之理既浩博無盡又須我心寬濶不執一見之私不取迫求之效公虛悠裕以居貯之使其細大皆容而條理自見也及其事至物來之時則又審其外當于理而內無私心如是以行之也君子由此四者以成大人之德故易直謂之大人以其君德已備也九三重剛而不中上不在天下不在田故乾乾因其時而惕雖危無咎矣以重剛不中而位非上下之安危地也惟乾惕可以無咎前數條止言乾惕之實未詳九三之象故于此發之四爻同此九四剛而不中上不在天下不在田中不在人故或之或之者疑之也故無咎九三猶可安居人位以盡人事為責四則變革之際進退未定非可安坐修職者比矣故或夫大人者與天地合其德與日月合其明與四時合其序與鬼神合其吉凶先天而天弗違後天而奉天時天且弗違而況於人乎況於鬼神乎前之釋五皆言其飛之義利見之義未言其所以為大人也夫大人者何如哉夫天下莫大于天地天地之垂象而照臨者莫大乎日月天地之循序而運行者莫大乎四時天地之屈伸往來而福禍萬物者莫大乎鬼神人與是數者本無二理特以蔽于有我之私是以梏于形體而不能相通大人無私與道為體又焉往而不合哉存之為剛健中正運之為元亨利貞無私覆無私載與天地合其德也推之智周萬物與日月合其明也張弛互用與四時合其序也威福無私與鬼神合其吉凶也其與天地無不符合如此故有時天所未有之事聖人以已意創為之是先乎天也而行之而順設之而安天亦不違之矣是大人所為即天所欲為也有時天所已有之事聖人體天意而繼行之是後乎天也而適所以奉乎天時之自然而不容已是天所為即大人所欲為也夫合先後天而天皆不違乎大人如此天且弗違況于人者天之心鬼神者天之用又安有或違乎夫大人與天地無往而不合則幽明上下亦無往而有違信乎人之利見矣亢之為言也知進而不知退知存而不知亡知得而不知喪其唯聖人乎知進退存亡而不失其正者其唯聖人乎亢則必有悔然則必何以處此而後免于悔乎蓋亢之為言也以其見幾之不明貪于前而不顧其後知身之欲進而不知有退知位之欲存而不知有亡知物之有得而不知有喪是以至于亢是以不免于悔也甚矣人之昧此者多也其唯聖人乎知進之必有退存之必有亡而處之以道固非溺于趨利而有貪得忘患之私亦非巧于避害而有以退為進之術確然循理之至當而不失其正者信非聖人不能也其唯聖人乎固知時有亢聖人無亢也坤下坤上坤元亨利牝馬之貞君子有攸往先迷後得主利西南得朋東北喪朋安貞吉坤至順也至順則虛心順應不違物之理不拂人之性自然在彼無惡在此無斁矣何行而不可其占亦當獲元亨也但隂柔之性不能堅久故必常守此順順之中有健以持之如牝馬之順而健乃其貞也蓋隂不可以敵陽故常減于陽之半陽以先統後而隂則僅得其後陽主于裁物之義而隂僅可以順其自然陽于四方無不統而隂則僅處其西南是凡事皆讓陽而甘守其力之所可及是乃坤順之正也故君子之有所往也苟先物則致迷惟處後乃為得主于順利而不敢造作往西南隂方則得朋若往東北陽方則喪朋可見後也利也西南也皆順則皆貞也若先也義也東北也皆陽健之為非坤貞也夫人苟能為陽之所為豈不更善而無如隂柔之分實止于此苟越分而求全乎陽之所為則妄動必凶矣惟審分既明心安于隂順之貞而無所冀焉是即順中之健是即牝馬之貞庶能為所可為而吉也蒙引曰乾辭皆從乾道大通至正上看來坤辭皆從陽全隂半上看來利牝馬之貞總含下文安貞吉總結上文彖曰至哉坤元萬物資生乃順承天坤道無不該而成形之大者惟地試以地觀坤之四德至矣哉坤之元乎舉萬物之廣莫不資坤元以為形生之始此坤元之德所以為至極而無少歉也然其所以資生者實非自為乃順承乎天之氣而生之耳舉天施之功而地能承順之自天以下孰有加乎地德者甚矣其為至極也坤厚載物德合無疆含𢎞光大品物咸亨若坤之亨何以見之夫坤本造化隂順之氣亘古來資之不窮用之無量蓋至厚也以其至厚者持載萬物此其德固配合乎天之無疆矣試由其厚德觀之一氣之內含蓄萬氣極其𢎞廣而由是發之于外者遂光顯而盛大焉品物之廣莫不潔齊而咸亨此坤之亨也牝馬地類行地無疆柔順利貞君子攸行若坤之利貞而取象牝馬何歟蓋馬本乾象而牝馬性順則地類也且行地無疆則順未嘗不健矣由牝象可識坤之柔順由無疆之象可識坤之利貞蓋承天即其柔順而柔順之德未嘗止息使生物皆克有終即其順之健即其利貞也此坤之利貞而君子所法以行也先迷失道後順得常西南得朋乃與類行東北喪朋乃終有慶惟君子攸行法乎坤之柔順故其占宜安乎隂之分而不敢全乎陽所為先迷則失其柔順之道後順則得其柔順之常西南得朋乃與其柔順之類同行東北喪朋則必復就于西南而終有慶信乎君子攸行惟利于柔順也安貞之吉應地無疆惟攸行皆利于順故必安貞而後許之以吉者正以安貞者地德所以無疆君子心安于貞則與地之無疆相應合而無間又何不吉乎君子攸行以上分釋四德先迷失道以下方釋占辭象曰地勢坤君子以厚德載物坤象地重坤之象如地勢髙下相因之無窮此可見其至順矣夫地勢所以髙下相因無窮者以其厚也君子亦有厚德焉寬仁之篤于念者無少薄義理之得于心者無少缺乃能承載天下使人民各得其願而事物吝得其理所載之物亦有髙下相因之無窮者矣初六履霜堅冰至霜隂氣所結盛則水凍而為冰此爻隂始生于下其端甚微而其勢必盛故其象如履霜則知堅冰之將至也占者可不謹于微哉夫隂陽不能相無而其消長亦非人所與然陽主生隂主殺則其類有淑慝之分焉故聖人作易于其不能相無者既以健順仁義之屬明之至其消長之際淑慝之分則又深致其扶陽抑隂之意蓋所以贊化育參天地其㫖深矣朱子曰盈天地間所以為造化者隂陽之終始盛衰而已陽生于北長于東而盛于南隂始于南中于西而終于北故陽嘗居左而以生育長養為功其類則為剛為明為公為義而凡君子之道屬焉隂常居右而以夷傷慘殺為事其類則為柔為暗為私為利而凡小人之道屬焉聖人作易于進退消長之際示人深矣象曰履霜堅冰隂始凝也馴致其道至堅冰也初六所以有履霜堅冰之象者以其隂氣始凝也由其道而馴至之故必至于堅冰馴者狎而習之之謂隂孽之端莫不由狎而玩之而終至于不可制六二直方大不習無不利坤德柔順正固直也賦形有定方也德合無疆大也此三者坤之全德也六爻皆坤惟六二柔順中正為得坤道之純故坤之全德獨歸焉內則居心得其正外則處事合其宜而直方之德又極于光輝盛大且不思不勉從容中道不待學習而自無不利矣象曰六二之動直以方也不習無不利地道光也惟六二則有柔順中正之德故其見于動者既徵其內之直又見其外之方也夫直方大皆地道也人苟勉而效之或合或否終未光顯惟不習無不利乃坤德純足于內而沛然發揮有餘然後于地道為瑩淨而光明也凡象傳提出爻名則義在爻名也從來重動字愚意重六二更切乾莫盛于九五坤莫盛于六二六三含章可貞或從王事無成有終三陽章美之德也以六隂居之為內含章美而不露自能貞固以守然居下之上則章美亦無終藏之理或出而從王事焉始雖無敢専成而其後亦能建竪以有終也無成者含有終者章也象曰含章可貞以時發也或從王事知光大也含章可貞豈終于含哉特俟時而發也遇時而不能發是本無章矣從王事而能無成有終由其智之光明𢎞大所見者逺自不急于炫耀淺暗之人有善惟恐人不知豈能含章也六四括囊無咎無譽重隂則無才而甘退不中則過于謹守故深藏固閉如結囊口而不出也人不能害己己亦不能利人占為無咎無譽也隂虛能受有囊象六三六四皆取含蓄不露之象三以隂居陽猶或可出而從王事四以隂居隂唯括囊不出而已象曰括囊無咎慎不害也慎釋括囊不害釋無咎單舉無咎者四之意求無咎而已無譽非所計也六五黃裳元吉五尊位也而以隂居之隂為順五為中德中順之德充諸內而見于外者一言一行無往而非中順溫恭之美人人可見如黃裳然以之處已則盡已之道以之處人則得人之心大善而吉之道也蒙引曰凡言吉者只是事吉而已元吉則于道理盡善而吉也象曰黃裳元吉文在中也黃裳之文非飾諸外者可能由其根于中乃見于外也息齊余氏曰文在中止發黃裳義蓋通坤卦皆可言裳惟五則為黃裳二雖中而不文三雖文而不中故直方但言其質之中含章但戒其華之露上六龍戰于野其血𤣥黃隂本不敢敵陽惟隂盛之極遂敢與陽爭為龍戰于野之象夫陽方衰固無盛隂之勢隂雖盛亦無獨克之理兩敗俱傷而其血兼𤣥黃二者凶不言可知也隂盛于陽故與陽俱稱龍陽衰于隂故與隂俱稱血初曰堅冰至防龍戰之禍于其始上曰龍戰于野著堅冰之至于其終象曰龍戰于野其道窮也隂盛至于窮極則必爭而傷也蓋由初六馴習其道以至此故兩示其道字具載始末用六利永貞凡筮得隂爻者皆用六不用八亦通例也以此卦純隂居首故發之遇此卦而六畫皆變者其占如此辭蓋隂柔不能固守六隂皆變而為陽則順而能健能永其貞矣故戒占者宜于永貞即乾之利貞也自坤而變故不足于元亨云雲峰胡氏曰坤安貞變而為乾則永貞安者順而不動永者健而不息象曰用六永貞以大終也陽大隂小先隂而後變為陽是始雖小而以大終也雲峰胡氏曰既提出隂陽二字于乾坤初爻至此曰以大終以見隂為小陽為大隂陽之大分明矣文言曰坤至柔而動也剛至靜而德方後得主而有常含萬物而化光坤道其順乎承天而時行坤之為坤其道誠何如乎以地觀之頺然處卑不敢専成至柔矣而及其氣機之發動也勃然莫禦其力之剛決未嘗遜乾也寂然安處無所造作至靜矣而其作成之德則賦形有定不可移易未嘗因靜而渾淆也此文王所謂利牝馬之貞而吾所謂柔順利貞者此也以人事之占言之以處後為得主于順利而無時無事非後利也所行如是洵有常矣此文王所謂後得主利與吾所謂後順得常者此也再以地觀之舉萬物之生氣俱含蓄于地中而發達于外功化遂光顯而不可掩此文王所謂亨而吾所謂含𢎞光大者此也然則合所謂利牝馬之貞與所謂亨者而總斷之坤道固可知矣坤道其順乎天以資始之氣施于下而地即以資生者承之不敢先乾而起亦不敢後乾而不應承天而時行如此其順也此文王所謂元而吾所謂乃順承天者此也識坤元之義乃知坤止一順而凡柔剛靜方後利有常含物化光之屬總皆順德也坤之為坤如此蒙引曰彖傳有以地道言者有以人之占言者此則復錯舉以申之不可附㑹以貞利亨元之說也積善之家必有餘慶積不善之家必有餘殃臣弒其君子弒其父非一朝一夕之故其所由來者漸矣由辨之不早辨也易曰履霜堅冰至蓋言順也家之慶殃由于積弒逆之禍由于漸甚矣微之不可不慎也直其正也方其義也君子敬以直內義以方外敬義立而德不孤直方大不習無不利則不疑其所行也六二直方大之德以何學而成乎夫直者其本心無私之體也正也方者其應物裁制之用也義也君子何以直人心怠玩故惟見私意膠擾君子則主敬收斂嚴肅心常惺惺使其胸次洞然無纎毫委曲才敬則內已直是敬以直內也何以方人處事不奉義理為權衡故是非長短偏私互見君子則辨義本天理之公以為裁制區畫使其是者決是非者決非截然方正而不可移易才義則外自方是義以方外也夫人之修德義而無敬則中心無主而義亦莫能自辨敬而無義則公私不明而敬亦不克獨存是皆孤也若一敬主乎內一義防乎外二者並立夾持吾心使神明之內非敬即義更無閒餘且敬足以生義義又足以生敬始覺吾德有所持循依助而不孤所以日造于盛大也故曰直方大不習無不利者正以敬義功純直方德備則本心洞達天理流行日用之間沛然行之而無疑又何待于習也乾二言誠坤二言敬乾二言仁坤二言義隂雖有美含之以從王事弗敢成也地道也妻道也臣道也地道無成而代有終也弗敢云者非才不足乃分不敢也天地變化草木蕃天地閉賢人隱易曰括囊無咎無譽蓋言謹也人與天地萬物同是一氣泰則見否則隱猶草木之春生秋落氣至即應間不容髮衆人與天地之氣不相通氣至而覺者獨賢人而已所以有括囊之謹也爻義所指寬或事宜慎密或時當隱遁文言則單指隱遁之時君子黃中通理六五何以為黃裳也蓋君子之心虛中無物是黃中也而無物之中自覺萬理融通無少滯礙條理各得無少混淆黃中通理此五之中德而辭所以取象于黃也正位居體正乎君位而能謙抑待人自居乎下體此五之順德而辭所以取象于裳也美在其中而暢于四支發于事業美之至也夫中順析言之則二也合言則惟中故順益黃裳本一物耳君子有黃中通理之美充積于中而由是暢達于四支冲和洋溢莫非順焉發施于事業優優敷布莫非順焉虛中之體存乎中而暢發于外無非謙抑此乃美之至也已蒙引曰暢四支發事業要切居體意不可泛泛說隂疑于陽必戰為其嫌于無陽也故稱龍焉猶未離其類也故稱血焉夫𤣥黃者天地之雜也天𤣥而地黃上何以言戰蓋隂下于陽則分得其平爭于何起今隂盛之極勢與陽相似盛者不復安于卑衰者終不降其尊固必戰也何以言龍為此時純隂疑若無陽故稱龍以見陽之未嘗一日絶也何以言血蓋隂雖盛終不離乎隂類故稱血以見隂之亦傷不能獨害于陽也何以言𤣥黃𤣥黃並舉是天地之雜色然究實而言天則𤣥地則黃又以見隂陽之有定不可得而相易也震下坎上屯元亨利貞勿用有攸往利建侯屯難也與否之塞蹇之滯困之窮不同物之始生而未伸事之方營而未通時之方創而未平皆屯也皆鬱而未暢之意也此卦以震遇坎震當乾坤之始交而即遇坎險正創始未通之象故名屯屯難之時需才以濟而卦有震動之德在險中而能經營布置不坐以待困焉不患不大通也故當得元亨但所云動者惟利在固守正理不可遽有所往濟大事者要在識大義而徐聽其時勢邀險功趨小利不可為也然濟屯又有要務焉在立君以統治而初九陽居隂下為成卦之主是以賢下人得民而可君之象故又利于建侯也彖曰屯剛柔始交而難生屯者震為剛柔之始交震而遇坎是始交而難生此開始未通之象故名屯也動乎險中大亨貞所謂元亨利貞者卦德動乎險中動有幹濟之用故許其大亨險非輕舉躁進之地故戒以貞勿用攸往之義統此矣雷雨之動滿盈天造草昧宜建侯而不寧所謂利建侯者由卦象觀之雷雨交作雜亂晦冥塞乎兩間屯象也正如天運未通之日天下未定則雜亂之甚謂之草名分未明則晦冥之甚謂之昧此時正宜立君以統之然後草者可治昧者可明也然而建侯之後豈敢遽謂安寧而致流于荒怠以復生草昧之禍哉甚矣屯之未易處也蒙引曰人情易溺于晏安一立個君便以為安寧了則終無以撥亂反正所謂電起漚滅乍聚乍散者耳如更始諸將一立更始便只日夜縱情聲色識者知其不終矣象曰雲雷屯君子以經綸雷雨作則解矣雲雷方興屯鬱之象也君子當屯時治其草昧必先經以引之而正其大綱又綸以理之而條其節目然後草者就緒昧者向明而屯可通也屯難之世人皆惶懼沮喪不敢有為殊不知正君子有為之時也初九盤桓利居貞利建侯初陽剛震動正濟屯之才也然以其居動體則志固欲進矣以其居難初則時未可進也在下則勢不足進也所應者隂柔險陷之爻則依倚之人不足與共進也得無盤桓而難進乎夫難進則不可徼幸以求進也而初九以剛居剛亦有得正之象故其占利于居貞難進而終必有可進之㑹也而初九以陽下隂亦有得民而為君之象故象為利自建為侯也象曰雖盤桓志行正也以貴下賤大得民也盤桓者以甚欲進之心而厄于不得進之勢恐不暇復顧其正矣然初九剛正其志自在行正不以盤桓而變也其曰利建侯者初有剛動之德可貴者在我而居隂下是能以安人利物為懷舍已便民為訃不自尊亢而下乎賤所以大得乎民而侯位不得不屬之也六二屯如邅如乘馬斑如匪冦婚媾女子貞不字十年乃字六二隂柔中正其德為人所欲求然既正應于五矣而近乘初剛又為初所求故為初所屯難欲與五合而邅回不進若乘馬而且前且却班布不進也夫初之屯我非為冦也乃求與我為婚媾耳此其厚我之意何其殷勤在人情以利較之何忍拒近我者之殷求而懸待于地逺勢衰之正應乎且士為知已者用二亦不為無辭以謝五然而六二中正之守則確不可拔也斷不從初如女子守正而不許嫁直至十年數窮理極之日妄求者知我必不可求而去而後得合乎正應焉如十年乃字也六二之象如此是為不以利害傷義不以盛衰易心占者可以戒矣象曰六二之難乘剛也十年乃字反常也二之屯難以乘初剛則必為所求也應五者其常乃字則復常矣明君子之處變而不敢棄常也好言權變者妄人耳六三即鹿無虞惟入于林中君子幾不如舍往吝隂柔才弱也居下位卑也不中正立心制行不善也上無正應無援也但隂柔不中正之人雖不可進而躁于進則非但不遂其進而反以取困如即鹿而無虞人導之惟陷入于林中而已君子知幾不如舍之若貪而往焉徒取吝耳象曰即鹿無虞以從禽也君子舍之往吝窮也即鹿無虞非有濟世之志特貪乎功利遂不覺躁動耳君子舍之誠知往之必吝窮也六四乘馬班如求婚媾往吉無不利才弱不能自進然得正則不似三之妄進故且前且却有乘馬班如之象所幸初九守正居下以應于已應已是我之婚媾也居下則猶未就我也守正則雖情不他適而必不肯枉已先來也故四宜求之以自輔夫今日之勢天下成敗固在于初四乃求得此人以往濟屯何吉如之又焉不利之有象曰求而往明也知已之不足而甘心求初非明者能之乎知濟屯之必待于初知初之為已正應又知正應之必待求而後至皆必審于理勢之正者乃能之此是贊詞不作推本說九五屯其膏小貞吉大貞凶九五雖以陽剛之才中正之德居乎尊位但陷于險中是失勢也六二正應才弱不足以濟是無援也當此時而又有初九得衆于下民皆歸之則五雖坎體有膏澤將安施乎為屯塞其膏之象是蓋德不能抗時理不足勝數無可為也處此者于小事而行之以正猶可吉若大事則雖正亦凶矣象曰屯其膏施未光也屯其膏非不施也縱施之未能光大也上六乘馬斑如泣血漣如屯極則當通上居屯極正一機㑹也然才弱無應進無所之憂懼而已故象如此象曰泣血漣如何可長也屯極之時若不變而為治即入于亂亡止此二者更不容待如第泣血漣如而已則亂亡及之何可長也坎下艮上蒙亨匪我求童蒙童蒙求我初筮告再三瀆瀆則不告利貞蒙昧也物生之初蒙昧未明也此卦以坎遇艮山下有險山下已險矣又遇險陷手足靡措蒙地也內險外止如人心中既危􅑾不安矣外又阻礙而不如意蒙意也故名蒙人心蒙昧惟剛者有以發人之蒙惟剛而中者又善于發蒙九二剛中以之治蒙亨可必也然善發蒙者豈往求童蒙而教之哉二剛中而六五下應之則匪我求童蒙也乃童蒙求我故可施吾教也且其求我者必至誠専一如筮者之初筮則可告矣若心不専一若筮者之一事而筮至再三則其心瀆亂瀆亂則不告矣待求而受之待求之誠而教之皆剛中之用也至所以發蒙之具則惟利于以正理啓之治蒙具此三義故蒙可亨也雙湖胡氏曰乾坤之後屯主在震初爻蒙主在坎二爻此長子代父弟次兄之象屯君道蒙師道天地既位君師立矣彖曰蒙山下有險險而止蒙蒙者卦象山下有險蒙之地卦德險而止蒙之意合兩義而名蒙蒙亨以亨行時中也匪我求童蒙童蒙求我志應也初筮告以剛中也再三瀆瀆則不告瀆蒙也蒙以養正聖功也蒙而能亨非蒙自亨也治蒙在九二而二能以可亨之道而行之且又得乎時中蓋既有教人之道而施教之術又因時而當其可是以亨也苟無可亨之道則童蒙不我求而非時中則又不待求而應之矣故所謂匪我求童蒙童蒙求我者正以五之志應于二二非有求于五也抑無可亨之道則無以告蒙而非時中則告之不以其節矣故所謂初筮告者以二剛則能告中則必待其誠而後告也再三瀆瀆則不告者再三而亦告之則彼固瀆我而我亦為瀆蒙故不告也凡此皆以亨行時中之事也至所謂利貞者蓋蒙而養之以正則其去聖域雖逺而此日所為即求為聖人之功也教蒙何可不貞乎象曰山下出泉蒙君子以果行育德山下出泉勢雖必行而流則有漸未能遽達蒙象也泉非蒙出之山下則蒙也夫人當蒙未知所適也必果決其行而達之蒙未有害也必育養其德而成之治人之蒙與自治其蒙皆然初六發蒙利用刑人用說桎梏以往吝隂柔之性而僻處下陋蒙甚矣不可不求所以發之夫昏蒙甚者告之而弗喻引之而屢違非痛懲不能知警而有奮故利用刑人也然痛懲之後又宜暫寬舍之以徐觀其後用說去其桎梏之刑焉苟純用刑人以往而不舍焉則終不足以發彼而我可吝矣象曰利用刑人以正法也用刑人非酷暴也發蒙之初矩間不可不正刑其不法而後法可正以為愛蒙之必由乎此也九二包蒙吉納婦吉子克家九二以陽剛為內卦之主統治羣隂當發蒙之任者以理言之所治既廣物性不齊不可一槩取必也而爻德剛中實能包容而并育之吉道也且以陽受隂而隂得所歸有納婦之象亦吉占也又二居下位而善于治蒙能任上事有子克家之象占者有其德則當之矣象曰子克家剛柔接也子克家雖二之能然非五任之二亦不能成功二剛而五之柔與之接意相入情相契二始得有其教不然我以我之剛而彼以彼之柔味殊臭别呼之而不靈施之而不受二何為耶六三勿用取女見金夫不有躬無攸利隂柔不中正昏愚而志邪蒙不足以盡之以女取象則此女也人勿用取之也彼其貪欲忘恥見有金之夫輒不自有其躬焉取之何所利乎象曰勿用取女行不順也人未論才之髙下但其操行知慎則君子猶欲與之如女雖無他長但知自慎者皆可取也若見金棄躬不慎之大者斷不可取矣六四困蒙吝既逺于陽又無正應獨守固陋誰與發之困於蒙焉甚可吝也象曰困蒙之吝獨逺實也羣隂皆近陽四獨逺之人皆欲上達而我獨甘汚陋此其可恥也獨字重六五童蒙吉雖居尊位而賦性柔中下應九二純一未發以聽治于剛明是為童蒙之象聖功可修吉道也象曰童蒙之吉順以巽也人不患蒙患有發蒙之人而我心不卑順不能與之巽從而相入五有順德以巽乎二此童蒙之所以吉也上九擊蒙不利為冦利禦冦以剛居上治蒙過剛有擊蒙之象夫取必太過攻治太深則反阻其知能而無以自進于善是我反為彼冦甚不利于如此也若捍其外誘以全其真純為之禦冦焉則雖過于嚴密亦其宜矣象曰利用禦冦上下順也聖人行事惟欲人我各得其道則利矣禦冦以剛則我之用剛得其宜而人借我之剛以去其冦彼亦樂吾之用剛也上下皆順不亦利乎順字貼利字然上下二字亦不可略蓋治蒙者不可以已居上遂惟意所行也必上之道順而後下因以順必下之道順而後上益見其順惟禦冦能然故利乾下坎上需有孚光亨貞吉利涉大川需待也天下事當時之未至機之未通雖聖人不敢強進以速敗也此卦以乾遇坎剛健務進然遇險而不遽進待之義也故名需夫人之需待有限于勢而非出于心之實然者非能需者也或心實需而事有不正非能需者也此卦九五坎體中實有中孚之象陽剛中正以居尊位有得貞之象坎水在前乾健臨之有將涉水而不輕進之象夫需待而有孚實心以待真覺義命之可安則時之至否一毫不以纍其心吾見其絶計較之私而心光明矣絶憂患之擾而心亨通矣又能守其正理應事之際惟行其天理所當行而無所僥幸則其事可濟而吉矣凡事皆吉而大川險難之際尤宜需之以正貞則又利涉矣信乎需道內欲孚而外欲貞不可易也孚者若將終身焉心中實放得下也以此皎潔心胸而行事一循乎本分聖賢所以成大事而氣不亂智不鑿者此道而已彖曰需須也險在前也剛健而不陷其義不困窮矣需之義須待也而此卦所以名需者坎在上乾在下以卦德推之是有險難在前也夫隂柔性躁不能久待若剛健則沉毅不苟而不肯冒陷于險此其義固可以不困窮矣需有孚光亨貞吉位乎天位以正中也利涉大川往有功也需而謂之有孚光亨貞吉者蓋卦體九五位乎天位則事之需與不需權固在五矣而五實有正中之德正則規模正大外無苟且之圖中則處心虛靜內無躁動之念所以能孚能貞而光亨且吉也利涉大川者卦象坎陷有大川之象乾健有利涉之象以乾而涉大川則沉毅堅定有忍而克濟矣往則有功又非特不困窮而已故云利也象曰雲上於天需君子以飲食宴樂雲上于天無所復為待其隂陽之自和而雨耳事之當需者亦不容更有所為但飲食晏樂俟其自至而已一有所為則反敗矣初九需于郊利用恆無咎國外曰郊未近于險之地也初去坎險尚逺其需也需于郊之象也夫事未及我而我強與焉或先已靜待而躁𠂻忽動又變常而姑試焉皆取咎之道也初九乾剛有能恆于其所之象故需郊者惟宜恆其心志以安處于郊焉則免咎矣象曰需于郊不犯難行也利用恆無咎未失常也郊本無難若不知需是難非有意來困我而我固犯之以行也難不可避亦不可犯初所以需于郊也需者初本然之能固其常也無故而失其常度有舉皆謬矣故利用恆乃無咎者此時無他善可冀惟未失常則庶幾無咎也九二需于沙小有言終吉二比初則漸近于險矣需于沙之象近險不能無小傷或小有人言之災然剛中之人沉毅而善隨時必不激于人言而失其需故終能濟險而吉象曰需于沙衍在中也雖小有言以吉終也二雖近險然本性剛健能寬衍自得以居乎中道未嘗急進也故雖有小言之傷而處之有道自能以吉終也九三需于泥致冦至三比二則又近于險矣為需于泥之象夫難已迫身而九三又以過剛不中處之適足以致冦害之至耳象曰需于泥災在外也自我致冦敬慎不敗也需于泥則災已在外一舉足即入災矣故冦至而曰致者三自過剛自我致之也誠使敬以居心而慮患又加慎焉固不至于敗也蓋過剛則傲忽取敗故以敬慎教之自能審宜量勢可救其不中之病矣六四需于血出自穴血者殺傷之地穴者險陷之所四交坎體已入乎險在殺傷之地而需焉為需于血之象然柔順得正能靜以待之而不妄動又可以自險而出蓋正與九三之象相反象曰需于血順以聽也血而需焉蓋本其柔順之心以聽乎時也使非順聽則殺傷之地不可一息處安能需乎三在險外而過剛以致冦四已入險而順聽以出穴天下事成敗何常顧人自處如何耳九五需于酒食貞吉需將極矣而九五以陽剛中正需于尊位時無他為酒食晏樂以需之而已得正而吉象曰酒食貞吉以中正也需于酒食非晏安荒逸之比也以其有中正之德內不躁而外不苟故能安以待之酒食即其正理也上六入于穴有不速之客三人來敬之終吉隂居險極才不足自拯時已需極無復容待遂陷而入于險中矣有入于穴之象幸下應九三三與下二陽正需極而並進為不速之客三人來之象三陽既進隂不能禦而順之有敬之之象夫我方溺于極險而忽有強力之人連類而至是我意外之幸也彼之志雖不在我我敬待之固可資其力以出險也終吉蒙引曰此爻倣佛如漢髙為項羽所怒忽得項伯救之之類世事如此類甚多惟有智量之人步步得活法要在寧耐委曲上象曰不速之客來敬之終吉雖不當位未大失也才足以濟其位之事則為當位隂居險極是不當位而將有大失也惟不速之客來而能敬之則雖不當位而未至于大失不大失即吉也坎下乾上訟有孚窒惕中吉終凶利見大人不利涉大川訟爭辨也攻責也此卦上乾下坎以上下言上剛以制其下下必有所不堪下險以伺其上上又為其所脅以一人言內險則心忍于害物外健則力足以遂奸以兩人言則此既險能脅彼短以為辭彼又健能為我敵而不屈凡此皆訟道也故名訟及觀卦內九二中實上無應與有有孚而見窒之象坎為加憂有惕象卦變自遁來剛來居二而得中有中象上九過剛居訟之極有終極其訟之象九五剛健中正以居尊位有大人之象以剛乘險為以實履陷有不利涉大川之象文王本其象以著戒曰凡訟者必情真理正而見枉于人有孚而見窒則不免于訟矣然必心懷惕厲可已即已惕而中焉則吉苟務終極其事以為快則凶道也大人中正能公能明斯利見之若涉虛冒險涉大川焉則不利也訟雖衰世之事而聖賢處之依然仁厚正大之心天下皆我同體訟之事何忍見訟之辭何忍聞訟之意何忍萌也然必言不可訟又非所以御末世之變不得已而訟焉必自審果有孚乎果見窒乎是自反至矣恕物至矣然猶自慚自懼苟可已而已焉甚不樂其事之終蓋以不欲訟之心而行乎訟依然仁厚正大之意也彖曰訟上剛下險險而健訟訟者以卦德推為上剛下險又為險而健皆致訟之由故名訟訟有孚窒惕中吉剛來而得中也終凶訟不可成也利見大人尚中正也不利涉大川入于淵也其為有孚窒惕中吉者以卦變推之訟有自遁變來之義遁九三之剛來居于二而得中焉惟二居中則中實無應之象加憂得中之象皆出矣其曰終凶者以理言之訟非善事不可成也若終之則樂成其事是凶人之道也曰利見大人者以卦體推之繫辭聖人蓋取九五之中正也不利涉大川者以卦象推之乾剛而實坎險而陷以實物而履陷物之上則墜沒于深淵耳故不利象曰天與水違行訟君子以作事謀始天上水下相違而行訟象也凡訟生于爭爭皆生于始之不慎君子凡所作事必謀其始使其後無可爭之端則訟永絶矣初六不永所事小有言終吉人之終訟必剛健有勢力者能之初六隂柔才弱居下勢卑故其訟也能量力知止而不長永其事雖小有言語之傷而終于獲吉象曰不永所事訟不可長也雖小有言其辨明也不永所事蓋訟原不可長也雖小有言然其辨之未嘗不明又何不吉乎九二不克訟歸而逋其邑人三百戶無眚陽剛為險之主本欲訟者也然以剛居柔得中于下則其心猶知自屈于理况上應陽剛居尊之九五勢不相敵故始雖欲訟而其後竟不能乃歸而逋逃焉其所逃之地又邑人三百戶之小邑自處卑約如此庶可免于災患矣無眚雙湖胡氏曰初三四吉二僅無眚者以犯分于先不克而後逋竄非本無訟上之心也雲峰胡氏曰九二九四皆以剛居柔故皆不克訟但九四居健體之初非能用其健者九二為險體之主則本欲用其險者以勢不敵而避故僅可無眚象曰不克訟歸逋竄也自下訟上患至掇也二非不能訟者今乃不克訟而歸逋竄也何哉蓋二之訟五乃下訟上也自下訟上勢分不敵則其患之至皆自取也二明乎此能無逋竄耶六三食舊德貞厲終吉或從王事無成隂柔才弱非能訟者此其素分所謂舊德也夫能訟之人好訟尚凶况才弱之人不安其分意欲免危而適以召禍故其象為守素分而居正焉則雖有被侵之厲而我不好訟患無由生終必吉矣然處訟以無爭為貴而任事以有為為功如三之才或以從王事則不能成功也蓋爭訟貴其怯而有為存乎才此句泛說與上文不相繫象曰食舊德從上吉也食舊德者才不足有為惟從上所為則吉也故有無成之戒九四不克訟復即命渝安貞吉剛而不中有訟之象以其居柔故又為不克訟而復反就于正理且渝變其素而心安于貞焉吉道也夫人受天命以生天命以善不命以惡命以正不命以邪故命者正理也好訟之人是非忿怨之氣勃于中術數攻取之私熾于外安肯降心以就正理四剛中有柔故能復還就正理而以言其心則已脫然大變其矜強角勝之習不待矯強而安處于貞也聖人不貴無過而貴改過故許其吉象曰復即命渝安貞不失也向也騁私智背正理其失甚矣今復歸而即命渝變而安貞是乃得其立身制事之本則而不失也人亦何為不復不渝以甘失乎九五訟元吉陽剛中正以居尊位聽訟而得其平者也訟之直者見之必獲伸矣大善而吉象曰訟元吉以中正也中則聽不偏正則斷合理故訟之直者利見之上九或錫之鞶帶終朝三褫之剛居訟極好強務勝此終訟之凶人也當其幸而勝也或受賞于上而錫之鞶帶之服然終朝之間已三次褫奪之矣況所謂勝而受賞者又未必然乎象曰以訟受服亦不足敬也凡好訟者彼蓋以訟為能以勝為榮耳夫訟勝之榮至于受服而極矣然以訟受服亦不足敬狡橫取榮見者唾棄況因訟受服者又萬無一二乎甚矣其所為能者乃天下之大愚其所為榮者乃天下之大辱也亦可哀也坎下坤上師貞丈人吉無咎師兵衆也此卦下坎上坤伏至險于大順藏不測于至靜有寓兵于民之象又惟九二一陽居下卦之中有將帥之象上下五隂順而從之有兵衆之象九二以剛居下任事六五以柔居上而任之為人君命將出師之象故名師夫行師非聖人得已惟一以禁暴安民為主不忿不貪師得其正此第一本務要務也然行兵制勝變化不可概舉要在任老成明達之人熟厯事變而持重逺慮者乃可為將也行師以貞又任丈人為將則師出有功吉矣又何咎丈人不必素居崇貴但才謀德業衆所畏服者是也彖曰師衆也貞正也能以衆正可以王矣師之為言衆也貞之為言正也卦體一陽在下之中而五隂皆為所以此將帥之事兵衆皆聽其所以也以者欲左之則左之欲右之則右之之謂然以之于不正則為爭奪之禍以之于正則為王者之師夫行一不義殺一不辜而得天下不為則人孰不懷德服義願以為主可以王矣此行師所以首貴貞也剛中而應行險而順以此毒天下而民從之吉又何咎矣其曰丈人吉無咎者卦體九二剛中而六五應之剛則有勇有威中則虛𠂻善應此丈人之才也卦德則行險而順行兵凶戰危之事而一皆順乎人心之所願此丈人之德也丈人才德若此則雖以兵事毒害乎天下而民且悅從之事必克動合義吉又何咎矣毒如殺戮之慘供億之煩征戍之苦皆是雲峰胡氏曰毒之一字見王者之師不得已而用之如毒藥之攻病非沉疴堅癥不輕用也其指深矣象曰地中有水師君子以容民畜衆水之險汜于地外則為害矣惟藏于地中天下不見水惟見地而地之內實莫非水君子知國家不可無兵特兵形見則為亂惟藏兵于民凡平時厚其生聚善其政教皆以容保吾民耳而一旦有事即用之為兵蓋容民之中即以畜備其衆所以天下不見衆惟見民而民無非衆也初六師出以律否臧凶在卦之初出師之始也出師之道當謹始守律坐作進退之有節牛馬臣妾之無逸六步七步之不敢越四伐五伐之不敢亂皆有法焉當出師之始即宜申嚴其法所以一耳目齊心志為不可敗之基也苟其始不善則伍亂陳囂必為敵乘矣凶象曰師出以律失律凶也師出以律是必律之斷不可失故如此戒之也觀于失律必凶而安得不斷斷以律乎九二在師中吉無咎王三錫命在下而統羣隂是將帥之職也而有剛中之德以是德而在師中威德兼濟所謂丈人而吉無咎者也且上應于五受其寵任王三錫以命眷遇之殷不一而足將之得主以行志未有如二者也象曰在師中吉承天寵也王三錫命懷萬邦也人君寵任不専則威不伸權不重或中制或旁參計畫不行讒間滋起何由成功乎故二之在師中吉非獨二之能蓋由于承天王之寵遇也而王之所以寵二而三錫命者又豈私于二哉懷念萬邦愛萬邦之心切則其待安萬邦之人自不得不殷耳六三師或輿尸凶以隂居陽則才弱志剛不正不中則犯非其分以是人為將則師或至于撓敗覆沒而輿尸以歸者有之矣何凶如之象曰師或輿尸大無功也三固自必有功者孰意至于輿尸是大無功也六四師左次無咎隂柔不中雖不足于才而居隂得正量已之力全師而退無咎象曰左次無咎未失常也見可而進知難而退兵之常也左次雖無功亦未失常故無咎也六五田有禽利執言無咎長子帥師弟子輿尸貞凶柔順而中非好為兵端者特冦敵之起實為民患如田有禽以害稼則勢不獲已利于摶執之而已何咎此所謂師貞也但師行雖正而成敗係于用將苟九二長子帥師是將已得人矣又使三四弟子參之則是使之輿師而歸師雖正而實凶矣象曰長子帥師以中行也弟子輿尸使不當也所以必用長子帥師者謂其有剛中之道而行師也使之帥師當矣若弟子輿尸則使之不當也又誰咎乎上六大君有命開國承家小人勿用師之終順之極論功行賞之時也坤為土有國家之象故大君當功成之日有封賞之命焉功大者使之開國而為諸侯功小者使之承家而為大夫無差無吝此王者所以公天下也然興師之日用人之才不責其行雖小人亦可有功封賞固無不及也若任以官政與謀國事則不可故又戒以小人勿用象曰大君有命以正功也小人勿用必亂邦也功有大小必大君親命之而後大小之實可見以正功也若小人則斷乎勿用致戒如此之嚴者蓋用之必至于亂邦也以其挾私任術之心而立之政權之際彼肯晏然盡心于我而無他乎惟其亂邦之禍有必然者故斷以勿用隆山李氏曰六爻出師駐師將兵將將與夫奉辭伐罪旋師班賞無所不載雖後代兵書之煩殆不如師卦六爻之略況于論王者之師比之後世權謀之書竒正逺甚人君不得已而用兵何必捨此而他求哉建安丘氏曰出師之道不可不正故曰師貞帥師之任不可非人故曰丈人吉無咎蓋只七字而用師之道盡矣四之無咎不如二之吉而三之凶又不如四之無咎聖人以萬世用兵利害而權輕重于吉凶無咎四字之間後之出師命將者盍亦鑒于斯乎讀易日鈔卷一
